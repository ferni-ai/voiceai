# Cloud Build Configuration for Ferni Voice Agent
#
# This build includes:
# - Backend voice agent with dynamic agent bundle system
# - All agents in src/personas/bundles/ are auto-discovered
# - Environment variables configure voice IDs per environment
#
# CACHING STRATEGY (OPTIMIZED):
# - Kaniko builder with 168h (1 week) cache TTL
# - BuildKit 1.4 syntax enables parallel stage builds
# - Semantic versioning for cache invalidation
#
# To add a new agent:
# 1. Create bundle in src/personas/bundles/<agent-id>/
# 2. Set voice ID environment variable (e.g., MY_AGENT_VOICE_ID)
# 3. Deploy - agent will be auto-discovered
#
# See docs/AGENT-MANAGEMENT.md for details

substitutions:
  _CACHE_TTL: '24h'  # 1 day cache (reduced from 1 week)

steps:
  # Build with Kaniko (much better caching than docker build)
  # - Cache layers persist for 24 hours
  # - Parallel stage builds in Dockerfile
  # - Pushes BOTH :latest AND :$COMMIT_SHA tags for GitHub Actions compatibility
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--dockerfile=docker/Dockerfile.agent'
      - '--destination=gcr.io/$PROJECT_ID/ferni-voice-agent:latest'
      - '--destination=gcr.io/$PROJECT_ID/ferni-voice-agent:$COMMIT_SHA'
      - '--cache=true'
      - '--cache-ttl=${_CACHE_TTL}'
      - '--snapshot-mode=redo'
      - '--use-new-run'
      - '--push-retry=3'
    id: 'build-agent'

# Note: Kaniko pushes the image directly, so 'images:' section is not needed
# and can cause false "failed to find" errors due to timing issues

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '900s'  # Reduced from 1200s - builds should be ~5 min with caching
