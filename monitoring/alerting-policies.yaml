# ============================================================================
# MEMORY SYSTEM ALERTS
# Better Than Human memory maintenance monitoring
# ============================================================================

# Memory Consolidation Job Failure
# Triggers when weekly memory consolidation job fails
apiVersion: monitoring.googleapis.com/v1
kind: AlertPolicy
metadata:
  name: memory-consolidation-failure
  labels:
    severity: warning
    team: memory
spec:
  displayName: "Memory Consolidation Job Failed"
  documentation:
    content: |
      The weekly memory consolidation job has failed.

      **Impact:**
      - Related memories not being merged
      - Storage not being optimized
      - Memory retrieval may be slower

      **Investigation Steps:**
      1. Check job logs: `ferni ops logs --filter=memory-consolidation`
      2. Verify Firestore connectivity
      3. Check for timeout issues (job may need more time)
      4. Manual trigger: `ferni ops memory:trigger memory-consolidation`

      **Recovery:**
      - Job will retry automatically
      - If persistent, check `src/tasks/scheduled/memory-jobs.ts`
    mimeType: text/markdown
  conditions:
    - displayName: Memory consolidation job error
      conditionThreshold:
        filter: |
          resource.type="cloud_run_revision"
          AND resource.labels.service_name="john-bogle-ui"
          AND metric.type="logging.googleapis.com/log_entry_count"
          AND textPayload=~"Memory consolidation job failed"
        aggregations:
          - alignmentPeriod: 3600s
            perSeriesAligner: ALIGN_COUNT
        comparison: COMPARISON_GT
        thresholdValue: 0
        duration: 0s
  combiner: OR
  alertStrategy:
    autoClose: 86400s  # 24 hours (weekly job)
  notificationChannels:
    - projects/ferni-prod/notificationChannels/slack-alerts

