# Email Delivery Failure Alert
# Triggers when email delivery failure rate exceeds 5%
apiVersion: monitoring.googleapis.com/v1
kind: AlertPolicy
metadata:
  name: email-delivery-failures
  labels:
    severity: warning
    team: engagement
spec:
  displayName: "Email Delivery Failure Rate > 5%"
  documentation:
    content: |
      Email delivery failure rate has exceeded 5%.

      **Investigation Steps:**
      1. Check SendGrid/Mailgun status
      2. Verify API keys are valid
      3. Check for bounces or spam complaints

      **Impact:**
      - Share invites not being received
      - Marketplace notifications failing
      - User engagement affected
    mimeType: text/markdown
  conditions:
    - displayName: Email failures above threshold
      conditionThreshold:
        filter: |
          resource.type="cloud_run_revision"
          AND metric.type="custom.googleapis.com/email/delivery_failures"
        aggregations:
          - alignmentPeriod: 600s
            perSeriesAligner: ALIGN_RATE
        comparison: COMPARISON_GT
        thresholdValue: 0.05
        duration: 600s
  combiner: OR
  alertStrategy:
    autoClose: 3600s
  notificationChannels:
    - projects/ferni-prod/notificationChannels/slack-alerts

