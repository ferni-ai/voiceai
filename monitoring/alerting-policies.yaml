# Cloud Monitoring Alerting Policies
# Deploy with: gcloud alpha monitoring policies create --policy-from-file=alerting-policies.yaml
#
# These policies monitor critical API metrics and trigger alerts when thresholds are exceeded.

---
# API Error Rate Alert
# Triggers when error rate exceeds 1% over 5 minutes
apiVersion: monitoring.googleapis.com/v1
kind: AlertPolicy
metadata:
  name: api-error-rate-high
  labels:
    severity: critical
    team: api
spec:
  displayName: "API Error Rate > 1%"
  documentation:
    content: |
      The API error rate has exceeded 1% over the past 5 minutes.

      **Investigation Steps:**
      1. Check Cloud Run logs: `ferni ops:logs:errors`
      2. Check recent deployments
      3. Verify external service health (Stripe, Cartesia, etc.)

      **Escalation:**
      - Page on-call if error rate > 5%
      - Rollback if caused by recent deployment
    mimeType: text/markdown
  conditions:
    - displayName: Error rate above threshold
      conditionThreshold:
        filter: |
          resource.type="cloud_run_revision"
          AND resource.labels.service_name="john-bogle-ui"
          AND metric.type="run.googleapis.com/request_count"
          AND metric.labels.response_code_class!="2xx"
        aggregations:
          - alignmentPeriod: 300s
            perSeriesAligner: ALIGN_RATE
            crossSeriesReducer: REDUCE_SUM
        comparison: COMPARISON_GT
        thresholdValue: 0.01  # 1%
        duration: 300s
  combiner: OR
  alertStrategy:
    autoClose: 1800s  # 30 minutes
  notificationChannels:
    - projects/ferni-prod/notificationChannels/email-oncall
    - projects/ferni-prod/notificationChannels/slack-alerts

---
# P95 Latency Alert
# Triggers when P95 latency exceeds 500ms
apiVersion: monitoring.googleapis.com/v1
kind: AlertPolicy
metadata:
  name: api-latency-high
  labels:
    severity: warning
    team: api
spec:
  displayName: "API P95 Latency > 500ms"
  documentation:
    content: |
      API P95 latency has exceeded 500ms.

      **Investigation Steps:**
      1. Check for slow database queries
      2. Check external API latency (Cartesia, Stripe)
      3. Review recent code changes

      **Common Causes:**
      - Database connection pool exhaustion
      - Cold starts after scale-down
      - External API slowdown
    mimeType: text/markdown
  conditions:
    - displayName: P95 latency above threshold
      conditionThreshold:
        filter: |
          resource.type="cloud_run_revision"
          AND resource.labels.service_name="john-bogle-ui"
          AND metric.type="run.googleapis.com/request_latencies"
        aggregations:
          - alignmentPeriod: 300s
            perSeriesAligner: ALIGN_PERCENTILE_95
        comparison: COMPARISON_GT
        thresholdValue: 500  # milliseconds
        duration: 600s
  combiner: OR
  alertStrategy:
    autoClose: 1800s
  notificationChannels:
    - projects/ferni-prod/notificationChannels/slack-alerts

