# Cloud Scheduler Jobs for Marketplace Billing
#
# Deploy all jobs with:
#   ./scripts/deploy-marketplace-scheduler.sh
#
# Or individually with gcloud commands below.

jobs:
  # Daily: Usage aggregation and quota warnings
  # Runs every day at 6am PT
  - name: marketplace-daily-aggregation
    description: Daily marketplace usage aggregation and quota warnings
    schedule: "0 6 * * *"  # 6am every day
    timeZone: America/Los_Angeles
    httpTarget:
      uri: https://app.ferni.ai/api/jobs/marketplace-daily-aggregation
      httpMethod: POST
      headers:
        Content-Type: application/json
        X-CloudScheduler: "true"
    retryConfig:
      retryCount: 3
      minBackoffDuration: 30s
      maxBackoffDuration: 300s

  # Weekly: Usage reports for users
  # Runs every Monday at 9am PT
  - name: marketplace-weekly-reports
    description: Weekly marketplace usage reports for users
    schedule: "0 9 * * 1"  # 9am every Monday
    timeZone: America/Los_Angeles
    httpTarget:
      uri: https://app.ferni.ai/api/jobs/marketplace-weekly-reports
      httpMethod: POST
      headers:
        Content-Type: application/json
        X-CloudScheduler: "true"
    retryConfig:
      retryCount: 3
      minBackoffDuration: 60s
      maxBackoffDuration: 600s

  # Monthly: Revenue calculation
  # Runs at midnight on the 1st of each month
  - name: marketplace-monthly-revenue
    description: Monthly marketplace revenue share calculation
    schedule: "0 0 1 * *"  # Midnight on 1st of month
    timeZone: America/Los_Angeles
    httpTarget:
      uri: https://app.ferni.ai/api/jobs/marketplace-monthly-revenue
      httpMethod: POST
      headers:
        Content-Type: application/json
        X-CloudScheduler: "true"
    retryConfig:
      retryCount: 3
      minBackoffDuration: 120s
      maxBackoffDuration: 900s

  # Monthly: Publisher payouts
  # Runs at noon on the 15th of each month
  - name: marketplace-publisher-payouts
    description: Process monthly publisher payouts via Stripe
    schedule: "0 12 15 * *"  # Noon on 15th of month
    timeZone: America/Los_Angeles
    httpTarget:
      uri: https://app.ferni.ai/api/jobs/marketplace-publisher-payouts
      httpMethod: POST
      headers:
        Content-Type: application/json
        X-CloudScheduler: "true"
    retryConfig:
      retryCount: 3
      minBackoffDuration: 120s
      maxBackoffDuration: 900s

  # Quarterly: Cleanup and archival
  # Runs at 2am on 1st of Jan, Apr, Jul, Oct
  - name: marketplace-quarterly-cleanup
    description: Quarterly cleanup and archival of old marketplace data
    schedule: "0 2 1 1,4,7,10 *"  # 2am on 1st of Jan, Apr, Jul, Oct
    timeZone: America/Los_Angeles
    httpTarget:
      uri: https://app.ferni.ai/api/jobs/marketplace-quarterly-cleanup
      httpMethod: POST
      headers:
        Content-Type: application/json
        X-CloudScheduler: "true"
    retryConfig:
      retryCount: 2
      minBackoffDuration: 300s
      maxBackoffDuration: 1800s

# ============================================================================
# MANUAL DEPLOYMENT COMMANDS
# ============================================================================
#
# Create daily aggregation job:
# gcloud scheduler jobs create http marketplace-daily-aggregation \
#   --location=us-central1 \
#   --schedule="0 6 * * *" \
#   --uri="https://app.ferni.ai/api/jobs/marketplace-daily-aggregation" \
#   --http-method=POST \
#   --headers="Content-Type=application/json,X-CloudScheduler=true" \
#   --time-zone="America/Los_Angeles" \
