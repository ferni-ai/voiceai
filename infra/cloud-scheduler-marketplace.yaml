# ============================================================================
# MANAGEMENT COMMANDS
# ============================================================================
#
# List all marketplace jobs:
# gcloud scheduler jobs list --location=us-central1 | grep marketplace
#
# Run a job manually:
# gcloud scheduler jobs run marketplace-daily-aggregation --location=us-central1
#
# Delete a job:
# gcloud scheduler jobs delete marketplace-daily-aggregation --location=us-central1
#
# Pause a job:
# gcloud scheduler jobs pause marketplace-publisher-payouts --location=us-central1
#
# Resume a job:
# gcloud scheduler jobs resume marketplace-publisher-payouts --location=us-central1
