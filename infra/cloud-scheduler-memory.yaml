# Cloud Scheduler Jobs for Memory System Maintenance
#
# These jobs ensure long-term health and efficiency of the memory system:
# - Consolidation: Merges related memories to reduce storage
# - Decay: Applies graceful forgetting to old, low-importance memories
# - Deduplication: Removes redundant memories
# - Health Check: Monitors system health and sends alerts
#
# Deploy with gcloud commands below or via Terraform.

jobs:
  # Memory Consolidation - runs weekly on Sundays at 3am PT
  # Compresses related memories for long-term users
  - name: memory-consolidation
    description: Weekly memory consolidation for long-term users
    schedule: "0 3 * * 0"  # 3am every Sunday
    timeZone: America/Los_Angeles
    httpTarget:
      uri: https://app.ferni.ai/api/jobs/memory-consolidation
      httpMethod: POST
      headers:
        Content-Type: application/json
        X-CloudScheduler: "true"
    retryConfig:
      retryCount: 2
      minBackoffDuration: 60s
      maxBackoffDuration: 300s

  # Memory Decay - runs daily at 4am PT
  # Applies graceful forgetting to old memories
  - name: memory-decay
    description: Daily memory decay for graceful forgetting
    schedule: "0 4 * * *"  # 4am every day
    timeZone: America/Los_Angeles
    httpTarget:
      uri: https://app.ferni.ai/api/jobs/memory-decay
      httpMethod: POST
      headers:
        Content-Type: application/json
        X-CloudScheduler: "true"
    retryConfig:
      retryCount: 2
      minBackoffDuration: 30s
      maxBackoffDuration: 120s

  # Memory Deduplication - runs weekly on Saturdays at 2am PT
  # Removes redundant memories to optimize storage
  - name: memory-deduplication
    description: Weekly memory deduplication cleanup
    schedule: "0 2 * * 6"  # 2am every Saturday
    timeZone: America/Los_Angeles
    httpTarget:
      uri: https://app.ferni.ai/api/jobs/memory-deduplication
      httpMethod: POST
      headers:
        Content-Type: application/json
        X-CloudScheduler: "true"
    retryConfig:
      retryCount: 2
      minBackoffDuration: 60s
      maxBackoffDuration: 300s

  # Memory Health Check - runs every 4 hours
  # Monitors system health and sends alerts
  - name: memory-health-check
    description: Memory system health monitoring
    schedule: "0 */4 * * *"  # Every 4 hours
    timeZone: America/Los_Angeles
    httpTarget:
      uri: https://app.ferni.ai/api/jobs/memory-health-check
      httpMethod: POST
      headers:
        Content-Type: application/json
        X-CloudScheduler: "true"
    retryConfig:
      retryCount: 1
      minBackoffDuration: 30s
      maxBackoffDuration: 60s

  # Superhuman Memory Maintenance - runs nightly at 3am PT
  # LLM link detection, pattern formation, protection cleanup
  - name: memory-nightly-maintenance
    description: Nightly Superhuman Memory maintenance (LLM links, patterns, protection)
    schedule: "0 3 * * *"  # 3am every day
    timeZone: America/Los_Angeles
    httpTarget:
      uri: https://app.ferni.ai/api/memory/maintenance
      httpMethod: POST
      headers:
        Content-Type: application/json
        X-CloudScheduler: "true"
      body: |
        {"dryRun": false}
    retryConfig:
      retryCount: 2
      minBackoffDuration: 60s
      maxBackoffDuration: 300s

# ============================================================================
