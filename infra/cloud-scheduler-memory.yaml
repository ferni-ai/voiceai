#
# gcloud scheduler jobs create http memory-consolidation \
#   --location=us-central1 \
#   --schedule="0 3 * * 0" \
#   --uri="https://app.ferni.ai/api/jobs/memory-consolidation" \
#   --http-method=POST \
#   --headers="Content-Type=application/json,X-CloudScheduler=true" \
#   --time-zone="America/Los_Angeles" \
