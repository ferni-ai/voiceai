# Cloud Build Configuration for Ferni Speaker Pre-build
#
# Pre-builds the ferni-speaker native Rust module.
# Run this manually when ferni-speaker repo changes:
#
#   gcloud builds submit --config=cloudbuild-speaker.yaml
#
# The resulting image is cached in GCR and used by Dockerfile.ui
# to avoid rebuilding Rust from scratch on every UI deploy.

steps:
  # Build the speaker container image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          -f docker/Dockerfile.speaker \
          --build-arg GITHUB_PAT=$$GITHUB_PAT \
          -t gcr.io/$PROJECT_ID/ferni-speaker:latest \
          -t gcr.io/$PROJECT_ID/ferni-speaker:$(date +%Y%m%d) \
          .
    id: 'build-speaker'
    secretEnv: ['GITHUB_PAT']
    env:
      - 'DOCKER_BUILDKIT=1'

  # Push the container images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ferni-speaker:latest']
    waitFor: ['build-speaker']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ferni-speaker:$(date +%Y%m%d)']
    waitFor: ['build-speaker']

images:
  - 'gcr.io/$PROJECT_ID/ferni-speaker:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Access secrets from Secret Manager
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/github-pat/versions/latest
      env: 'GITHUB_PAT'

timeout: '1800s'

