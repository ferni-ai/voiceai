<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Favicon - Smiling Expression
     LUXO STYLE: opaque white eyes, NO pupils
     Expression conveyed through eye shape (curved bottom = smile) -->
<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="16" cy="16" r="14" fill="url(#orbGradient)"/>

  <!-- Left eye - happy curved (smile) -->
  <path d="M8.5,15 Q11,11 13.5,15" 
        fill="none" stroke="url(#eyeFill)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Right eye - happy curved (smile) -->
  <path d="M18.5,15 Q21,11 23.5,15" 
        fill="none" stroke="url(#eyeFill)" stroke-width="3" stroke-linecap="round"/>
</svg>
