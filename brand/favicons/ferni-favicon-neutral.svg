<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Favicon - Neutral Expression (32x32)
     LUXO STYLE: opaque white eyes, NO pupils
     This is the standard favicon for browser tabs -->
<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="16" cy="16" r="14" fill="url(#orbGradient)"/>

  <!-- Left eye - LUXO STYLE: opaque white, no pupils -->
  <ellipse cx="11" cy="15" rx="2.5" ry="3.2" fill="url(#eyeFill)"/>

  <!-- Right eye - LUXO STYLE: opaque white, no pupils -->
  <ellipse cx="21" cy="15" rx="2.5" ry="3.2" fill="url(#eyeFill)"/>
</svg>
