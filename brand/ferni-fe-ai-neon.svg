<?xml version="1.0" encoding="UTF-8"?>
<!-- FE AI logo - neon glow variant for special use -->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5fb870"/>
      <stop offset="100%" stop-color="#3d5a35"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring with glow -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#5fb870" stroke-width="2" opacity="0.6" filter="url(#neonGlow)"/>

  <!-- Circular background -->
  <circle cx="50" cy="50" r="40" fill="url(#orbGradient)"/>

  <!-- Left eye -->
  <ellipse cx="36" cy="47" rx="8" ry="10" fill="url(#eyeFill)"/>
  <circle cx="34" cy="43" r="2" fill="white"/>
  <circle cx="36" cy="45" r="0.8" fill="white" opacity="0.7"/>

  <!-- Right eye -->
  <ellipse cx="64" cy="47" rx="8" ry="10" fill="url(#eyeFill)"/>
  <circle cx="62" cy="43" r="2" fill="white"/>
  <circle cx="64" cy="45" r="0.8" fill="white" opacity="0.7"/>
</svg>
