<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- FE AI logo - neon glow variant for special use -->
  <defs>
    <linearGradient id="neonOrb" x1="0%" y1="100%" x2="100%" y2="0%" gradientTransform="rotate(-35)">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#5fb870"/>
    </linearGradient>
    <linearGradient id="neonShine" x1="0%" y1="0%" x2="60%" y2="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="46" fill="none" stroke="#5fb870" stroke-width="2" opacity="0.6" filter="url(#neonGlow)"/>
  <circle cx="50" cy="50" r="40" fill="url(#neonOrb)"/>
  <circle cx="50" cy="50" r="40" fill="url(#neonShine)"/>
  <text x="50" y="50" text-anchor="middle" dominant-baseline="central"
    font-family="'Plus Jakarta Sans', system-ui, sans-serif"
    font-size="30" font-weight="800" fill="white" letter-spacing="-1">
    <tspan dy="2">FE</tspan>
  </text>
</svg>
