<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- FE AI logo - dark gradient for dark backgrounds -->
  <defs>
    <linearGradient id="gradDarkOrb" x1="0%" y1="100%" x2="100%" y2="0%" gradientTransform="rotate(-35)">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#6a9a70"/>
    </linearGradient>
    <linearGradient id="gradDarkShine" x1="0%" y1="0%" x2="60%" y2="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <circle cx="50" cy="50" r="46" fill="none" stroke="#6a9a70" stroke-width="1.5" opacity="0.5"/>
  <circle cx="50" cy="50" r="40" fill="url(#gradDarkOrb)"/>
  <circle cx="50" cy="50" r="40" fill="url(#gradDarkShine)"/>
  <text x="50" y="50" text-anchor="middle" dominant-baseline="central"
    font-family="'Plus Jakarta Sans', system-ui, sans-serif"
    font-size="30" font-weight="800" fill="white" letter-spacing="-1">
    <tspan dy="2">FE</tspan>
  </text>
</svg>
