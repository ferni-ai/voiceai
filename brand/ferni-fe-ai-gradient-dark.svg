<?xml version="1.0" encoding="UTF-8"?>
<!-- FE AI logo - dark gradient for dark backgrounds -->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a9a70"/>
      <stop offset="100%" stop-color="#3d5a35"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#6a9a70" stroke-width="1.5" opacity="0.5"/>

  <!-- Circular background -->
  <circle cx="50" cy="50" r="40" fill="url(#orbGradient)"/>

  <!-- Left eye - LUXO STYLE: opaque white, no pupils -->
  <ellipse cx="36" cy="47" rx="8" ry="10" fill="url(#eyeFill)"/>

  <!-- Right eye - LUXO STYLE: opaque white, no pupils -->
  <ellipse cx="64" cy="47" rx="8" ry="10" fill="url(#eyeFill)"/>
</svg>
