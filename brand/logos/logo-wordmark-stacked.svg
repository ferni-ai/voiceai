<svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stackedOrb" x1="0%" y1="100%" x2="100%" y2="0%" gradientTransform="rotate(-35)">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#4a6741"/>
    </linearGradient>
    <linearGradient id="stackedShine" x1="0%" y1="0%" x2="60%" y2="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(20, 8)">
    <circle cx="40" cy="40" r="38" fill="none" stroke="#4a6741" stroke-width="1.5" opacity="0.35"/>
    <circle cx="40" cy="40" r="33" fill="url(#stackedOrb)"/>
    <circle cx="40" cy="40" r="33" fill="url(#stackedShine)"/>
    <text x="40" y="40" text-anchor="middle" dominant-baseline="central"
      font-family="'Plus Jakarta Sans', system-ui, sans-serif"
      font-size="24" font-weight="800" fill="white" letter-spacing="-0.5">
      <tspan dy="1">FE</tspan>
    </text>
  </g>
  
  <!-- Wordmark -->
  <text x="60" y="120" text-anchor="middle"
    font-family="'Plus Jakarta Sans', system-ui, sans-serif"
    font-size="28" font-weight="700" fill="#2c2520" letter-spacing="-0.5">Ferni</text>
</svg>
