<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo with three supportive orbs representing the team -->
  <defs>
    <linearGradient id="stonesMainOrb" x1="0%" y1="100%" x2="100%" y2="0%" gradientTransform="rotate(-35)">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#4a6741"/>
    </linearGradient>
    <linearGradient id="stonesShine" x1="0%" y1="0%" x2="60%" y2="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Supporting orbs (team representation) -->
  <circle cx="30" cy="65" r="18" fill="#3a6b73" opacity="0.6"/>
  <circle cx="170" cy="65" r="18" fill="#a67a6a" opacity="0.6"/>
  <circle cx="100" cy="80" r="14" fill="#c4856a" opacity="0.5"/>
  
  <!-- Main Ferni orb -->
  <circle cx="100" cy="45" r="40" fill="none" stroke="#4a6741" stroke-width="1.5" opacity="0.35"/>
  <circle cx="100" cy="45" r="35" fill="url(#stonesMainOrb)"/>
  <circle cx="100" cy="45" r="35" fill="url(#stonesShine)"/>
  <text x="100" y="45" text-anchor="middle" dominant-baseline="central"
    font-family="'Plus Jakarta Sans', system-ui, sans-serif"
    font-size="26" font-weight="800" fill="white" letter-spacing="-0.5">
    <tspan dy="2">FE</tspan>
  </text>
</svg>
