<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Logo - Animated Eyes with solid color base -->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes blink {
      0%, 94%, 100% { transform: scaleY(1); }
      97% { transform: scaleY(0.1); }
    }
    .orb-body { animation: breathe 4s ease-in-out infinite; transform-origin: center; }
    .eyes-group { animation: blink 5s ease-in-out infinite; transform-origin: center 47px; }
    @media (prefers-reduced-motion: reduce) {
      .orb-body, .eyes-group { animation: none; }
    }
  </style>

  <!-- Solid color rounded square background -->
  <rect class="orb-body" width="100" height="100" rx="18" fill="url(#orbGradient)"/>

  <!-- Eyes group (for blinking) -->
  <g class="eyes-group">
    <!-- Left eye -->
    <ellipse cx="36" cy="47" rx="10" ry="13" fill="url(#eyeFill)"/>
    <circle cx="34" cy="42" r="2.5" fill="white"/>
    <circle cx="36" cy="44" r="1" fill="white" opacity="0.7"/>

    <!-- Right eye -->
    <ellipse cx="64" cy="47" rx="10" ry="13" fill="url(#eyeFill)"/>
    <circle cx="62" cy="42" r="2.5" fill="white"/>
    <circle cx="64" cy="44" r="1" fill="white" opacity="0.7"/>
  </g>
</svg>
