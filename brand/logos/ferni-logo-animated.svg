<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="animOrb" x1="0%" y1="100%" x2="100%" y2="0%" gradientTransform="rotate(-35)">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#4a6741"/>
    </linearGradient>
    <linearGradient id="animShine" x1="0%" y1="0%" x2="60%" y2="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.25; }
    }
    .anim-body { animation: breathe 4s ease-in-out infinite; transform-origin: center; }
    .anim-shine { animation: shimmer 3s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .anim-body, .anim-shine { animation: none; }
    }
  </style>
  
  <g class="anim-body">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#4a6741" stroke-width="1.5" opacity="0.35"/>
    <circle cx="50" cy="50" r="40" fill="url(#animOrb)"/>
    <text x="50" y="50" text-anchor="middle" dominant-baseline="central"
      font-family="'Plus Jakarta Sans', system-ui, sans-serif"
      font-size="30" font-weight="800" fill="white" letter-spacing="-1">
      <tspan dy="2">FE</tspan>
    </text>
    <circle class="anim-shine" cx="50" cy="50" r="40" fill="url(#animShine)"/>
  </g>
</svg>
