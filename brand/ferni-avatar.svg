<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Avatar - Eyes design with ring and heart badge -->
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="avatarBadge" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#5a8060"/>
    </linearGradient>
    <filter id="avatarBadgeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#2c2520" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#4a6741" stroke-width="1.5" opacity="0.35"/>

  <!-- Circular background -->
  <circle cx="60" cy="60" r="48" fill="url(#orbGradient)"/>

  <!-- Left eye -->
  <ellipse cx="46" cy="57" rx="10" ry="13" fill="url(#eyeFill)"/>
  <circle cx="44" cy="52" r="2.5" fill="white"/>
  <circle cx="46" cy="54" r="1" fill="white" opacity="0.7"/>

  <!-- Right eye -->
  <ellipse cx="74" cy="57" rx="10" ry="13" fill="url(#eyeFill)"/>
  <circle cx="72" cy="52" r="2.5" fill="white"/>
  <circle cx="74" cy="54" r="1" fill="white" opacity="0.7"/>

  <!-- Heart badge -->
  <circle cx="98" cy="98" r="14" fill="url(#avatarBadge)" stroke="#FFFDFB" stroke-width="3" filter="url(#avatarBadgeShadow)"/>
  <path d="M98 93c0-2-1.6-3.6-3.6-3.6s-3.6 1.6-3.6 3.6c0 3.6 7 9 7 9s7-5.4 7-9c0-2-1.6-3.6-3.6-3.6s-3.6 1.6-3.6 3.6z"
    fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
