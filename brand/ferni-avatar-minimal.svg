<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimal avatar - smallest version, no effects -->
  <defs>
    <linearGradient id="minimalOrb" x1="0%" y1="100%" x2="100%" y2="0%" gradientTransform="rotate(-35)">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#4a6741"/>
    </linearGradient>
  </defs>
  
  <circle cx="50" cy="50" r="50" fill="url(#minimalOrb)"/>
  <text x="50" y="50" text-anchor="middle" dominant-baseline="central"
    font-family="'Plus Jakarta Sans', system-ui, sans-serif"
    font-size="38" font-weight="800" fill="white" letter-spacing="-1">
    <tspan dy="3">FE</tspan>
  </text>
</svg>
