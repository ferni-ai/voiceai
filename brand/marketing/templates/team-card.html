<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Card Template</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Design System -->
  <link rel="stylesheet" href="../../master-tokens.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f0f0;
      padding: 40px;
      gap: 40px;
      flex-wrap: wrap;
    }

    /* Team Card (1080x1080 for Instagram) */
    .team-card {
      width: 1080px;
      height: 1080px;
      background: var(--color-bg-primary);
      padding: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Background glow */
    .team-card::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, var(--persona-color) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      opacity: 0.15;
      pointer-events: none;
    }

    /* Overline */
    .card-overline {
      font-family: var(--font-body);
      font-size: 18px;
      font-weight: var(--font-semibold);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--persona-color);
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }

    /* Avatar */
    .card-avatar {
      width: 300px;
      height: 300px;
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }

    .avatar-glow {
      position: absolute;
      inset: -60px;
      background: radial-gradient(circle, var(--persona-color) 0%, transparent 70%);
      opacity: 0.3;
      border-radius: 50%;
    }

    .card-avatar svg {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 16px 48px rgba(0,0,0,0.15));
    }

    /* Name */
    .card-name {
      font-family: var(--font-display);
      font-size: 72px;
      font-weight: var(--font-extrabold);
      color: var(--color-text-primary);
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    /* Role */
    .card-role {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: var(--font-semibold);
      color: var(--persona-color);
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }

    /* Description */
    .card-description {
      font-family: var(--font-body);
      font-size: 28px;
      line-height: 1.5;
      color: var(--color-text-secondary);
      max-width: 700px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .card-logo {
      position: absolute;
      bottom: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-avatar {
      width: 48px;
      height: 48px;
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: var(--font-bold);
      color: var(--color-text-primary);
    }

    /* Persona colors */
    [data-persona="ferni"] { --persona-color: #4a6741; }
    [data-persona="maya"] { --persona-color: #a67a6a; }
    [data-persona="peter"] { --persona-color: #3a6b73; }
    [data-persona="jordan"] { --persona-color: #c4856a; }
    [data-persona="alex"] { --persona-color: #5a6b8a; }
    [data-persona="nayan"] { --persona-color: #b8956a; }

    /* Controls */
    .controls {
      position: fixed;
      top: 20px;
      left: 20px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      z-index: 100;
      font-family: var(--font-body);
    }

    .controls h3 {
      margin-bottom: 16px;
      font-size: 16px;
    }

    .controls label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .controls select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 12px;
      font-family: inherit;
    }

    .controls button {
      background: var(--color-accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .controls button:hover {
      background: var(--color-accent-hover);
    }
  </style>
</head>
<body>

  <!-- Controls Panel -->
  <div class="controls">
    <h3>Team Card Generator</h3>

    <label>Persona:</label>
    <select id="persona" onchange="updateCard()">
      <option value="ferni">Ferni - The Coordinator</option>
      <option value="maya">Maya - Habits Coach</option>
      <option value="peter">Peter - The Quant</option>
      <option value="jordan">Jordan - Life Planner</option>
      <option value="alex">Alex - Chief of Staff</option>
      <option value="nayan">Nayan - The Sage</option>
    </select>

    <button onclick="updateCard()">Update Card</button>
  </div>

  <!-- Team Card Preview -->
  <div class="team-card" id="card" data-persona="ferni">
    <span class="card-overline">Meet the Team</span>

    <div class="card-avatar">
      <div class="avatar-glow"></div>
      <svg viewBox="0 0 100 100" id="avatarSvg">
        <circle cx="50" cy="50" r="46" fill="#4a6741" id="avatarCircle"/>
        <ellipse cx="36" cy="48" rx="8" ry="10" fill="white"/>
        <ellipse cx="64" cy="48" rx="8" ry="10" fill="white"/>
      </svg>
    </div>

    <h2 class="card-name" id="personaName">Ferni</h2>
    <p class="card-role" id="personaRole">The Coordinator</p>
    <p class="card-description" id="personaDesc">
      Your primary companion. Listens deeply, connects the dots, knows when to bring in specialists.
    </p>

    <div class="card-logo">
      <svg class="logo-avatar" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="#4a6741"/>
        <ellipse cx="36" cy="48" rx="7" ry="9" fill="white"/>
        <ellipse cx="64" cy="48" rx="7" ry="9" fill="white"/>
      </svg>
      <span class="logo-text">Ferni</span>
    </div>
  </div>

  <script>
    const personaData = {
      ferni: {
        name: 'Ferni',
        role: 'The Coordinator',
        color: '#4a6741',
        description: 'Your primary companion. Listens deeply, connects the dots, knows when to bring in specialists.'
      },
      maya: {
        name: 'Maya',
        role: 'Habits Coach',
        color: '#a67a6a',
        description: 'Gentle accountability without shame. Celebrates your progress, never judges your setbacks.'
      },
      peter: {
        name: 'Peter',
        role: 'The Quant',
        color: '#3a6b73',
        description: 'Deep research on any topic. Financial guidance, market analysis, data-driven decisions.'
      },
      jordan: {
        name: 'Jordan',
        role: 'Life Planner',
        color: '#c4856a',
        description: 'Big dreams, concrete plans. Helps you turn "someday" into "this month" with realistic milestones.'
      },
      alex: {
        name: 'Alex',
        role: 'Chief of Staff',
        color: '#5a6b8a',
        description: 'Email strategy, calendar optimization, communication coaching. Your productivity partner.'
      },
      nayan: {
        name: 'Nayan',
        role: 'The Sage',
        color: '#b8956a',
        description: 'Life\'s deeper questions. Purpose, meaning, values. Wisdom from a place of genuine care.'
      }
    };

    function updateCard() {
      const persona = document.getElementById('persona').value;
      const pd = personaData[persona];

      document.getElementById('card').setAttribute('data-persona', persona);
      document.getElementById('personaName').textContent = pd.name;
      document.getElementById('personaRole').textContent = pd.role;
      document.getElementById('personaDesc').textContent = pd.description;
      document.getElementById('avatarCircle').setAttribute('fill', pd.color);
    }
  </script>
</body>
</html>
