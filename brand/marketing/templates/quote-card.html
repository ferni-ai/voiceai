<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Card Template</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Design System -->
  <link rel="stylesheet" href="../../master-tokens.css">

  <style>
    /* ============================================
       QUOTE CARD TEMPLATE
       Sizes: 1080x1080 (Instagram), 1200x630 (Facebook/LinkedIn)
       ============================================ */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f0f0;
      padding: 40px;
    }

    /* Square Card (1080x1080 for Instagram) */
    .quote-card-square {
      width: 1080px;
      height: 1080px;
      background: var(--color-bg-primary);
      padding: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Wide Card (1200x630 for Facebook/LinkedIn) */
    .quote-card-wide {
      width: 1200px;
      height: 630px;
      background: var(--color-bg-primary);
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background glow effect */
    .quote-card-square::before,
    .quote-card-wide::before {
      content: '';
      position: absolute;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--color-ferni-glow) 0%, transparent 70%);
      opacity: 0.4;
      pointer-events: none;
    }

    /* Quote mark */
    .quote-mark {
      font-family: var(--font-display);
      font-size: 180px;
      font-weight: var(--font-bold);
      line-height: 1;
      color: var(--color-accent-muted);
      margin-bottom: -40px;
    }

    .quote-card-wide .quote-mark {
      font-size: 120px;
      margin-bottom: -30px;
    }

    /* Quote text */
    .quote-text {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: var(--font-semibold);
      line-height: 1.3;
      color: var(--color-text-primary);
      margin-bottom: 48px;
      max-width: 90%;
    }

    .quote-card-wide .quote-text {
      font-size: 36px;
      margin-bottom: 32px;
    }

    /* Author info */
    .quote-author {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .author-avatar {
      width: 80px;
      height: 80px;
    }

    .quote-card-wide .author-avatar {
      width: 60px;
      height: 60px;
    }

    .author-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .author-name {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: var(--font-semibold);
      color: var(--color-text-primary);
    }

    .author-title {
      font-family: var(--font-body);
      font-size: 18px;
      color: var(--color-text-secondary);
    }

    .quote-card-wide .author-name {
      font-size: 20px;
    }

    .quote-card-wide .author-title {
      font-size: 16px;
    }

    /* Logo */
    .card-logo {
      position: absolute;
      bottom: 60px;
      right: 80px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-avatar {
      width: 48px;
      height: 48px;
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: var(--font-bold);
      color: var(--color-text-primary);
    }

    /* Persona variants */
    [data-persona="ferni"] { --persona-color: var(--color-ferni); }
    [data-persona="maya"] { --persona-color: var(--color-maya); }
    [data-persona="peter"] { --persona-color: var(--color-peter); }
    [data-persona="jordan"] { --persona-color: var(--color-jordan); }
    [data-persona="alex"] { --persona-color: var(--color-alex); }
    [data-persona="nayan"] { --persona-color: var(--color-nayan); }

    [data-persona] .quote-mark {
      color: var(--persona-color);
      opacity: 0.2;
    }

    [data-persona]::before {
      background: radial-gradient(circle, var(--persona-color) 0%, transparent 70%);
      opacity: 0.15;
    }

    /* Controls (not exported) */
    .controls {
      position: fixed;
      top: 20px;
      left: 20px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      z-index: 100;
      font-family: var(--font-body);
    }

    .controls h3 {
      margin-bottom: 16px;
      font-size: 16px;
    }

    .controls label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .controls select,
    .controls textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 12px;
      font-family: inherit;
    }

    .controls textarea {
      min-height: 80px;
      resize: vertical;
    }

    .controls button {
      background: var(--color-accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .controls button:hover {
      background: var(--color-accent-hover);
    }
  </style>
</head>
<body>

  <!-- Controls Panel -->
  <div class="controls">
    <h3>Quote Card Generator</h3>

    <label>Format:</label>
    <select id="format">
      <option value="square">Square (1080x1080 - Instagram)</option>
      <option value="wide">Wide (1200x630 - Facebook/LinkedIn)</option>
    </select>

    <label>Persona:</label>
    <select id="persona">
      <option value="ferni">Ferni</option>
      <option value="maya">Maya</option>
      <option value="peter">Peter</option>
      <option value="jordan">Jordan</option>
      <option value="alex">Alex</option>
      <option value="nayan">Nayan</option>
    </select>

    <label>Quote:</label>
    <textarea id="quote">Between therapy appointments. Between calls with friends. At 3am when everyone's asleep. There's a gap where you need someone.</textarea>

    <label>Author (optional):</label>
    <input type="text" id="author" value="" placeholder="Leave empty for Ferni branding">

    <button onclick="updateCard()">Update Card</button>
  </div>

  <!-- Quote Card Preview -->
  <div class="quote-card-square" id="card" data-persona="ferni">
    <span class="quote-mark">"</span>

    <p class="quote-text" id="quoteText">
      Between therapy appointments. Between calls with friends.
      At 3am when everyone's asleep. There's a gap where you need someone.
    </p>

    <div class="quote-author" id="authorSection">
      <svg class="author-avatar" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="var(--persona-color, #4a6741)"/>
        <ellipse cx="36" cy="48" rx="7" ry="9" fill="white"/>
        <ellipse cx="64" cy="48" rx="7" ry="9" fill="white"/>
      </svg>
      <div class="author-info">
        <span class="author-name" id="authorName">Ferni</span>
        <span class="author-title" id="authorTitle">The Coordinator</span>
      </div>
    </div>

    <div class="card-logo">
      <svg class="logo-avatar" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="var(--color-ferni)"/>
        <ellipse cx="36" cy="48" rx="7" ry="9" fill="white"/>
        <ellipse cx="64" cy="48" rx="7" ry="9" fill="white"/>
      </svg>
      <span class="logo-text">Ferni</span>
    </div>
  </div>

  <script>
    const personaData = {
      ferni: { name: 'Ferni', title: 'The Coordinator', color: '#4a6741' },
      maya: { name: 'Maya', title: 'Habits Coach', color: '#a67a6a' },
      peter: { name: 'Peter', title: 'The Quant', color: '#3a6b73' },
      jordan: { name: 'Jordan', title: 'Life Planner', color: '#c4856a' },
      alex: { name: 'Alex', title: 'Chief of Staff', color: '#5a6b8a' },
      nayan: { name: 'Nayan', title: 'The Sage', color: '#b8956a' }
    };

    function updateCard() {
      const format = document.getElementById('format').value;
      const persona = document.getElementById('persona').value;
      const quote = document.getElementById('quote').value;
      const author = document.getElementById('author').value;

      const card = document.getElementById('card');
      const quoteText = document.getElementById('quoteText');
      const authorName = document.getElementById('authorName');
      const authorTitle = document.getElementById('authorTitle');
      const authorAvatar = card.querySelector('.author-avatar circle');

      // Update format
      card.className = format === 'wide' ? 'quote-card-wide' : 'quote-card-square';

      // Update persona
      card.setAttribute('data-persona', persona);
      const pd = personaData[persona];
      authorAvatar.setAttribute('fill', pd.color);

      // Update content
      quoteText.textContent = quote;

      if (author) {
        authorName.textContent = author;
        authorTitle.textContent = '';
      } else {
        authorName.textContent = pd.name;
        authorTitle.textContent = pd.title;
      }
    }
  </script>
</body>
</html>
