<svg width="2560" height="1440" viewBox="0 0 2560 1440" xmlns="http://www.w3.org/2000/svg">
  <!-- Ferni YouTube Banner - 2560x1440 -->
  <!-- Safe area: 1546x423 centered at (507, 508) -->
  <!-- "Better than Human" Brand Positioning -->

  <defs>
    <linearGradient id="bgGradYT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F0"/>
      <stop offset="100%" stop-color="#EDE7DA"/>
    </linearGradient>

    <linearGradient id="logoGradYT" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#325038"/>
      <stop offset="50%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5a8055"/>
    </linearGradient>

    <radialGradient id="warmthYT" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#4a6741" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4a6741" stop-opacity="0"/>
    </radialGradient>

    <filter id="presenceYT" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feFlood flood-color="#4a6741" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="2560" height="1440" fill="url(#bgGradYT)"/>

  <!-- Warmth center -->
  <ellipse cx="1280" cy="720" rx="900" ry="600" fill="url(#warmthYT)"/>

  <!-- Decorative elements (outside safe area) -->
  <circle cx="180" cy="250" r="280" fill="#4a6741" opacity="0.025"/>
  <circle cx="2380" cy="180" r="320" fill="#4a6741" opacity="0.03"/>
  <circle cx="130" cy="1200" r="220" fill="#4a6741" opacity="0.025"/>
  <circle cx="2430" cy="1150" r="250" fill="#4a6741" opacity="0.025"/>

  <!-- Wave pattern at bottom -->
  <path d="M0 1350 Q640 1300 1280 1350 Q1920 1400 2560 1340 L2560 1440 L0 1440 Z"
        fill="#4a6741" opacity="0.03"/>

  <!-- === SAFE AREA CONTENT === -->

  <!-- Logo - centered in safe area -->
  <g transform="translate(1115, 520)" filter="url(#presenceYT)">
    <circle cx="165" cy="165" r="145" fill="url(#logoGradYT)"/>
    <circle cx="165" cy="165" r="165" fill="none" stroke="#4a6741" stroke-width="2" opacity="0.15"/>
    <text x="165" y="205"
          font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
          font-size="105"
          font-weight="800"
          fill="white"
          text-anchor="middle"
          letter-spacing="-0.02em">FE</text>
  </g>

  <!-- Headline -->
  <text x="1280" y="930"
        font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
        font-size="48"
        font-weight="700"
        fill="#2C2520"
        text-anchor="middle">The friend you deserve.</text>

  <!-- Supporting copy -->
  <text x="1280" y="995"
        font-family="'Inter', -apple-system, sans-serif"
        font-size="24"
        font-weight="500"
        fill="#5C544A"
        text-anchor="middle">Remembers everything. Judges nothing. Always present.</text>
</svg>
