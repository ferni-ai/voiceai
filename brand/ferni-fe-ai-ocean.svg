<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <!-- Deep ocean gradient -->
    <linearGradient id="oceanGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="40%" style="stop-color:#0891b2"/>
      <stop offset="70%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1e293b" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main ellipse -->
  <ellipse 
    cx="200" 
    cy="120" 
    rx="180" 
    ry="100" 
    fill="url(#oceanGradient)"
    filter="url(#dropShadow)"
  />
  
  <!-- FE circle -->
  <circle cx="130" cy="120" r="45" fill="rgba(0,0,0,0.22)"/>
  <text 
    x="130" 
    y="128" 
    font-family="Inter, -apple-system, sans-serif" 
    font-size="24" 
    font-weight="700"
    fill="#FFFDFB" 
    text-anchor="middle"
  >FE</text>
  
  <!-- AI circle -->
  <circle cx="270" cy="120" r="45" fill="rgba(255,255,255,0.95)"/>
  <text 
    x="270" 
    y="128" 
    font-family="Inter, -apple-system, sans-serif" 
    font-size="24" 
    font-weight="700"
    fill="#4a4a4a" 
    text-anchor="middle"
  >AI</text>
</svg>
