<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <linearGradient id="ferniGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6741"/>
      <stop offset="100%" style="stop-color:#3d5a35"/>
    </linearGradient>
  </defs>
  
  <!-- Main Ferni ellipse -->
  <ellipse 
    cx="100" 
    cy="60" 
    rx="90" 
    ry="50" 
    fill="url(#ferniGradient)"
  />
  
  <!-- FE circle -->
  <circle cx="65" cy="60" r="22" fill="#5a6b5a" opacity="0.85"/>
  <text x="65" y="66" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#FFFDFB" text-anchor="middle">FE</text>
  
  <!-- AI circle -->
  <circle cx="135" cy="60" r="22" fill="#FFFDFB" opacity="0.9"/>
  <circle cx="135" cy="60" r="21" fill="none" stroke="#b8c4b4" stroke-width="1"/>
  <text x="135" y="66" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#4a6741" text-anchor="middle">AI</text>
</svg>
