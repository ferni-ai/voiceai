# Kyutai TTS 1.6B (en/fr) - moshi-server worker config
# Source: https://github.com/kyutai-labs/delayed-streams-modeling/blob/main/configs/config-tts.toml
# Use with: moshi-server worker --config configs/kyutai-tts.toml
# Expose: /api/tts_streaming (e.g. port 8090)
# Auth: ?auth_id=public_token or kyutai-api-key header

static_dir = "./static/"
log_dir = "$HOME/tmp/tts-logs"
instance_name = "tts"
authorized_ids = ["public_token"]

[modules.tts_py]
type = "Py"
path = "/api/tts_streaming"
text_tokenizer_file = "hf://kyutai/tts-1.6b-en_fr/tokenizer_spm_8k_en_fr_audio.model"
batch_size = 8
text_bos_token = 1

[modules.tts_py.py]
log_folder = "$HOME/tmp/moshi-server-logs"
voice_folder = "hf-snapshot://kyutai/tts-voices/**/*.safetensors"
default_voice = "unmute-prod-website/default_voice.wav"
cfg_coef = 2.0
cfg_is_no_text = true
padding_between = 1
n_q = 24
padding_bonus = 0
