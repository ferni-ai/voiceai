<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Jack Bogle</title>
    
    <style>
        /* Self-hosted Nunito Sans - closest to Avenir */
        @font-face {
            font-family: 'Nunito Sans';
            font-style: normal;
            font-weight: 300;
            font-display: swap;
            src: url('fonts/nunito-sans-300.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Nunito Sans';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('fonts/nunito-sans-400.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Nunito Sans';
            font-style: normal;
            font-weight: 500;
            font-display: swap;
            src: url('fonts/nunito-sans-500.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Nunito Sans';
            font-style: normal;
            font-weight: 600;
            font-display: swap;
            src: url('fonts/nunito-sans-600.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Nunito Sans';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url('fonts/nunito-sans-700.woff2') format('woff2');
        }

        :root {
            /* Premium dark theme */
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --bg-elevated: #242424;
            --bg-hover: #2a2a2a;
            
            /* Text hierarchy */
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.72);
            --text-tertiary: rgba(255, 255, 255, 0.48);
            --text-disabled: rgba(255, 255, 255, 0.24);
            
            /* Brand accent - warm gold */
            --accent: #c8a45c;
            --accent-hover: #d4b56e;
            --accent-pressed: #b8944c;
            --accent-glow: rgba(200, 164, 92, 0.24);
            --accent-subtle: rgba(200, 164, 92, 0.08);
            
            /* Status */
            --success: #30d158;
            --success-glow: rgba(48, 209, 88, 0.32);
            
            /* Animation curves - Uber/Google style springs */
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-in-out: cubic-bezier(0.45, 0, 0.55, 1);
            --spring: cubic-bezier(0.5, 1.5, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            /* Avenir on Apple devices, Nunito Sans elsewhere */
            font-family: 'Avenir', 'Avenir Next', 'Nunito Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            font-feature-settings: 'kern' 1, 'liga' 1;
        }

        /* App container */
        .app {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Ambient background effects */
        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0;
            transition: opacity 1.2s var(--ease-out-expo);
        }

        .ambient-orb.top {
            width: 400px;
            height: 400px;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
        }

        .ambient-orb.bottom {
            width: 600px;
            height: 300px;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(ellipse, var(--accent-subtle) 0%, transparent 60%);
        }

        .app.connected .ambient-orb {
            opacity: 1;
        }

        /* Header */
        .header {
            padding: 48px 24px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .header-content {
            opacity: 0;
            transform: translateY(-24px) scale(0.96);
            animation: headerIn 0.7s var(--ease-out-expo) 0.1s forwards;
        }

        @keyframes headerIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Avatar */
        .avatar-wrap {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
        }

        .avatar-ring {
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--accent), transparent 50%, var(--accent));
            opacity: 0;
            transform: scale(0.9) rotate(-90deg);
            transition: all 0.6s var(--ease-out-expo);
        }

        .app.connected .avatar-ring {
            opacity: 1;
            transform: scale(1) rotate(0deg);
            animation: ringRotate 8s linear infinite;
        }

        @keyframes ringRotate {
            to { transform: rotate(360deg); }
        }

        .avatar-ring::after {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: var(--bg-primary);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .avatar-text {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 1px;
        }

        .status-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            background: var(--bg-tertiary);
            border: 3px solid var(--bg-primary);
            border-radius: 50%;
            z-index: 2;
            transition: all 0.4s var(--ease-out-back);
        }

        .app.connected .status-indicator {
            background: var(--success);
            box-shadow: 0 0 16px var(--success-glow);
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 8px var(--success-glow); }
            50% { box-shadow: 0 0 20px var(--success-glow); }
        }

        .name {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.2px;
            margin-bottom: 2px;
        }

        .subtitle {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-tertiary);
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        /* Main visualizer */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 32px;
            min-height: 0;
        }

        /* Waveform bars */
        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 100px;
            opacity: 0;
            transform: translateY(16px);
            animation: waveIn 0.7s var(--ease-out-expo) 0.25s forwards;
        }

        @keyframes waveIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bar {
            width: 4px;
            height: 32px;
            background: var(--bg-elevated);
            border-radius: 2px;
            transition: background 0.3s ease, height 0.3s ease;
        }

        /* Idle state */
        .bar { animation: barIdle 2.4s ease-in-out infinite; }
        .bar:nth-child(1) { animation-delay: 0.0s; }
        .bar:nth-child(2) { animation-delay: 0.15s; }
        .bar:nth-child(3) { animation-delay: 0.3s; }
        .bar:nth-child(4) { animation-delay: 0.45s; }
        .bar:nth-child(5) { animation-delay: 0.3s; }
        .bar:nth-child(6) { animation-delay: 0.15s; }
        .bar:nth-child(7) { animation-delay: 0.0s; }

        @keyframes barIdle {
            0%, 100% { transform: scaleY(0.5); opacity: 0.3; }
            50% { transform: scaleY(1); opacity: 0.5; }
        }

        /* Listening state */
        .app.connected.listening .bar {
            background: var(--accent);
            animation: barListen 1.6s ease-in-out infinite;
        }

        @keyframes barListen {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1); }
        }

        /* Speaking state - more energetic */
        .app.connected.speaking .bar {
            background: linear-gradient(to top, var(--accent), var(--accent-hover));
            animation: barSpeak 0.6s ease-in-out infinite;
        }

        .app.connected.speaking .bar:nth-child(1) { animation-duration: 0.5s; }
        .app.connected.speaking .bar:nth-child(2) { animation-duration: 0.55s; }
        .app.connected.speaking .bar:nth-child(3) { animation-duration: 0.6s; }
        .app.connected.speaking .bar:nth-child(4) { animation-duration: 0.65s; }
        .app.connected.speaking .bar:nth-child(5) { animation-duration: 0.6s; }
        .app.connected.speaking .bar:nth-child(6) { animation-duration: 0.55s; }
        .app.connected.speaking .bar:nth-child(7) { animation-duration: 0.5s; }

        @keyframes barSpeak {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1.4); }
        }

        /* Message */
        .message {
            margin-top: 28px;
            text-align: center;
            min-height: 48px;
        }

        .message-text {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1.4;
            max-width: 280px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.4s var(--ease-out-expo);
        }

        .message-text.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .message-text.quote {
            font-style: italic;
            color: var(--text-tertiary);
            font-size: 15px;
        }

        /* Footer controls */
        .footer {
            padding: 20px 24px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            opacity: 0;
            transform: translateY(24px);
            animation: footerIn 0.7s var(--ease-out-expo) 0.4s forwards;
        }

        @keyframes footerIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Primary button */
        .btn-primary {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: var(--accent);
            color: var(--bg-primary);
            box-shadow: 0 4px 20px var(--accent-glow);
            transition: all 0.25s var(--ease-out-expo);
            -webkit-user-select: none;
            user-select: none;
        }

        .btn-primary:hover {
            transform: scale(1.06);
            box-shadow: 0 8px 28px var(--accent-glow);
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        /* Ripple effect */
        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: scale(0);
            opacity: 0;
        }

        .btn-primary:active::before {
            animation: btnRipple 0.5s var(--ease-out-expo);
        }

        @keyframes btnRipple {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* Connecting pulse */
        .app.connecting .btn-primary {
            animation: connectPulse 1.5s ease-in-out infinite;
        }

        @keyframes connectPulse {
            0%, 100% { box-shadow: 0 4px 20px var(--accent-glow); }
            50% { box-shadow: 0 4px 40px var(--accent-glow), 0 0 0 12px var(--accent-subtle); }
        }

        /* Secondary button */
        .btn-secondary {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            background: var(--bg-elevated);
            color: var(--text-secondary);
            transition: all 0.25s var(--ease-out-expo);
        }

        .btn-secondary:hover {
            transform: scale(1.06);
            background: var(--bg-hover);
        }

        .btn-secondary:active {
            transform: scale(0.96);
        }

        .btn-secondary svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Helper text */
        .helper {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-disabled);
            letter-spacing: 0.3px;
        }

        /* Safe areas */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .footer {
                padding-bottom: calc(28px + env(safe-area-inset-bottom));
            }
            .header {
                padding-top: calc(40px + env(safe-area-inset-top));
            }
        }

        /* Hidden audio */
        audio { display: none; }

        /* Responsive */
        @media (max-height: 680px) {
            .header { padding: 36px 24px 16px; }
            .avatar-wrap { width: 64px; height: 64px; margin-bottom: 12px; }
            .avatar { width: 64px; height: 64px; }
            .avatar-text { font-size: 20px; }
            .name { font-size: 20px; }
            .waveform { height: 80px; }
            .footer { padding: 16px 24px 28px; }
        }

        @media (max-height: 560px) {
            .subtitle { display: none; }
            .waveform { height: 60px; }
            .message { margin-top: 16px; }
            .btn-primary, .btn-secondary { width: 56px; height: 56px; }
        }
    </style>
</head>
<body>
    <audio id="connectSound" src="connect.mp3" preload="auto"></audio>
    <audio id="disconnectSound" src="disconnect.mp3" preload="auto"></audio>

    <div id="app" class="app">
        <div class="ambient">
            <div class="ambient-orb top"></div>
            <div class="ambient-orb bottom"></div>
        </div>

        <header class="header">
            <div class="header-content">
                <div class="avatar-wrap">
                    <div class="avatar-ring"></div>
                    <div class="avatar">
                        <span class="avatar-text">JB</span>
                    </div>
                    <div class="status-indicator"></div>
                </div>
                <h1 class="name">Jack Bogle</h1>
                <p class="subtitle">Your Financial Guide</p>
            </div>
        </header>

        <main class="main">
            <div class="waveform">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <div class="message">
                <p id="messageText" class="message-text quote visible">"Stay the course."</p>
            </div>
        </main>

        <footer class="footer">
            <button id="connectBtn" class="btn-primary" aria-label="Start conversation">
                <svg viewBox="0 0 24 24">
                    <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                </svg>
            </button>
            
            <button id="disconnectBtn" class="btn-secondary" aria-label="End conversation">
                <svg viewBox="0 0 24 24">
                    <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
                </svg>
            </button>
            
            <span id="helper" class="helper">Tap to talk with Jack</span>
        </footer>
    </div>

    <!-- Spotify Web Playback SDK -->
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    
    <script src="livekit-client.umd.js?v=2"></script>
    <script>
        if (typeof LivekitClient === 'undefined') {
            console.error('LiveKit SDK failed to load');
        } else {
            window.LiveKit = LivekitClient;
        }
    </script>
    <script src="spotify-player.js?v=1"></script>
    <script src="app.js?v=12"></script>
</body>
</html>
