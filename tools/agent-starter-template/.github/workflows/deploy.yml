name: Deploy Agent

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Ferni CLI
        run: npm install -g @ferni/cli
      
      - name: Validate Agent
        run: ferni agent validate my-agent
      
      - name: Deploy Agent
        run: ferni agent publish my-agent
        env:
          FERNI_API_KEY: ${{ secrets.FERNI_API_KEY }}
      
      - name: Post Deploy URL
        run: echo "🚀 Deployed to https://my-agent.agents.ferni.ai"
