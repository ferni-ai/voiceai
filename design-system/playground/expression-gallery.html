<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferni Expression Gallery — All 100 Luxo Expressions</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ferni: #4a6741;
      --ferni-light: #5a7a51;
      --ferni-dark: #3d5a35;
      --cream: #F5F1E8;
      --cream-dark: #E8E2D9;
      --ink: #2C2520;
      --ink-light: #5C544A;
      --accent: #c4856a;
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-gentle: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      color: var(--ink);
    }

    header {
      text-align: center;
      padding: 24px 20px 16px;
      background: white;
      border-bottom: 1px solid var(--cream-dark);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    h1 { font-size: 1.4rem; font-weight: 800; color: var(--ferni); }
    .subtitle { font-size: 0.75rem; color: var(--ink-light); margin-top: 4px; }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .controls button {
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s var(--ease-gentle);
    }

    .controls button.primary { background: var(--ferni); color: white; }
    .controls button.primary:hover { background: var(--ferni-dark); transform: scale(1.05); }
    .controls button.secondary { background: var(--cream); color: var(--ink); }
    .controls button.secondary:hover { background: var(--cream-dark); }
    .controls button.active { box-shadow: 0 0 0 2px var(--ferni); }

    .speed-control {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      color: var(--ink-light);
    }

    .speed-control input { width: 80px; }

    .main {
      display: flex;
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .preview-panel {
      flex: 0 0 300px;
      position: sticky;
      top: 120px;
      height: fit-content;
    }

    .preview-card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 8px 40px rgba(44,37,32,0.08);
      text-align: center;
    }

    .preview-avatar {
      width: 180px;
      height: 180px;
      margin: 0 auto 16px;
      position: relative;
    }

    .expression-name { font-size: 1.2rem; font-weight: 700; color: var(--ferni); margin-bottom: 4px; }
    .expression-family { font-size: 0.75rem; color: var(--ink-light); text-transform: uppercase; letter-spacing: 0.5px; }

    .expression-details {
      margin-top: 16px;
      text-align: left;
      font-size: 0.7rem;
      color: var(--ink-light);
      background: var(--cream);
      padding: 12px;
      border-radius: 12px;
    }

    .expression-details dt { font-weight: 600; color: var(--ink); margin-top: 8px; }
    .expression-details dt:first-child { margin-top: 0; }
    .expression-details dd { margin-left: 0; }

    .gallery-panel { flex: 1; }

    .family-section { margin-bottom: 24px; }

    .family-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--ferni);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--cream-dark);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .family-count {
      font-size: 0.65rem;
      font-weight: 600;
      background: var(--cream);
      padding: 2px 8px;
      border-radius: 10px;
      color: var(--ink-light);
    }

    .expression-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
    }

    .expression-card {
      background: white;
      border-radius: 16px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s var(--ease-spring);
      text-align: center;
      border: 2px solid transparent;
    }

    .expression-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(44,37,32,0.12); }
    .expression-card.active { border-color: var(--ferni); background: rgba(74, 103, 65, 0.05); }
    .expression-card.playing { animation: pulse 1s ease-in-out infinite; }

    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

    .mini-avatar { width: 60px; height: 60px; margin: 0 auto 8px; position: relative; }
    .expression-label { font-size: 0.65rem; font-weight: 600; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .avatar { width: 100%; height: 100%; position: relative; }

    .avatar-body {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      height: 75%;
      background: var(--ferni);
      border-radius: 50% 50% 45% 45%;
      transition: all 0.3s var(--ease-spring);
    }

    .eyes-container {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15%;
      transition: transform 0.2s var(--ease-gentle);
    }

    .eye {
      width: 28%;
      aspect-ratio: 1;
      background: white;
      border-radius: 50%;
      position: relative;
      transition: all 0.2s var(--ease-spring);
    }

    .lid-top {
      position: absolute;
      top: -2px;
      left: -4px;
      right: -4px;
      height: 50%;
      background: var(--ferni);
      border-radius: 50% 50% 0 0;
      transform-origin: bottom center;
      transform: scaleY(0);
      transition: transform 0.15s var(--ease-gentle);
    }

    .lid-bottom {
      position: absolute;
      bottom: -2px;
      left: -4px;
      right: -4px;
      height: 40%;
      background: var(--ferni);
      border-radius: 0 0 50% 50%;
      transform-origin: top center;
      transform: scaleY(0);
      transition: transform 0.15s var(--ease-gentle);
    }

    /* Expression states - Happy family */
    .avatar[data-expression="happy"] .eye { transform: scaleY(0.75) scaleX(1.1); }
    .avatar[data-expression="happy"] .lid-top { transform: scaleY(0.3); }
    .avatar[data-expression="joyful"] .avatar-body { transform: translateX(-50%) translateY(-6px) scale(1.05); }
    .avatar[data-expression="joyful"] .eye { transform: scaleY(0.6) scaleX(1.15); }
    .avatar[data-expression="joyful"] .lid-top { transform: scaleY(0.4); }
    .avatar[data-expression="delighted"] .avatar-body { transform: translateX(-50%) translateY(-4px); }
    .avatar[data-expression="delighted"] .eye { transform: scaleY(0.7) scaleX(1.12); }
    .avatar[data-expression="delighted"] .lid-top { transform: scaleY(0.35); }
    .avatar[data-expression="amused"] .eye { transform: scaleY(0.8) scaleX(1.08); }
    .avatar[data-expression="amused"] .lid-top { transform: scaleY(0.25); }
    .avatar[data-expression="pleased"] .eye { transform: scaleY(0.82) scaleX(1.05); }
    .avatar[data-expression="pleased"] .lid-top { transform: scaleY(0.2); }
    .avatar[data-expression="content"] .eye { transform: scaleY(0.85); }
    .avatar[data-expression="content"] .lid-top { transform: scaleY(0.15); }
    .avatar[data-expression="excited"] .avatar-body { transform: translateX(-50%) translateY(-8px) scale(1.08); }
    .avatar[data-expression="excited"] .eye { transform: scaleY(1.1) scaleX(1.1); }
    .avatar[data-expression="grateful"] .eye { transform: scaleY(0.78) scaleX(1.08); }
    .avatar[data-expression="grateful"] .lid-top { transform: scaleY(0.25); }
    .avatar[data-expression="proud"] .avatar-body { transform: translateX(-50%) translateY(-5px) scale(1.03); }
    .avatar[data-expression="proud"] .eye { transform: scaleY(0.85) scaleX(1.05); }
    .avatar[data-expression="proud"] .lid-top { transform: scaleY(0.18); }

    /* Warmth family */
    .avatar[data-expression="warm"] .eye { transform: scaleY(0.8) scaleX(1.05); }
    .avatar[data-expression="warm"] .lid-top { transform: scaleY(0.22); }
    .avatar[data-expression="caring"] .avatar-body { transform: translateX(-50%) rotate(-3deg); }
    .avatar[data-expression="caring"] .eye { transform: scaleY(0.82) scaleX(1.05); }
    .avatar[data-expression="caring"] .lid-top { transform: scaleY(0.2); }
    .avatar[data-expression="loving"] .eye { transform: scaleY(0.75) scaleX(1.1); }
    .avatar[data-expression="loving"] .lid-top { transform: scaleY(0.28); }

    .avatar[data-expression="tender"] .lid-top { transform: scaleY(0.22); }

    .avatar[data-expression="supportive"] .lid-top { transform: scaleY(0.15); }

    .avatar[data-expression="compassionate"] .eye { transform: scaleY(0.82) scaleX(1.05); }
    .avatar[data-expression="compassionate"] .lid-top { transform: scaleY(0.2); }

    .avatar[data-expression="empathetic"] .eye { transform: scaleY(0.85) scaleX(1.02); }
    .avatar[data-expression="empathetic"] .lid-top { transform: scaleY(0.18); }

    /* Surprised family */
    .avatar[data-expression="surprised"] .eye { transform: scaleY(1.25) scaleX(1.15); }

    .avatar[data-expression="focused"] .lid-top { transform: scaleY(0.08); }
    .avatar[data-expression="processing"] .eye { transform: scaleY(0.9); }

    .avatar[data-expression="sympathetic"] .eye { transform: scaleY(0.85) scaleX(1.02); }

    .avatar[data-expression="understanding"] .eye { transform: scaleY(0.88); }
    .avatar[data-expression="understanding"] .lid-top { transform: scaleY(0.14); }
    .avatar[data-expression="comforting"] .avatar-body { transform: translateX(-50%) rotate(-3deg) translateY(-2px); }
    .avatar[data-expression="comforting"] .eye { transform: scaleY(0.82) scaleX(1.05); }
    .avatar[data-expression="comforting"] .lid-top { transform: scaleY(0.2); }

    /* Sad family */
    .avatar[data-expression="sad"] .avatar-body { transform: translateX(-50%) translateY(4px) scale(0.98); }

    .avatar[data-expression="attentive"] .avatar-body { transform: translateX(-50%) rotate(3deg); }
    .avatar[data-expression="engaged"] .eye { transform: scaleY(1.02) scaleX(1.02); }
    .avatar[data-expression="engaged"] .avatar-body { transform: translateX(-50%) rotate(2deg) translateY(-2px); }
    .avatar[data-expression="interested"] .eye { transform: scaleY(1.08) scaleX(1.03); }
    .avatar[data-expression="interested"] .avatar-body { transform: translateX(-50%) rotate(4deg); }
    .avatar[data-expression="absorbing"] .eye { transform: scaleY(1.05); }
    .avatar[data-expression="absorbing"] .lid-top { transform: scaleY(0.05); }
    .avatar[data-expression="receptive"] .eye { transform: scaleY(1.03) scaleX(1.02); }
    .avatar[data-expression="receptive"] .avatar-body { transform: translateX(-50%) translateY(-2px); }

    .avatar[data-expression="speaking"] .avatar-body { transform: translateX(-50%) scaleY(1.02); }
    .avatar[data-expression="speaking"] .eye { transform: scaleY(0.92); }

    .stats {
      text-align: center;
      padding: 20px;
      font-size: 0.7rem;
      color: var(--ink-light);
      background: white;
      border-top: 1px solid var(--cream-dark);
    }

    @media (max-width: 768px) {
      .main { flex-direction: column; }
      .preview-panel { position: relative; top: 0; flex: none; }
      .expression-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
      .mini-avatar { width: 50px; height: 50px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Ferni Expression Gallery</h1>
    <p class="subtitle">All 100 Luxo-Style Expressions — Click to Preview</p>
    <div class="controls">
      <button id="playAll" class="primary">Play All</button>
      <button id="stopAll" class="secondary">Stop</button>
      <button id="randomPlay" class="secondary">Random</button>
      <div class="speed-control">
        <label for="speed">Speed:</label>
        <input type="range" id="speed" min="200" max="2000" value="800">
        <span id="speedValue">800ms</span>
      </div>
    </div>
  </header>

  <div class="main">
    <div class="preview-panel">
      <div class="preview-card">
        <div class="preview-avatar">
          <div class="avatar" id="previewAvatar" data-expression="neutral">
            <div class="avatar-body">
              <div class="eyes-container">
                <div class="eye"><div class="lid-top"></div><div class="lid-bottom"></div></div>
                <div class="eye"><div class="lid-top"></div><div class="lid-bottom"></div></div>
              </div>
            </div>
          </div>
        </div>
        <div class="expression-name" id="currentName">neutral</div>
        <div class="expression-family" id="currentFamily">core</div>
        <dl class="expression-details">
          <dt>Family</dt>
          <dd id="detailFamily">core</dd>
          <dt>Animation</dt>
          <dd id="detailAnimation">none</dd>
          <dt>Eye Scale</dt>
          <dd id="detailEyeScale">1.0 x 1.0</dd>
        </dl>
      </div>
    </div>

    <div class="gallery-panel" id="gallery"></div>
  </div>

  <div class="stats">
    <span id="totalExpressions">0</span> expressions in <span id="totalFamilies">0</span> families
  </div>

  <script>
    const EXPRESSIONS = {
      core: ['neutral', 'listening', 'speaking'],
      happy: ['happy', 'joyful', 'delighted', 'amused', 'pleased', 'content', 'excited', 'grateful', 'proud'],
      warmth: ['warm', 'caring', 'loving', 'tender', 'supportive', 'compassionate', 'empathetic', 'nurturing'],
      playful: ['playful', 'mischievous', 'cheeky', 'silly', 'winking', 'teasing'],
      surprised: ['surprised', 'shocked', 'amazed', 'intrigued', 'astonished', 'curious'],
      thinking: ['thinking', 'pondering', 'contemplating', 'focused', 'processing', 'reflecting', 'analyzing'],
      listening: ['attentive', 'engaged', 'interested', 'absorbing', 'receptive'],
      presence: ['present', 'grounded', 'calm', 'serene', 'peaceful'],
      coaching: ['encouraging', 'cheering', 'guiding', 'wise', 'knowing'],
      tired: ['sleepy', 'drowsy', 'exhausted', 'yawning', 'resting', 'blissful'],
      concern: ['concerned', 'worried', 'sympathetic', 'understanding', 'comforting'],
      sad: ['sad', 'melancholy', 'disappointed', 'dejected'],
      cool: ['confident', 'smirking', 'cool', 'sassy', 'smug'],
    };

    let playInterval = null;
    let currentExpressionIndex = 0;
    const allExpressions = [];

    Object.entries(EXPRESSIONS).forEach(([family, expressions]) => {
      expressions.forEach(expr => allExpressions.push({ id: expr, family }));
    });

    function createAvatar(expression) {
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.dataset.expression = expression;

      const body = document.createElement('div');
      body.className = 'avatar-body';

      const eyesContainer = document.createElement('div');
      eyesContainer.className = 'eyes-container';

      for (let i = 0; i < 2; i++) {
        const eye = document.createElement('div');
        eye.className = 'eye';
        const lidTop = document.createElement('div');
        lidTop.className = 'lid-top';
        const lidBottom = document.createElement('div');
        lidBottom.className = 'lid-bottom';
        eye.appendChild(lidTop);
        eye.appendChild(lidBottom);
        eyesContainer.appendChild(eye);
      }

      body.appendChild(eyesContainer);
      avatar.appendChild(body);
      return avatar;
    }

    function generateGallery() {
      const gallery = document.getElementById('gallery');
      gallery.replaceChildren();

      Object.entries(EXPRESSIONS).forEach(([family, expressions]) => {
        const section = document.createElement('div');
        section.className = 'family-section';

        const title = document.createElement('h2');
        title.className = 'family-title';
        title.textContent = family.charAt(0).toUpperCase() + family.slice(1) + ' ';
        const count = document.createElement('span');
        count.className = 'family-count';
        count.textContent = String(expressions.length);
        title.appendChild(count);
        section.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'expression-grid';

        expressions.forEach(expr => {
          const card = document.createElement('div');
          card.className = 'expression-card';
          card.dataset.expression = expr;
          card.dataset.family = family;

          const miniAvatar = document.createElement('div');
          miniAvatar.className = 'mini-avatar';
          miniAvatar.appendChild(createAvatar(expr));
          card.appendChild(miniAvatar);

          const label = document.createElement('div');
          label.className = 'expression-label';
          label.textContent = expr;
          card.appendChild(label);

          card.addEventListener('click', () => {
            setPreviewExpression(expr, family);
            document.querySelectorAll('.expression-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
          });

          grid.appendChild(card);
        });

        section.appendChild(grid);
        gallery.appendChild(section);
      });

      document.getElementById('totalExpressions').textContent = String(allExpressions.length);
      document.getElementById('totalFamilies').textContent = String(Object.keys(EXPRESSIONS).length);
    }

    function setPreviewExpression(expr, family) {
      const previewAvatar = document.getElementById('previewAvatar');
      previewAvatar.dataset.expression = expr;
      document.getElementById('currentName').textContent = expr;
      document.getElementById('currentFamily').textContent = family;
      document.getElementById('detailFamily').textContent = family;
      document.getElementById('detailAnimation').textContent = 'CSS transition';
      document.getElementById('detailEyeScale').textContent = '~1.0 x 1.0';
    }

    function playAllExpressions() {
      stopPlayback();
      currentExpressionIndex = 0;
      const speed = parseInt(document.getElementById('speed').value);

      playInterval = setInterval(() => {
        if (currentExpressionIndex >= allExpressions.length) currentExpressionIndex = 0;
        const { id, family } = allExpressions[currentExpressionIndex];
        setPreviewExpression(id, family);
        document.querySelectorAll('.expression-card').forEach(c => c.classList.remove('active', 'playing'));
        const activeCard = document.querySelector('.expression-card[data-expression="' + id + '"]');
        if (activeCard) {
          activeCard.classList.add('active', 'playing');
          activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        currentExpressionIndex++;
      }, speed);

      document.getElementById('playAll').classList.add('active');
    }

    function stopPlayback() {
      if (playInterval) { clearInterval(playInterval); playInterval = null; }
      document.getElementById('playAll').classList.remove('active');
      document.querySelectorAll('.expression-card').forEach(c => c.classList.remove('playing'));
    }

    function playRandom() {
      const randomIndex = Math.floor(Math.random() * allExpressions.length);
      const { id, family } = allExpressions[randomIndex];
      setPreviewExpression(id, family);
      document.querySelectorAll('.expression-card').forEach(c => c.classList.remove('active'));
      const activeCard = document.querySelector('.expression-card[data-expression="' + id + '"]');
      if (activeCard) {
        activeCard.classList.add('active');
        activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    document.getElementById('playAll').addEventListener('click', playAllExpressions);
    document.getElementById('stopAll').addEventListener('click', stopPlayback);
    document.getElementById('randomPlay').addEventListener('click', playRandom);
    document.getElementById('speed').addEventListener('input', (e) => {
      document.getElementById('speedValue').textContent = e.target.value + 'ms';
      if (playInterval) playAllExpressions();
    });

    generateGallery();
    setPreviewExpression('neutral', 'core');
  </script>
</body>
</html>
