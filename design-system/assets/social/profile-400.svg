<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Ferni Social Media Profile Picture - 400x400 -->
  <!-- "Better than Human" Brand - Eyes Design -->

  <defs>
    <!-- Refined sage gradient with depth -->
    <linearGradient id="sageGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#325038"/>
      <stop offset="40%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5a8055"/>
    </linearGradient>

    <linearGradient id="eyeFillProfile" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>

    <!-- Warm inner glow - human warmth -->
    <radialGradient id="warmGlow" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="rgba(255,253,251,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Presence ring - subtle breathing effect -->
    <radialGradient id="presenceRing" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="rgba(90,128,85,0)"/>
      <stop offset="95%" stop-color="rgba(90,128,85,0.15)"/>
      <stop offset="100%" stop-color="rgba(90,128,85,0)"/>
    </radialGradient>

    <filter id="eyeShadowProfile" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="black" flood-opacity="0.1"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="2" flood-color="white" flood-opacity="0.5"/>
    </filter>

    <filter id="sparkleGlowProfile" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Presence indicator - outer glow -->
  <circle cx="200" cy="200" r="195" fill="url(#presenceRing)"/>

  <!-- Main circle - Sage Green -->
  <circle cx="200" cy="200" r="175" fill="url(#sageGradient)"/>

  <!-- Warmth overlay -->
  <circle cx="200" cy="200" r="175" fill="url(#warmGlow)"/>

  <!-- Subtle inner ring - grounded stability -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Eyes - No pupils, just white with sparkles -->
  <!-- Left Eye -->
  <g transform="translate(150, 195)">
    <ellipse cx="0" cy="0" rx="26" ry="34" fill="url(#eyeFillProfile)" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="21" ry="28" fill="url(#eyeFillProfile)" filter="url(#eyeShadowProfile)"/>
    <g transform="translate(-8, -12)" filter="url(#sparkleGlowProfile)">
      <circle cx="0" cy="0" r="6" fill="white"/>
      <circle cx="4" cy="3" r="2.4" fill="white" opacity="0.7"/>
    </g>
  </g>

  <!-- Right Eye -->
  <g transform="translate(250, 195)">
    <ellipse cx="0" cy="0" rx="26" ry="34" fill="url(#eyeFillProfile)" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="21" ry="28" fill="url(#eyeFillProfile)" filter="url(#eyeShadowProfile)"/>
    <g transform="translate(-7, -12)" filter="url(#sparkleGlowProfile)">
      <circle cx="0" cy="0" r="6" fill="white"/>
      <circle cx="4" cy="3" r="2.4" fill="white" opacity="0.7"/>
    </g>
  </g>
</svg>
