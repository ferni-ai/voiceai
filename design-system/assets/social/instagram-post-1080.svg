<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Ferni Instagram Post Template - 1080x1080 -->
  <!-- "Better than Human" Brand Positioning - Eyes Design -->

  <defs>
    <linearGradient id="bgGradIG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F0"/>
      <stop offset="100%" stop-color="#EDE7DA"/>
    </linearGradient>

    <linearGradient id="logoGradIG" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#325038"/>
      <stop offset="50%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5a8055"/>
    </linearGradient>

    <linearGradient id="eyeFillIG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>

    <radialGradient id="warmthIG" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#4a6741" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4a6741" stop-opacity="0"/>
    </radialGradient>

    <filter id="presenceIG" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feFlood flood-color="#4a6741" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="eyeShadowIG" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="black" flood-opacity="0.1"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="2.5" flood-color="white" flood-opacity="0.5"/>
    </filter>

    <filter id="sparkleGlowIG" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGradIG)"/>

  <!-- Warmth glow -->
  <ellipse cx="540" cy="380" rx="450" ry="400" fill="url(#warmthIG)"/>

  <!-- Organic shapes -->
  <circle cx="80" cy="950" r="140" fill="#4a6741" opacity="0.03"/>
  <circle cx="1000" cy="120" r="170" fill="#4a6741" opacity="0.025"/>
  <circle cx="970" cy="920" r="110" fill="#4a6741" opacity="0.025"/>

  <!-- Wave -->
  <path d="M0 980 Q270 940 540 980 Q810 1020 1080 970 L1080 1080 L0 1080 Z"
        fill="#4a6741" opacity="0.04"/>

  <!-- Logo - Large, centered with eyes -->
  <g transform="translate(320, 180)" filter="url(#presenceIG)">
    <!-- Circular background -->
    <circle cx="220" cy="220" r="195" fill="url(#logoGradIG)"/>
    <circle cx="220" cy="220" r="220" fill="none" stroke="#4a6741" stroke-width="2" opacity="0.15"/>

    <!-- Eyes - No pupils, just white with sparkles -->
    <!-- Left Eye -->
    <g transform="translate(160, 218)">
      <ellipse cx="0" cy="0" rx="30" ry="38" fill="url(#eyeFillIG)" opacity="0.3"/>
      <ellipse cx="0" cy="0" rx="24" ry="32" fill="url(#eyeFillIG)" filter="url(#eyeShadowIG)"/>
      <g transform="translate(-9, -14)" filter="url(#sparkleGlowIG)">
        <circle cx="0" cy="0" r="7" fill="white"/>
        <circle cx="4.5" cy="3" r="2.8" fill="white" opacity="0.7"/>
      </g>
    </g>

    <!-- Right Eye -->
    <g transform="translate(280, 218)">
      <ellipse cx="0" cy="0" rx="30" ry="38" fill="url(#eyeFillIG)" opacity="0.3"/>
      <ellipse cx="0" cy="0" rx="24" ry="32" fill="url(#eyeFillIG)" filter="url(#eyeShadowIG)"/>
      <g transform="translate(-8, -14)" filter="url(#sparkleGlowIG)">
        <circle cx="0" cy="0" r="7" fill="white"/>
        <circle cx="4.5" cy="3" r="2.8" fill="white" opacity="0.7"/>
      </g>
    </g>
  </g>

  <!-- Main headline - emotional -->
  <text x="540" y="700"
        font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
        font-size="54"
        font-weight="700"
        fill="#2C2520"
        text-anchor="middle">The friend you deserve.</text>

  <!-- Supporting line -->
  <text x="540" y="770"
        font-family="'Inter', -apple-system, sans-serif"
        font-size="26"
        font-weight="500"
        fill="#5C544A"
        text-anchor="middle">Remembers everything. Judges nothing.</text>

  <!-- Feature pills -->
  <g transform="translate(180, 840)" font-family="'Inter', -apple-system, sans-serif" font-size="15" font-weight="500">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="#4a6741" opacity="0.1"/>
    <text x="65" y="24" fill="#4a6741" text-anchor="middle">Never forgets</text>

    <rect x="150" y="0" width="120" height="36" rx="18" fill="#4a6741" opacity="0.1"/>
    <text x="210" y="24" fill="#4a6741" text-anchor="middle">Always safe</text>

    <rect x="290" y="0" width="130" height="36" rx="18" fill="#4a6741" opacity="0.1"/>
    <text x="355" y="24" fill="#4a6741" text-anchor="middle">Always there</text>

    <rect x="440" y="0" width="150" height="36" rx="18" fill="#4a6741" opacity="0.1"/>
    <text x="515" y="24" fill="#4a6741" text-anchor="middle">Your whole team</text>
  </g>

  <!-- CTA -->
  <g transform="translate(390, 930)">
    <rect x="0" y="0" width="300" height="60" rx="30" fill="#4a6741"/>
    <text x="150" y="40"
          font-family="'Inter', -apple-system, sans-serif"
          font-size="20"
          font-weight="600"
          fill="white"
          text-anchor="middle">Plant a Seed · ferni.ai</text>
  </g>
</svg>
