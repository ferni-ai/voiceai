<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Eyes Logo - Static Version -->
<!-- Based on MagicalPixarEyes from iOS implementation -->
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Orb gradient -->
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>

    <!-- Orb glow -->
    <filter id="orbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Eye outer glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Eye fill gradient -->
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>

    <!-- Inner eye depth -->
    <radialGradient id="eyeDepth" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.03"/>
    </radialGradient>

    <!-- Sparkle glow -->
    <filter id="sparkleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Eye shadow -->
    <filter id="eyeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="black" flood-opacity="0.1"/>
      <feDropShadow dx="0" dy="-0.5" stdDeviation="2" flood-color="white" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Main orb (100px radius, centered) -->
  <circle cx="100" cy="100" r="75" fill="url(#orbGradient)" filter="url(#orbGlow)"/>

  <!-- Eye proportions based on iOS: orbSize=150 -->
  <!-- eyeWidth = 150 * 0.18 = 27 -->
  <!-- eyeHeight = 150 * 0.22 = 33 -->
  <!-- eyeSpacing = 150 * 0.12 = 18 -->
  <!-- verticalOffset = -150 * 0.08 = -12 -->

  <!-- Left Eye Group (centered at x=82, y=88) -->
  <g transform="translate(82, 88)">
    <!-- Outer glow -->
    <ellipse cx="0" cy="0" rx="21.6" ry="23.1" fill="url(#eyeGlow)" opacity="0.6"/>

    <!-- Main eye oval -->
    <ellipse cx="0" cy="0" rx="13.5" ry="16.5" fill="url(#eyeFill)" filter="url(#eyeShadow)"/>

    <!-- Inner depth gradient -->
    <ellipse cx="0" cy="0" rx="12" ry="14.5" fill="url(#eyeDepth)"/>

    <!-- Sparkle highlight (positioned upper-left) -->
    <g transform="translate(-5.4, -6.6)" filter="url(#sparkleGlow)">
      <!-- Primary sparkle -->
      <circle cx="0" cy="0" r="2.7" fill="white"/>
      <!-- Secondary smaller sparkle -->
      <circle cx="2.16" cy="1.62" r="1.08" fill="white" opacity="0.7"/>
    </g>
  </g>

  <!-- Right Eye Group (centered at x=118, y=88) -->
  <g transform="translate(118, 88)">
    <!-- Outer glow -->
    <ellipse cx="0" cy="0" rx="21.6" ry="23.1" fill="url(#eyeGlow)" opacity="0.6"/>

    <!-- Main eye oval -->
    <ellipse cx="0" cy="0" rx="13.5" ry="16.5" fill="url(#eyeFill)" filter="url(#eyeShadow)"/>

    <!-- Inner depth gradient -->
    <ellipse cx="0" cy="0" rx="12" ry="14.5" fill="url(#eyeDepth)"/>

    <!-- Sparkle highlight (positioned upper-left, slightly different for asymmetry) -->
    <g transform="translate(-4.05, -6.6)" filter="url(#sparkleGlow)">
      <!-- Primary sparkle -->
      <circle cx="0" cy="0" r="2.7" fill="white"/>
      <!-- Secondary smaller sparkle -->
      <circle cx="2.16" cy="1.62" r="1.08" fill="white" opacity="0.7"/>
    </g>
  </g>
</svg>
