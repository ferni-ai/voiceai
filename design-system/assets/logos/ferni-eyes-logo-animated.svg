<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Eyes Logo - Animated with circular base and expressive eyes -->
<!-- Features: Natural blinking, subtle breathing, occasional looking -->
<!-- Follows Ferni EQ animation principles -->
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <filter id="eyeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="black" flood-opacity="0.1"/>
      <feDropShadow dx="0" dy="-0.5" stdDeviation="1.5" flood-color="white" flood-opacity="0.6"/>
    </filter>
    <filter id="sparkleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @media (prefers-reduced-motion: reduce) {
      .animated { animation: none !important; }
    }
  </style>

  <!-- Outer ring with subtle breathing -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#4a6741" stroke-width="1.5" stroke-opacity="0.35">
    <animate class="animated" attributeName="r" values="92;94;92" dur="8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </circle>

  <!-- Circular background with breathing (8s cycle - Ferni breath) -->
  <circle cx="100" cy="100" r="82" fill="url(#orbGradient)">
    <animate class="animated" attributeName="r" values="82;84;82" dur="8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </circle>

  <!-- Both Eyes Container (for synchronized looking) -->
  <g id="bothEyes">
    <!-- Subtle looking movement -->
    <animateTransform class="animated" attributeName="transform" type="translate"
      values="0,0; 2,-1; 0,0; -1.5,0.5; 0,0"
      dur="12s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>

    <!-- Left Eye Group - larger and more prominent -->
    <g id="leftEye" transform="translate(72, 98)">
      <!-- Outer glow -->
      <ellipse cx="0" cy="0" rx="18" ry="22" fill="url(#eyeFill)" opacity="0.3"/>

      <!-- Main eye with natural blinking -->
      <ellipse cx="0" cy="0" rx="15" fill="url(#eyeFill)" filter="url(#eyeShadow)">
        <animate class="animated" attributeName="ry"
          values="20;20;20;20;20;1;20;20;20;20;20;20;20;20;20;1;1;20"
          keyTimes="0;0.15;0.25;0.35;0.42;0.43;0.45;0.5;0.6;0.7;0.75;0.85;0.92;0.93;0.935;0.94;0.945;0.98"
          dur="6s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Sparkles -->
      <g transform="translate(-6, -8)" filter="url(#sparkleGlow)">
        <circle cx="0" cy="0" r="4" fill="white">
          <animate class="animated" attributeName="opacity" values="1;0.7;1;0.9;1" dur="3s" repeatCount="indefinite"/>
          <animate class="animated" attributeName="r"
            values="4;4;4;4;4;0;4;4;4;4;4;4;4;4;4;0;0;4"
            keyTimes="0;0.15;0.25;0.35;0.42;0.43;0.45;0.5;0.6;0.7;0.75;0.85;0.92;0.93;0.935;0.94;0.945;0.98"
            dur="6s" repeatCount="indefinite"/>
        </circle>
        <circle cx="3" cy="2" r="1.6" fill="white" opacity="0.7">
          <animate class="animated" attributeName="r"
            values="1.6;1.6;1.6;1.6;1.6;0;1.6;1.6;1.6;1.6;1.6;1.6;1.6;1.6;1.6;0;0;1.6"
            keyTimes="0;0.15;0.25;0.35;0.42;0.43;0.45;0.5;0.6;0.7;0.75;0.85;0.92;0.93;0.935;0.94;0.945;0.98"
            dur="6s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>

    <!-- Right Eye Group - larger and more prominent -->
    <g id="rightEye" transform="translate(128, 98)">
      <!-- Outer glow -->
      <ellipse cx="0" cy="0" rx="18" ry="22" fill="url(#eyeFill)" opacity="0.3"/>

      <!-- Main eye with natural blinking -->
      <ellipse cx="0" cy="0" rx="15" fill="url(#eyeFill)" filter="url(#eyeShadow)">
        <animate class="animated" attributeName="ry"
          values="20;20;20;20;20;1;20;20;20;20;20;20;20;20;20;1;1;20"
          keyTimes="0;0.15;0.25;0.35;0.42;0.43;0.45;0.5;0.6;0.7;0.75;0.85;0.92;0.93;0.935;0.94;0.945;0.98"
          dur="6s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Sparkles -->
      <g transform="translate(-5, -8)" filter="url(#sparkleGlow)">
        <circle cx="0" cy="0" r="4" fill="white">
          <animate class="animated" attributeName="opacity" values="1;0.85;1;0.75;1" dur="3.5s" repeatCount="indefinite"/>
          <animate class="animated" attributeName="r"
            values="4;4;4;4;4;0;4;4;4;4;4;4;4;4;4;0;0;4"
            keyTimes="0;0.15;0.25;0.35;0.42;0.43;0.45;0.5;0.6;0.7;0.75;0.85;0.92;0.93;0.935;0.94;0.945;0.98"
            dur="6s" repeatCount="indefinite"/>
        </circle>
        <circle cx="3" cy="2" r="1.6" fill="white" opacity="0.7">
          <animate class="animated" attributeName="r"
            values="1.6;1.6;1.6;1.6;1.6;0;1.6;1.6;1.6;1.6;1.6;1.6;1.6;1.6;1.6;0;0;1.6"
            keyTimes="0;0.15;0.25;0.35;0.42;0.43;0.45;0.5;0.6;0.7;0.75;0.85;0.92;0.93;0.935;0.94;0.945;0.98"
            dur="6s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
  </g>
</svg>
