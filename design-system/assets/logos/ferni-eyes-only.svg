<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Eyes Only - No Orb Background -->
<!-- For use on custom backgrounds or as icon overlay -->
<svg width="100" height="60" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Eye outer glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Eye fill gradient -->
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>

    <!-- Inner eye depth -->
    <radialGradient id="eyeDepth" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.03"/>
    </radialGradient>

    <!-- Sparkle glow -->
    <filter id="sparkleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Eye shadow -->
    <filter id="eyeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="black" flood-opacity="0.15"/>
      <feDropShadow dx="0" dy="-0.5" stdDeviation="2" flood-color="white" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Left Eye -->
  <g transform="translate(32, 30)">
    <!-- Outer glow -->
    <ellipse cx="0" cy="0" rx="18" ry="22" fill="url(#eyeGlow)" opacity="0.6"/>
    <!-- Main eye -->
    <ellipse cx="0" cy="0" rx="14" ry="18" fill="url(#eyeFill)" filter="url(#eyeShadow)"/>
    <!-- Inner depth -->
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="url(#eyeDepth)"/>
    <!-- Sparkle -->
    <g transform="translate(-5, -7)" filter="url(#sparkleGlow)">
      <circle cx="0" cy="0" r="3" fill="white"/>
      <circle cx="2.5" cy="2" r="1.2" fill="white" opacity="0.7"/>
    </g>
  </g>

  <!-- Right Eye -->
  <g transform="translate(68, 30)">
    <!-- Outer glow -->
    <ellipse cx="0" cy="0" rx="18" ry="22" fill="url(#eyeGlow)" opacity="0.6"/>
    <!-- Main eye -->
    <ellipse cx="0" cy="0" rx="14" ry="18" fill="url(#eyeFill)" filter="url(#eyeShadow)"/>
    <!-- Inner depth -->
    <ellipse cx="0" cy="0" rx="12" ry="16" fill="url(#eyeDepth)"/>
    <!-- Sparkle -->
    <g transform="translate(-4, -7)" filter="url(#sparkleGlow)">
      <circle cx="0" cy="0" r="3" fill="white"/>
      <circle cx="2.5" cy="2" r="1.2" fill="white" opacity="0.7"/>
    </g>
  </g>
</svg>
