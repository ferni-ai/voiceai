<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Favicon - Square icon with eyes -->
<!-- Optimized for small sizes (16x16, 32x32, etc.) -->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="url(#orbGradient)"/>

  <!-- Left eye - simplified for small size -->
  <ellipse cx="11" cy="14" rx="3" ry="4" fill="url(#eyeFill)"/>
  <circle cx="10" cy="12.5" r="0.8" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="21" cy="14" rx="3" ry="4" fill="url(#eyeFill)"/>
  <circle cx="20" cy="12.5" r="0.8" fill="white"/>
</svg>
