<?xml version="1.0" encoding="UTF-8"?>
<!-- Monochrome dark (dark icon for light backgrounds) -->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#2c2520" stroke-width="1.5" opacity="0.35"/>

  <!-- Circular background -->
  <circle cx="50" cy="50" r="40" fill="#2c2520"/>

  <!-- Left eye -->
  <ellipse cx="36" cy="47" rx="8" ry="10" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="64" cy="47" rx="8" ry="10" fill="white"/>
</svg>
