<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Favicon 192x192 - Eyes design -->
<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="badgeGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#5a8060"/>
    </linearGradient>
    <filter id="badgeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#2c2520" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="96" cy="96" r="90" fill="none" stroke="#4a6741" stroke-width="2" opacity="0.35"/>

  <!-- Circular background -->
  <circle cx="96" cy="96" r="80" fill="url(#orbGradient)"/>

  <!-- Left eye -->
  <ellipse cx="72" cy="92" rx="16" ry="20" fill="url(#eyeFill)"/>
  <circle cx="68" cy="86" r="4" fill="white"/>
  <circle cx="72" cy="89" r="1.6" fill="white" opacity="0.7"/>

  <!-- Right eye -->
  <ellipse cx="120" cy="92" rx="16" ry="20" fill="url(#eyeFill)"/>
  <circle cx="116" cy="86" r="4" fill="white"/>
  <circle cx="120" cy="89" r="1.6" fill="white" opacity="0.7"/>

  <!-- Heart badge -->
  <circle cx="156" cy="156" r="22" fill="url(#badgeGradient)" stroke="#FFFDFB" stroke-width="4" filter="url(#badgeShadow)"/>
  <path d="M156 149c0-3.2-2.6-5.8-5.8-5.8s-5.8 2.6-5.8 5.8c0 5.8 11 14.5 11 14.5s11-8.7 11-14.5c0-3.2-2.6-5.8-5.8-5.8s-5.8 2.6-5.8 5.8z"
    fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
