<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Ferni Twitter/X Header - 1500x500 -->
  <!-- "Better than Human" Brand Positioning - Eyes Design -->

  <defs>
    <!-- Warm background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F0"/>
      <stop offset="100%" stop-color="#EDE7DA"/>
    </linearGradient>

    <!-- Logo gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#325038"/>
      <stop offset="50%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5a8055"/>
    </linearGradient>

    <linearGradient id="eyeFillTW" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>

    <!-- Ambient warmth -->
    <radialGradient id="warmthCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a6741" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4a6741" stop-opacity="0"/>
    </radialGradient>

    <!-- Presence glow -->
    <filter id="logoGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#4a6741" flood-opacity="0.18"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="eyeShadowTW" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="black" flood-opacity="0.1"/>
      <feDropShadow dx="0" dy="-0.5" stdDeviation="1.5" flood-color="white" flood-opacity="0.5"/>
    </filter>

    <filter id="sparkleGlowTW" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>

  <!-- Warmth center -->
  <ellipse cx="750" cy="250" rx="600" ry="300" fill="url(#warmthCenter)"/>

  <!-- Organic shapes -->
  <circle cx="120" cy="420" r="150" fill="#4a6741" opacity="0.025"/>
  <circle cx="1380" cy="80" r="180" fill="#4a6741" opacity="0.03"/>
  <circle cx="1420" cy="450" r="100" fill="#4a6741" opacity="0.02"/>

  <!-- Subtle wave -->
  <path d="M0 460 Q375 430 750 460 Q1125 490 1500 450 L1500 500 L0 500 Z"
        fill="#4a6741" opacity="0.035"/>

  <!-- Logo - Centered, with presence and eyes -->
  <g transform="translate(615, 100)" filter="url(#logoGlow)">
    <circle cx="135" cy="135" r="110" fill="url(#logoGrad)"/>
    <!-- Presence ring -->
    <circle cx="135" cy="135" r="125" fill="none" stroke="#4a6741" stroke-width="1.5" opacity="0.15"/>

    <!-- Eyes - No pupils, just white with sparkles -->
    <!-- Left Eye -->
    <g transform="translate(95, 133)">
      <ellipse cx="0" cy="0" rx="17" ry="22" fill="url(#eyeFillTW)" opacity="0.3"/>
      <ellipse cx="0" cy="0" rx="14" ry="18" fill="url(#eyeFillTW)" filter="url(#eyeShadowTW)"/>
      <g transform="translate(-5, -8)" filter="url(#sparkleGlowTW)">
        <circle cx="0" cy="0" r="4" fill="white"/>
        <circle cx="2.5" cy="2" r="1.6" fill="white" opacity="0.7"/>
      </g>
    </g>

    <!-- Right Eye -->
    <g transform="translate(175, 133)">
      <ellipse cx="0" cy="0" rx="17" ry="22" fill="url(#eyeFillTW)" opacity="0.3"/>
      <ellipse cx="0" cy="0" rx="14" ry="18" fill="url(#eyeFillTW)" filter="url(#eyeShadowTW)"/>
      <g transform="translate(-4.5, -8)" filter="url(#sparkleGlowTW)">
        <circle cx="0" cy="0" r="4" fill="white"/>
        <circle cx="2.5" cy="2" r="1.6" fill="white" opacity="0.7"/>
      </g>
    </g>
  </g>

  <!-- Headline - Emotional, bold -->
  <text x="750" y="385"
        font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
        font-size="32"
        font-weight="700"
        fill="#2C2520"
        text-anchor="middle"
        letter-spacing="-0.01em">Everyone needs someone in their corner.</text>

  <!-- Tagline -->
  <text x="750" y="430"
        font-family="'Inter', -apple-system, sans-serif"
        font-size="16"
        font-weight="500"
        fill="#5C544A"
        text-anchor="middle">Never forgets. Always safe. Always there. ferni.ai</text>
</svg>
