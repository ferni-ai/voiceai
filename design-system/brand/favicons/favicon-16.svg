<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- 
    Ferni Favicon 16x16 - Three Stones
    Optimized for tiny display - simplified to essential shapes
  -->
  
  <!-- Background with rounded corners -->
  <rect width="16" height="16" rx="3" fill="#F5F1E8"/>
  
  <!-- Outer Stone: Body -->
  <circle cx="8" cy="8" r="6" fill="#4a6741"/>
  
  <!-- Middle Stone: Eye White -->
  <circle cx="8" cy="8" r="2.5" fill="white"/>
  
  <!-- Inner Stone: Pupil (simplified - no iris at this size) -->
  <circle cx="8" cy="8" r="1.2" fill="#2c2520"/>
  
  <!-- Catchlight (life spark) -->
  <circle cx="7.3" cy="7.3" r="0.4" fill="white" opacity="0.9"/>
</svg>
