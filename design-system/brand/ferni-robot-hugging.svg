<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- Warm gradient -->
    <linearGradient id="warmHead" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="30%" style="stop-color:#0891b2"/>
      <stop offset="60%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf4ff"/>
      <stop offset="100%" style="stop-color:#fae8ff"/>
    </linearGradient>
    
    <linearGradient id="limbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    
    <filter id="softShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1e293b" flood-opacity="0.15"/>
    </filter>
    
    <filter id="warmGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#ec4899" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Warm aura/glow behind -->
  <ellipse cx="200" cy="280" rx="180" ry="200" fill="#ec4899" opacity="0.05"/>
  <ellipse cx="200" cy="280" rx="140" ry="160" fill="#ec4899" opacity="0.05"/>
  
  <!-- === BODY === -->
  <rect 
    x="120" y="200" 
    width="160" height="180" 
    rx="40" ry="40"
    fill="url(#bodyGradient)"
    stroke="url(#limbGradient)"
    stroke-width="3"
    filter="url(#softShadow)"
  />
  
  <!-- Heart (glowing with love) -->
  <circle cx="200" cy="280" r="30" fill="#ec4899" opacity="0.2" filter="url(#warmGlow)"/>
  <circle cx="200" cy="280" r="18" fill="#ec4899" opacity="0.4"/>
  <circle cx="200" cy="280" r="10" fill="#ec4899"/>
  <!-- Heart shape -->
  <path d="M 200 275 C 192 267, 182 272, 182 280 C 182 290, 200 300, 200 300 C 200 300, 218 290, 218 280 C 218 272, 208 267, 200 275" fill="#FFFDFB" opacity="0.8"/>
  
  <!-- === ARMS (hugging self / open for hug) === -->
  <!-- Left arm wrapping -->
  <path d="M 85 250 Q 60 280, 90 320 Q 110 350, 150 340" fill="none" stroke="url(#limbGradient)" stroke-width="24" stroke-linecap="round"/>
  <circle cx="155" cy="335" r="18" fill="url(#limbGradient)"/>
  
  <!-- Right arm wrapping -->
  <path d="M 315 250 Q 340 280, 310 320 Q 290 350, 250 340" fill="none" stroke="url(#limbGradient)" stroke-width="24" stroke-linecap="round"/>
  <circle cx="245" cy="335" r="18" fill="url(#limbGradient)"/>
  
  <!-- === LEGS === -->
  <rect x="145" y="380" width="26" height="55" rx="13" fill="url(#limbGradient)"/>
  <ellipse cx="158" cy="445" rx="22" ry="12" fill="url(#limbGradient)"/>
  
  <rect x="229" y="380" width="26" height="55" rx="13" fill="url(#limbGradient)"/>
  <ellipse cx="242" cy="445" rx="22" ry="12" fill="url(#limbGradient)"/>
  
  <!-- === HEAD === -->
  <ellipse 
    cx="200" cy="110" 
    rx="130" ry="75" 
    fill="url(#warmHead)"
    filter="url(#softShadow)"
  />
  
  <!-- Shine -->
  <ellipse cx="200" cy="85" rx="100" ry="45" fill="rgba(255,255,255,0.1)"/>
  
  <!-- FE circle -->
  <circle cx="150" cy="110" r="32" fill="rgba(0,0,0,0.2)"/>
  <!-- Closed happy eye -->
  <path d="M 135 110 Q 150 95, 165 110" fill="none" stroke="#FFFDFB" stroke-width="4" stroke-linecap="round"/>
  
  <!-- AI circle -->
  <circle cx="250" cy="110" r="32" fill="rgba(255,255,255,0.9)"/>
  <!-- Closed happy eye -->
  <path d="M 235 110 Q 250 95, 265 110" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Content smile -->
  <path 
    d="M 170 145 Q 200 170, 230 145" 
    fill="none" 
    stroke="#FFFDFB" 
    stroke-width="4" 
    stroke-linecap="round"
  />
  
  <!-- Rosy cheeks -->
  <ellipse cx="125" cy="125" rx="12" ry="8" fill="#fda4af" opacity="0.5"/>
  <ellipse cx="275" cy="125" rx="12" ry="8" fill="#fda4af" opacity="0.5"/>
  
  <!-- Antenna -->
  <line x1="200" y1="35" x2="200" y2="10" stroke="url(#limbGradient)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="200" cy="8" r="8" fill="#ec4899"/>
  <circle cx="200" cy="8" r="4" fill="#FFFDFB"/>
  
  <!-- Small hearts floating -->
  <path d="M 60 80 C 55 75, 48 78, 48 83 C 48 90, 60 97, 60 97 C 60 97, 72 90, 72 83 C 72 78, 65 75, 60 80" fill="#ec4899" opacity="0.6"/>
  <path d="M 340 70 C 337 67, 332 69, 332 72 C 332 77, 340 82, 340 82 C 340 82, 348 77, 348 72 C 348 69, 343 67, 340 70" fill="#ec4899" opacity="0.5"/>
  <path d="M 45 140 C 43 138, 39 139, 39 141 C 39 144, 45 148, 45 148 C 45 148, 51 144, 51 141 C 51 139, 47 138, 45 140" fill="#ec4899" opacity="0.4"/>
</svg>
