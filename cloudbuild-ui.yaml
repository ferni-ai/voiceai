# Cloud Build Configuration for Ferni UI Server
#
# Builds the main UI server with frontend app and API routes.
# Uses modular Dockerfile from docker/ directory.

steps:
  # Build the UI container image (includes frontend-typescript build)
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '--no-cache'
      - '-f'
      - 'docker/Dockerfile.ui'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ferni-ui:latest'
      - '.'
    id: 'build-ui'
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ferni-ui:latest']
    waitFor: ['build-ui']

images:
  - 'gcr.io/$PROJECT_ID/ferni-ui:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '900s'
