steps:
  # Build the UI container image (includes frontend-typescript build)
  # Using --no-cache to ensure fresh builds pick up all changes
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '--no-cache'
      - '-f'
      - 'Dockerfile.ui'
      - '-t'
      - 'gcr.io/$PROJECT_ID/john-bogle-ui:latest'
      - '.'
    id: 'build-ui'
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/john-bogle-ui:latest']
    waitFor: ['build-ui']

images:
  - 'gcr.io/$PROJECT_ID/john-bogle-ui:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '900s'
