openapi: 3.0.3
info:
  title: Ferni Developer Platform API
  description: |
    Build AI-powered voice experiences with human-like conversational capabilities.
    Create custom personas, manage API access, configure webhooks, and monitor usage.

    ## Getting Started

    1. Sign up at [developers.ferni.ai](https://developers.ferni.ai)
    2. Create a test API key in the dashboard
    3. Make your first API call
    4. Create a persona and submit for review
    5. Upgrade to live API key for production

    ## Authentication

    Include your API key as a Bearer token:
    ```
    Authorization: Bearer ferni_live_xxxxxxxxxxxxx
    ```

    ### Key Types
    | Type | Prefix | Usage |
    |------|--------|-------|
    | Live | `ferni_live_` | Production, billed |
    | Test | `ferni_test_` | Development, free tier |

    ## Rate Limits
    | Tier | Requests/min | Sessions |
    |------|--------------|----------|
    | Free | 100 | 5 |
    | Pro | 500 | 25 |
    | Enterprise | Custom | Custom |

    ## Webhook Signatures

    Verify webhook authenticity using HMAC-SHA256:
    ```
    signature = HMAC-SHA256(secret, timestamp + "." + payload)
    ```

    Header format: `X-Webhook-Signature: t=1234567890,v1=abc123...`

  version: 2.0.0
  contact:
    name: Ferni Developer Support
    email: developers@ferni.ai
    url: https://developers.ferni.ai
  license:
    name: Proprietary

servers:
  - url: https://api.ferni.ai
    description: Production
  - url: https://api-staging.ferni.ai
    description: Staging

tags:
  - name: API Keys
    description: Manage API keys for authentication
  - name: Personas
    description: Create and manage AI personas
  - name: Webhooks
    description: Real-time event notifications
  - name: Analytics
    description: Usage statistics and insights
  - name: MCP Servers
    description: Register external Model Context Protocol servers
  - name: Custom Tools
    description: Create custom tools for your personas
  - name: Activities
    description: Track custom activities and events
  - name: Workflows
    description: Create multi-step automation workflows
  - name: OAuth
    description: Manage OAuth providers and tokens

security:
  - bearerAuth: []

paths:
  # ============================================================================
  # API KEYS
  # ============================================================================
  /api/v1/developers/keys:
    get:
      tags: [API Keys]
      summary: List API keys
      description: Returns all API keys (prefix only for security).
      operationId: listApiKeys
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKeyInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [API Keys]
      summary: Create API key
      description: |
        Creates a new API key. The full key is only shown once.
        Maximum 10 keys per account.
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [live, test]
                name:
                  type: string
                  maxLength: 100
            example:
              type: live
              name: Production App
      responses:
        '201':
          description: Key created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  key:
                    type: object
                    properties:
                      id:
                        type: string
                      apiKey:
                        type: string
                        description: Full key - save now!
                      type:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                  warning:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/developers/keys/{keyId}:
    delete:
      tags: [API Keys]
      summary: Revoke API key
      operationId: revokeApiKey
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/developers/keys/{keyId}/rotate:
    post:
      tags: [API Keys]
      summary: Rotate API key
      description: Revokes old key and generates new one.
      operationId: rotateApiKey
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Key rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  key:
                    type: object
                    properties:
                      id:
                        type: string
                      apiKey:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                  warning:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # PERSONAS
  # ============================================================================
  /api/v1/developers/personas:
    get:
      tags: [Personas]
      summary: List personas
      operationId: listPersonas
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  personas:
                    type: array
                    items:
                      $ref: '#/components/schemas/PersonaSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Personas]
      summary: Create persona draft
      description: |
        Creates a persona draft. Must pass validation before submission.

        **Lifecycle:** draft -> submitted -> approved -> published
      operationId: createPersona
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [manifest]
              properties:
                manifest:
                  $ref: '#/components/schemas/PersonaManifest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  persona:
                    $ref: '#/components/schemas/PersonaSummary'
                  validation:
                    $ref: '#/components/schemas/ValidationResult'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/developers/personas/{personaId}:
    get:
      tags: [Personas]
      summary: Get persona details
      operationId: getPersona
      parameters:
        - name: personaId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  persona:
                    $ref: '#/components/schemas/PersonaFull'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Personas]
      summary: Update persona
      description: Only drafts and rejected personas can be updated.
      operationId: updatePersona
      parameters:
        - name: personaId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [manifest]
              properties:
                manifest:
                  $ref: '#/components/schemas/PersonaManifest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  persona:
                    $ref: '#/components/schemas/PersonaSummary'
                  validation:
                    $ref: '#/components/schemas/ValidationResult'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Personas]
      summary: Delete persona
      description: Only drafts can be deleted.
      operationId: deletePersona
      parameters:
        - name: personaId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/developers/personas/{personaId}/validate:
    post:
      tags: [Personas]
      summary: Validate persona
      operationId: validatePersona
      parameters:
        - name: personaId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  validation:
                    $ref: '#/components/schemas/ValidationResult'
                  readyToSubmit:
                    type: boolean

  /api/v1/developers/personas/{personaId}/submit:
    post:
      tags: [Personas]
      summary: Submit for review
      operationId: submitPersona
      parameters:
        - name: personaId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  persona:
                    $ref: '#/components/schemas/PersonaSummary'

  # ============================================================================
  # WEBHOOKS
  # ============================================================================
  /api/v2/developers/webhooks:
    get:
      tags: [Webhooks]
      summary: List webhooks
      operationId: listWebhooks
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Webhook'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags: [Webhooks]
      summary: Create webhook
      description: |
        **Event Types:**
        - `session.started` - Voice session began
        - `session.ended` - Session completed
        - `session.error` - Error occurred
        - `persona.switched` - Persona handoff
        - `tool.executed` - Tool was called
        - `transcript.ready` - Transcript available
      operationId: createWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, url, events]
              properties:
                name:
                  type: string
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    $ref: '#/components/schemas/WebhookEventType'
                personaId:
                  type: string
                enabled:
                  type: boolean
                  default: true
            example:
              name: Session Events
              url: https://api.yourapp.com/webhooks/ferni
              events: [session.started, session.ended]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Webhook'

  /api/v2/developers/webhooks/{webhookId}:
    get:
      tags: [Webhooks]
      summary: Get webhook
      operationId: getWebhook
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Webhook'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Webhooks]
      summary: Update webhook
      operationId: updateWebhook
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    $ref: '#/components/schemas/WebhookEventType'
                enabled:
                  type: boolean
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Webhook'

    delete:
      tags: [Webhooks]
      summary: Delete webhook
      operationId: deleteWebhook
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      deleted:
                        type: boolean

  /api/v2/developers/webhooks/{webhookId}/test:
    post:
      tags: [Webhooks]
      summary: Send test event
      operationId: testWebhook
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                      statusCode:
                        type: integer
                      executionTimeMs:
                        type: integer
                      error:
                        type: string
                      payload:
                        $ref: '#/components/schemas/WebhookPayload'

  /api/v2/developers/webhooks/{webhookId}/logs:
    get:
      tags: [Webhooks]
      summary: Get delivery logs
      operationId: getWebhookLogs
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/WebhookDeliveryLog'
                      pagination:
                        $ref: '#/components/schemas/Pagination'

  # ============================================================================
  # ANALYTICS
  # ============================================================================
  /api/v1/developers/analytics/overview:
    get:
      tags: [Analytics]
      summary: Get overview
      description: Dashboard summary with comparison to previous period.
      operationId: getAnalyticsOverview
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month, year]
            default: week
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  period:
                    type: string
                  overview:
                    $ref: '#/components/schemas/AnalyticsOverview'

  /api/v1/developers/analytics/usage:
    get:
      tags: [Analytics]
      summary: Get usage over time
      operationId: getUsageOverTime
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month, year]
            default: week
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  period:
                    type: string
                  usage:
                    type: array
                    items:
                      $ref: '#/components/schemas/UsageDataPoint'

  /api/v1/developers/analytics/personas:
    get:
      tags: [Analytics]
      summary: Get persona usage
      operationId: getPersonaUsage
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month, year]
            default: week
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  period:
                    type: string
                  personas:
                    type: array
                    items:
                      $ref: '#/components/schemas/PersonaUsageStats'

  /api/v1/developers/analytics/errors:
    get:
      tags: [Analytics]
      summary: Get error breakdown
      operationId: getErrorBreakdown
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month, year]
            default: week
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  period:
                    type: string
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorBreakdown'

  # ============================================================================
  # MCP SERVERS (v2)
  # ============================================================================
  /api/v2/developers/mcp-servers:
    get:
      tags: [MCP Servers]
      summary: List MCP servers
      operationId: listMCPServers
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MCPServer'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags: [MCP Servers]
      summary: Register MCP server
      description: |
        Register an external MCP server to extend your personas with custom tools.
        
        **Transport Types:**
        - `http` - HTTP-based MCP server (most common)
        - `websocket` - WebSocket-based MCP server
        - `stdio` - Process-based MCP server (spawns a command)
      operationId: createMCPServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMCPServerInput'
            example:
              name: My CRM Tools
              description: Tools for CRM integration
              transport: http
              endpoint: https://my-mcp-server.example.com
              autoConnect: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MCPServer'

  /api/v2/developers/mcp-servers/{serverId}:
    get:
      tags: [MCP Servers]
      summary: Get MCP server
      operationId: getMCPServer
      parameters:
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MCPServer'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [MCP Servers]
      summary: Update MCP server
      operationId: updateMCPServer
      parameters:
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMCPServerInput'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MCPServer'

    delete:
      tags: [MCP Servers]
      summary: Delete MCP server
      operationId: deleteMCPServer
      parameters:
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      deleted:
                        type: boolean

  /api/v2/developers/mcp-servers/{serverId}/test:
    post:
      tags: [MCP Servers]
      summary: Test MCP server connection
      description: Tests the connection to the MCP server and discovers available tools.
      operationId: testMCPServer
      parameters:
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MCPServerTestResult'

  /api/v2/developers/mcp-servers/{serverId}/tools:
    get:
      tags: [MCP Servers]
      summary: List server tools
      description: Returns the list of tools available on the MCP server.
      operationId: getMCPServerTools
      parameters:
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tools list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      tools:
                        type: array
                        items:
                          type: string

  # ============================================================================
  # CUSTOM TOOLS (v2)
  # ============================================================================
  /api/v2/developers/tools:
    get:
      tags: [Custom Tools]
      summary: List custom tools
      operationId: listTools
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomTool'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags: [Custom Tools]
      summary: Create custom tool
      description: |
        Create a custom tool that can be used by your personas.
        
        **Execution Types:**
        - `webhook` - Calls an external HTTP endpoint
        - `mcp` - Calls a tool on a registered MCP server
        - `prompt` - Executes an LLM prompt
      operationId: createTool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateToolInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/CustomTool'

  /api/v2/developers/tools/{toolId}:
    get:
      tags: [Custom Tools]
      summary: Get custom tool
      operationId: getTool
      parameters:
        - name: toolId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/CustomTool'

    put:
      tags: [Custom Tools]
      summary: Update custom tool
      operationId: updateTool
      parameters:
        - name: toolId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateToolInput'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/CustomTool'

    delete:
      tags: [Custom Tools]
      summary: Delete custom tool
      operationId: deleteTool
      parameters:
        - name: toolId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      deleted:
                        type: boolean

  /api/v2/developers/tools/{toolId}/test:
    post:
      tags: [Custom Tools]
      summary: Test custom tool
      operationId: testTool
      parameters:
        - name: toolId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Test input parameters
      responses:
        '200':
