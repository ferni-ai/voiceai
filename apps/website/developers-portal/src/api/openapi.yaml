components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API key as Bearer token

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
        code:
          type: string

    Pagination:
      type: object
      properties:
        limit:
          type: integer
        nextCursor:
          type: string
        hasMore:
          type: boolean

    ApiKeyInfo:
      type: object
      properties:
        id:
          type: string
        keyPrefix:
          type: string
        type:
          type: string
          enum: [live, test]
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time

    PersonaSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        tagline:
          type: string
        category:
          type: string
        status:
          $ref: '#/components/schemas/PersonaStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PersonaFull:
      allOf:
        - $ref: '#/components/schemas/PersonaSummary'
        - type: object
          properties:
            manifest:
              $ref: '#/components/schemas/PersonaManifest'
            validationErrors:
              type: array
              items:
                type: string
            rejectionReason:
              type: string

    PersonaManifest:
      type: object
      required: [identity, voice, personality, knowledge]
      properties:
        identity:
          type: object
          required: [id, name, tagline]
          properties:
            id:
              type: string
              pattern: '^[a-z0-9-]+$'
            name:
              type: string
              maxLength: 50
            tagline:
              type: string
              minLength: 10
            description:
              type: string
            aliases:
              type: array
              items:
                type: string
        voice:
          type: object
          required: [provider, voice_id]
          properties:
            provider:
              type: string
              enum: [cartesia]
            voice_id:
              type: string
            name:
              type: string
        personality:
          type: object
          required: [warmth, humor_level, directness, formality, traits]
          properties:
            warmth:
              type: number
              minimum: 0
              maximum: 1
            humor_level:
              type: number
              minimum: 0
              maximum: 1
            directness:
              type: number
              minimum: 0
              maximum: 1
            formality:
              type: number
              minimum: 0
              maximum: 1
            traits:
              type: array
              minItems: 2
              items:
                type: string
        knowledge:
          type: object
          required: [category, domains]
          properties:
            category:
              type: string
            domains:
              type: array
              minItems: 1
              items:
                type: string
            expertise_tags:
              type: array
              items:
                type: string
        behaviors:
          type: object
          properties:
            greetings:
              type: array
              items:
                type: string
            backchannels:
              type: array
              items:
                type: string
            thinking_sounds:
              type: array
              items:
                type: string

    PersonaStatus:
      type: string
      enum: [draft, validating, submitted, approved, rejected, published]

    ValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string

    Webhook:
      type: object
      properties:
        id:
          type: string
        publisherId:
          type: string
        personaId:
          type: string
        name:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventType'
        secret:
          type: string
        enabled:
          type: boolean
        failureCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        lastDeliveredAt:
          type: string
          format: date-time

    WebhookEventType:
      type: string
      enum:
        - session.started
        - session.ended
        - session.error
        - persona.switched
        - tool.executed
        - transcript.ready

    WebhookPayload:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/WebhookEventType'
        timestamp:
          type: string
          format: date-time
        publisherId:
          type: string
        data:
          type: object

    WebhookDeliveryLog:
      type: object
      properties:
        id:
          type: string
        webhookId:
          type: string
        eventId:
          type: string
        eventType:
          $ref: '#/components/schemas/WebhookEventType'
        statusCode:
          type: integer
        success:
          type: boolean
        error:
          type: string
        executionTimeMs:
          type: integer
        attempt:
          type: integer
        createdAt:
          type: string
          format: date-time

    AnalyticsOverview:
      type: object
      properties:
        totalApiCalls:
          type: integer
        totalApiCallsChange:
          type: integer
        activePersonas:
          type: integer
        activePersonasChange:
          type: integer
        uniqueUsers:
          type: integer
        uniqueUsersChange:
          type: integer
        errorRate:
          type: number
        errorRateChange:
          type: integer
        avgResponseTime:
          type: integer
        avgResponseTimeChange:
          type: integer

    UsageDataPoint:
      type: object
      properties:
        date:
          type: string
          format: date
        apiCalls:
          type: integer
        uniqueUsers:
          type: integer
        errors:
          type: integer

    PersonaUsageStats:
      type: object
      properties:
        personaId:
          type: string
        personaName:
          type: string
        totalCalls:
          type: integer
        avgSessionDuration:
          type: integer
        uniqueUsers:
          type: integer

    ErrorBreakdown:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        count:
          type: integer
        lastOccurred:
          type: string
          format: date-time

    # MCP Server schemas
    MCPServer:
      type: object
      properties:
        id:
          type: string
        publisherId:
          type: string
        personaId:
          type: string
        name:
          type: string
        description:
          type: string
        transport:
          $ref: '#/components/schemas/MCPTransport'
        command:
          type: string
        args:
          type: array
          items:
            type: string
        endpoint:
          type: string
          format: uri
        headers:
          type: object
          additionalProperties:
            type: string
        hasSecrets:
          type: boolean
        autoConnect:
          type: boolean
        enabled:
          type: boolean
        timeout:
          type: integer
        status:
          $ref: '#/components/schemas/MCPServerStatus'
        toolCount:
          type: integer
        lastConnected:
          type: string
          format: date-time
        lastError:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MCPTransport:
      type: string
      enum: [http, websocket, stdio]

    MCPServerStatus:
      type: string
      enum: [active, error, disabled]

    CreateMCPServerInput:
      type: object
      required: [name, description, transport]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
        transport:
          $ref: '#/components/schemas/MCPTransport'
        command:
          type: string
          description: Command for stdio transport
        args:
          type: array
          items:
            type: string
        endpoint:
          type: string
          format: uri
          description: URL for http/websocket transport
        headers:
          type: object
          additionalProperties:
            type: string
        secrets:
          type: object
          additionalProperties:
            type: string
          description: Encrypted secrets (API keys, etc.)
        autoConnect:
          type: boolean
          default: true
        enabled:
          type: boolean
          default: true
        timeout:
          type: integer
          description: Connection timeout in milliseconds
        personaId:
          type: string

    UpdateMCPServerInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        transport:
          $ref: '#/components/schemas/MCPTransport'
        command:
          type: string
        args:
          type: array
          items:
            type: string
        endpoint:
          type: string
          format: uri
        headers:
          type: object
          additionalProperties:
            type: string
        secrets:
          type: object
          additionalProperties:
            type: string
        autoConnect:
          type: boolean
        enabled:
          type: boolean
        timeout:
          type: integer

    MCPServerTestResult:
      type: object
      properties:
        success:
          type: boolean
        connected:
          type: boolean
        tools:
          type: array
          items:
            type: string
        error:
          type: string
        latencyMs:
          type: integer

    # Custom Tool schemas
    CustomTool:
      type: object
      properties:
        id:
          type: string
        publisherId:
          type: string
        personaId:
          type: string
        name:
          type: string
        displayName:
          type: string
        description:
          type: string
        llmDescription:
          type: string
        type:
          $ref: '#/components/schemas/ToolExecutionType'
        config:
          $ref: '#/components/schemas/ToolConfig'
        parameters:
          type: object
          description: JSON Schema for input parameters
        returns:
          type: object
          description: JSON Schema for return value
        enabled:
          type: boolean
        requiresAuth:
          type: boolean
        version:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ToolExecutionType:
      type: string
      enum: [webhook, mcp, prompt]

    ToolConfig:
      type: object
      properties:
        url:
          type: string
          format: uri
        method:
          type: string
          enum: [GET, POST, PUT, DELETE]
        headers:
          type: object
          additionalProperties:
            type: string
        serverId:
          type: string
        toolName:
          type: string
        prompt:
          type: string

    CreateToolInput:
      type: object
      required: [name, displayName, description, llmDescription, type, config, parameters]
      properties:
        name:
          type: string
          pattern: '^[a-z0-9-]+$'
        displayName:
          type: string
        description:
          type: string
        llmDescription:
          type: string
        type:
          $ref: '#/components/schemas/ToolExecutionType'
        config:
          $ref: '#/components/schemas/ToolConfig'
        parameters:
          type: object
        returns:
          type: object
        enabled:
          type: boolean
          default: true
        requiresAuth:
          type: boolean
          default: false
        version:
          type: string
          default: "1.0.0"
        personaId:
          type: string

    UpdateToolInput:
      type: object
      properties:
        displayName:
          type: string
        description:
          type: string
        llmDescription:
          type: string
        type:
          $ref: '#/components/schemas/ToolExecutionType'
        config:
          $ref: '#/components/schemas/ToolConfig'
        parameters:
          type: object
        returns:
          type: object
        enabled:
          type: boolean
        requiresAuth:
          type: boolean
        version:
          type: string

    ToolTestResult:
      type: object
      properties:
        success:
          type: boolean
        result:
          type: object
        error:
          type: string
        executionTimeMs:
          type: integer

    # Activity schemas
    Activity:
      type: object
      properties:
        id:
          type: string
        publisherId:
          type: string
        personaId:
          type: string
        userId:
          type: string
        sessionId:
          type: string
        type:
          type: string
        name:
          type: string
        data:
          type: object
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        duration:
          type: integer
          description: Duration in milliseconds
        status:
          $ref: '#/components/schemas/ActivityStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ActivityStatus:
      type: string
      enum: [started, completed, failed]

    CreateActivityInput:
      type: object
      required: [type, name]
      properties:
        type:
          type: string
        name:
          type: string
        data:
          type: object
        status:
          $ref: '#/components/schemas/ActivityStatus'
        personaId:
          type: string
        userId:
          type: string
        sessionId:
          type: string

    UpdateActivityInput:
      type: object
      properties:
        data:
          type: object
        status:
          $ref: '#/components/schemas/ActivityStatus'
        completedAt:
          type: string
          format: date-time

    ActivityStats:
      type: object
      properties:
        totalCount:
          type: integer
        byType:
          type: object
          additionalProperties:
            type: integer
        byStatus:
          type: object
          properties:
            started:
              type: integer
            completed:
              type: integer
            failed:
              type: integer
        averageDurationMs:
          type: integer

    # Workflow schemas
    Workflow:
      type: object
      properties:
        id:
          type: string
        publisherId:
          type: string
        personaId:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string
        trigger:
          $ref: '#/components/schemas/WorkflowTrigger'
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        entryNodeId:
          type: string
        exitNodeIds:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        timeout:
          type: integer
        retryPolicy:
          $ref: '#/components/schemas/WorkflowRetryPolicy'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WorkflowTrigger:
      type: object
      required: [type]
      properties:
        type:
          $ref: '#/components/schemas/WorkflowTriggerType'
        config:
          type: object
          properties:
            command:
              type: string
            toolName:
              type: string
            schedule:
              type: string
            eventType:
              type: string

    WorkflowTriggerType:
      type: string
      enum: [voice_command, tool_call, schedule, event, api]

    WorkflowNode:
      type: object
      required: [id, name, type, config]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: '#/components/schemas/WorkflowNodeType'
        config:
          type: object
        position:
          type: object
          properties:
            x:
              type: number
            y:
              type: number

    WorkflowNodeType:
      type: string
      enum: [start, end, mcp_call, webhook, llm_prompt, condition, parallel, join, wait, set_variable, activity, sub_workflow]

    WorkflowEdge:
      type: object
      required: [id, sourceId, targetId]
      properties:
        id:
          type: string
        sourceId:
          type: string
        targetId:
          type: string
        label:
          type: string
        condition:
          type: string

    WorkflowRetryPolicy:
      type: object
      properties:
        maxAttempts:
          type: integer
          default: 3
        backoffMs:
          type: integer
          default: 1000
        backoffMultiplier:
          type: number
          default: 2

    CreateWorkflowInput:
      type: object
      required: [name, description, trigger, nodes, edges, entryNodeId]
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
          default: "1.0.0"
        trigger:
          $ref: '#/components/schemas/WorkflowTrigger'
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        entryNodeId:
          type: string
        exitNodeIds:
          type: array
          items:
            type: string
        enabled:
          type: boolean
          default: true
        timeout:
          type: integer
        retryPolicy:
          $ref: '#/components/schemas/WorkflowRetryPolicy'
        personaId:
          type: string

    UpdateWorkflowInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        trigger:
          $ref: '#/components/schemas/WorkflowTrigger'
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        entryNodeId:
          type: string
        exitNodeIds:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        timeout:
          type: integer
        retryPolicy:
          $ref: '#/components/schemas/WorkflowRetryPolicy'

    WorkflowExecution:
      type: object
      properties:
        id:
          type: string
        workflowId:
          type: string
        publisherId:
          type: string
        userId:
          type: string
        sessionId:
          type: string
        triggeredBy:
          type: string
          enum: [voice, api, schedule, event]
        status:
          $ref: '#/components/schemas/WorkflowExecutionStatus'
        currentNodeIds:
          type: array
          items:
            type: string
        completedNodeIds:
          type: array
          items:
            type: string
        variables:
          type: object
        result:
          type: object
        error:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    WorkflowExecutionStatus:
      type: string
      enum: [running, completed, failed, cancelled]

    # OAuth schemas
    OAuthProvider:
      type: object
      properties:
        id:
          type: string
        publisherId:
          type: string
        name:
          type: string
        authorizationUrl:
          type: string
          format: uri
        tokenUrl:
          type: string
          format: uri
        clientId:
          type: string
        scopes:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateOAuthProviderInput:
      type: object
      required: [name, authorizationUrl, tokenUrl, clientId, clientSecret, scopes]
      properties:
        name:
          type: string
        authorizationUrl:
          type: string
          format: uri
        tokenUrl:
          type: string
          format: uri
        clientId:
          type: string
        clientSecret:
          type: string
        scopes:
          type: array
          items:
            type: string
        enabled:
          type: boolean
          default: true

    UpdateOAuthProviderInput:
      type: object
      properties:
        name:
          type: string
        authorizationUrl:
          type: string
          format: uri
        tokenUrl:
          type: string
          format: uri
        clientId:
          type: string
        clientSecret:
          type: string
        scopes:
          type: array
          items:
            type: string
        enabled:
          type: boolean

    OAuthToken:
      type: object
      properties:
        id:
          type: string
        publisherId:
          type: string
        providerId:
          type: string
        userId:
          type: string
        expiresAt:
          type: string
          format: date-time
        scopes:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
