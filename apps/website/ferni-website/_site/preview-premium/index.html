trong>∞</strong> memory </span></div><div class="hero-premium__demo" id="heroPremiumDemo"><div class="hero-premium__input-wrapper"><input type="text" class="hero-premium__input" id="heroPremiumInput" placeholder="What's on your mind?" autocomplete="off" ><button class="hero-premium__mic-btn" id="heroPremiumMic" aria-label="Voice input"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></button></div><div class="hero-premium__prompts"><button class="hero-premium__prompt" data-prompt="I'm feeling overwhelmed at work">Overwhelmed at work</button><button class="hero-premium__prompt" data-prompt="Help me build better habits">Building habits</button><button class="hero-premium__prompt" data-prompt="I have a big decision to make">Big decision</button></div><div class="hero-premium__response" id="heroPremiumResponse"><div class="hero-premium__response-header"><div class="hero-premium__response-avatar"><svg class="ferni-eyes-svg" viewBox="0 0 100 100"><ellipse cx="36" cy="50" rx="10" ry="12" fill="white"/><circle cx="33" cy="45" r="2.5" fill="white" opacity="0.9"/><ellipse cx="64" cy="50" rx="10" ry="12" fill="white"/><circle cx="61" cy="45" r="2.5" fill="white" opacity="0.9"/></svg></div><span class="hero-premium__response-name">Ferni</span></div><div class="hero-premium__response-text" id="heroPremiumResponseText"><div class="hero-premium__typing"><span></span><span></span><span></span></div></div></div></div></div><div class="hero-premium__scroll" aria-hidden="true"><span class="hero-premium__scroll-text">Scroll</span><div class="hero-premium__scroll-icon"></div></div></section> <script>
(function() {
  'use strict';
  
  const RESPONSES = {
    "I'm feeling overwhelmed at work": 
      "I hear you. Feeling overwhelmed is tough—but you're not alone in this. Let's break it down together. What's the one thing that feels most urgent right now?",
    "Help me build better habits": 
      "Building habits is one of my favorite topics. The secret isn't willpower—it's making the habit so small you can't say no. What's one thing you've been wanting to build?",
    "I have a big decision to make": 
      "Big decisions deserve space to breathe. I'm curious—what's making this one feel so weighty? Sometimes just naming it helps us see it more clearly."
  };
  
  const input = document.getElementById('heroPremiumInput');
  const response = document.getElementById('heroPremiumResponse');
  const responseText = document.getElementById('heroPremiumResponseText');
  const prompts = document.querySelectorAll('.hero-premium__prompt');
  
  function showResponse(message) {
    const text = RESPONSES[message] || "I'm here to help. What would you like to talk about?";
    
    // Show response container
    response.classList.add('is-visible');
    
    // Show typing, then text
    responseText.innerHTML = '<div class="hero-premium__typing"><span></span><span></span><span></span></div>';
    
    setTimeout(() => {
      // Type out response
      responseText.textContent = '';
      let i = 0;
      const typeInterval = setInterval(() => {
        if (i < text.length) {
          responseText.textContent += text[i];
          i++;
        } else {
          clearInterval(typeInterval);
        }
      }, 15);
    }, 1000);
  }
  
  // Handle prompt clicks
  prompts.forEach(btn => {
    btn.addEventListener('click', () => {
      const prompt = btn.dataset.prompt;
      input.value = prompt;
      showResponse(prompt);
      
      // Fade out prompts
      document.querySelector('.hero-premium__prompts').style.opacity = '0';
    });
  });
  
  // Handle Enter key
  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && input.value.trim()) {
      showResponse(input.value.trim());
    }
  });
})();
</script> <main id="main-content"></main></body></html>
