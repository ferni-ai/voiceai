<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Ferni Avatar Favicon - Unified Brand Design -->
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#4a6741"/>
    </linearGradient>
  </defs>
  
  <!-- Main avatar circle -->
  <circle cx="16" cy="16" r="15" fill="url(#favGrad)"/>
  
  <!-- FE text -->
  <text 
    x="16" 
    y="17" 
    font-family="system-ui, -apple-system, 'SF Pro Display', sans-serif"
    font-size="11"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    letter-spacing="-0.5">FE</text>
  
  <!-- Subtle top highlight - ABOVE text -->
  <ellipse cx="12" cy="10" rx="7" ry="3.5" fill="white" opacity="0.15"/>
</svg>
