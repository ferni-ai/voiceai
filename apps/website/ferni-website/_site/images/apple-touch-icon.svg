<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Ferni Apple Touch Icon - 180x180 -->
  <defs>
    <linearGradient id="touchGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#4a6741"/>
    </linearGradient>
    <linearGradient id="touchBadgeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#5a8060"/>
    </linearGradient>
    <filter id="touchShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#2c2520" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" fill="#F5F1E8"/>
  
  <!-- Outer presence ring -->
  <circle cx="90" cy="90" r="70" fill="none" stroke="#4a6741" stroke-width="1.5" opacity="0.35"/>
  
  <!-- Main avatar circle -->
  <circle cx="90" cy="90" r="62" fill="url(#touchGrad)"/>
  
  <!-- FE Text -->
  <text 
    x="90" 
    y="90" 
    text-anchor="middle" 
    dominant-baseline="central"
    font-family="'Plus Jakarta Sans', 'SF Pro Display', system-ui, sans-serif"
    font-size="45"
    font-weight="800"
    fill="white"
    letter-spacing="-1.5">
    <tspan dy="3">FE</tspan>
  </text>
  
  <!-- Shine overlay - ABOVE text -->
  <ellipse cx="70" cy="62" rx="32" ry="16" fill="white" opacity="0.15"/>
  
  <!-- Heart badge -->
  <circle cx="139" cy="139" r="17" fill="url(#touchBadgeGrad)" stroke="#FFFDFB" stroke-width="3" filter="url(#touchShadow)"/>
  
  <!-- Heart icon - centered -->
  <path 
    d="M139 134c0-2.2-1.8-4-4-4s-4 1.8-4 4c0 4 7.5 9.5 7.5 9.5s7.5-5.5 7.5-9.5c0-2.2-1.8-4-4-4s-4 1.8-4 4z"
    fill="none"
    stroke="white"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>

