<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Building Test</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #faf8f5;
      color: #2c2520;
      padding: 40px;
      margin: 0;
    }
    h1 {
      font-size: 3rem;
      margin: 0 0 1rem 0;
    }
    .accent {
      background: linear-gradient(135deg, #4a6741, #3a6b73);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 1.2rem;
      color: #5c544a;
    }
    .hero {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>Built by a human.</h1>
      <h1 class="accent">And an AI.</h1>
      <h1>Together.</h1>
      <p>No VCs. No roadmaps. Just genuine curiosity and a lot of late nights.</p>
    </section>
  </main>
</body>
</html>
