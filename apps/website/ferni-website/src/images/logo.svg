<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Logo - Eyes design (friendly, warm presence) -->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="50" cy="50" r="45" fill="url(#orbGradient)"/>

  <!-- Left eye -->
  <ellipse cx="36" cy="50" rx="9" ry="11" fill="url(#eyeFill)"/>
  <circle cx="34" cy="45" r="2.2" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="64" cy="50" rx="9" ry="11" fill="url(#eyeFill)"/>
  <circle cx="62" cy="45" r="2.2" fill="white"/>
</svg>
