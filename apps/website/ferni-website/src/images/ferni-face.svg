<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Ferni Cyclops Face - Inspired by Luxo Jr. / Mike Wazowski -->
  <!-- Single large eye is incredibly expressive and memorable -->
  
  <!-- Face circle -->
  <circle cx="50" cy="50" r="45" fill="#4a6741"/>
  
  <!-- Single large eye - the hero feature -->
  <circle cx="50" cy="40" r="18" fill="white"/>
  
  <!-- Colored iris - matches Ferni green for brand consistency -->
  <circle cx="50" cy="40" r="12" fill="#5a8060"/>
  
  <!-- Pupil -->
  <circle cx="50" cy="40" r="6" fill="#2c2520"/>
  
  <!-- Highlight - adds life and sparkle -->
  <circle cx="47" cy="37" r="2" fill="white" opacity="0.9"/>
  
  <!-- Warm smile -->
  <path d="M 35 65 A 18 12 0 0 0 65 65" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
</svg>
