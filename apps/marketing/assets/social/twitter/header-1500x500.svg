<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Twitter/X Header Banner - 1500x500 -->
  
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F1E8"/>
      <stop offset="100%" style="stop-color:#E8E0D5"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="1300" cy="100" r="200" fill="#4a6741" opacity="0.05"/>
  <circle cx="200" cy="400" r="150" fill="#4a6741" opacity="0.03"/>
  
  <!-- Logo centered -->
  <g transform="translate(650, 120)">
    <!-- Halo -->
    <circle cx="100" cy="100" r="95" fill="none" stroke="#4a6741" stroke-width="3" opacity="0.35"/>
    <!-- Main circle -->
    <circle cx="100" cy="100" r="85" fill="#4a6741"/>
    <!-- FE -->
    <text x="100" y="115" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="50" font-weight="600" fill="white" text-anchor="middle">FE</text>
    <!-- Status -->
    <circle cx="160" cy="160" r="20" fill="white"/>
    <circle cx="160" cy="160" r="15" fill="#4a6741"/>
  </g>
  
  <!-- Tagline below logo -->
  <text x="750" y="370" font-family="'Plus Jakarta Sans', -apple-system, sans-serif" font-size="32" font-weight="700" fill="#2C2520" text-anchor="middle">Your personal AI life coach.</text>
  <text x="750" y="410" font-family="'Inter', -apple-system, sans-serif" font-size="18" font-weight="500" fill="#5C544A" text-anchor="middle">Six specialists. One conversation.</text>
  
  <!-- URL -->
  <text x="750" y="460" font-family="'Inter', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#4a6741" text-anchor="middle">app.ferni.ai</text>
</svg>
