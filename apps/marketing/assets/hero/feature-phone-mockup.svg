<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Feature Hero: App Screenshot / Phone Mockup -->
  
  <defs>
    <linearGradient id="bgGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F1E8"/>
      <stop offset="100%" style="stop-color:#E8E0D5"/>
    </linearGradient>
    <linearGradient id="phoneShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="50%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGrad6)"/>
  
  <!-- Decorative blurs -->
  <circle cx="300" cy="200" r="200" fill="#4a6741" opacity="0.05"/>
  <circle cx="900" cy="600" r="180" fill="#4a6741" opacity="0.04"/>
  
  <!-- iPhone Mockup -->
  <g transform="translate(450, 60)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="300" height="640" rx="45" fill="url(#phoneShine)"/>
    
    <!-- Screen bezel -->
    <rect x="10" y="10" width="280" height="620" rx="38" fill="#1a1a1a"/>
    
    <!-- Screen -->
    <rect x="15" y="15" width="270" height="610" rx="35" fill="#F5F1E8"/>
    
    <!-- Dynamic Island -->
    <rect x="100" y="25" width="100" height="30" rx="15" fill="#1a1a1a"/>
    
    <!-- App Content: Ferni Interface -->
    
    <!-- Status bar -->
    <text x="35" y="50" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#2C2520">9:41</text>
    <text x="240" y="50" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#2C2520">100%</text>
    
    <!-- Ferni orb in app -->
    <g transform="translate(150, 280)">
      <!-- Outer rings -->
      <circle cx="0" cy="0" r="100" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.15"/>
      <circle cx="0" cy="0" r="85" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.2"/>
      
      <!-- Main orb -->
      <circle cx="0" cy="0" r="70" fill="#4a6741"/>
      
      <!-- Waveform -->
      <g fill="white" opacity="0.9">
        <rect x="-35" y="-18" width="6" height="36" rx="3"/>
        <rect x="-22" y="-28" width="6" height="56" rx="3"/>
        <rect x="-9" y="-22" width="6" height="44" rx="3"/>
        <rect x="4" y="-32" width="6" height="64" rx="3"/>
        <rect x="17" y="-25" width="6" height="50" rx="3"/>
        <rect x="30" y="-16" width="6" height="32" rx="3"/>
      </g>
      
      <!-- Status -->
      <circle cx="55" cy="55" r="14" fill="white"/>
      <circle cx="55" cy="55" r="10" fill="#4a6741"/>
    </g>
    
    <!-- Speaking indicator text -->
    <text x="150" y="420" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#4a6741" text-anchor="middle">Ferni is listening...</text>
    
    <!-- Sample transcript -->
    <g transform="translate(30, 450)">
      <rect x="0" y="0" width="200" height="50" rx="12" fill="#4a6741" opacity="0.1"/>
      <text x="15" y="22" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#2C2520">"I've been feeling overwhelmed</text>
      <text x="15" y="38" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#2C2520">with work lately..."</text>
    </g>
    
    <!-- Team member chips at bottom -->
    <g transform="translate(30, 550)">
      <circle cx="20" cy="15" r="15" fill="#4a6741"/>
      <text x="20" y="19" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">FN</text>
      
      <circle cx="60" cy="15" r="15" fill="#9a7b5a" opacity="0.5"/>
      <text x="60" y="19" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">JB</text>
      
      <circle cx="100" cy="15" r="15" fill="#a67a6a" opacity="0.5"/>
      <text x="100" y="19" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">MY</text>
      
      <circle cx="140" cy="15" r="15" fill="#5a6b8a" opacity="0.5"/>
      <text x="140" y="19" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">AX</text>
    </g>
    
    <!-- Home indicator -->
    <rect x="115" y="600" width="70" height="5" rx="2.5" fill="#2C2520"/>
  </g>
  
  <!-- Text content on right -->
  <g transform="translate(820, 250)">
    <text x="0" y="0" font-family="'Plus Jakarta Sans', -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4a6741" letter-spacing="2">DESIGNED FOR YOUR LIFE</text>
    
    <text x="0" y="50" font-family="'Plus Jakarta Sans', -apple-system, sans-serif" font-size="32" font-weight="700" fill="#2C2520">Beautiful.</text>
    <text x="0" y="90" font-family="'Plus Jakarta Sans', -apple-system, sans-serif" font-size="32" font-weight="700" fill="#2C2520">Effortless.</text>
    <text x="0" y="130" font-family="'Plus Jakarta Sans', -apple-system, sans-serif" font-size="32" font-weight="700" fill="#2C2520">Human.</text>
    
    <text x="0" y="180" font-family="'Inter', -apple-system, sans-serif" font-size="16" font-weight="400" fill="#5C544A">The simplest way to get</text>
    <text x="0" y="205" font-family="'Inter', -apple-system, sans-serif" font-size="16" font-weight="400" fill="#5C544A">the support you deserve.</text>
    
    <!-- CTA -->
    <rect x="0" y="240" width="160" height="48" rx="24" fill="#4a6741"/>
    <text x="80" y="270" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Get Started Free</text>
  </g>
</svg>
