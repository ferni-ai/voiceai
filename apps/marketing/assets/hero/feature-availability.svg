<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Feature Hero: 24/7 Availability -->
  
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C2520"/>
      <stop offset="100%" style="stop-color:#1a1815"/>
    </linearGradient>
    <linearGradient id="orbGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a7d51"/>
      <stop offset="100%" style="stop-color:#4a6741"/>
    </linearGradient>
  </defs>
  
  <!-- Dark background for "night" feel -->
  <rect width="1200" height="800" fill="url(#bgGrad4)"/>
  
  <!-- Stars -->
  <circle cx="150" cy="120" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="300" cy="80" r="1" fill="white" opacity="0.3"/>
  <circle cx="450" cy="150" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="750" cy="100" r="1" fill="white" opacity="0.3"/>
  <circle cx="900" cy="180" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="1050" cy="120" r="1" fill="white" opacity="0.35"/>
  <circle cx="200" cy="220" r="1" fill="white" opacity="0.25"/>
  <circle cx="1000" cy="250" r="1.5" fill="white" opacity="0.3"/>
  
  <!-- Clock visualization -->
  <g transform="translate(600, 320)">
    <!-- Clock face -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#4a6741" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="130" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.2"/>
    
    <!-- Hour markers -->
    <g fill="#4a6741" opacity="0.5">
      <circle cx="0" cy="-120" r="4"/>
      <circle cx="60" cy="-104" r="3"/>
      <circle cx="104" cy="-60" r="3"/>
      <circle cx="120" cy="0" r="4"/>
      <circle cx="104" cy="60" r="3"/>
      <circle cx="60" cy="104" r="3"/>
      <circle cx="0" cy="120" r="4"/>
      <circle cx="-60" cy="104" r="3"/>
      <circle cx="-104" cy="60" r="3"/>
      <circle cx="-120" cy="0" r="4"/>
      <circle cx="-104" cy="-60" r="3"/>
      <circle cx="-60" cy="-104" r="3"/>
    </g>
    
    <!-- Ferni orb in center (always on) -->
    <circle cx="0" cy="0" r="70" fill="url(#orbGlow)"/>
    <circle cx="0" cy="0" r="75" fill="none" stroke="#4a6741" stroke-width="2" opacity="0.4"/>
    
    <!-- Waveform in orb -->
    <g fill="white" opacity="0.9">
      <rect x="-30" y="-20" width="5" height="40" rx="2.5"/>
      <rect x="-18" y="-28" width="5" height="56" rx="2.5"/>
      <rect x="-6" y="-22" width="5" height="44" rx="2.5"/>
      <rect x="6" y="-30" width="5" height="60" rx="2.5"/>
      <rect x="18" y="-25" width="5" height="50" rx="2.5"/>
      <rect x="30" y="-18" width="5" height="36" rx="2.5"/>
    </g>
    
    <!-- Status always on -->
    <circle cx="55" cy="55" r="16" fill="#2C2520"/>
    <circle cx="55" cy="55" r="12" fill="#4a6741"/>
    
    <!-- "2:47 AM" time display -->
    <text x="0" y="-170" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="24" font-weight="500" fill="#F5F1E8" text-anchor="middle" opacity="0.8">2:47 AM</text>
  </g>
  
  <!-- Feature text (light for dark bg) -->
  <text x="600" y="560" font-family="'Plus Jakarta Sans', -apple-system, sans-serif" font-size="36" font-weight="700" fill="#F5F1E8" text-anchor="middle">Available When You Need Us</text>
  <text x="600" y="600" font-family="'Inter', -apple-system, sans-serif" font-size="18" font-weight="400" fill="#A89D90" text-anchor="middle">Can't sleep? We're here. No scheduling. No waiting rooms.</text>
  
  <!-- Badge -->
  <rect x="530" y="640" width="140" height="36" rx="18" fill="#4a6741" opacity="0.3"/>
  <text x="600" y="664" font-family="'Inter', -apple-system, sans-serif" font-size="14" font-weight="600" fill="#F5F1E8" text-anchor="middle">24/7 Support</text>
</svg>
