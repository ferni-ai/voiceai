<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Feature Hero: Privacy & Security -->
  
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F1E8"/>
      <stop offset="100%" style="stop-color:#E8E0D5"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGrad5)"/>
  
  <!-- Shield visualization -->
  <g transform="translate(600, 320)">
    <!-- Outer shield shape -->
    <path d="M0 -140 L100 -100 L100 40 C100 120 0 160 0 160 C0 160 -100 120 -100 40 L-100 -100 Z" 
          fill="#4a6741" opacity="0.1" stroke="#4a6741" stroke-width="2"/>
    
    <!-- Inner shield -->
    <path d="M0 -110 L75 -80 L75 30 C75 90 0 120 0 120 C0 120 -75 90 -75 30 L-75 -80 Z" 
          fill="#4a6741" opacity="0.15"/>
    
    <!-- Ferni logo in center of shield -->
    <circle cx="0" cy="0" r="50" fill="#4a6741"/>
    <text x="0" y="10" font-family="-apple-system, sans-serif" font-size="22" font-weight="600" fill="white" text-anchor="middle">FN</text>
    
    <!-- Lock icon above -->
    <g transform="translate(0, -85)">
      <rect x="-12" y="0" width="24" height="18" rx="3" fill="none" stroke="#4a6741" stroke-width="2"/>
      <path d="M-8 0 L-8 -8 A8 8 0 0 1 8 -8 L8 0" fill="none" stroke="#4a6741" stroke-width="2"/>
      <circle cx="0" cy="9" r="3" fill="#4a6741"/>
    </g>
    
    <!-- Checkmarks floating around -->
    <g transform="translate(-150, -60)">
      <circle cx="0" cy="0" r="20" fill="#4a6741" opacity="0.15"/>
      <path d="M-8 0 L-3 5 L8 -5" fill="none" stroke="#4a6741" stroke-width="2"/>
    </g>
    
    <g transform="translate(150, -40)">
      <circle cx="0" cy="0" r="20" fill="#4a6741" opacity="0.15"/>
      <path d="M-8 0 L-3 5 L8 -5" fill="none" stroke="#4a6741" stroke-width="2"/>
    </g>
    
    <g transform="translate(-140, 80)">
      <circle cx="0" cy="0" r="18" fill="#4a6741" opacity="0.15"/>
      <path d="M-6 0 L-2 4 L6 -4" fill="none" stroke="#4a6741" stroke-width="2"/>
    </g>
    
    <g transform="translate(145, 90)">
      <circle cx="0" cy="0" r="18" fill="#4a6741" opacity="0.15"/>
      <path d="M-6 0 L-2 4 L6 -4" fill="none" stroke="#4a6741" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Privacy points -->
  <g transform="translate(180, 280)">
    <circle cx="0" cy="0" r="6" fill="#4a6741"/>
    <text x="20" y="5" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#2C2520">End-to-end encrypted</text>
  </g>
  
  <g transform="translate(180, 320)">
    <circle cx="0" cy="0" r="6" fill="#4a6741"/>
    <text x="20" y="5" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#2C2520">Never sold. Never shared.</text>
  </g>
  
  <g transform="translate(180, 360)">
    <circle cx="0" cy="0" r="6" fill="#4a6741"/>
    <text x="20" y="5" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#2C2520">Delete anytime</text>
  </g>
  
  <g transform="translate(900, 280)">
    <circle cx="0" cy="0" r="6" fill="#4a6741"/>
    <text x="20" y="5" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#2C2520">No ads. Ever.</text>
  </g>
  
  <g transform="translate(900, 320)">
    <circle cx="0" cy="0" r="6" fill="#4a6741"/>
    <text x="20" y="5" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#2C2520">HIPAA-aligned practices</text>
  </g>
  
  <g transform="translate(900, 360)">
    <circle cx="0" cy="0" r="6" fill="#4a6741"/>
    <text x="20" y="5" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#2C2520">Your data. Your control.</text>
  </g>
  
  <!-- Feature text -->
  <text x="600" y="580" font-family="'Plus Jakarta Sans', -apple-system, sans-serif" font-size="36" font-weight="700" fill="#2C2520" text-anchor="middle">Your Conversations Stay Private</text>
  <text x="600" y="620" font-family="'Inter', -apple-system, sans-serif" font-size="18" font-weight="400" fill="#5C544A" text-anchor="middle">Talk freely. We're not listening—except when you are.</text>
  
  <!-- Badge -->
  <rect x="515" y="660" width="170" height="36" rx="18" fill="#4a6741" opacity="0.1"/>
  <text x="600" y="684" font-family="'Inter', -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4a6741" text-anchor="middle">Privacy First</text>
</svg>
