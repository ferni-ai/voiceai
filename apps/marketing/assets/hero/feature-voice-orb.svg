<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Feature Hero: Voice Orb / Main Interface -->
  
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F1E8"/>
      <stop offset="50%" style="stop-color:#EDE8DD"/>
      <stop offset="100%" style="stop-color:#E8E0D5"/>
    </linearGradient>
    <linearGradient id="orbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a7d51"/>
      <stop offset="100%" style="stop-color:#3d5a35"/>
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  
  <!-- Ambient circles -->
  <circle cx="100" cy="700" r="300" fill="#4a6741" opacity="0.03"/>
  <circle cx="1100" cy="100" r="250" fill="#4a6741" opacity="0.04"/>
  
  <!-- Main Voice Orb -->
  <g transform="translate(600, 350)">
    <!-- Outer glow rings -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.1"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.15"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#4a6741" stroke-width="2" opacity="0.2"/>
    
    <!-- Main orb with glow -->
    <circle cx="0" cy="0" r="120" fill="url(#orbGrad)" filter="url(#glow)"/>
    
    <!-- Inner highlight -->
    <ellipse cx="-30" cy="-30" rx="60" ry="40" fill="white" opacity="0.1"/>
    
    <!-- Waveform bars -->
    <g fill="white" opacity="0.9">
      <rect x="-50" y="-30" width="8" height="60" rx="4"/>
      <rect x="-35" y="-45" width="8" height="90" rx="4"/>
      <rect x="-20" y="-35" width="8" height="70" rx="4"/>
      <rect x="-5" y="-50" width="8" height="100" rx="4"/>
      <rect x="10" y="-40" width="8" height="80" rx="4"/>
      <rect x="25" y="-48" width="8" height="96" rx="4"/>
      <rect x="40" y="-30" width="8" height="60" rx="4"/>
    </g>
    
    <!-- Status indicator -->
    <circle cx="95" cy="95" r="20" fill="white"/>
    <circle cx="95" cy="95" r="15" fill="#4a6741"/>
  </g>
  
  <!-- Feature text -->
  <text x="600" y="580" font-family="'Plus Jakarta Sans', -apple-system, sans-serif" font-size="36" font-weight="700" fill="#2C2520" text-anchor="middle">Just Talk</text>
  <text x="600" y="620" font-family="'Inter', -apple-system, sans-serif" font-size="18" font-weight="400" fill="#5C544A" text-anchor="middle">No buttons. No menus. Just natural conversation.</text>
  
  <!-- Subtitle badge -->
  <rect x="510" y="660" width="180" height="36" rx="18" fill="#4a6741" opacity="0.1"/>
  <text x="600" y="684" font-family="'Inter', -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4a6741" text-anchor="middle">Voice-First AI</text>
</svg>
