<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Feature Hero: Memory / Remembers Everything -->
  
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F1E8"/>
      <stop offset="100%" style="stop-color:#E8E0D5"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGrad3)"/>
  
  <!-- Memory visualization - connected nodes -->
  <g transform="translate(600, 350)">
    <!-- Central node (current conversation) -->
    <circle cx="0" cy="0" r="60" fill="#4a6741"/>
    <text x="0" y="5" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Today</text>
    
    <!-- Connected memory nodes -->
    <!-- Last week -->
    <line x1="-60" y1="0" x2="-140" y2="-60" stroke="#4a6741" stroke-width="2" opacity="0.3"/>
    <circle cx="-170" cy="-80" r="35" fill="#4a6741" opacity="0.7"/>
    <text x="-170" y="-75" font-family="-apple-system, sans-serif" font-size="11" font-weight="500" fill="white" text-anchor="middle">Last</text>
    <text x="-170" y="-62" font-family="-apple-system, sans-serif" font-size="11" font-weight="500" fill="white" text-anchor="middle">Week</text>
    
    <!-- Goals -->
    <line x1="50" y1="-35" x2="120" y2="-90" stroke="#4a6741" stroke-width="2" opacity="0.3"/>
    <circle cx="150" cy="-110" r="40" fill="#4a6741" opacity="0.6"/>
    <text x="150" y="-105" font-family="-apple-system, sans-serif" font-size="12" font-weight="500" fill="white" text-anchor="middle">Your</text>
    <text x="150" y="-90" font-family="-apple-system, sans-serif" font-size="12" font-weight="500" fill="white" text-anchor="middle">Goals</text>
    
    <!-- Preferences -->
    <line x1="60" y1="0" x2="150" y2="30" stroke="#4a6741" stroke-width="2" opacity="0.3"/>
    <circle cx="190" cy="45" r="38" fill="#4a6741" opacity="0.5"/>
    <text x="190" y="50" font-family="-apple-system, sans-serif" font-size="11" font-weight="500" fill="white" text-anchor="middle">Preferences</text>
    
    <!-- Relationships -->
    <line x1="-40" y1="45" x2="-100" y2="100" stroke="#4a6741" stroke-width="2" opacity="0.3"/>
    <circle cx="-130" cy="130" r="42" fill="#4a6741" opacity="0.55"/>
    <text x="-130" y="125" font-family="-apple-system, sans-serif" font-size="11" font-weight="500" fill="white" text-anchor="middle">People</text>
    <text x="-130" y="140" font-family="-apple-system, sans-serif" font-size="11" font-weight="500" fill="white" text-anchor="middle">You Know</text>
    
    <!-- Context -->
    <line x1="30" y1="50" x2="70" y2="120" stroke="#4a6741" stroke-width="2" opacity="0.3"/>
    <circle cx="90" cy="155" r="32" fill="#4a6741" opacity="0.45"/>
    <text x="90" y="160" font-family="-apple-system, sans-serif" font-size="10" font-weight="500" fill="white" text-anchor="middle">Context</text>
    
    <!-- Floating labels showing what Ferni remembers -->
    <g transform="translate(-280, -150)">
      <rect x="0" y="0" width="140" height="28" rx="14" fill="white" stroke="#4a6741" stroke-width="1" opacity="0.8"/>
      <text x="70" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#4a6741" text-anchor="middle">"Emma's birthday"</text>
    </g>
    
    <g transform="translate(200, -180)">
      <rect x="0" y="0" width="120" height="28" rx="14" fill="white" stroke="#4a6741" stroke-width="1" opacity="0.8"/>
      <text x="60" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#4a6741" text-anchor="middle">"Job interview"</text>
    </g>
    
    <g transform="translate(220, 100)">
      <rect x="0" y="0" width="130" height="28" rx="14" fill="white" stroke="#4a6741" stroke-width="1" opacity="0.8"/>
      <text x="65" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#4a6741" text-anchor="middle">"Morning person"</text>
    </g>
    
    <g transform="translate(-320, 80)">
      <rect x="0" y="0" width="150" height="28" rx="14" fill="white" stroke="#4a6741" stroke-width="1" opacity="0.8"/>
      <text x="75" y="19" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#4a6741" text-anchor="middle">"Anxious about travel"</text>
    </g>
  </g>
  
  <!-- Feature text -->
  <text x="600" y="600" font-family="'Plus Jakarta Sans', -apple-system, sans-serif" font-size="36" font-weight="700" fill="#2C2520" text-anchor="middle">Ferni Remembers Everything</text>
  <text x="600" y="640" font-family="'Inter', -apple-system, sans-serif" font-size="18" font-weight="400" fill="#5C544A" text-anchor="middle">Mention it once. We'll never forget. No "remind me again?"</text>
  
  <!-- Badge -->
  <rect x="505" y="680" width="190" height="36" rx="18" fill="#4a6741" opacity="0.1"/>
  <text x="600" y="704" font-family="'Inter', -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4a6741" text-anchor="middle">Perfect Memory</text>
</svg>
