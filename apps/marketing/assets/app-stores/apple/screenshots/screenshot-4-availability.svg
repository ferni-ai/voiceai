<svg width="1290" height="2796" viewBox="0 0 1290 2796" xmlns="http://www.w3.org/2000/svg">
  <!-- App Store Screenshot 4: 24/7 Availability -->
  
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C2520"/>
      <stop offset="100%" style="stop-color:#1a1815"/>
    </linearGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="1290" height="2796" fill="url(#bgGrad4)"/>
  
  <!-- Stars -->
  <circle cx="150" cy="200" r="2" fill="white" opacity="0.4"/>
  <circle cx="350" cy="120" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="550" cy="180" r="2" fill="white" opacity="0.5"/>
  <circle cx="750" cy="100" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="950" cy="220" r="2" fill="white" opacity="0.4"/>
  <circle cx="1100" cy="150" r="1.5" fill="white" opacity="0.35"/>
  
  <!-- Top marketing text (light for dark bg) -->
  <text x="645" y="180" font-family="'Plus Jakarta Sans', -apple-system, sans-serif" font-size="42" font-weight="800" fill="#F5F1E8" text-anchor="middle">Available 24/7</text>
  <text x="645" y="240" font-family="'Inter', -apple-system, sans-serif" font-size="32" font-weight="500" fill="#A89D90" text-anchor="middle">Whenever you need us. No waiting.</text>
  
  <!-- iPhone frame (dark mode interface) -->
  <g transform="translate(195, 350)">
    <rect x="0" y="0" width="900" height="1800" rx="120" fill="#0a0a0a"/>
    <rect x="20" y="20" width="860" height="1760" rx="100" fill="#1a1815"/>
    <rect x="320" y="50" width="260" height="80" rx="40" fill="#0a0a0a"/>
    
    <!-- Status bar (light text) -->
    <text x="80" y="110" font-family="'SF Mono', monospace" font-size="40" font-weight="500" fill="#F5F1E8">2:47 AM</text>
    
    <!-- Clock visualization -->
    <g transform="translate(430, 600)">
      <!-- Clock face -->
      <circle cx="0" cy="0" r="220" fill="none" stroke="#4a6741" stroke-width="2" opacity="0.2"/>
      <circle cx="0" cy="0" r="200" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.15"/>
      
      <!-- Hour markers -->
      <g fill="#4a6741" opacity="0.4">
        <circle cx="0" cy="-180" r="8"/>
        <circle cx="90" cy="-156" r="5"/>
        <circle cx="156" cy="-90" r="5"/>
        <circle cx="180" cy="0" r="8"/>
        <circle cx="156" cy="90" r="5"/>
        <circle cx="90" cy="156" r="5"/>
        <circle cx="0" cy="180" r="8"/>
        <circle cx="-90" cy="156" r="5"/>
        <circle cx="-156" cy="90" r="5"/>
        <circle cx="-180" cy="0" r="8"/>
        <circle cx="-156" cy="-90" r="5"/>
        <circle cx="-90" cy="-156" r="5"/>
      </g>
      
      <!-- Ferni orb in center -->
      <circle cx="0" cy="0" r="100" fill="#4a6741"/>
      
      <!-- Waveform -->
      <g fill="white" opacity="0.9">
        <rect x="-50" y="-30" width="12" height="60" rx="6"/>
        <rect x="-28" y="-45" width="12" height="90" rx="6"/>
        <rect x="-6" y="-35" width="12" height="70" rx="6"/>
        <rect x="16" y="-50" width="12" height="100" rx="6"/>
        <rect x="38" y="-40" width="12" height="80" rx="6"/>
      </g>
      
      <!-- Status always on -->
      <circle cx="75" cy="75" r="25" fill="#1a1815"/>
      <circle cx="75" cy="75" r="18" fill="#4a6741"/>
    </g>
    
    <!-- Late night message -->
    <g transform="translate(100, 950)">
      <rect x="0" y="0" width="660" height="130" rx="25" fill="#4a6741" opacity="0.15"/>
      <text x="40" y="55" font-family="'Inter', sans-serif" font-size="30" font-weight="500" fill="#F5F1E8">"I can't sleep. I keep thinking about</text>
      <text x="40" y="95" font-family="'Inter', sans-serif" font-size="30" font-weight="500" fill="#F5F1E8">tomorrow's presentation..."</text>
    </g>
    
    <!-- Ferni response -->
    <g transform="translate(100, 1120)">
      <rect x="0" y="0" width="660" height="180" rx="25" fill="#4a6741" opacity="0.3"/>
      <circle cx="70" cy="90" r="45" fill="#4a6741"/>
      <text x="70" y="98" font-family="-apple-system, sans-serif" font-size="22" font-weight="600" fill="white" text-anchor="middle">FE</text>
      <text x="140" y="60" font-family="'Inter', sans-serif" font-size="26" font-weight="500" fill="#F5F1E8">"I hear you. Late night worries</text>
      <text x="140" y="95" font-family="'Inter', sans-serif" font-size="26" font-weight="500" fill="#F5F1E8">hit different. Let's talk through</text>
      <text x="140" y="130" font-family="'Inter', sans-serif" font-size="26" font-weight="500" fill="#F5F1E8">what's on your mind..."</text>
    </g>
    
    <!-- Features list -->
    <g transform="translate(100, 1380)">
      <circle cx="20" cy="10" r="10" fill="#4a6741"/>
      <text x="50" y="18" font-family="'Inter', sans-serif" font-size="26" font-weight="500" fill="#A89D90">No scheduling required</text>
      
      <circle cx="20" cy="70" r="10" fill="#4a6741"/>
      <text x="50" y="78" font-family="'Inter', sans-serif" font-size="26" font-weight="500" fill="#A89D90">No waiting rooms</text>
      
      <circle cx="20" cy="130" r="10" fill="#4a6741"/>
      <text x="50" y="138" font-family="'Inter', sans-serif" font-size="26" font-weight="500" fill="#A89D90">Available in any time zone</text>
    </g>
    
    <!-- Home indicator -->
    <rect x="330" y="1700" width="200" height="12" rx="6" fill="#F5F1E8" opacity="0.5"/>
  </g>
  
  <!-- Bottom tagline -->
  <text x="645" y="2450" font-family="'Inter', -apple-system, sans-serif" font-size="36" font-weight="600" fill="#A89D90" text-anchor="middle">Can't sleep? We're here.</text>
  <text x="645" y="2510" font-family="'Inter', -apple-system, sans-serif" font-size="36" font-weight="600" fill="#A89D90" text-anchor="middle">No judgment. Just support.</text>
</svg>
