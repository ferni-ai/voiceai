<svg width="1290" height="2796" viewBox="0 0 1290 2796" xmlns="http://www.w3.org/2000/svg">
  <!-- App Store Screenshot 1: Hero / Main Interface -->
  
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F1E8"/>
      <stop offset="100%" style="stop-color:#E8E0D5"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1290" height="2796" fill="url(#bgGrad)"/>
  
  <!-- Top marketing text -->
  <text x="645" y="180" font-family="'Plus Jakarta Sans', -apple-system, sans-serif" font-size="42" font-weight="800" fill="#2C2520" text-anchor="middle">Your Personal</text>
  <text x="645" y="240" font-family="'Plus Jakarta Sans', -apple-system, sans-serif" font-size="42" font-weight="800" fill="#4a6741" text-anchor="middle">AI Life Coach</text>
  
  <!-- iPhone frame -->
  <g transform="translate(195, 350)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="900" height="1800" rx="120" fill="#1a1a1a"/>
    
    <!-- Screen -->
    <rect x="20" y="20" width="860" height="1760" rx="100" fill="#F5F1E8"/>
    
    <!-- Dynamic Island -->
    <rect x="320" y="50" width="260" height="80" rx="40" fill="#1a1a1a"/>
    
    <!-- Status bar -->
    <text x="80" y="110" font-family="-apple-system, sans-serif" font-size="36" font-weight="600" fill="#2C2520">9:41</text>
    <text x="760" y="110" font-family="-apple-system, sans-serif" font-size="32" font-weight="600" fill="#2C2520">100%</text>
    
    <!-- App content: Ferni main screen -->
    
    <!-- Settings icon top right -->
    <circle cx="780" cy="200" r="30" fill="#4a6741" opacity="0.1"/>
    
    <!-- Main Ferni Orb -->
    <g transform="translate(430, 700)">
      <!-- Outer rings -->
      <circle cx="0" cy="0" r="280" fill="none" stroke="#4a6741" stroke-width="2" opacity="0.1"/>
      <circle cx="0" cy="0" r="250" fill="none" stroke="#4a6741" stroke-width="2" opacity="0.15"/>
      <circle cx="0" cy="0" r="220" fill="none" stroke="#4a6741" stroke-width="3" opacity="0.2"/>
      
      <!-- Main orb -->
      <circle cx="0" cy="0" r="180" fill="#4a6741"/>
      
      <!-- Waveform -->
      <g fill="white" opacity="0.9">
        <rect x="-90" y="-50" width="16" height="100" rx="8"/>
        <rect x="-60" y="-80" width="16" height="160" rx="8"/>
        <rect x="-30" y="-60" width="16" height="120" rx="8"/>
        <rect x="0" y="-90" width="16" height="180" rx="8"/>
        <rect x="30" y="-70" width="16" height="140" rx="8"/>
        <rect x="60" y="-85" width="16" height="170" rx="8"/>
        <rect x="90" y="-50" width="16" height="100" rx="8"/>
      </g>
      
      <!-- Status indicator -->
      <circle cx="140" cy="140" r="40" fill="white"/>
      <circle cx="140" cy="140" r="30" fill="#4a6741"/>
    </g>
    
    <!-- "Listening..." text -->
    <text x="430" y="1080" font-family="'Inter', -apple-system, sans-serif" font-size="40" font-weight="500" fill="#4a6741" text-anchor="middle">Ferni is listening...</text>
    
    <!-- Recent message bubble -->
    <g transform="translate(80, 1180)">
      <rect x="0" y="0" width="600" height="120" rx="30" fill="#4a6741" opacity="0.08"/>
      <text x="40" y="55" font-family="'Inter', sans-serif" font-size="32" font-weight="500" fill="#2C2520">"I've been feeling stressed</text>
      <text x="40" y="95" font-family="'Inter', sans-serif" font-size="32" font-weight="500" fill="#2C2520">about my new job..."</text>
    </g>
    
    <!-- Team chips at bottom -->
    <g transform="translate(100, 1450)">
      <circle cx="50" cy="40" r="40" fill="#4a6741"/>
      <text x="50" y="48" font-family="-apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">FE</text>
      <text x="50" y="105" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#5C544A" text-anchor="middle">Ferni</text>
      
      <circle cx="170" cy="40" r="40" fill="#9a7b5a" opacity="0.4"/>
      <text x="170" y="48" font-family="-apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">JB</text>
      <text x="170" y="105" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#5C544A" text-anchor="middle">Jack</text>
      
      <circle cx="290" cy="40" r="40" fill="#a67a6a" opacity="0.4"/>
      <text x="290" y="48" font-family="-apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">MY</text>
      <text x="290" y="105" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#5C544A" text-anchor="middle">Maya</text>
      
      <circle cx="410" cy="40" r="40" fill="#5a6b8a" opacity="0.4"/>
      <text x="410" y="48" font-family="-apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">AX</text>
      <text x="410" y="105" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#5C544A" text-anchor="middle">Alex</text>
      
      <circle cx="530" cy="40" r="40" fill="#3a6b73" opacity="0.4"/>
      <text x="530" y="48" font-family="-apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">PL</text>
      <text x="530" y="105" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#5C544A" text-anchor="middle">Peter</text>
      
      <circle cx="650" cy="40" r="40" fill="#c4856a" opacity="0.4"/>
      <text x="650" y="48" font-family="-apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">JD</text>
      <text x="650" y="105" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#5C544A" text-anchor="middle">Jordan</text>
    </g>
    
    <!-- Home indicator -->
    <rect x="330" y="1700" width="200" height="12" rx="6" fill="#2C2520"/>
  </g>
  
  <!-- Bottom tagline -->
  <text x="645" y="2450" font-family="'Inter', -apple-system, sans-serif" font-size="36" font-weight="600" fill="#5C544A" text-anchor="middle">Six specialists. One conversation.</text>
  <text x="645" y="2510" font-family="'Inter', -apple-system, sans-serif" font-size="36" font-weight="600" fill="#5C544A" text-anchor="middle">Just talk.</text>
  
  <!-- App Store badge area -->
  <rect x="445" y="2600" width="400" height="80" rx="40" fill="#4a6741"/>
  <text x="645" y="2652" font-family="'Inter', sans-serif" font-size="32" font-weight="600" fill="white" text-anchor="middle">Get Started Free</text>
</svg>
