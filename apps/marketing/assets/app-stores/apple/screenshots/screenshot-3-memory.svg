<svg width="1290" height="2796" viewBox="0 0 1290 2796" xmlns="http://www.w3.org/2000/svg">
  <!-- App Store Screenshot 3: Memory Feature -->
  
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F1E8"/>
      <stop offset="100%" style="stop-color:#E8E0D5"/>
    </linearGradient>
  </defs>
  
  <rect width="1290" height="2796" fill="url(#bgGrad3)"/>
  
  <!-- Top marketing text -->
  <text x="645" y="180" font-family="'Plus Jakarta Sans', -apple-system, sans-serif" font-size="42" font-weight="800" fill="#2C2520" text-anchor="middle">Ferni Remembers</text>
  <text x="645" y="240" font-family="'Inter', -apple-system, sans-serif" font-size="32" font-weight="500" fill="#5C544A" text-anchor="middle">Mention it once. We'll never forget.</text>
  
  <!-- iPhone frame -->
  <g transform="translate(195, 350)">
    <rect x="0" y="0" width="900" height="1800" rx="120" fill="#1a1a1a"/>
    <rect x="20" y="20" width="860" height="1760" rx="100" fill="#F5F1E8"/>
    <rect x="320" y="50" width="260" height="80" rx="40" fill="#1a1a1a"/>
    
    <!-- Status bar -->
    <text x="80" y="110" font-family="-apple-system, sans-serif" font-size="36" font-weight="600" fill="#2C2520">9:41</text>
    
    <!-- Memory visualization -->
    <!-- Central node -->
    <g transform="translate(430, 600)">
      <circle cx="0" cy="0" r="100" fill="#4a6741"/>
      <text x="0" y="10" font-family="-apple-system, sans-serif" font-size="32" font-weight="600" fill="white" text-anchor="middle">You</text>
    </g>
    
    <!-- Connected memories -->
    <line x1="330" y1="600" x2="200" y2="450" stroke="#4a6741" stroke-width="3" opacity="0.3"/>
    <g transform="translate(150, 380)">
      <circle cx="0" cy="0" r="70" fill="#4a6741" opacity="0.2"/>
      <text x="0" y="0" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#2C2520" text-anchor="middle">Career</text>
      <text x="0" y="25" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#2C2520" text-anchor="middle">Goals</text>
    </g>
    
    <line x1="530" y1="600" x2="680" y2="450" stroke="#4a6741" stroke-width="3" opacity="0.3"/>
    <g transform="translate(730, 380)">
      <circle cx="0" cy="0" r="70" fill="#4a6741" opacity="0.2"/>
      <text x="0" y="0" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#2C2520" text-anchor="middle">Family</text>
      <text x="0" y="25" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#2C2520" text-anchor="middle">&amp; Friends</text>
    </g>
    
    <line x1="330" y1="650" x2="180" y2="780" stroke="#4a6741" stroke-width="3" opacity="0.3"/>
    <g transform="translate(130, 850)">
      <circle cx="0" cy="0" r="65" fill="#4a6741" opacity="0.2"/>
      <text x="0" y="5" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#2C2520" text-anchor="middle">Habits</text>
    </g>
    
    <line x1="530" y1="650" x2="700" y2="800" stroke="#4a6741" stroke-width="3" opacity="0.3"/>
    <g transform="translate(750, 870)">
      <circle cx="0" cy="0" r="65" fill="#4a6741" opacity="0.2"/>
      <text x="0" y="5" font-family="'Inter', sans-serif" font-size="22" font-weight="500" fill="#2C2520" text-anchor="middle">Events</text>
    </g>
    
    <!-- Memory cards -->
    <g transform="translate(80, 1050)">
      <rect x="0" y="0" width="700" height="140" rx="25" fill="white" stroke="#4a6741" stroke-width="2" opacity="0.8"/>
      <circle cx="70" cy="70" r="40" fill="#4a6741" opacity="0.1"/>
      <text x="70" y="78" font-family="-apple-system, sans-serif" font-size="28" fill="#4a6741" text-anchor="middle">📅</text>
      <text x="140" y="55" font-family="'Plus Jakarta Sans', sans-serif" font-size="28" font-weight="600" fill="#2C2520">Emma's birthday is March 15</text>
      <text x="140" y="95" font-family="'Inter', sans-serif" font-size="22" font-weight="400" fill="#5C544A">Remembered from your chat on Feb 2</text>
    </g>
    
    <g transform="translate(80, 1220)">
      <rect x="0" y="0" width="700" height="140" rx="25" fill="white" stroke="#4a6741" stroke-width="2" opacity="0.8"/>
      <circle cx="70" cy="70" r="40" fill="#4a6741" opacity="0.1"/>
      <text x="70" y="78" font-family="-apple-system, sans-serif" font-size="28" fill="#4a6741" text-anchor="middle">💼</text>
      <text x="140" y="55" font-family="'Plus Jakarta Sans', sans-serif" font-size="28" font-weight="600" fill="#2C2520">You're interviewing at Acme Corp</text>
      <text x="140" y="95" font-family="'Inter', sans-serif" font-size="22" font-weight="400" fill="#5C544A">Mentioned last Thursday</text>
    </g>
    
    <g transform="translate(80, 1390)">
      <rect x="0" y="0" width="700" height="140" rx="25" fill="white" stroke="#4a6741" stroke-width="2" opacity="0.8"/>
      <circle cx="70" cy="70" r="40" fill="#4a6741" opacity="0.1"/>
      <text x="70" y="78" font-family="-apple-system, sans-serif" font-size="28" fill="#4a6741" text-anchor="middle">🌅</text>
      <text x="140" y="55" font-family="'Plus Jakarta Sans', sans-serif" font-size="28" font-weight="600" fill="#2C2520">You're a morning person</text>
      <text x="140" y="95" font-family="'Inter', sans-serif" font-size="22" font-weight="400" fill="#5C544A">We'll respect your schedule</text>
    </g>
    
    <!-- Home indicator -->
    <rect x="330" y="1700" width="200" height="12" rx="6" fill="#2C2520"/>
  </g>
  
  <!-- Bottom tagline -->
  <text x="645" y="2450" font-family="'Inter', -apple-system, sans-serif" font-size="36" font-weight="600" fill="#5C544A" text-anchor="middle">No more "remind me again?"</text>
  <text x="645" y="2510" font-family="'Inter', -apple-system, sans-serif" font-size="36" font-weight="600" fill="#5C544A" text-anchor="middle">Ferni knows your story.</text>
</svg>
