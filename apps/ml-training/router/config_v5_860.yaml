# Ferni Router Model Training Configuration
# FTIS V5-860 - Full 860 tool labels with LLM-generated training data
#
# Key changes from V4:
# - 860 labels (up from 40 in V4)
# - Lower LR (1e-5 vs 2e-5) for stability with many labels
# - More epochs (5 vs 3) for larger label space
# - Larger effective batch (128 vs 32) for smoother gradients
# - Label smoothing (0.1) for better calibration
# - Less frequent eval (more training data)
#
# Expected: ~430k training examples, 2-4 hours on MPS, 30-60 min on A100

# Model settings
model:
  base_model: "Qwen/Qwen3-1.7B"
  task: "multi_label_classification"
  num_labels: 860  # Full tool set

# LoRA configuration
lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.1
  bias: "none"
  task_type: "SEQ_CLS"

# Training hyperparameters (tuned for 860 labels)
training:
  # Lower LR for stability with many labels
  learning_rate: 1.0e-5

  # More epochs needed for 860-class classification
  num_train_epochs: 5

  # Batch size (effective = per_device * gradient_accumulation)
  # Reduced for 24GB RAM systems - effective batch still 64
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 16  # Effective batch: 4 * 16 = 64

  # Less warmup with more data (already has plenty)
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"

  # Label smoothing helps with 860-class calibration
  label_smoothing_factor: 0.1

  # Evaluation (less frequent due to larger dataset)
  eval_strategy: "steps"
  eval_steps: 500
  save_strategy: "steps"
  save_steps: 1000
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_top1_accuracy"
  greater_is_better: true

  # Performance
  # Note: fp16 disabled for MPS (Apple Silicon) compatibility
  fp16: false
  dataloader_num_workers: 2  # Reduced for memory constraints

  # Logging
  logging_steps: 50

# Data settings (V5-860 with LLM-generated examples)
data:
  max_length: 128
  pad_to_max_length: false
  train_file: "data/train_v5_860.jsonl"
  validation_file: "data/validation_v5_860.jsonl"
  test_file: "data/test_v5_860.jsonl"
  label_map_file: "data/label_map_v5_860.json"

# Output settings
output:
  output_dir: "outputs/ferni-router-v5-860"
  logging_dir: "logs/v5-860"
  report_to: "tensorboard"

# ONNX export settings
onnx:
  export: true
  opset_version: 14
  optimize: true
  quantize: false  # Set true for int8 quantization (~1.6GB vs 6.4GB)
