# Ferni Router Model Training Configuration
# FTIS V7 Stage 2 - Meta-tool Classifier (112 classes)
# Hierarchical: domain (from stage 1) → meta-tool (this model)
# Input format: "[domain_name] user query" (domain prefix for conditioning)

# Model settings
model:
  base_model: "Qwen/Qwen3-1.7B"
  task: "single_label_classification"
  num_labels: 112  # 111 meta-tools + __no_tool__

# LoRA configuration (same as V6 - proven stable on L4)
lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.1
  bias: "none"
  task_type: "SEQ_CLS"

# Training hyperparameters
training:
  learning_rate: 2.0e-5
  num_train_epochs: 3
  # GCE g2-standard-8 (L4 GPU, 24GB VRAM)
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 4  # Effective batch size: 16 * 4 = 64
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"

  # Evaluation
  eval_strategy: "steps"
  eval_steps: 500
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "f1_weighted"
  greater_is_better: true

  # Performance - GCE with NVIDIA L4 GPU
  fp16: false
  bf16: true
  dataloader_num_workers: 4

# Data settings
data:
  max_length: 128
  pad_to_max_length: false
  train_file: "data/v7/stage2_train.jsonl"
  validation_file: "data/v7/stage2_validation.jsonl"
  test_file: "data/v7/stage2_test.jsonl"

# Output settings
output:
  output_dir: "outputs/ferni-router-v7-stage2"
  logging_dir: "logs/v7-stage2"
  report_to: "tensorboard"

# ONNX export settings
onnx:
  export: true
  opset_version: 14
  optimize: true
  quantize: false
