# Ferni Router Model Training Configuration - FULL TOOL COVERAGE
# Trains on all 758 tools in the Ferni system

# Model settings
model:
  base_model: 'Qwen/Qwen2.5-0.5B'
  task: 'multi_label_classification'
  num_labels: 800 # Max number of tools (758 actual)

# LoRA configuration - larger for 758 classes
lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - 'q_proj'
    - 'k_proj'
    - 'v_proj'
    - 'o_proj'
  lora_dropout: 0.1
  bias: 'none'
  task_type: 'SEQ_CLS'

# Training hyperparameters
training:
  learning_rate: 2.0e-5
  num_train_epochs: 5
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  lr_scheduler_type: 'cosine'

  # Evaluation
  eval_strategy: 'steps'
  eval_steps: 300
  save_strategy: 'steps'
  save_steps: 600
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: 'f1'
  greater_is_better: true

  # Performance - Disabled fp16 for MPS
  fp16: false
  dataloader_num_workers: 0

# Data settings
data:
  max_length: 256
  pad_to_max_length: false
  train_file: 'data/train.jsonl'
  validation_file: 'data/validation.jsonl'
  test_file: 'data/test.jsonl'

# Output settings
output:
  output_dir: 'outputs/ferni-router-full'
  logging_dir: 'logs'
  report_to: 'tensorboard'

# ONNX export settings
onnx:
  export: true
  opset_version: 14
  optimize: true
  quantize: false
