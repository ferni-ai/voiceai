# FTIS V5 Training Configuration
# Target: 99%+ accuracy with expanded categories and augmented data
# Created: January 26, 2026

# Model settings
model:
  base_model: 'Qwen/Qwen3-1.7B'
  task: 'multi_label_classification'
  num_labels: 120 # Expanded from 40

# LoRA configuration (efficient fine-tuning)
lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - 'q_proj'
    - 'k_proj'
    - 'v_proj'
    - 'o_proj'
    - 'gate_proj'
    - 'up_proj'
    - 'down_proj'
  lora_dropout: 0.1
  bias: 'none'
  task_type: 'SEQ_CLS'

# Training hyperparameters
training:
  learning_rate: 2.0e-5
  num_train_epochs: 3
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  lr_scheduler_type: 'cosine'

  # Evaluation
  eval_strategy: 'steps'
  eval_steps: 200
  save_strategy: 'steps'
  save_steps: 400
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: 'f1'
  greater_is_better: true

  # Performance (fp16 disabled for MPS compatibility)
  fp16: false
  dataloader_num_workers: 0 # MPS compatibility

# Data settings - V5 with expanded categories
data:
  max_length: 128
  pad_to_max_length: false
  train_file: 'data/train_v5.jsonl'
  validation_file: 'data/validation_v5.jsonl'
  test_file: 'data/test_v5.jsonl'

# Output settings
output:
  output_dir: 'outputs/ferni-router-v5'
  logging_dir: 'logs/v5'
  report_to: 'tensorboard'

# ONNX export settings
onnx:
  export: true
  opset_version: 14
  optimize: true
  quantize: false
