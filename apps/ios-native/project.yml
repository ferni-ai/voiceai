name: FerniVoice
options:
  bundleIdPrefix: com.sethdford
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  LiveKit:
    path: ../../vendor/client-sdk-swift
  FerniShared:
    path: ../shared
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "XT8W26YE9U"
    CODE_SIGN_STYLE: Automatic

targets:
  FerniVoice:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
        type: group
      - path: FerniVoice
        type: group
      - path: FerniCarPlay
        type: group
    dependencies:
      - package: LiveKit
        product: LiveKit
      - package: FerniShared
        product: FerniShared
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCore
      - target: FerniWidgets
        embed: true
      - target: FerniShareExtension
        embed: true
      - framework: CarPlay.framework
    resources:
      - path: FerniVoice/Assets.xcassets
      - path: FerniVoice/LaunchScreen.storyboard
      - path: FerniVoice/Preview Content
      - path: FerniVoice/GoogleService-Info.plist
    info:
      path: FerniVoice/Info.plist
      properties:
        CFBundleDisplayName: Ferni
        UILaunchStoryboardName: LaunchScreen
        UIBackgroundModes:
          - audio
          - voip
          - fetch
          - processing
        # CarPlay scene configuration
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).FerniCarPlaySceneDelegate
        # Core permissions
        NSMicrophoneUsageDescription: Ferni needs microphone access for voice conversations with your AI team.
        # HealthKit - wellness insights
        NSHealthShareUsageDescription: Ferni uses health data to provide personalized wellness insights and notice when you might need extra support.
        NSHealthUpdateUsageDescription: Ferni may save wellness notes to your Health app.
        # Contacts - relationship awareness
        NSContactsUsageDescription: Ferni uses your contacts to remember the people in your life and help you stay connected.
        # HomeKit - ambient environment
        NSHomeKitUsageDescription: Ferni can adjust your smart home lighting to create calming or energizing environments.
        # Siri - voice activation
        NSSiriUsageDescription: Add Ferni shortcuts to Siri for quick access to emotional support.
        # Music - mood-aware playback
        NSAppleMusicUsageDescription: Ferni plays music that matches your mood to help you feel better.
        # Location - context awareness (optional future use)
        NSLocationWhenInUseUsageDescription: Ferni uses your location to provide context-aware support, like knowing when you're at home vs work.
        # User activity types for Siri Shortcuts
        NSUserActivityTypes:
          - com.ferni.talk
          - com.ferni.support
          - com.ferni.checkin
          - com.ferni.music.calming
          - com.ferni.routine.morning
          - com.ferni.routine.evening
          - com.ferni.vent
          - com.ferni.gratitude
        UIUserInterfaceStyle: Dark
    entitlements:
      path: FerniVoice/FerniVoice.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sethdford.ferni
        INFOPLIST_FILE: FerniVoice/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"

  FerniVoiceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        type: group
    dependencies:
      - target: FerniVoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sethdford.ferni.tests

  FerniWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FerniWidgets
        type: group
    info:
      path: FerniWidgets/Info.plist
      properties:
        CFBundleDisplayName: Ferni Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: FerniWidgets/FerniWidgets.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sethdford.ferni.widgets
        INFOPLIST_FILE: FerniWidgets/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"

  # MARK: - watchOS Targets

  FerniWatch:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: FerniWatch
        type: group
    dependencies:
      - package: FerniShared
        product: FerniShared
      - target: FerniWatchWidgets
        embed: true
    info:
      path: FerniWatch/Info.plist
      properties:
        CFBundleDisplayName: Ferni
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.sethdford.ferni
    entitlements:
      path: FerniWatch/FerniWatch.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sethdford.ferni.watch
        INFOPLIST_FILE: FerniWatch/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        WATCHOS_DEPLOYMENT_TARGET: "9.0"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"
        SDKROOT: watchos

  FerniWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: FerniWatchWidgets
        type: group
    dependencies:
      - package: FerniShared
        product: FerniShared
    info:
      path: FerniWatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: Ferni Watch Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: FerniWatchWidgets/FerniWatchWidgets.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sethdford.ferni.watch.widgets
        INFOPLIST_FILE: FerniWatchWidgets/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        WATCHOS_DEPLOYMENT_TARGET: "9.0"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"
        SDKROOT: watchos

  # MARK: - Share Extension

  FerniShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: FerniShareExtension
        type: group
    info:
      path: FerniShareExtension/Info.plist
    entitlements:
      path: FerniShareExtension/FerniShareExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sethdford.ferni.share
        INFOPLIST_FILE: FerniShareExtension/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"

schemes:
  FerniVoice:
    build:
      targets:
        FerniVoice: all
        FerniVoiceTests: [test]
        FerniWidgets: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FerniVoiceTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  FerniWidgets:
    build:
      targets:
        FerniWidgets: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  FerniWatch:
    build:
      targets:
        FerniWatch: all
        FerniWatchWidgets: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  FerniShareExtension:
    build:
      targets:
        FerniShareExtension: all
    run:
      config: Debug
      askForAppToLaunch: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
