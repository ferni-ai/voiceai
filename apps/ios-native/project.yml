name: FerniVoice
options:
  bundleIdPrefix: com.sethdford
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  LiveKit:
    path: ../../vendor/client-sdk-swift
  FerniShared:
    path: ../shared
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "XT8W26YE9U"
    CODE_SIGN_STYLE: Automatic

targets:
  FerniVoice:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
        type: group
      - path: FerniVoice
        type: group
    dependencies:
      - package: LiveKit
        product: LiveKit
      - package: FerniShared
        product: FerniShared
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCore
    resources:
      - path: FerniVoice/Assets.xcassets
      - path: FerniVoice/LaunchScreen.storyboard
      - path: FerniVoice/Preview Content
      - path: FerniVoice/GoogleService-Info.plist
    info:
      path: FerniVoice/Info.plist
      properties:
        CFBundleDisplayName: Ferni
        UILaunchStoryboardName: LaunchScreen
        UIBackgroundModes:
          - audio
          - voip
        NSMicrophoneUsageDescription: Ferni needs microphone access for voice conversations with your AI team.
        UIUserInterfaceStyle: Dark
    entitlements:
      path: FerniVoice/FerniVoice.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sethdford.ferni
        INFOPLIST_FILE: FerniVoice/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"

  FerniVoiceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        type: group
    dependencies:
      - target: FerniVoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sethdford.ferni.tests

schemes:
  FerniVoice:
    build:
      targets:
        FerniVoice: all
        FerniVoiceTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FerniVoiceTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
