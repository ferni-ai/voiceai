    <!-- Magical Interactions -->
    <script>
      (function () {
        'use strict';

        // ========================================
        // TIME OF DAY AWARENESS
        // ========================================
        function updateAmbientWarmth() {
          const hour = new Date().getHours();
          let warmth = 0;

          // Morning (6-10): slight warmth
          if (hour >= 6 && hour < 10) warmth = 0.3;
          // Day (10-17): neutral
          else if (hour >= 10 && hour < 17) warmth = 0;
          // Evening (17-21): warm golden hour
          else if (hour >= 17 && hour < 21) warmth = 0.6;
          // Night (21-6): cool
          else warmth = -0.2;

          document.documentElement.style.setProperty('--ambient-warmth', warmth);
        }

        updateAmbientWarmth();
        setInterval(updateAmbientWarmth, 60000); // Update every minute

        // ========================================
        // MAGNETIC BUTTON EFFECT
        // ========================================
        function initMagneticButtons() {
          const magneticBtns = document.querySelectorAll('.btn-magnetic');

          magneticBtns.forEach((btn) => {
            btn.addEventListener('mousemove', (e) => {
              const rect = btn.getBoundingClientRect();
              const x = e.clientX - rect.left - rect.width / 2;
              const y = e.clientY - rect.top - rect.height / 2;

              btn.style.setProperty('--magnetic-x', x * 0.15);
              btn.style.setProperty('--magnetic-y', y * 0.15);
            });

            btn.addEventListener('mouseleave', () => {
              btn.style.setProperty('--magnetic-x', 0);
              btn.style.setProperty('--magnetic-y', 0);
            });
          });
        }

        // ========================================
        // RIPPLE CLICK EFFECT
        // ========================================
        function initRippleEffect() {
          const buttons = document.querySelectorAll('.btn');

          buttons.forEach((btn) => {
            btn.addEventListener('click', (e) => {
              const rect = btn.getBoundingClientRect();
              const ripple = document.createElement('span');
              ripple.className = 'ripple';
              ripple.style.left = e.clientX - rect.left + 'px';
              ripple.style.top = e.clientY - rect.top + 'px';
              ripple.style.width = ripple.style.height = Math.max(rect.width, rect.height) + 'px';

              btn.appendChild(ripple);

              ripple.addEventListener('animationend', () => ripple.remove());
            });
          });
        }

        // ========================================
        // CONNECTION CELEBRATION
        // ========================================
        window.celebrateConnection = function () {
          // Create celebration burst
          const burst = document.createElement('div');
          burst.className = 'celebration-burst';
          burst.innerHTML =
            '<div class="celebration-ring"></div><div class="celebration-ring"></div><div class="celebration-ring"></div>';
          document.body.appendChild(burst);

          // Add pulse to avatar
          const avatar = document.getElementById('coachAvatar');
          if (avatar) {
            avatar.classList.add('avatar-connected-pulse');
            setTimeout(() => avatar.classList.remove('avatar-connected-pulse'), 1500);
          }

          // Remove burst after animation
          setTimeout(() => burst.remove(), 1500);
        };

        // ========================================
        // PERSONA TRANSITION EFFECT
        // ========================================
        window.triggerPersonaTransition = function () {
          const avatar = document.getElementById('coachAvatar');
          if (avatar) {
            avatar.classList.add('persona-transition');
            setTimeout(() => avatar.classList.remove('persona-transition'), 600);
          }
        };

        // ========================================
        // SMOOTH SCROLL TO TOP ON LOAD
        // ========================================
        window.scrollTo(0, 0);

        // ========================================
        // INITIALIZE ON DOM READY
        // ========================================
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init);
        } else {
          init();
        }

        function init() {
          initMagneticButtons();
          initRippleEffect();

          // Listen for connection events
          window.addEventListener('voiceai-connected', () => {
            window.celebrateConnection();
          });

          // Listen for persona changes
          window.addEventListener('voiceai-persona-changed', () => {
            window.triggerPersonaTransition();
          });
        }
      })();
    </script>
