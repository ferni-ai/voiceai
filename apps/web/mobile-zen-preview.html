<!DOCTYPE html>
<html lang="en" data-theme="zen">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Ferni Mobile Zen Mode Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* CSS Variables - Ferni Design Tokens */
    :root {
      --color-ferni: #4a6741;
      --color-ferni-glow: rgba(74, 103, 65, 0.3);
      --color-bg-primary: #F5F1E8;
      --color-bg-elevated: #FFFDF8;
      --color-text-primary: #2C2520;
      --color-text-secondary: rgba(44, 37, 32, 0.7);
      --color-text-muted: rgba(44, 37, 32, 0.5);
      --color-border-subtle: rgba(44, 37, 32, 0.1);
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 26px;
      --space-xl: 42px;
    }

    [data-theme="midnight"] {
      --color-bg-primary: #1a1614;
      --color-bg-elevated: #2a2520;
      --color-text-primary: #F5F1E8;
      --color-text-secondary: rgba(245, 241, 232, 0.7);
      --color-text-muted: rgba(245, 241, 232, 0.4);
      --color-border-subtle: rgba(245, 241, 232, 0.1);
    }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      height: 100%;
      overflow: hidden;
    }

    /* Device Frame */
    .device-frame {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 375px;
      height: 812px;
      background: var(--color-bg-primary);
      border-radius: 40px;
      box-shadow: 0 50px 100px rgba(0,0,0,0.3);
      overflow: hidden;
      border: 12px solid #1a1a1a;
    }

    /* Notch */
    .device-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 28px;
      background: #1a1a1a;
      border-radius: 0 0 20px 20px;
      z-index: 100;
    }

    /* App Container */
    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 44px 16px 34px;
      padding-top: calc(44px + 20px);
    }

    /* Header */
    .header {
      text-align: center;
      padding: var(--space-sm) 0;
    }

    /* Avatar */
    .avatar-container {
      width: 140px;
      height: 140px;
      margin: 0 auto;
      position: relative;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .avatar-container.connected {
      width: 180px;
      height: 180px;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(145deg, #3d5a35, var(--color-ferni));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      position: relative;
    }

    .avatar-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 2px solid var(--color-ferni);
      opacity: 0.6;
      transition: all 0.5s ease;
    }

    .connected .avatar-ring {
      inset: -16px;
      border-width: 3px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.05); opacity: 0.3; }
    }

    /* Persona Info */
    .persona-name {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: var(--space-md);
      color: var(--color-text-primary);
    }

    .persona-subtitle {
      font-size: 0.875rem;
      color: var(--color-text-secondary);
      margin-top: var(--space-xs);
      transition: all 0.3s ease;
    }

    .connected .persona-subtitle {
      opacity: 0;
      height: 0;
      margin: 0;
      overflow: hidden;
    }

    /* Team Roster (hidden on mobile) */
    .team-roster {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: var(--space-md);
      transition: all 0.3s ease;
    }

    .team-roster.hidden {
      opacity: 0;
      height: 0;
      margin: 0;
      overflow: hidden;
    }

    .team-member {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--color-bg-elevated);
      border: 2px solid var(--color-border-subtle);
    }

    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-lg);
    }

    /* Waveform */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 48px;
    }

    .waveform-bar {
      width: 4px;
      height: 20px;
      background: var(--color-ferni);
      border-radius: 2px;
      animation: wave 1.2s ease-in-out infinite;
    }

    .connected .waveform-bar {
      animation: wave 0.8s ease-in-out infinite;
    }

    .waveform-bar:nth-child(1) { animation-delay: 0s; }
    .waveform-bar:nth-child(2) { animation-delay: 0.1s; }
    .waveform-bar:nth-child(3) { animation-delay: 0.2s; }
    .waveform-bar:nth-child(4) { animation-delay: 0.3s; }
    .waveform-bar:nth-child(5) { animation-delay: 0.4s; }
    .waveform-bar:nth-child(6) { animation-delay: 0.5s; }
    .waveform-bar:nth-child(7) { animation-delay: 0.4s; }
    .waveform-bar:nth-child(8) { animation-delay: 0.3s; }
    .waveform-bar:nth-child(9) { animation-delay: 0.2s; }
    .waveform-bar:nth-child(10) { animation-delay: 0.1s; }
    .waveform-bar:nth-child(11) { animation-delay: 0s; }

    @keyframes wave {
      0%, 100% { height: 12px; }
      50% { height: 36px; }
    }

    /* Buttons */
    .btn {
      padding: 16px 36px;
      border-radius: 26px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 180px;
    }

    .btn-primary {
      background: var(--color-ferni);
      color: white;
      box-shadow: 0 4px 20px var(--color-ferni-glow);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--color-ferni-glow);
    }

    .btn-secondary {
      background: var(--color-bg-elevated);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border-subtle);
    }

    /* Helper Text */
    .helper-text {
      font-size: 0.875rem;
      color: var(--color-text-muted);
      transition: all 0.3s ease;
    }

    .connected .helper-text {
      opacity: 0;
      height: 0;
      margin: 0;
    }

    /* Bottom Sheet Trigger */
    .menu-trigger {
      position: absolute;
      bottom: 50px;
      left: 16px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-border-subtle);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .menu-trigger:hover {
      transform: scale(1.05);
    }

    .menu-trigger svg {
      width: 20px;
      height: 20px;
      stroke: var(--color-text-primary);
    }

    /* Theme Toggle */
    .theme-toggle {
      position: absolute;
      bottom: 50px;
      right: 16px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--color-bg-elevated);
      border: 1px solid var(--color-border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      stroke: var(--color-text-primary);
    }

    /* Bottom Sheet */
    .bottom-sheet-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .bottom-sheet-backdrop.open {
      opacity: 1;
      visibility: visible;
    }

    .bottom-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--color-bg-elevated);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: 34px;
    }

    .bottom-sheet.open {
      transform: translateY(0);
    }

    .bottom-sheet-handle {
      display: flex;
      justify-content: center;
      padding: 12px 0 8px;
    }

    .bottom-sheet-handle::before {
      content: '';
      width: 36px;
      height: 4px;
      background: var(--color-text-muted);
      border-radius: 2px;
    }

    .bottom-sheet-content {
      padding: 8px 20px 24px;
    }

    .bottom-sheet-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .bottom-sheet-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 8px;
      border: none;
      background: rgba(0,0,0,0.03);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    [data-theme="midnight"] .action-btn {
      background: rgba(255,255,255,0.05);
    }

    .action-btn:hover {
      background: rgba(0,0,0,0.06);
    }

    [data-theme="midnight"] .action-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    .action-btn svg {
      width: 24px;
      height: 24px;
      stroke: var(--color-text-primary);
    }

    .action-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-secondary);
    }

    /* Controls Panel */
    .controls-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .controls-panel h3 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .control-btn {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: #f8f8f8;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .control-btn:hover {
      background: #eee;
    }

    .control-btn.active {
      background: var(--color-ferni);
      color: white;
      border-color: var(--color-ferni);
    }

    /* Info Panel */
    .info-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      padding: 16px 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      max-width: 300px;
      font-size: 13px;
      line-height: 1.5;
      color: #666;
    }

    .info-panel strong {
      color: #333;
    }
  </style>
</head>
<body>
  <!-- Device Frame -->
  <div class="device-frame">
    <div class="app" id="app">
      <!-- Header -->
      <header class="header">
        <div class="avatar-container" id="avatarContainer">
          <div class="avatar-ring"></div>
          <div class="avatar">FE</div>
        </div>
        <h1 class="persona-name">Ferni</h1>
        <p class="persona-subtitle">Your personal guide</p>

        <!-- Team Roster (hidden on mobile zen mode) -->
        <div class="team-roster hidden" id="teamRoster">
          <div class="team-member" style="background: #3a6b73"></div>
          <div class="team-member" style="background: #5a6b8a"></div>
          <div class="team-member" style="background: #a67a6a"></div>
          <div class="team-member" style="background: #c4856a"></div>
          <div class="team-member" style="background: #b8956a"></div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main">
        <div class="waveform">
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
        </div>

        <button class="btn btn-primary" id="connectBtn">Connect</button>
        <p class="helper-text">Your personal guide</p>
      </main>

      <!-- Menu Trigger -->
      <button class="menu-trigger" id="menuTrigger">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <!-- Theme Toggle -->
      <button class="theme-toggle" id="themeToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <!-- Bottom Sheet Backdrop -->
      <div class="bottom-sheet-backdrop" id="backdrop"></div>

      <!-- Bottom Sheet -->
      <div class="bottom-sheet" id="bottomSheet">
        <div class="bottom-sheet-handle"></div>
        <div class="bottom-sheet-content">
          <div class="bottom-sheet-title">Quick Actions</div>
          <div class="bottom-sheet-actions">
            <button class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
              <span class="action-label">Settings</span>
            </button>
            <button class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              <span class="action-label">Team</span>
            </button>
            <button class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/>
                <circle cx="18" cy="16" r="3"/>
              </svg>
              <span class="action-label">Music</span>
            </button>
            <button class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <span class="action-label">Calendar</span>
            </button>
            <button class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
              <span class="action-label">History</span>
            </button>
            <button class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <span class="action-label">People</span>
            </button>
            <button class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
                <path d="M22 12A10 10 0 0 0 12 2v10z"/>
              </svg>
              <span class="action-label">Insights</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Controls Panel -->
  <div class="controls-panel">
    <h3>Preview Controls</h3>
    <button class="control-btn" id="toggleConnect">Toggle Connected State</button>
    <button class="control-btn" id="toggleRoster">Toggle Team Roster</button>
    <button class="control-btn" id="toggleSheet">Toggle Bottom Sheet</button>
  </div>

  <!-- Info Panel -->
  <div class="info-panel">
    <strong>Zen Mobile Mode</strong><br>
    On mobile, the experience is simplified:
    <ul style="margin-top: 8px; padding-left: 16px;">
      <li>Team roster hidden</li>
      <li>Garden widget hidden</li>
      <li>Avatar grows when connected</li>
      <li>Subtitle/helper text fade out</li>
      <li>Bottom sheet for settings</li>
    </ul>
  </div>

  <script>
    const app = document.getElementById('app');
    const avatarContainer = document.getElementById('avatarContainer');
    const teamRoster = document.getElementById('teamRoster');
    const connectBtn = document.getElementById('connectBtn');
    const menuTrigger = document.getElementById('menuTrigger');
    const backdrop = document.getElementById('backdrop');
    const bottomSheet = document.getElementById('bottomSheet');
    const themeToggle = document.getElementById('themeToggle');

    let isConnected = false;
    let isSheetOpen = false;
    let isDark = false;

    // Toggle connection state
    function toggleConnect() {
      isConnected = !isConnected;
      if (isConnected) {
        avatarContainer.classList.add('connected');
        app.classList.add('connected');
        connectBtn.textContent = 'Disconnect';
        connectBtn.classList.remove('btn-primary');
        connectBtn.classList.add('btn-secondary');
      } else {
        avatarContainer.classList.remove('connected');
        app.classList.remove('connected');
        connectBtn.textContent = 'Connect';
        connectBtn.classList.add('btn-primary');
        connectBtn.classList.remove('btn-secondary');
      }
    }

    // Toggle roster visibility
    function toggleRoster() {
      teamRoster.classList.toggle('hidden');
    }

    // Toggle bottom sheet
    function toggleSheet() {
      isSheetOpen = !isSheetOpen;
      if (isSheetOpen) {
        backdrop.classList.add('open');
        bottomSheet.classList.add('open');
      } else {
        backdrop.classList.remove('open');
        bottomSheet.classList.remove('open');
      }
    }

    // Toggle theme
    function toggleTheme() {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? 'midnight' : 'zen');
    }

    // Event listeners
    connectBtn.addEventListener('click', toggleConnect);
    menuTrigger.addEventListener('click', toggleSheet);
    backdrop.addEventListener('click', toggleSheet);
    themeToggle.addEventListener('click', toggleTheme);

    // Control panel
    document.getElementById('toggleConnect').addEventListener('click', toggleConnect);
    document.getElementById('toggleRoster').addEventListener('click', toggleRoster);
    document.getElementById('toggleSheet').addEventListener('click', toggleSheet);
  </script>
</body>
</html>
