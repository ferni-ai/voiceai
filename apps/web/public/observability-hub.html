<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Observability Hub | Ferni AI</title>
  <link rel="stylesheet" href="/design-system/tokens.css">
  <style>
    /* ========================================
       FERNI DESIGN SYSTEM - OBSERVABILITY HUB
       ======================================== */
    
    :root {
      --font-display: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-background-base, #1a1614);
      color: var(--color-text-primary, #faf6f0);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Navigation */
    .nav-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--color-background-elevated, #252220);
      border-bottom: 1px solid var(--color-border-subtle, rgba(250, 246, 240, 0.1));
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .nav-brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--color-accent-sage, #4a6741), var(--color-accent-sage-dark, #3d5a35));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-brand-text {
      font-family: var(--font-display);
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      color: var(--color-text-secondary, #e8e2da);
      text-decoration: none;
      font-size: 0.875rem;
      transition: all 200ms ease;
    }

    .nav-link:hover {
      background: var(--color-background-hover, rgba(250, 246, 240, 0.05));
      color: var(--color-text-primary);
    }

    .nav-link.active {
      background: var(--color-accent-sage, #4a6741);
      color: white;
    }

    .nav-link .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    /* Main Content */
    .main-content {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 2rem;
    }

    .page-eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-accent-sage, #4a6741);
      margin-bottom: 0.5rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .page-subtitle {
      color: var(--color-text-secondary, #c4bdb4);
      font-size: 1rem;
    }

    /* Overall Health Card */
    .health-hero {
      background: linear-gradient(135deg, var(--color-background-elevated, #252220), var(--color-background-subtle, #1e1c1a));
      border-radius: 24px;
      padding: 2rem;
      margin-bottom: 2rem;
      border: 1px solid var(--color-border-subtle, rgba(250, 246, 240, 0.1));
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .health-score-ring {
      position: relative;
      width: 160px;
      height: 160px;
      flex-shrink: 0;
    }

    .health-score-svg {
      transform: rotate(-90deg);
    }

    .health-score-bg {
      fill: none;
      stroke: var(--color-background-base, #1a1614);
      stroke-width: 12;
    }

    .health-score-fill {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s ease, stroke 0.5s ease;
    }

    .health-score-value {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .health-score-number {
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
    }

    .health-score-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-muted, #a09890);
      margin-top: 0.25rem;
    }

    .health-details {
      flex: 1;
    }

    .health-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .health-status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .health-status.healthy {
      background: rgba(74, 103, 65, 0.2);
      color: var(--color-accent-sage-light, #6b8f60);
    }

    .health-status.warning {
      background: rgba(196, 133, 106, 0.2);
      color: var(--color-accent-terracotta, #c4856a);
    }

    .health-status.critical {
      background: rgba(180, 80, 80, 0.2);
      color: #e07070;
    }

    .health-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Metric Grid */
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .metric-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .metric-label {
      font-size: 0.75rem;
      color: var(--color-text-muted, #a09890);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .metric-value {
      font-family: var(--font-mono);
      font-size: 1.25rem;
      font-weight: 600;
    }

    /* Health Cards Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .health-card {
      background: var(--color-background-elevated, #252220);
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid var(--color-border-subtle, rgba(250, 246, 240, 0.1));
      transition: transform 200ms ease, box-shadow 200ms ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .health-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-background-base, #1a1614);
    }

    .card-icon .icon {
      width: 20px;
      height: 20px;
      stroke: var(--color-accent-sage, #4a6741);
      stroke-width: 2;
      fill: none;
    }

    .card-score {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
    }

    .card-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .card-subtitle {
      font-size: 0.875rem;
      color: var(--color-text-secondary, #c4bdb4);
      margin-bottom: 1rem;
    }

    .card-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .card-metric {
      flex: 1;
      min-width: 80px;
    }

    .card-metric-label {
      font-size: 0.6875rem;
      color: var(--color-text-muted, #a09890);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-metric-value {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 600;
    }

    /* Score colors */
    .score-excellent { color: var(--color-accent-sage, #4a6741); }
    .score-good { color: var(--color-accent-sage-light, #6b8f60); }
    .score-warning { color: var(--color-accent-terracotta, #c4856a); }
    .score-critical { color: #e07070; }

    /* Alerts Section */
    .alerts-section {
      background: var(--color-background-elevated, #252220);
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid var(--color-border-subtle, rgba(250, 246, 240, 0.1));
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .section-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.125rem;
    }

    .alert-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      padding: 0 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .alert-badge.critical {
      background: rgba(180, 80, 80, 0.2);
      color: #e07070;
    }

    .alert-badge.warning {
      background: rgba(196, 133, 106, 0.2);
      color: var(--color-accent-terracotta, #c4856a);
    }

    .alerts-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem;
      border-radius: 8px;
      background: var(--color-background-base, #1a1614);
    }

    .alert-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 0.375rem;
      flex-shrink: 0;
    }

    .alert-indicator.critical {
      background: #e07070;
      box-shadow: 0 0 8px rgba(224, 112, 112, 0.5);
    }

    .alert-indicator.warning {
      background: var(--color-accent-terracotta, #c4856a);
    }

    .alert-indicator.info {
      background: var(--color-accent-sage, #4a6741);
    }

    .alert-content {
      flex: 1;
    }

    .alert-title {
      font-weight: 600;
      font-size: 0.875rem;
    }

    .alert-message {
      font-size: 0.8125rem;
      color: var(--color-text-secondary, #c4bdb4);
    }

    .alert-time {
      font-size: 0.75rem;
      color: var(--color-text-muted, #a09890);
    }

    .no-alerts {
      text-align: center;
      padding: 2rem;
      color: var(--color-text-muted, #a09890);
    }

    /* Last Updated */
    .last-updated {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--color-text-muted, #a09890);
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--color-border-subtle, rgba(250, 246, 240, 0.1));
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 200ms ease;
    }

    .refresh-btn:hover {
      background: var(--color-background-hover, rgba(250, 246, 240, 0.05));
      color: var(--color-text-primary);
    }

    .refresh-btn .icon {
      width: 14px;
      height: 14px;
    }

    .refresh-btn.loading .icon {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Loading state */
    .loading-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      color: var(--color-text-muted);
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--color-background-elevated);
      border-top-color: var(--color-accent-sage);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 1rem;
    }

    /* Theme toggle */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem;
      border-radius: 8px;
      border: 1px solid var(--color-border-subtle);
      background: transparent;
      cursor: pointer;
    }

    .theme-toggle .icon {
      width: 18px;
      height: 18px;
      stroke: var(--color-text-secondary);
      stroke-width: 2;
      fill: none;
      transition: all 200ms ease;
    }

    .theme-toggle:hover .icon {
      stroke: var(--color-text-primary);
    }

    /* Light theme overrides */
    [data-theme="light"] {
      --color-background-base: #faf6f0;
      --color-background-elevated: #ffffff;
      --color-background-subtle: #f5f0e8;
      --color-text-primary: #2C2520;
      --color-text-secondary: #5a524a;
      --color-text-muted: #8a827a;
      --color-border-subtle: rgba(44, 37, 32, 0.1);
      --color-background-hover: rgba(44, 37, 32, 0.05);
    }
    
    /* Skip link for accessibility */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #4a6741;
      color: white;
      padding: 8px 16px;
      z-index: 1000;
      transition: top 0.3s;
      text-decoration: none;
      border-radius: 0 0 8px 0;
    }
    .skip-link:focus { top: 0; }
    
    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

  <!-- Main Content -->
  <main class="main-content" id="app">
    <div class="loading-overlay">
      <div class="loading-spinner"></div>
      <span>Loading observability data...</span>
    </div>
  </main>

  <script>
    // ========================================
    // STATE
    // ========================================
    let data = null;
    let lastUpdate = null;
    let autoRefreshInterval = null;

    // ========================================
    // THEME
    // ========================================
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
      localStorage.setItem('ferni-theme', current === 'dark' ? 'light' : 'dark');
    }

    // Load saved theme
    const savedTheme = localStorage.getItem('ferni-theme');
    if (savedTheme) {
      document.documentElement.setAttribute('data-theme', savedTheme);
    }

    // ========================================
    // DATA FETCHING
    // ========================================
    async function fetchData() {
      try {
        const response = await fetch('/api/observability?window=60', {
          headers: { 'x-admin-key': 'dev-mode' }
        });
        if (!response.ok) throw new Error('Failed to fetch data');
        data = await response.json();
        lastUpdate = new Date();
        render();
      } catch (err) {
        console.error('Failed to fetch observability data:', err);
        document.getElementById('app').innerHTML = `
          <div class="loading-overlay">
            <span style="color: var(--color-accent-terracotta)">Failed to load data. Is the server running?</span>
          </div>
        `;
      }
    }

    // ========================================
    // HELPERS
    // ========================================
    function getScoreClass(score) {
      if (score >= 90) return 'score-excellent';
      if (score >= 70) return 'score-good';
      if (score >= 50) return 'score-warning';
      return 'score-critical';
    }

    function getScoreColor(score) {
      if (score >= 90) return '#4a6741';
      if (score >= 70) return '#6b8f60';
      if (score >= 50) return '#c4856a';
      return '#e07070';
    }

    function getHealthStatus(score) {
      if (score >= 90) return { text: 'All Systems Healthy', class: 'healthy' };
      if (score >= 70) return { text: 'Minor Issues Detected', class: 'warning' };
      if (score >= 50) return { text: 'Performance Degraded', class: 'warning' };
      return { text: 'Critical Issues', class: 'critical' };
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function formatDuration(ms) {
      if (ms < 1000) return `${ms.toFixed(0)}ms`;
      return `${(ms / 1000).toFixed(1)}s`;
    }

    function formatCurrency(amount) {
      return `$${amount.toFixed(4)}`;
    }

    function formatPercent(value) {
      return `${value.toFixed(1)}%`;
    }

    // ========================================
    // RENDER
    // ========================================
    function render() {
      if (!data) return;

      const status = getHealthStatus(data.overallHealth);
      const circumference = 2 * Math.PI * 70;
      const offset = circumference - (data.overallHealth / 100) * circumference;
      const scoreColor = getScoreColor(data.overallHealth);

      const app = document.getElementById('app');
      app.innerHTML = `
        <!-- Page Header -->
        <header class="page-header">
          <p class="page-eyebrow">System Health</p>
          <div style="display: flex; align-items: center; justify-content: space-between;">
            <div>
              <h1 class="page-title">Observability Hub</h1>
              <p class="page-subtitle">Real-time monitoring of all Ferni AI systems</p>
            </div>
            <div class="last-updated">
              <span>Updated ${lastUpdate ? formatTime(lastUpdate) : 'never'}</span>
              <button class="refresh-btn" aria-label="Refresh data" onclick="refreshData()">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                  <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
                Refresh
              </button>
            </div>
          </div>
        </header>

        <!-- Overall Health Hero -->
        <section class="health-hero">
          <div class="health-score-ring">
            <svg class="health-score-svg" width="160" height="160" viewBox="0 0 160 160">
              <circle class="health-score-bg" cx="80" cy="80" r="70"/>
              <circle class="health-score-fill" cx="80" cy="80" r="70"
                stroke="${scoreColor}"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="${offset}"/>
            </svg>
            <div class="health-score-value">
              <span class="health-score-number ${getScoreClass(data.overallHealth)}">${data.overallHealth}</span>
              <span class="health-score-label">Health</span>
            </div>
          </div>
          <div class="health-details">
            <h2 class="health-title">Overall System Health</h2>
            <div class="health-status ${status.class}">
              <span class="health-status-dot"></span>
              ${status.text}
            </div>
            <div class="metric-grid">
              <div class="metric-item">
                <span class="metric-label">Active Sessions</span>
                <span class="metric-value" aria-live="polite">${data.ux?.activeSessions || 0}</span>
              </div>
              <div class="metric-item">
                <span class="metric-label">LLM Calls</span>
                <span class="metric-value" aria-live="polite">${data.llm?.totalCalls || 0}</span>
              </div>
              <div class="metric-item">
                <span class="metric-label">Errors (1h)</span>
                <span class="metric-value" aria-live="polite">${data.errors?.errorsLastHour || 0}</span>
              </div>
              <div class="metric-item">
                <span class="metric-label">Cost (1h)</span>
                <span class="metric-value" aria-live="polite">${formatCurrency(data.cost?.costLastHour || 0)}</span>
              </div>
            </div>
          </div>
        </section>

        <!-- Health Cards Grid -->
        <section class="cards-grid">
          ${renderHealthCard('LLM Health', 'llm', data.llmHealth, '/llm-dashboard.html', [
            { label: 'Avg Latency', value: formatDuration(data.llm?.avgLatencyMs || 0) },
            { label: 'Error Rate', value: formatPercent(data.llm?.errorRate || 0) },
            { label: 'Tokens Used', value: (data.llm?.totalTokensUsed || 0).toLocaleString() },
          ], 'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5')}

          ${renderHealthCard('Connection', 'connection', data.connectionHealth, '/connection-dashboard.html', [
            { label: 'Availability', value: formatPercent(data.connection?.availabilityPercent || 100) },
            { label: 'Packet Loss', value: formatPercent(data.connection?.packetLossPercent || 0) },
            { label: 'Reconnects', value: data.connection?.reconnectionCount || 0 },
          ], 'M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0')}

          ${renderHealthCard('User Experience', 'ux', data.uxHealth, '#', [
            { label: 'Completion', value: formatPercent(data.ux?.completionRate || 100) },
            { label: 'Avg Turns', value: (data.ux?.avgTurnsPerSession || 0).toFixed(1) },
            { label: 'Sessions', value: data.ux?.totalSessions || 0 },
          ], 'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75')}

          ${renderHealthCard('Memory/RAG', 'memory', data.memoryHealth, '#', [
            { label: 'Search Latency', value: formatDuration(data.memory?.avgSearchLatencyMs || 0) },
            { label: 'Relevance', value: formatPercent((data.memory?.avgRelevanceScore || 0) * 100) },
            { label: 'Cache Hits', value: formatPercent((data.memory?.cacheHitRate || 0) * 100) },
          ], 'M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20')}

          ${renderHealthCard('Cost Tracking', 'cost', data.costHealth, '/cost-dashboard.html', [
            { label: 'Total Cost', value: formatCurrency(data.cost?.totalCost || 0) },
            { label: 'Per Session', value: formatCurrency(data.cost?.costPerSession || 0) },
            { label: 'Projected Mo.', value: formatCurrency(data.cost?.projectedMonthlyCost || 0) },
          ], 'M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6')}

          ${renderHealthCard('Errors', 'error', data.errorHealth, '#', [
            { label: 'Total (1h)', value: data.errors?.errorsLastHour || 0 },
            { label: 'Recovery Rate', value: formatPercent((data.errors?.recoveryRate || 0) * 100) },
            { label: 'Last 5min', value: data.errors?.errorsLast5Min || 0 },
          ], 'M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01')}

          ${renderHealthCard('Personas', 'persona', data.personaHealth, '#', [
            { label: 'Load Time', value: formatDuration(data.persona?.avgBundleLoadTimeMs || 0) },
            { label: 'Active', value: data.persona?.activePersonas || 0 },
            { label: 'Handoffs', value: (data.persona?.totalHandoffsIn || 0) + (data.persona?.totalHandoffsOut || 0) },
          ], 'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z')}
        </section>

        <!-- Alerts Section -->
        <section class="alerts-section">
          <div class="section-header">
            <h3 class="section-title">Recent Alerts</h3>
            <div style="display: flex; gap: 0.5rem;">
              ${data.criticalAlerts > 0 ? `<span class="alert-badge critical">${data.criticalAlerts} Critical</span>` : ''}
              ${data.warningAlerts > 0 ? `<span class="alert-badge warning">${data.warningAlerts} Warning</span>` : ''}
            </div>
          </div>
          <div class="alerts-list">
            ${data.alerts && data.alerts.length > 0 ? data.alerts.slice(0, 5).map(alert => `
              <div class="alert-item">
                <div class="alert-indicator ${alert.severity}"></div>
                <div class="alert-content">
                  <div class="alert-title">${alert.title}</div>
                  <div class="alert-message">${alert.message}</div>
                </div>
                <div class="alert-time">${formatTime(alert.timestamp)}</div>
              </div>
            `).join('') : `
              <div class="no-alerts">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom: 1rem; opacity: 0.5;">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                  <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <p>No active alerts - all systems operating normally</p>
              </div>
            `}
          </div>
        </section>
      `;
    }

    function renderHealthCard(title, type, score, href, metrics, iconPath) {
      return `
        <a href="${href}" class="health-card">
          <div class="card-header">
            <div class="card-icon">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="${iconPath}"/>
              </svg>
            </div>
            <span class="card-score ${getScoreClass(score)}">${score}</span>
          </div>
          <h3 class="card-title">${title}</h3>
          <p class="card-subtitle">Health Score</p>
          <div class="card-metrics">
            ${metrics.map(m => `
              <div class="card-metric">
                <div class="card-metric-label">${m.label}</div>
                <div class="card-metric-value">${m.value}</div>
              </div>
            `).join('')}
          </div>
        </a>
      `;
    }

    // ========================================
    // ACTIONS
    // ========================================
    async function refreshData() {
      const btn = document.querySelector('.refresh-btn');
      if (btn) btn.classList.add('loading');
      await fetchData();
      if (btn) btn.classList.remove('loading');
    }

    // ========================================
    // INIT
    // ========================================
    fetchData();
    autoRefreshInterval = setInterval(fetchData, 30000); // Refresh every 30s
  </script>
</body>
</html>
