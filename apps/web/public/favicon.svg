<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Favicon 32x32 - Eyes -->
<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGrad32" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill32" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="6" fill="url(#orbGrad32)"/>

  <!-- Left eye -->
  <ellipse cx="11.5" cy="15" rx="3.1" ry="4.1" fill="url(#eyeFill32)"/>
  <circle cx="10.8" cy="13.3" r="0.8" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="20.5" cy="15" rx="3.1" ry="4.1" fill="url(#eyeFill32)"/>
  <circle cx="19.8" cy="13.3" r="0.8" fill="white"/>
</svg>
