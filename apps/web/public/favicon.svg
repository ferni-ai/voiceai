<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Ferni Orb Favicon 32x32 -->
  <defs>
    <linearGradient id="orbGrad32" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#5a7a52"/>
      <stop offset="50%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3d5a35"/>
    </linearGradient>
    <linearGradient id="borderGrad32" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8aa880"/>
      <stop offset="100%" stop-color="#6a8a62"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="url(#borderGrad32)" stroke-width="1" opacity="0.5"/>
  <!-- Main orb -->
  <circle cx="16" cy="16" r="12" fill="url(#orbGrad32)"/>
  <!-- Highlight -->
  <ellipse cx="16" cy="11" rx="6" ry="3.5" fill="white" opacity="0.25"/>
  <!-- FE text -->
  <text x="16" y="20"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11"
        font-weight="700"
        fill="white"
        text-anchor="middle">FE</text>
</svg>
