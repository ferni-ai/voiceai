<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crash Analytics | Ferni Observability</title>
  <link rel="stylesheet" href="/design-system/tokens.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--color-background-primary); color: var(--color-text-primary); min-height: 100vh; line-height: 1.6; }
    .skip-link { position: absolute; top: -40px; left: 0; background: var(--color-accent-primary); color: white; padding: 8px 16px; z-index: 1000; transition: top 0.3s; text-decoration: none; border-radius: 0 0 8px 0; }
    .skip-link:focus { top: 0; }
    .nav-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--color-background-elevated, #252220); border-bottom: 1px solid rgba(250, 246, 240, 0.1); position: sticky; top: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 0.75rem; }
    .nav-brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #4a6741, #3d5a35); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .nav-brand-text { font-family: var(--font-display); font-size: 1.125rem; font-weight: 600; }
    .nav-links { display: flex; gap: 0.5rem; }
    .nav-link { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 8px; color: var(--color-text-secondary, #e8e2da); text-decoration: none; font-size: 0.875rem; transition: all 200ms ease; }
    .nav-link:hover { background: rgba(250, 246, 240, 0.05); color: var(--color-text-primary); }
    .nav-link.active { background: #4a6741; color: white; }
    .nav-link .icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }
    .main-content { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .page-header { margin-bottom: 2rem; display: flex; align-items: flex-start; justify-content: space-between; }
    .page-eyebrow { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #4a6741; margin-bottom: 0.5rem; }
    .page-title { font-family: var(--font-display); font-size: 2rem; font-weight: 700; }
    .page-subtitle { color: var(--color-text-secondary, #c4bdb4); font-size: 1rem; margin-top: 0.25rem; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--color-background-elevated, #252220); border-radius: 12px; padding: 1.25rem; border: 1px solid rgba(250, 246, 240, 0.1); }
    .stat-label { font-size: 0.75rem; color: var(--color-text-muted, #a09890); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .stat-value { font-family: var(--font-mono); font-size: 1.75rem; font-weight: 700; }
    .stat-subtext { font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.25rem; }
    .section { background: var(--color-background-elevated, #252220); border-radius: 16px; padding: 1.5rem; border: 1px solid rgba(250, 246, 240, 0.1); margin-bottom: 1.5rem; }
    .section-title { font-family: var(--font-display); font-weight: 600; font-size: 1.125rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .section-title .icon { width: 20px; height: 20px; stroke: #4a6741; stroke-width: 2; fill: none; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
    .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid rgba(250, 246, 240, 0.05); }
    .metric-row:last-child { border-bottom: none; }
    .metric-name { color: var(--color-text-secondary, #c4bdb4); font-size: 0.875rem; }
    .metric-value { font-family: var(--font-mono); font-weight: 600; }
    .progress-bar { height: 8px; background: var(--color-background-base, #1a1614); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .progress-fill.green { background: linear-gradient(90deg, #3d5a35, #4a6741); }
    .progress-fill.yellow { background: linear-gradient(90deg, #9a7b5a, #c4856a); }
    .progress-fill.red { background: linear-gradient(90deg, #b05050, #e07070); }
    .status-badge { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.375rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .status-badge.healthy { background: rgba(74, 103, 65, 0.2); color: #4a6741; }
    .status-badge.warning { background: rgba(196, 133, 106, 0.2); color: #c4856a; }
    .status-badge.critical { background: rgba(224, 112, 112, 0.2); color: #e07070; }
    .crash-item { background: var(--color-background-base, #1a1614); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; border-left: 4px solid; }
    .crash-item.exception { border-left-color: #e07070; }
    .crash-item.memory { border-left-color: #c4856a; }
    .crash-item.livekit { border-left-color: #6b8ed6; }
    .crash-item.signal { border-left-color: #9a7b5a; }
    .crash-item.crash_loop { border-left-color: #b05050; }
    .crash-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
    .crash-type { font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    .crash-time { font-family: var(--font-mono); font-size: 0.75rem; color: var(--color-text-muted); }
    .crash-reason { font-size: 0.875rem; margin-bottom: 0.5rem; }
    .crash-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; font-size: 0.75rem; color: var(--color-text-muted); }
    .crash-meta-item { display: flex; align-items: center; gap: 0.25rem; }
    .empty-state { text-align: center; padding: 3rem; color: var(--color-text-muted); }
    .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    .refresh-btn { display: flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid rgba(250, 246, 240, 0.1); background: transparent; color: var(--color-text-secondary); font-size: 0.875rem; cursor: pointer; transition: all 200ms ease; }
    .refresh-btn:hover { background: rgba(250, 246, 240, 0.05); color: var(--color-text-primary); }
    .refresh-btn .icon { width: 16px; height: 16px; }
    .loading-overlay { display: flex; align-items: center; justify-content: center; padding: 4rem; color: var(--color-text-muted); }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--color-background-elevated); border-top-color: #4a6741; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 1rem; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    [data-theme="light"] { --color-background-base: #faf6f0; --color-background-elevated: #ffffff; --color-text-primary: #2C2520; --color-text-secondary: #5a524a; --color-text-muted: #8a827a; }
    .theme-toggle { padding: 0.375rem; border-radius: 8px; border: 1px solid rgba(250, 246, 240, 0.1); background: transparent; cursor: pointer; }
    .theme-toggle .icon { width: 18px; height: 18px; stroke: var(--color-text-secondary); stroke-width: 2; fill: none; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
      .loading-spinner { animation: none; }
    }
    .nav-link:focus-visible, .refresh-btn:focus-visible, .theme-toggle:focus-visible {
      outline: 2px solid var(--color-accent-primary);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <nav class="nav-header" aria-label="Dashboard navigation">
    <div class="nav-brand">
      <div class="nav-brand-icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" aria-hidden="true"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <span class="nav-brand-text">Ferni Observability</span>
    </div>
    <div class="nav-links">
      <a href="/observability-hub.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Hub</a>
      <a href="/llm-dashboard.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/></svg>LLM</a>
      <a href="/memory-dashboard.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Memory</a>
      <a href="/crash-analytics-dashboard.html" class="nav-link active"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Crashes</a>
      <a href="/cost-dashboard.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Cost</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/></svg></button>
    </div>
  </nav>

  <main class="main-content" id="main-content">
    <div class="loading-overlay"><div class="loading-spinner"></div><span>Loading crash analytics...</span></div>
  </main>

  <script>
    let data = null;
    const appEl = document.getElementById('main-content');

    // Get the voice agent URL from environment or default to GCE IP
    const VOICE_AGENT_URL = window.VOICE_AGENT_URL || 'http://34.134.186.63:8080';

    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
      localStorage.setItem('ferni-theme', current === 'dark' ? 'light' : 'dark');
    }
    const savedTheme = localStorage.getItem('ferni-theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

    async function fetchData() {
      try {
        // Try local first (for dev), then fall back to voice agent
        let res;
        try {
          res = await fetch('/api/crash-analytics');
          if (!res.ok) throw new Error('Local not available');
        } catch {
          res = await fetch(`${VOICE_AGENT_URL}/health/crash-analytics`);
        }

        if (!res.ok) throw new Error('Failed to fetch crash analytics');
        data = await res.json();
        render();
      } catch (err) {
        console.error('Fetch error:', err);
        appEl.innerHTML = `<div class="loading-overlay"><span style="color: var(--color-semantic-warning)">Failed to load data. Is the voice agent running?</span></div>`;
      }
    }

    function formatUptime(seconds) {
      if (seconds < 60) return `${seconds}s`;
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ${seconds % 60}s`;
      const hours = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      return `${hours}h ${mins}m`;
    }

    function formatTimestamp(ts) {
      const date = new Date(ts);
      return date.toLocaleString();
    }

    function timeAgo(ts) {
      const now = Date.now();
      const diff = now - new Date(ts).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `${days}d ago`;
    }

    function getHealthStatus(crashes, uptime) {
      if (crashes === 0) return 'healthy';
      // If more than 3 crashes in the last hour (rough estimate)
      if (crashes >= 3 && uptime < 3600) return 'critical';
      if (crashes >= 1) return 'warning';
      return 'healthy';
    }

    function getCrashTypeColor(type) {
      switch (type) {
        case 'exception': return '#e07070';
        case 'memory': return '#c4856a';
        case 'livekit': return '#6b8ed6';
        case 'signal': return '#9a7b5a';
        case 'crash_loop': return '#b05050';
        default: return '#c4bdb4';
      }
    }

    function render() {
      if (!data || !data.success) {
        appEl.innerHTML = `<div class="loading-overlay"><span style="color: var(--color-semantic-warning)">No data available</span></div>`;
        return;
      }

      const { currentUptime, crashHistory, totalCrashes, lastCrash, currentMemory, processInfo } = data.data;
      const status = getHealthStatus(totalCrashes, currentUptime);
      const memoryPercent = Math.round((currentMemory.heapUsedMB / currentMemory.heapTotalMB) * 100);

      appEl.innerHTML = `
        <header class="page-header">
          <div>
            <p class="page-eyebrow">System Stability</p>
            <h1 class="page-title">Crash Analytics</h1>
            <p class="page-subtitle">Monitor crashes, memory usage, and process health</p>
          </div>
          <button class="refresh-btn" aria-label="Refresh data" onclick="fetchData()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Refresh
          </button>
        </header>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">Current Uptime</div>
            <div class="stat-value" style="color: #4a6741">${formatUptime(currentUptime)}</div>
            <div class="stat-subtext">Since last restart</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Crashes</div>
            <div class="stat-value" style="color: ${totalCrashes === 0 ? '#4a6741' : '#e07070'}">${totalCrashes}</div>
            <div class="stat-subtext">In current session</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Heap Memory</div>
            <div class="stat-value" style="color: ${memoryPercent > 85 ? '#e07070' : memoryPercent > 70 ? '#c4856a' : '#4a6741'}">${memoryPercent}%</div>
            <div class="stat-subtext">${currentMemory.heapUsedMB}MB / ${currentMemory.heapTotalMB}MB</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">RSS Memory</div>
            <div class="stat-value">${currentMemory.rssMB}MB</div>
            <div class="stat-subtext">Total process memory</div>
          </div>
        </div>

        <div class="two-col">
          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
              System Status
            </h2>
            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
              <span class="status-badge ${status}">
                ${status === 'healthy' ? '✓ Healthy' : status === 'warning' ? '⚠ Warning' : '✗ Critical'}
              </span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Process ID</span>
              <span class="metric-value">${processInfo.pid}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Node Version</span>
              <span class="metric-value">${processInfo.nodeVersion}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Platform</span>
              <span class="metric-value">${processInfo.platform}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Instance</span>
              <span class="metric-value">${processInfo.instanceName}</span>
            </div>
          </div>

          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
              Memory Usage
            </h2>
            <div style="margin-bottom: 1rem;">
              <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                <span class="metric-name">Heap Usage</span>
                <span class="metric-value">${memoryPercent}%</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill ${memoryPercent > 85 ? 'red' : memoryPercent > 70 ? 'yellow' : 'green'}" style="width: ${memoryPercent}%"></div>
              </div>
            </div>
            <div class="metric-row">
              <span class="metric-name">Heap Used</span>
              <span class="metric-value">${currentMemory.heapUsedMB} MB</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Heap Total</span>
              <span class="metric-value">${currentMemory.heapTotalMB} MB</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">RSS</span>
              <span class="metric-value">${currentMemory.rssMB} MB</span>
            </div>
            <div style="margin-top: 1rem; padding: 0.75rem; background: var(--color-background-base); border-radius: 8px; font-size: 0.75rem; color: var(--color-text-muted);">
              <strong>Preemptive restart threshold:</strong> 92% heap usage
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Crash History
          </h2>
          ${crashHistory.length === 0 ? `
            <div class="empty-state">
              <div class="empty-state-icon">🎉</div>
              <p>No crashes recorded in this session</p>
              <p style="font-size: 0.875rem; margin-top: 0.5rem;">The system is running smoothly</p>
            </div>
          ` : `
            <div style="margin-bottom: 1rem; font-size: 0.875rem; color: var(--color-text-muted);">
              Showing ${crashHistory.length} crash event${crashHistory.length === 1 ? '' : 's'}
            </div>
            ${crashHistory.slice().reverse().map(crash => `
              <div class="crash-item ${crash.type}" role="article" aria-label="Crash event">
                <div class="crash-header">
                  <span class="crash-type" style="color: ${getCrashTypeColor(crash.type)}">${crash.type.replace('_', ' ')}</span>
                  <span class="crash-time">${formatTimestamp(crash.timestamp)} (${timeAgo(crash.timestamp)})</span>
                </div>
                <div class="crash-reason">${crash.reason}</div>
                <div class="crash-meta">
                  <span class="crash-meta-item">
                    <svg class="icon" style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Uptime: ${formatUptime(crash.uptimeSeconds)}
                  </span>
                  ${crash.memoryUsage ? `
                    <span class="crash-meta-item">
                      <svg class="icon" style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                      Heap: ${crash.memoryUsage.heapUsedMB}MB / ${crash.memoryUsage.heapTotalMB}MB
                  </span>
                  ` : ''}
                  <span class="crash-meta-item">
                    <svg class="icon" style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
                    Exceptions: ${crash.exceptionCount}
                  </span>
                </div>
              </div>
            `).join('')}
          `}
        </div>

        ${lastCrash ? `
          <div class="section" style="border-color: rgba(224, 112, 112, 0.3);">
            <h2 class="section-title" style="color: #e07070;">
              <svg class="icon" style="stroke: #e07070;" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Last Crash Details
            </h2>
            <div class="metric-row">
              <span class="metric-name">Type</span>
              <span class="metric-value" style="color: ${getCrashTypeColor(lastCrash.type)}">${lastCrash.type.replace('_', ' ').toUpperCase()}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Timestamp</span>
              <span class="metric-value">${formatTimestamp(lastCrash.timestamp)}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Reason</span>
              <span class="metric-value" style="font-size: 0.875rem; max-width: 60%; text-align: right;">${lastCrash.reason}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Uptime at Crash</span>
              <span class="metric-value">${formatUptime(lastCrash.uptimeSeconds)}</span>
            </div>
          </div>
        ` : ''}
      `;
    }

    fetchData();
    setInterval(fetchData, 30000);
  </script>
</body>
</html>
