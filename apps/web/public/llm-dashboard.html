<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Health | Ferni Observability</title>
  <link rel="stylesheet" href="/design-system/tokens.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Fonts loaded via Google Fonts link, using tokens.css variables */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }
    
    /* Skip link for accessibility */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: var(--color-accent-primary);
      color: white;
      padding: 8px 16px;
      z-index: 1000;
      transition: top 0.3s;
      text-decoration: none;
      border-radius: 0 0 8px 0;
    }
    .skip-link:focus { top: 0; }

    .nav-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--color-background-secondary);
      border-bottom: 1px solid var(--color-border-subtle);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .nav-brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #4a6741, #3d5a35);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-brand-text {
      font-family: var(--font-display);
      font-size: 1.125rem;
      font-weight: 600;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      color: var(--color-text-secondary, #e8e2da);
      text-decoration: none;
      font-size: 0.875rem;
      transition: all 200ms ease;
    }

    .nav-link:hover { background: rgba(250, 246, 240, 0.05); color: var(--color-text-primary); }
    .nav-link.active { background: #4a6741; color: white; }
    .nav-link .icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }

    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .page-header {
      margin-bottom: 2rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .page-eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #4a6741;
      margin-bottom: 0.5rem;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      color: var(--color-text-secondary, #c4bdb4);
      font-size: 1rem;
      margin-top: 0.25rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--color-background-elevated, #252220);
      border-radius: 12px;
      padding: 1.25rem;
      border: 1px solid rgba(250, 246, 240, 0.1);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--color-text-muted, #a09890);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 1.75rem;
      font-weight: 700;
    }

    .stat-change {
      font-size: 0.75rem;
      margin-top: 0.25rem;
    }

    .stat-change.positive { color: #4a6741; }
    .stat-change.negative { color: #e07070; }
    .stat-change.neutral { color: var(--color-text-muted); }

    .section {
      background: var(--color-background-elevated, #252220);
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid rgba(250, 246, 240, 0.1);
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.125rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title .icon {
      width: 20px;
      height: 20px;
      stroke: #4a6741;
      stroke-width: 2;
      fill: none;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

    .progress-bar {
      height: 8px;
      background: var(--color-background-base, #1a1614);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .progress-fill.green { background: linear-gradient(90deg, #3d5a35, #4a6741); }
    .progress-fill.yellow { background: linear-gradient(90deg, #9a7b5a, #c4856a); }
    .progress-fill.red { background: linear-gradient(90deg, #b05050, #e07070); }

    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(250, 246, 240, 0.05);
    }

    .metric-row:last-child { border-bottom: none; }

    .metric-name {
      color: var(--color-text-secondary, #c4bdb4);
      font-size: 0.875rem;
    }

    .metric-value {
      font-family: var(--font-mono);
      font-weight: 600;
    }

    .model-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: var(--color-background-base, #1a1614);
      border-radius: 8px;
      margin-bottom: 0.75rem;
    }

    .model-card:last-child { margin-bottom: 0; }

    .model-name {
      font-weight: 600;
      font-size: 0.9375rem;
    }

    .model-stats {
      display: flex;
      gap: 1.5rem;
      text-align: right;
    }

    .model-stat-label {
      font-size: 0.6875rem;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .model-stat-value {
      font-family: var(--font-mono);
      font-size: 0.9375rem;
      font-weight: 600;
    }

    .error-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: var(--color-background-base, #1a1614);
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }

    .error-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e07070;
      flex-shrink: 0;
    }

    .error-type { flex: 1; font-size: 0.875rem; }
    .error-count { font-family: var(--font-mono); font-weight: 600; }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(250, 246, 240, 0.1);
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 200ms ease;
    }

    .refresh-btn:hover {
      background: rgba(250, 246, 240, 0.05);
      color: var(--color-text-primary);
    }

    .refresh-btn .icon { width: 16px; height: 16px; }

    .loading-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      color: var(--color-text-muted);
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--color-background-elevated);
      border-top-color: #4a6741;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 1rem;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    [data-theme="light"] {
      --color-background-base: #faf6f0;
      --color-background-elevated: #ffffff;
      --color-text-primary: #2C2520;
      --color-text-secondary: #5a524a;
      --color-text-muted: #8a827a;
      --color-border-subtle: rgba(44, 37, 32, 0.1);
    }

    .theme-toggle {
      padding: 0.375rem;
      border-radius: 8px;
      border: 1px solid rgba(250, 246, 240, 0.1);
      background: transparent;
      cursor: pointer;
    }

    .theme-toggle .icon {
      width: 18px;
      height: 18px;
      stroke: var(--color-text-secondary);
      stroke-width: 2;
      fill: none;
    }
    
    /* Reduced Motion Support - WCAG Compliance */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .loading-spinner { animation: none; }
    }
    
    /* Focus indicators for accessibility */
    .nav-link:focus-visible,
    .refresh-btn:focus-visible,
    .theme-toggle:focus-visible {
      outline: 2px solid var(--color-accent-primary);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <nav class="nav-header" aria-label="Dashboard navigation">
    <div class="nav-brand">
      <div class="nav-brand-icon">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" aria-hidden="true">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="nav-brand-text">Ferni Observability</span>
    </div>
    <div class="nav-links">
      <a href="/observability-hub.html" class="nav-link">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Hub
      </a>
      <a href="/llm-dashboard.html" class="nav-link active">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        LLM
      </a>
      <a href="/connection-dashboard.html" class="nav-link">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/></svg>
        Connection
      </a>
      <a href="/cost-dashboard.html" class="nav-link">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Cost
      </a>
      <a href="/handoff-dashboard.html" class="nav-link">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>
        Handoffs
      </a>
      <button class="theme-toggle" onclick="toggleTheme()">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </nav>

  <main class="main-content" id="main-content">
    <div class="loading-overlay">
      <div class="loading-spinner"></div>
      <span>Loading LLM metrics...</span>
    </div>
  </main>

  <script>
    let data = null;
    const appEl = document.getElementById('main-content');

    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
      localStorage.setItem('ferni-theme', current === 'dark' ? 'light' : 'dark');
    }

    const savedTheme = localStorage.getItem('ferni-theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

    async function fetchData() {
      try {
        const response = await fetch('/api/observability/llm?window=60');
        if (!response.ok) throw new Error('Failed to fetch');
        data = await response.json();
        render();
      } catch (err) {
        // Structured error display instead of console.error
        appEl.innerHTML = `
          <div class="loading-overlay">
            <span style="color: var(--color-semantic-warning)">Failed to load data. Is the server running?</span>
          </div>
        `;
      }
    }

    function formatDuration(ms) {
      if (ms < 1000) return `${ms.toFixed(0)}ms`;
      return `${(ms / 1000).toFixed(2)}s`;
    }

    function formatNumber(n) {
      if (n >= 1000000) return `${(n / 1000000).toFixed(1)}M`;
      if (n >= 1000) return `${(n / 1000).toFixed(1)}K`;
      return n.toLocaleString();
    }

    function formatPercent(v) { return `${v.toFixed(1)}%`; }

    function getProgressClass(value, thresholds) {
      if (value <= thresholds.good) return 'green';
      if (value <= thresholds.warning) return 'yellow';
      return 'red';
    }

    function render() {
      if (!data) return;

      const models = Object.entries(data.tokenUsageByModel || {}).sort((a, b) => b[1] - a[1]);
      const errors = Object.entries(data.errorsByType || {}).sort((a, b) => b[1] - a[1]);

      appEl.innerHTML = `
        <header class="page-header">
          <div>
            <p class="page-eyebrow">AI Performance</p>
            <h1 class="page-title">LLM Health Dashboard</h1>
            <p class="page-subtitle">Monitor token usage, latency, and model performance</p>
          </div>
          <button class="refresh-btn" aria-label="Refresh data" onclick="fetchData()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            Refresh
          </button>
        </header>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">Total Calls</div>
            <div class="stat-value">${formatNumber(data.totalCalls || 0)}</div>
            <div class="stat-change neutral">Last hour</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Tokens Used</div>
            <div class="stat-value">${formatNumber(data.totalTokensUsed || 0)}</div>
            <div class="stat-change neutral">Avg ${formatNumber(data.avgTokensPerResponse || 0)}/call</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Avg Latency</div>
            <div class="stat-value">${formatDuration(data.avgLatencyMs || 0)}</div>
            <div class="stat-change ${data.avgLatencyMs < 1000 ? 'positive' : 'negative'}">p95: ${formatDuration(data.p95LatencyMs || 0)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Error Rate</div>
            <div class="stat-value">${formatPercent(data.errorRate || 0)}</div>
            <div class="stat-change ${data.errorRate < 2 ? 'positive' : 'negative'}">Target: <2%</div>
          </div>
        </div>

        <div class="two-col">
          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              Context Window Usage
            </h2>
            <div class="metric-row">
              <span class="metric-name">Average Utilization</span>
              <span class="metric-value" aria-live="polite">${formatPercent(data.avgContextUtilization || 0)}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${getProgressClass(data.avgContextUtilization || 0, { good: 60, warning: 80 })}" 
                   style="width: ${Math.min(100, data.avgContextUtilization || 0)}%"></div>
            </div>
            <div class="metric-row" style="margin-top: 1rem;">
              <span class="metric-name">Maximum Utilization</span>
              <span class="metric-value" aria-live="polite">${formatPercent(data.maxContextUtilization || 0)}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${getProgressClass(data.maxContextUtilization || 0, { good: 70, warning: 90 })}" 
                   style="width: ${Math.min(100, data.maxContextUtilization || 0)}%"></div>
            </div>
            <div class="metric-row" style="margin-top: 1rem;">
              <span class="metric-name">Context Truncations</span>
              <span class="metric-value" aria-live="polite">${data.contextTruncations || 0}</span>
            </div>
          </div>

          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
              Rate Limits
            </h2>
            <div class="metric-row">
              <span class="metric-name">Current Usage</span>
              <span class="metric-value" aria-live="polite">${formatPercent(data.rateLimitProximity || 0)}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${getProgressClass(data.rateLimitProximity || 0, { good: 50, warning: 80 })}" 
                   style="width: ${Math.min(100, data.rateLimitProximity || 0)}%"></div>
            </div>
            <div class="metric-row" style="margin-top: 1rem;">
              <span class="metric-name">Rate Limit Hits</span>
              <span class="metric-value" aria-live="polite">${data.rateLimitHits || 0}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Requests/min</span>
              <span class="metric-value" aria-live="polite">${(data.requestsPerMinute || 0).toFixed(1)}</span>
            </div>
          </div>
        </div>

        <div class="two-col">
          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
              Model Usage
            </h2>
            ${models.length > 0 ? models.map(([model, tokens]) => `
              <div class="model-card">
                <div class="model-name">${model}</div>
                <div class="model-stats">
                  <div>
                    <div class="model-stat-label">Tokens</div>
                    <div class="model-stat-value">${formatNumber(tokens)}</div>
                  </div>
                </div>
              </div>
            `).join('') : '<p style="color: var(--color-text-muted); text-align: center; padding: 2rem;">No model usage data</p>'}
          </div>

          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              Errors by Type
            </h2>
            ${errors.length > 0 ? errors.map(([type, count]) => `
              <div class="error-item">
                <div class="error-dot"></div>
                <div class="error-type">${type}</div>
                <div class="error-count">${count}</div>
              </div>
            `).join('') : '<p style="color: var(--color-text-muted); text-align: center; padding: 2rem;">No errors - excellent!</p>'}
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Fallback & Quality
          </h2>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
            <div class="metric-row" style="flex-direction: column; align-items: flex-start;">
              <span class="metric-name">Fallback Count</span>
              <span class="metric-value" aria-live="polite" style="font-size: 1.5rem;">${data.fallbackCount || 0}</span>
            </div>
            <div class="metric-row" style="flex-direction: column; align-items: flex-start;">
              <span class="metric-name">Fallback Rate</span>
              <span class="metric-value" aria-live="polite" style="font-size: 1.5rem;">${formatPercent(data.fallbackRate || 0)}</span>
            </div>
            <div class="metric-row" style="flex-direction: column; align-items: flex-start;">
              <span class="metric-name">Primary Success Rate</span>
              <span class="metric-value" aria-live="polite" style="font-size: 1.5rem;">${formatPercent(data.primaryModelSuccessRate || 100)}</span>
            </div>
            <div class="metric-row" style="flex-direction: column; align-items: flex-start;">
              <span class="metric-name">Low Quality Responses</span>
              <span class="metric-value" aria-live="polite" style="font-size: 1.5rem;">${data.lowQualityResponses || 0}</span>
            </div>
          </div>
        </div>
      `;
    }

    fetchData();
    setInterval(fetchData, 30000);
  </script>
</body>
</html>
