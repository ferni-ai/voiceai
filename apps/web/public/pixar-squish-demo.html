<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferni - Zen Squish Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F5F1E8;
      --sage: #4a6741;
      --sage-dark: #3d5a35;
      --iris: #5a8060;
      --ink: #2c2520;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
    }

    /* The FERNI word display */
    .word-container {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 180px;
      gap: 2px;
    }

    .letter {
      font-size: 80px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
      transform-origin: bottom center;
      opacity: 0;
      visibility: hidden;
    }
    
    .letter.visible {
      visibility: visible;
    }

    .letter-i-container {
      position: relative;
      width: 48px;
    }

    .letter-i {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      font-size: 80px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
      transform-origin: bottom center;
    }

    /* The Avatar that replaces the I */
    .avatar-bouncer {
      position: absolute;
      bottom: 10px;
      left: 50%;
      width: 65px;
      height: 65px;
      transform: translateX(-50%) translateY(-400px);
      opacity: 0;
      visibility: hidden;
    }
    
    .avatar-bouncer.visible {
      visibility: visible;
    }

    .avatar-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 12px rgba(74, 103, 65, 0.25));
    }

    /* Controls */
    .controls {
      margin-top: 60px;
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 14px 28px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: all 150ms ease;
    }

    .btn-primary {
      background: var(--sage);
      color: white;
    }

    .btn-primary:hover {
      background: var(--sage-dark);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(74, 103, 65, 0.12);
      color: var(--sage);
    }

    .btn-secondary:hover {
      background: rgba(74, 103, 65, 0.2);
    }

    .description {
      margin-top: 40px;
      max-width: 500px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      opacity: 0.7;
    }

    /* Speed control */
    .speed-control {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--ink);
    }

    .speed-control select {
      padding: 6px 12px;
      border-radius: 8px;
      border: 2px solid var(--sage);
      background: white;
      color: var(--ink);
      font-family: inherit;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="word-container">
      <span class="letter" id="f">F</span>
      <span class="letter" id="e">E</span>
      <span class="letter" id="r">R</span>
      <span class="letter" id="n">N</span>
      <div class="letter-i-container">
        <span class="letter letter-i" id="i">I</span>
        <div class="avatar-bouncer" id="avatar">
          <svg class="avatar-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- Outer sage circle -->
            <circle cx="50" cy="50" r="45" fill="#4a6741"/>
            <!-- Eye white -->
            <ellipse cx="50" cy="46" rx="16" ry="14" fill="white"/>
            <!-- Iris -->
            <circle cx="50" cy="46" r="10" fill="#5a8060"/>
            <!-- Pupil - static, centered, no rolling -->
            <circle cx="50" cy="46" r="5" fill="#2c2520"/>
            <!-- Catchlight - adds life -->
            <circle cx="47" cy="43" r="2" fill="white" opacity="0.9"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="playBtn">▶ Play Animation</button>
      <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
    </div>

    <div class="speed-control">
      <label for="speed">Speed:</label>
      <select id="speed">
        <option value="0.5">Slow (0.5x)</option>
        <option value="1" selected>Normal (1x)</option>
        <option value="1.5">Fast (1.5x)</option>
        <option value="2">Very Fast (2x)</option>
      </select>
    </div>

    <p class="description">
      <strong>Zen Squish:</strong> The avatar falls with satisfying weight, 
      squishes the "I", and settles into place. Static eye - no rolling pupil.
      Simple. Calm. Present.
    </p>
  </div>

  <script>
    // Easing functions
    const EASING = {
      LINEAR: 'linear',
      SPRING: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
      GENTLE: 'cubic-bezier(0.4, 0, 0.2, 1)',
      EXPO_OUT: 'cubic-bezier(0.16, 1, 0.3, 1)',
    };

    // Elements
    const letters = ['f', 'e', 'r', 'n'].map(id => document.getElementById(id));
    const letterI = document.getElementById('i');
    const avatar = document.getElementById('avatar');
    const speedSelect = document.getElementById('speed');

    let isAnimating = false;

    function getSpeedMultiplier() {
      return parseFloat(speedSelect.value);
    }

    function dur(ms) {
      return ms / getSpeedMultiplier();
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, dur(ms)));
    }

    async function reset() {
      // Reset all letters
      letters.forEach(l => {
        l.classList.remove('visible');
        l.style.opacity = '0';
        l.style.transform = '';
      });
      
      // Reset I
      letterI.classList.remove('visible');
      letterI.style.opacity = '0';
      letterI.style.transform = 'translateX(-50%) scaleY(1) scaleX(1)';
      
      // Reset avatar
      avatar.classList.remove('visible');
      avatar.style.opacity = '0';
      avatar.style.transform = 'translateX(-50%) translateY(-400px)';
      
      
      isAnimating = false;
    }

    async function playAnimation() {
      if (isAnimating) return;
      isAnimating = true;
      
      await reset();
      await sleep(100);
      
      // ============================================
      // PHASE 1: Letters appear with stagger
      // ============================================
      for (let i = 0; i < letters.length; i++) {
        const letter = letters[i];
        letter.classList.add('visible');
        letter.style.opacity = '1';
        
        letter.animate([
          { transform: 'translateY(30px) scaleY(0.8)', opacity: 0 },
          { transform: 'translateY(-8px) scaleY(1.05)', opacity: 1, offset: 0.6 },
          { transform: 'translateY(0) scaleY(1)', opacity: 1 }
        ], {
          duration: dur(350),
          easing: EASING.SPRING,
          fill: 'forwards'
        });
        
        await sleep(80);
      }
      
      // The "I" appears
      letterI.classList.add('visible');
      letterI.style.opacity = '1';
      letterI.animate([
        { transform: 'translateX(-50%) translateY(30px) scaleY(0.8)', opacity: 0 },
        { transform: 'translateX(-50%) translateY(-8px) scaleY(1.05)', opacity: 1, offset: 0.6 },
        { transform: 'translateX(-50%) translateY(0) scaleY(1)', opacity: 1 }
      ], {
        duration: dur(350),
        easing: EASING.SPRING,
        fill: 'forwards'
      });
      
      await sleep(500);
      
      // ============================================
      // PHASE 2: Avatar falls from sky (THE MONEY SHOT)
      // ============================================
      avatar.classList.add('visible');
      avatar.style.opacity = '1';
      
      // The fall animation - lots of keyframes for perfect squash/stretch
      avatar.animate([
        // Start high
        { 
          transform: 'translateX(-50%) translateY(-400px) scaleY(1) scaleX(1)', 
          offset: 0 
        },
        // Anticipation squash before drop
        { 
          transform: 'translateX(-50%) translateY(-380px) scaleY(0.85) scaleX(1.15)', 
          offset: 0.05 
        },
        // Begin fall - stretch
        { 
          transform: 'translateX(-50%) translateY(-200px) scaleY(1.25) scaleX(0.82)', 
          offset: 0.25 
        },
        // Accelerating - more stretch
        { 
          transform: 'translateX(-50%) translateY(-50px) scaleY(1.35) scaleX(0.78)', 
          offset: 0.45 
        },
        // IMPACT! Maximum squash
        { 
          transform: 'translateX(-50%) translateY(8px) scaleY(0.6) scaleX(1.4)', 
          offset: 0.52 
        },
        // First bounce up
        { 
          transform: 'translateX(-50%) translateY(-35px) scaleY(1.15) scaleX(0.9)', 
          offset: 0.65 
        },
        // Second smaller impact
        { 
          transform: 'translateX(-50%) translateY(3px) scaleY(0.85) scaleX(1.1)', 
          offset: 0.78 
        },
        // Tiny bounce
        { 
          transform: 'translateX(-50%) translateY(-10px) scaleY(1.05) scaleX(0.97)', 
          offset: 0.88 
        },
        // Settle
        { 
          transform: 'translateX(-50%) translateY(0px) scaleY(1) scaleX(1)', 
          offset: 1 
        }
      ], {
        duration: dur(900),
        easing: EASING.LINEAR,
        fill: 'forwards'
      });
      
      // The "I" gets squished at impact (offset 0.52 = ~470ms)
      await sleep(900 * 0.48);
      
      // Squish the I!
      letterI.animate([
        { 
          transform: 'translateX(-50%) translateY(0) scaleY(1) scaleX(1)', 
          opacity: 1,
          offset: 0 
        },
        { 
          transform: 'translateX(-50%) translateY(10px) scaleY(0.3) scaleX(2)', 
          opacity: 0.7,
          offset: 0.3 
        },
        { 
          transform: 'translateX(-50%) translateY(20px) scaleY(0.1) scaleX(2.5)', 
          opacity: 0.3,
          offset: 0.6 
        },
        { 
          transform: 'translateX(-50%) translateY(25px) scaleY(0) scaleX(3)', 
          opacity: 0,
          offset: 1 
        }
      ], {
        duration: dur(250),
        easing: 'ease-in',
        fill: 'forwards'
      });
      
      // ============================================
      // PHASE 3: Blink! (whole avatar squashes vertically)
      // ============================================
      await sleep(500);
      
      // Quick blink - squash the whole avatar vertically
      avatar.animate([
        { transform: 'translateX(-50%) translateY(0) scaleY(1) scaleX(1)' },
        { transform: 'translateX(-50%) translateY(2px) scaleY(0.15) scaleX(1.1)', offset: 0.4 },
        { transform: 'translateX(-50%) translateY(0) scaleY(1) scaleX(1)' }
      ], {
        duration: dur(200),
        easing: EASING.GENTLE,
        fill: 'forwards'
      });
      
      isAnimating = false;
    }

    // Event listeners
    document.getElementById('playBtn').addEventListener('click', playAnimation);
    document.getElementById('resetBtn').addEventListener('click', reset);
    
    // Also play on spacebar
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        playAnimation();
      }
      if (e.code === 'KeyR') {
        reset();
      }
    });

    // Initial state
    reset();
  </script>
</body>
</html>
