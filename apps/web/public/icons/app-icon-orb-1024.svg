<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Ferni Living Avatar App Icon - 1024x1024 master -->
  <!-- The orb that embodies the human spirit -->
  <!-- Brand Colors: Ferni Sage #4a6741, Paper Cream #F5F1E8 -->
  <defs>
    <!-- Orb gradient - Deep to light sage -->
    <linearGradient id="orbGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="40%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>
    
    <!-- Background gradient - Warm cream -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#E8E0D5"/>
    </linearGradient>
    
    <!-- Outer glow -->
    <filter id="orbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feFlood flood-color="#4a6741" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Inner shadow for depth -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#2C2520" flood-opacity="0.2"/>
    </filter>
    
    <!-- Top highlight -->
    <radialGradient id="orbHighlight" cx="35%" cy="25%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    
    <!-- Bottom ambient reflection -->
    <radialGradient id="orbReflect" cx="50%" cy="85%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>
  
  <!-- Outer glow rings (subtle) -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.15"/>
  <circle cx="512" cy="512" r="380" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.1"/>
  
  <!-- Main orb with glow -->
  <circle cx="512" cy="512" r="340" fill="url(#orbGradient)" filter="url(#orbGlow)"/>
  
  <!-- Inner shadow at bottom -->
  <ellipse cx="512" cy="680" rx="200" ry="60" fill="rgba(0,0,0,0.12)" filter="blur(20px)"/>
  
  <!-- Top highlight -->
  <circle cx="512" cy="512" r="340" fill="url(#orbHighlight)"/>
  
  <!-- Bottom reflection -->
  <circle cx="512" cy="512" r="340" fill="url(#orbReflect)"/>
  
  <!-- Waveform bars - the voice visualization -->
  <g transform="translate(512, 512)">
    <!-- 9 waveform bars centered, like a gentle smile -->
    <rect x="-120" y="-24" width="12" height="48" rx="6" fill="rgba(255,255,255,0.95)"/>
    <rect x="-90" y="-36" width="12" height="72" rx="6" fill="rgba(255,255,255,0.95)"/>
    <rect x="-60" y="-48" width="12" height="96" rx="6" fill="rgba(255,255,255,0.95)"/>
    <rect x="-30" y="-56" width="12" height="112" rx="6" fill="rgba(255,255,255,0.95)"/>
    <rect x="0" y="-64" width="12" height="128" rx="6" fill="rgba(255,255,255,0.95)"/>
    <rect x="30" y="-56" width="12" height="112" rx="6" fill="rgba(255,255,255,0.95)"/>
    <rect x="60" y="-48" width="12" height="96" rx="6" fill="rgba(255,255,255,0.95)"/>
    <rect x="90" y="-36" width="12" height="72" rx="6" fill="rgba(255,255,255,0.95)"/>
    <rect x="120" y="-24" width="12" height="48" rx="6" fill="rgba(255,255,255,0.95)"/>
  </g>
  
  <!-- Subtle inner ring for depth -->
  <circle cx="512" cy="512" r="320" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
</svg>

