<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Windows Tile 150x150 - Eyes -->
<svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="150" height="150" fill="url(#orbGradient)"/>

  <!-- Left eye -->
  <ellipse cx="54" cy="70" rx="15" ry="19" fill="url(#eyeFill)"/>
  <circle cx="51" cy="62" r="4" fill="white"/>
  <circle cx="54" cy="65" r="1.5" fill="white" opacity="0.7"/>

  <!-- Right eye -->
  <ellipse cx="96" cy="70" rx="15" ry="19" fill="url(#eyeFill)"/>
  <circle cx="93" cy="62" r="4" fill="white"/>
  <circle cx="96" cy="65" r="1.5" fill="white" opacity="0.7"/>
</svg>
