<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="150" height="150">
  <!-- Ferni Three Stones Logo - 150x150 -->
  <defs>
    <radialGradient id="stoneGrad150" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#5a8060"/>
      <stop offset="70%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3d5a35"/>
    </radialGradient>
    <radialGradient id="catchlightGrad150" cx="30%" cy="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowFilter150" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="150" height="150" rx="28" fill="#F5F1E8"/>
  
  <circle cx="75" cy="75" r="56.595000000000006" fill="none" stroke="#4a6741" stroke-width="0.5" opacity="0.25"/>
  <!-- Outer Stone: Body -->
  <circle cx="75" cy="75" r="51.45" fill="url(#stoneGrad150)" filter="url(#glowFilter150)"/>

  <!-- Middle Stone: Eye White -->
  <circle cx="75" cy="75" r="21.0945" fill="white"/>

  <!-- Iris -->
  <circle cx="75" cy="75" r="13.6857" fill="#5a8060"/>

  <!-- Inner Stone: Pupil -->
  <circle cx="75" cy="75" r="6.84285" fill="#2c2520"/>

  <!-- Catchlight (life spark) -->
  <circle cx="66.768" cy="66.768" r="2.82975" fill="url(#catchlightGrad150)"/>
  
  <!-- Secondary catchlight -->
  <circle cx="79.116" cy="78.2928" r="1.1319000000000001" fill="white" opacity="0.4"/>
</svg>