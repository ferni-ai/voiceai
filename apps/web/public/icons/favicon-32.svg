<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Ferni Favicon 32x32 -->
  <defs>
    <linearGradient id="fav32Grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#4a6741"/>
    </linearGradient>
  </defs>
  
  <!-- Subtle outer ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#4a6741" stroke-width="0.75" opacity="0.3"/>
  
  <!-- Main circle -->
  <circle cx="16" cy="16" r="13" fill="url(#fav32Grad)"/>
  
  <!-- Highlight -->
  <ellipse cx="12" cy="10" rx="6" ry="3" fill="white" opacity="0.15"/>
  
  <!-- FE text -->
  <text 
    x="16" 
    y="16.5" 
    text-anchor="middle" 
    dominant-baseline="central"
    font-family="system-ui, -apple-system, 'SF Pro Display', sans-serif"
    font-size="10"
    font-weight="800"
    fill="white"
    letter-spacing="-0.3">FE</text>
</svg>
