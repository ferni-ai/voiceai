<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Ferni Three Stones Logo - 32x32 -->
  <defs>
    <radialGradient id="stoneGrad32" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#5a8060"/>
      <stop offset="70%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3d5a35"/>
    </radialGradient>
    <radialGradient id="catchlightGrad32" cx="30%" cy="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#F5F1E8"/>
  
  <!-- Outer Stone: Body -->
  <circle cx="16" cy="16" r="10.976" fill="url(#stoneGrad32)"/>

  <!-- Middle Stone: Eye White -->
  <circle cx="16" cy="16" r="4.50016" fill="white"/>

  <!-- Iris -->
  <circle cx="16" cy="16" r="2.9196160000000004" fill="#5a8060"/>

  <!-- Inner Stone: Pupil -->
  <circle cx="16" cy="16" r="1.4598080000000002" fill="#2c2520"/>

  <!-- Catchlight (life spark) -->
  <circle cx="14.24384" cy="14.24384" r="0.43904000000000004" fill="url(#catchlightGrad32)"/>
  
</svg>