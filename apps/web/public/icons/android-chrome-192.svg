<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Ferni Avatar - Android Chrome Icon 192x192 -->
  <defs>
    <linearGradient id="avatarGrad192" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#4a6741"/>
    </linearGradient>
    <linearGradient id="badgeGrad192" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#5a8060"/>
    </linearGradient>
    <filter id="shadow192" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#2c2520" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="#F5F1E8"/>
  
  <!-- Outer ring -->
  <circle cx="96" cy="96" r="75" fill="none" stroke="#4a6741" stroke-width="1.5" opacity="0.35"/>
  
  <!-- Main avatar -->
  <circle cx="96" cy="96" r="66" fill="url(#avatarGrad192)"/>
  
  <!-- FE Text -->
  <text 
    x="96" 
    y="96" 
    text-anchor="middle" 
    dominant-baseline="central"
    font-family="'Plus Jakarta Sans', 'SF Pro Display', system-ui, sans-serif"
    font-size="48"
    font-weight="800"
    fill="white"
    letter-spacing="-1.5">
    <tspan dy="3">FE</tspan>
  </text>
  
  <!-- Shine - ABOVE text -->
  <ellipse cx="75" cy="68" rx="34" ry="17" fill="white" opacity="0.15"/>
  
  <!-- Heart badge -->
  <circle cx="148" cy="148" r="18" fill="url(#badgeGrad192)" stroke="#FFFDFB" stroke-width="3.5" filter="url(#shadow192)"/>
  
  <!-- Heart icon - centered -->
  <path 
    d="M148 143c0-2.5-2-4.5-4.5-4.5s-4.5 2-4.5 4.5c0 4.5 8.5 11 8.5 11s8.5-6.5 8.5-11c0-2.5-2-4.5-4.5-4.5s-4.5 2-4.5 4.5z"
    fill="none"
    stroke="white"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
