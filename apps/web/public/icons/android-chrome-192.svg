<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Android Chrome Icon 192x192 - Eyes -->
<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill192" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="192" height="192" rx="36" fill="url(#orbGradient192)"/>

  <!-- Left eye -->
  <ellipse cx="69" cy="90" rx="19" ry="25" fill="url(#eyeFill192)"/>
  <circle cx="65" cy="80" r="5" fill="white"/>
  <circle cx="68" cy="84" r="2" fill="white" opacity="0.7"/>

  <!-- Right eye -->
  <ellipse cx="123" cy="90" rx="19" ry="25" fill="url(#eyeFill192)"/>
  <circle cx="119" cy="80" r="5" fill="white"/>
  <circle cx="122" cy="84" r="2" fill="white" opacity="0.7"/>
</svg>
