<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni OG Image - Social Media Preview with Eyes -->
<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF6F0"/>
      <stop offset="100%" stop-color="#F0EBE4"/>
    </linearGradient>
    <linearGradient id="orbGradientOG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFillOG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <filter id="avatarShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#2c2520" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle ambient orb in background -->
  <circle cx="300" cy="315" r="400" fill="#4a6741" opacity="0.03"/>

  <!-- Avatar group (centered vertically, offset left) -->
  <g transform="translate(250, 315)" filter="url(#avatarShadow)">
    <!-- Rounded square background -->
    <rect x="-140" y="-140" width="280" height="280" rx="50" fill="url(#orbGradientOG)"/>

    <!-- Left eye -->
    <ellipse cx="-50" cy="-10" rx="27" ry="36" fill="url(#eyeFillOG)"/>
    <circle cx="-57" cy="-24" r="7" fill="white"/>
    <circle cx="-52" cy="-18" r="2.7" fill="white" opacity="0.7"/>

    <!-- Right eye -->
    <ellipse cx="50" cy="-10" rx="27" ry="36" fill="url(#eyeFillOG)"/>
    <circle cx="43" cy="-24" r="7" fill="white"/>
    <circle cx="48" cy="-18" r="2.7" fill="white" opacity="0.7"/>
  </g>

  <!-- Text content -->
  <g transform="translate(520, 200)">
    <!-- Tagline -->
    <text
      font-family="'Plus Jakarta Sans', 'SF Pro Display', system-ui, sans-serif"
      font-size="24"
      font-weight="500"
      fill="#4a6741"
      letter-spacing="3"
      text-transform="uppercase">LIFE COACHING</text>

    <!-- Title -->
    <text
      y="70"
      font-family="'Plus Jakarta Sans', 'SF Pro Display', system-ui, sans-serif"
      font-size="72"
      font-weight="800"
      fill="#2C2520"
      letter-spacing="-2">Ferni</text>

    <!-- Subtitle -->
    <text
      y="150"
      font-family="'Inter', system-ui, sans-serif"
      font-size="28"
      font-weight="400"
      fill="#70605a">Better than human.</text>

    <!-- Description -->
    <text
      y="210"
      font-family="'Inter', system-ui, sans-serif"
      font-size="20"
      font-weight="400"
      fill="#9a8a7a">Your personal team that listens, remembers,</text>
    <text
      y="240"
      font-family="'Inter', system-ui, sans-serif"
      font-size="20"
      font-weight="400"
      fill="#9a8a7a">and shows up at 2am with the same warmth as noon.</text>
  </g>

  <!-- URL at bottom -->
  <text
    x="600"
    y="580"
    text-anchor="middle"
    font-family="'Inter', system-ui, sans-serif"
    font-size="18"
    font-weight="500"
    fill="#9a8a7a">ferni.ai</text>
</svg>
