<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Ferni Three Stones Logo - 16x16 (circular) -->
  <defs>
    <radialGradient id="stoneGrad16" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#5a8060"/>
      <stop offset="70%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3d5a35"/>
    </radialGradient>
    <radialGradient id="catchlightGrad16" cx="30%" cy="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="8" cy="8" r="8" fill="#F5F1E8"/>
  
  <!-- Outer Stone: Body -->
  <circle cx="8" cy="8" r="5.488" fill="url(#stoneGrad16)"/>

  <!-- Middle Stone: Eye White -->
  <circle cx="8" cy="8" r="2.25008" fill="white"/>

  <!-- Iris -->
  <circle cx="8" cy="8" r="1.4598080000000002" fill="#5a8060"/>

  <!-- Inner Stone: Pupil -->
  <circle cx="8" cy="8" r="0.7299040000000001" fill="#2c2520"/>

  <!-- Catchlight (life spark) -->
  <circle cx="7.12192" cy="7.12192" r="0.21952000000000002" fill="url(#catchlightGrad16)"/>
  
</svg>