<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Ferni Orb Logo - 180x180 -->
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="40%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>
    <radialGradient id="orbHighlight" cx="35%" cy="25%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    
    <filter id="orbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7.2" result="blur"/>
      <feFlood flood-color="#4a6741" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="180" height="180" rx="0" fill="#F5F1E8"/>
  
    <circle cx="90" cy="90" r="74.32560000000001" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.15"/>
    <circle cx="90" cy="90" r="67.13280000000002" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.1"/>

  <!-- Main orb -->
  <circle cx="90" cy="90" r="59.940000000000005" fill="url(#orbGradient)" filter="url(#orbGlow)"/>

  <!-- Top highlight -->
  <circle cx="90" cy="90" r="59.940000000000005" fill="url(#orbHighlight)"/>

  <!-- Waveform bars -->
  <g>
    <rect x="61" y="85.5045" width="2" height="8.991000000000001" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="68" y="83.25675" width="2" height="13.486500000000001" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="75" y="81.009" width="2" height="17.982000000000003" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="82" y="79.5105" width="2" height="20.979000000000003" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="89" y="78.012" width="2" height="23.976000000000003" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="96" y="79.5105" width="2" height="20.979000000000003" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="103" y="81.009" width="2" height="17.982000000000003" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="110" y="83.25675" width="2" height="13.486500000000001" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="117" y="85.5045" width="2" height="8.991000000000001" rx="1" fill="rgba(255,255,255,0.95)"/>
  </g>
</svg>