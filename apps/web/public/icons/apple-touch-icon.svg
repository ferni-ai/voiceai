<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Ferni Three Stones Logo - 180x180 (circular) -->
  <defs>
    <radialGradient id="stoneGrad180" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#5a8060"/>
      <stop offset="70%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3d5a35"/>
    </radialGradient>
    <radialGradient id="catchlightGrad180" cx="30%" cy="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowFilter180" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="0" fill="#F5F1E8"/>
  
  <circle cx="90" cy="90" r="67.914" fill="none" stroke="#4a6741" stroke-width="0.54" opacity="0.25"/>
  <!-- Outer Stone: Body -->
  <circle cx="90" cy="90" r="61.74" fill="url(#stoneGrad180)" filter="url(#glowFilter180)"/>

  <!-- Middle Stone: Eye White -->
  <circle cx="90" cy="90" r="25.313399999999998" fill="white"/>

  <!-- Iris -->
  <circle cx="90" cy="90" r="16.42284" fill="#5a8060"/>

  <!-- Inner Stone: Pupil -->
  <circle cx="90" cy="90" r="8.21142" fill="#2c2520"/>

  <!-- Catchlight (life spark) -->
  <circle cx="80.1216" cy="80.1216" r="3.3957" fill="url(#catchlightGrad180)"/>
  
  <!-- Secondary catchlight -->
  <circle cx="94.9392" cy="93.95136" r="1.3582800000000002" fill="white" opacity="0.4"/>
</svg>