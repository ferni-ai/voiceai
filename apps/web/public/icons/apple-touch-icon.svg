<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Apple Touch Icon 180x180 - Eyes -->
<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" fill="url(#orbGradient)"/>

  <!-- Left eye -->
  <ellipse cx="65" cy="84" rx="17.5" ry="23" fill="url(#eyeFill)"/>
  <circle cx="61" cy="75" r="4.5" fill="white"/>
  <circle cx="65" cy="79" r="1.8" fill="white" opacity="0.7"/>

  <!-- Right eye -->
  <ellipse cx="115" cy="84" rx="17.5" ry="23" fill="url(#eyeFill)"/>
  <circle cx="111" cy="75" r="4.5" fill="white"/>
  <circle cx="115" cy="79" r="1.8" fill="white" opacity="0.7"/>
</svg>
