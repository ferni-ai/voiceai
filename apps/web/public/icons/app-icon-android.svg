<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Ferni Three Stones Logo - 512x512 (circular) -->
  <defs>
    <radialGradient id="stoneGrad512" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#5a8060"/>
      <stop offset="70%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3d5a35"/>
    </radialGradient>
    <radialGradient id="catchlightGrad512" cx="30%" cy="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowFilter512" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5.12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#F5F1E8"/>
  
  <circle cx="256" cy="256" r="193.17760000000004" fill="none" stroke="#4a6741" stroke-width="1.536" opacity="0.25"/>
  <!-- Outer Stone: Body -->
  <circle cx="256" cy="256" r="175.616" fill="url(#stoneGrad512)" filter="url(#glowFilter512)"/>

  <!-- Middle Stone: Eye White -->
  <circle cx="256" cy="256" r="72.00256" fill="white"/>

  <!-- Iris -->
  <circle cx="256" cy="256" r="46.71385600000001" fill="#5a8060"/>

  <!-- Inner Stone: Pupil -->
  <circle cx="256" cy="256" r="23.356928000000003" fill="#2c2520"/>

  <!-- Catchlight (life spark) -->
  <circle cx="227.90144" cy="227.90144" r="9.658880000000002" fill="url(#catchlightGrad512)"/>
  
  <!-- Secondary catchlight -->
  <circle cx="270.04928" cy="267.239424" r="3.8635520000000008" fill="white" opacity="0.4"/>
</svg>