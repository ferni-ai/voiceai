<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Ferni Three Stones Logo - 1024x1024 (circular) -->
  <defs>
    <radialGradient id="stoneGrad1024" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#5a8060"/>
      <stop offset="70%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3d5a35"/>
    </radialGradient>
    <radialGradient id="catchlightGrad1024" cx="30%" cy="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowFilter1024" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10.24" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="512" cy="512" r="512" fill="#F5F1E8"/>
  
  <circle cx="512" cy="512" r="386.3552000000001" fill="none" stroke="#4a6741" stroke-width="3.072" opacity="0.25"/>
  <!-- Outer Stone: Body -->
  <circle cx="512" cy="512" r="351.232" fill="url(#stoneGrad1024)" filter="url(#glowFilter1024)"/>

  <!-- Middle Stone: Eye White -->
  <circle cx="512" cy="512" r="144.00512" fill="white"/>

  <!-- Iris -->
  <circle cx="512" cy="512" r="93.42771200000001" fill="#5a8060"/>

  <!-- Inner Stone: Pupil -->
  <circle cx="512" cy="512" r="46.71385600000001" fill="#2c2520"/>

  <!-- Catchlight (life spark) -->
  <circle cx="455.80288" cy="455.80288" r="19.317760000000003" fill="url(#catchlightGrad1024)"/>
  
  <!-- Secondary catchlight -->
  <circle cx="540.09856" cy="534.478848" r="7.7271040000000015" fill="white" opacity="0.4"/>
</svg>