<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni App Icon 1024x1024 - Eyes -->
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="180" fill="url(#orbGradient)"/>

  <!-- Left eye -->
  <ellipse cx="370" cy="480" rx="100" ry="132" fill="url(#eyeFill)"/>
  <circle cx="346" cy="426" r="26" fill="white"/>
  <circle cx="366" cy="446" r="10" fill="white" opacity="0.7"/>

  <!-- Right eye -->
  <ellipse cx="654" cy="480" rx="100" ry="132" fill="url(#eyeFill)"/>
  <circle cx="630" cy="426" r="26" fill="white"/>
  <circle cx="650" cy="446" r="10" fill="white" opacity="0.7"/>
</svg>
