<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Ferni Three Stones Logo - 200x200 -->
  <defs>
    <radialGradient id="stoneGrad200" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#5a8060"/>
      <stop offset="70%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3d5a35"/>
    </radialGradient>
    <radialGradient id="catchlightGrad200" cx="30%" cy="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowFilter200" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="transparent"/>
  
  <circle cx="100" cy="100" r="75.46000000000002" fill="none" stroke="#4a6741" stroke-width="0.6" opacity="0.25"/>
  <!-- Outer Stone: Body -->
  <circle cx="100" cy="100" r="68.60000000000001" fill="url(#stoneGrad200)" filter="url(#glowFilter200)"/>

  <!-- Middle Stone: Eye White -->
  <circle cx="100" cy="100" r="28.126" fill="white"/>

  <!-- Iris -->
  <circle cx="100" cy="100" r="18.247600000000002" fill="#5a8060"/>

  <!-- Inner Stone: Pupil -->
  <circle cx="100" cy="100" r="9.123800000000001" fill="#2c2520"/>

  <!-- Catchlight (life spark) -->
  <circle cx="89.024" cy="89.024" r="3.7730000000000006" fill="url(#catchlightGrad200)"/>
  
  <!-- Secondary catchlight -->
  <circle cx="105.488" cy="104.3904" r="1.5092000000000003" fill="white" opacity="0.4"/>
</svg>