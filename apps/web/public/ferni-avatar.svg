<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Avatar 200x200 - Eyes Design -->
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="200" height="200" rx="36" fill="url(#orbGradient)"/>

  <!-- Left eye -->
  <ellipse cx="72" cy="94" rx="20" ry="26" fill="url(#eyeFill)"/>
  <circle cx="68" cy="83" r="5" fill="white"/>
  <circle cx="72" cy="87" r="2" fill="white" opacity="0.7"/>

  <!-- Right eye -->
  <ellipse cx="128" cy="94" rx="20" ry="26" fill="url(#eyeFill)"/>
  <circle cx="124" cy="83" r="5" fill="white"/>
  <circle cx="128" cy="87" r="2" fill="white" opacity="0.7"/>
</svg>
