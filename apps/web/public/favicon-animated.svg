<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Animated Favicon - Eyes with Breathing & Blinking -->
<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }
      @keyframes blink {
        0%, 94%, 100% { transform: scaleY(1); }
        97% { transform: scaleY(0.1); }
      }
      .eyes-group {
        animation: blink 4s ease-in-out infinite;
        transform-origin: center 15px;
      }
      .orb-body {
        animation: breathe 4s ease-in-out infinite;
        transform-origin: center;
      }
      @media (prefers-reduced-motion: reduce) {
        .eyes-group, .orb-body { animation: none; }
      }
    </style>

    <linearGradient id="orbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (solid color base) -->
  <rect class="orb-body" width="32" height="32" rx="6" fill="url(#orbGrad)"/>

  <!-- Eyes group (for blinking) -->
  <g class="eyes-group">
    <!-- Left eye -->
    <ellipse cx="11.5" cy="15" rx="3.1" ry="4.1" fill="url(#eyeFill)"/>
    <circle cx="10.8" cy="13.3" r="0.8" fill="white"/>

    <!-- Right eye -->
    <ellipse cx="20.5" cy="15" rx="3.1" ry="4.1" fill="url(#eyeFill)"/>
    <circle cx="19.8" cy="13.3" r="0.8" fill="white"/>
  </g>
</svg>
