<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Ferni Logo Icon - 64x64 -->
  <defs>
    <linearGradient id="logoGrad64" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="100%" stop-color="#4a6741"/>
    </linearGradient>
  </defs>
  
  <!-- Outer presence ring -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.35"/>
  
  <!-- Main avatar circle -->
  <circle cx="32" cy="32" r="25" fill="url(#logoGrad64)"/>
  
  <!-- FE Text -->
  <text 
    x="32" 
    y="32" 
    text-anchor="middle" 
    dominant-baseline="central"
    font-family="'Plus Jakarta Sans', 'SF Pro Display', system-ui, sans-serif"
    font-size="19"
    font-weight="800"
    fill="white"
    letter-spacing="-0.5">
    <tspan dy="1">FE</tspan>
  </text>
  
  <!-- Shine overlay - ABOVE text -->
  <ellipse cx="25" cy="22" rx="13" ry="6.5" fill="white" opacity="0.15"/>
</svg>
