<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Logo Icon 64x64 - Eyes -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGrad64" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill64" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="12" fill="url(#orbGrad64)"/>

  <!-- Left eye -->
  <ellipse cx="23" cy="30" rx="6.2" ry="8.2" fill="url(#eyeFill64)"/>
  <circle cx="21.6" cy="26.6" r="1.6" fill="white"/>
  <circle cx="23" cy="28" r="0.6" fill="white" opacity="0.7"/>

  <!-- Right eye -->
  <ellipse cx="41" cy="30" rx="6.2" ry="8.2" fill="url(#eyeFill64)"/>
  <circle cx="39.6" cy="26.6" r="1.6" fill="white"/>
  <circle cx="41" cy="28" r="0.6" fill="white" opacity="0.7"/>
</svg>
