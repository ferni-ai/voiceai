<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Ferni Three Stones Logo - 64x64 (circular) -->
  <defs>
    <radialGradient id="stoneGrad64" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#5a8060"/>
      <stop offset="70%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3d5a35"/>
    </radialGradient>
    <radialGradient id="catchlightGrad64" cx="30%" cy="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowFilter64" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#F5F1E8"/>
  
  <circle cx="32" cy="32" r="24.147200000000005" fill="none" stroke="#4a6741" stroke-width="0.5" opacity="0.25"/>
  <!-- Outer Stone: Body -->
  <circle cx="32" cy="32" r="21.952" fill="url(#stoneGrad64)" filter="url(#glowFilter64)"/>

  <!-- Middle Stone: Eye White -->
  <circle cx="32" cy="32" r="9.00032" fill="white"/>

  <!-- Iris -->
  <circle cx="32" cy="32" r="5.839232000000001" fill="#5a8060"/>

  <!-- Inner Stone: Pupil -->
  <circle cx="32" cy="32" r="2.9196160000000004" fill="#2c2520"/>

  <!-- Catchlight (life spark) -->
  <circle cx="28.48768" cy="28.48768" r="1.2073600000000002" fill="url(#catchlightGrad64)"/>
  
  <!-- Secondary catchlight -->
  <circle cx="33.75616" cy="33.404928" r="0.4829440000000001" fill="white" opacity="0.4"/>
</svg>