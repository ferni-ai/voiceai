<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Ferni Instagram Post Template - 1080x1080 -->
  <!-- "Better than Human" Brand Positioning -->

  <defs>
    <linearGradient id="bgGradIG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F0"/>
      <stop offset="100%" stop-color="#EDE7DA"/>
    </linearGradient>

    <linearGradient id="logoGradIG" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#325038"/>
      <stop offset="50%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5a8055"/>
    </linearGradient>

    <radialGradient id="warmthIG" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#4a6741" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4a6741" stop-opacity="0"/>
    </radialGradient>

    <filter id="presenceIG" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feFlood flood-color="#4a6741" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGradIG)"/>

  <!-- Warmth glow -->
  <ellipse cx="540" cy="380" rx="450" ry="400" fill="url(#warmthIG)"/>

  <!-- Organic shapes -->
  <circle cx="80" cy="950" r="140" fill="#4a6741" opacity="0.03"/>
  <circle cx="1000" cy="120" r="170" fill="#4a6741" opacity="0.025"/>
  <circle cx="970" cy="920" r="110" fill="#4a6741" opacity="0.025"/>

  <!-- Wave -->
  <path d="M0 980 Q270 940 540 980 Q810 1020 1080 970 L1080 1080 L0 1080 Z"
        fill="#4a6741" opacity="0.04"/>

  <!-- Logo - Large, centered -->
  <g transform="translate(320, 180)" filter="url(#presenceIG)">
    <circle cx="220" cy="220" r="195" fill="url(#logoGradIG)"/>
    <circle cx="220" cy="220" r="220" fill="none" stroke="#4a6741" stroke-width="2" opacity="0.15"/>
    <text x="220" y="270"
          font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
          font-size="150"
          font-weight="800"
          fill="white"
          text-anchor="middle"
          letter-spacing="-0.02em">FE</text>
  </g>

  <!-- Main headline - emotional -->
  <text x="540" y="700"
        font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
        font-size="54"
        font-weight="700"
        fill="#2C2520"
        text-anchor="middle">The friend you deserve.</text>

  <!-- Supporting line -->
  <text x="540" y="770"
        font-family="'Inter', -apple-system, sans-serif"
        font-size="26"
        font-weight="500"
        fill="#5C544A"
        text-anchor="middle">Remembers everything. Judges nothing.</text>

  <!-- Feature pills -->
  <g transform="translate(180, 840)" font-family="'Inter', -apple-system, sans-serif" font-size="15" font-weight="500">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#4a6741" opacity="0.1"/>
    <text x="70" y="24" fill="#4a6741" text-anchor="middle">Perfect memory</text>

    <rect x="160" y="0" width="130" height="36" rx="18" fill="#4a6741" opacity="0.1"/>
    <text x="225" y="24" fill="#4a6741" text-anchor="middle">Zero judgment</text>

    <rect x="310" y="0" width="130" height="36" rx="18" fill="#4a6741" opacity="0.1"/>
    <text x="375" y="24" fill="#4a6741" text-anchor="middle">24/7 presence</text>

    <rect x="460" y="0" width="130" height="36" rx="18" fill="#4a6741" opacity="0.1"/>
    <text x="525" y="24" fill="#4a6741" text-anchor="middle">Six specialists</text>
  </g>

  <!-- CTA -->
  <g transform="translate(390, 930)">
    <rect x="0" y="0" width="300" height="60" rx="30" fill="#4a6741"/>
    <text x="150" y="40"
          font-family="'Inter', -apple-system, sans-serif"
          font-size="20"
          font-weight="600"
          fill="white"
          text-anchor="middle">Start free at ferni.ai</text>
  </g>
</svg>
