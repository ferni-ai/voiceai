<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <!-- Aurora borealis gradient -->
    <linearGradient id="auroraGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a5a4c"/>
      <stop offset="30%" style="stop-color:#2dd4bf"/>
      <stop offset="60%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1a1a2e" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main ellipse -->
  <ellipse 
    cx="200" 
    cy="120" 
    rx="180" 
    ry="100" 
    fill="url(#auroraGradient)"
    filter="url(#dropShadow)"
  />
  
  <!-- Subtle inner glow -->
  <ellipse 
    cx="200" 
    cy="100" 
    rx="160" 
    ry="70" 
    fill="rgba(255,255,255,0.08)"
  />
  
  <!-- FE circle -->
  <circle cx="130" cy="120" r="45" fill="rgba(0,0,0,0.25)"/>
  <text 
    x="130" 
    y="128" 
    font-family="Inter, -apple-system, sans-serif" 
    font-size="24" 
    font-weight="700"
    fill="#FFFDFB" 
    text-anchor="middle"
    filter="url(#glow)"
  >FE</text>
  
  <!-- AI circle -->
  <circle cx="270" cy="120" r="45" fill="rgba(255,255,255,0.92)"/>
  <text 
    x="270" 
    y="128" 
    font-family="Inter, -apple-system, sans-serif" 
    font-size="24" 
    font-weight="700"
    fill="#4a4a4a" 
    text-anchor="middle"
  >AI</text>
</svg>
