<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- For use on dark backgrounds -->
  <defs>
    <linearGradient id="orbGradientDark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    
    <filter id="glowDark" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <linearGradient id="shineDark" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  
  <!-- Enhanced glow ring for dark backgrounds -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Main orb with enhanced glow -->
  <circle cx="60" cy="60" r="46" fill="url(#orbGradientDark)" filter="url(#glowDark)"/>
  
  <!-- Shine highlight -->
  <ellipse cx="48" cy="42" rx="22" ry="16" fill="url(#shineDark)" opacity="0.8"/>
  
  <!-- Sound wave mark -->
  <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="60" cy="60" r="5" fill="white"/>
    <path d="M 50 60 Q 50 52, 60 52 Q 70 52, 70 60" stroke-width="2.5" opacity="0.95"/>
    <path d="M 50 60 Q 50 68, 60 68 Q 70 68, 70 60" stroke-width="2.5" opacity="0.95"/>
    <path d="M 44 60 Q 44 48, 60 48 Q 76 48, 76 60" stroke-width="2" opacity="0.7"/>
    <path d="M 44 60 Q 44 72, 60 72 Q 76 72, 76 60" stroke-width="2" opacity="0.7"/>
    <path d="M 38 60 Q 38 44, 60 44 Q 82 44, 82 60" stroke-width="1.5" opacity="0.4"/>
    <path d="M 38 60 Q 38 76, 60 76 Q 82 76, 82 60" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>

