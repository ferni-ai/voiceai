<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="headGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="30%" style="stop-color:#06b6d4"/>
      <stop offset="60%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    
    <linearGradient id="bodyMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e293b" flood-opacity="0.2"/>
    </filter>
    
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="512" height="512" rx="115"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="#f8fafc"/>
  
  <g clip-path="url(#roundedSquare)">
    <!-- Neck -->
    <rect x="231" y="260" width="50" height="35" rx="6" fill="#cbd5e1"/>
    
    <!-- Body (partial, cropped at bottom) -->
    <rect x="156" y="290" width="200" height="180" rx="20" fill="url(#bodyMetal)" filter="url(#shadow)"/>
    
    <!-- Heart light -->
    <rect x="226" y="320" width="60" height="45" rx="10" fill="#1e293b"/>
    <rect x="234" y="328" width="44" height="29" rx="6" fill="#06b6d4" opacity="0.8"/>
    
    <!-- Arms sticking out -->
    <rect x="96" y="320" width="60" height="22" rx="11" fill="#cbd5e1"/>
    <circle cx="86" cy="331" r="18" fill="#cbd5e1"/>
    
    <rect x="356" y="320" width="60" height="22" rx="11" fill="#cbd5e1"/>
    <circle cx="426" cy="331" r="18" fill="#cbd5e1"/>
    
    <!-- HEAD -->
    <ellipse 
      cx="256" cy="145" 
      rx="170" ry="100" 
      fill="url(#headGradient)"
      filter="url(#shadow)"
    />
    
    <!-- Shine -->
    <ellipse cx="256" cy="110" rx="130" ry="55" fill="rgba(255,255,255,0.1)"/>
    
    <!-- FE EYE -->
    <circle cx="185" cy="145" r="55" fill="rgba(0,0,0,0.3)"/>
    <circle cx="185" cy="145" r="47" fill="#1e293b"/>
    <circle cx="185" cy="145" r="35" fill="#0f172a"/>
    <circle cx="185" cy="150" r="18" fill="#06b6d4"/>
    <circle cx="178" cy="140" r="8" fill="#FFFDFB"/>
    
    <!-- AI EYE -->
    <circle cx="327" cy="145" r="55" fill="rgba(255,255,255,0.95)"/>
    <circle cx="327" cy="145" r="47" fill="#f8fafc"/>
    <circle cx="327" cy="145" r="35" fill="#FFFDFB"/>
    <circle cx="327" cy="150" r="18" fill="#1e293b"/>
    <circle cx="320" cy="140" r="8" fill="#FFFDFB"/>
    
    <!-- Eyebrow hint -->
    <path d="M 100 95 Q 256 55, 412 95" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
