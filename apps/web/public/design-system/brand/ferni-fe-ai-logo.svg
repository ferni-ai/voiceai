<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <!-- Subtle gradient for depth -->
    <linearGradient id="ferniGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6741"/>
      <stop offset="100%" style="stop-color:#3d5a35"/>
    </linearGradient>
    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2C2520" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Main Ferni ellipse -->
  <ellipse 
    cx="200" 
    cy="120" 
    rx="180" 
    ry="100" 
    fill="url(#ferniGradient)"
    filter="url(#softShadow)"
  />
  
  <!-- FE circle (human/frontend element) -->
  <circle 
    cx="130" 
    cy="120" 
    r="45" 
    fill="#5a6b5a"
    opacity="0.85"
  />
  <text 
    x="130" 
    y="128" 
    font-family="Inter, -apple-system, sans-serif" 
    font-size="24" 
    font-weight="600"
    fill="#FFFDFB" 
    text-anchor="middle"
  >FE</text>
  
  <!-- AI circle (artificial intelligence element) -->
  <circle 
    cx="270" 
    cy="120" 
    r="45" 
    fill="#FFFDFB"
    opacity="0.9"
  />
  <circle 
    cx="270" 
    cy="120" 
    r="43" 
    fill="none"
    stroke="#b8c4b4"
    stroke-width="2"
  />
  <text 
    x="270" 
    y="128" 
    font-family="Inter, -apple-system, sans-serif" 
    font-size="24" 
    font-weight="600"
    fill="#4a6741" 
    text-anchor="middle"
  >AI</text>
</svg>
