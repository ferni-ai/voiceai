<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <!-- Aurora head gradient -->
    <linearGradient id="auroraHead" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a5a4c"/>
      <stop offset="30%" style="stop-color:#2dd4bf"/>
      <stop offset="60%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    
    <linearGradient id="bodyMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="50%" style="stop-color:#cbd5e1"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    
    <linearGradient id="armMetal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="50%" style="stop-color:#cbd5e1"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1e293b" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- === NECK (tilted - curious!) === -->
  <rect x="140" y="145" width="30" height="25" rx="4" fill="url(#armMetal)" transform="rotate(10 155 157)"/>
  <rect x="132" y="165" width="40" height="8" rx="2" fill="#64748b"/>
  
  <!-- === BODY === -->
  <rect x="85" y="170" width="130" height="120" rx="12" fill="url(#bodyMetal)" filter="url(#shadow)"/>
  
  <!-- Body panel -->
  <rect x="95" y="180" width="110" height="60" rx="6" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <line x1="150" y1="180" x2="150" y2="240" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Heart light (curious = teal) -->
  <rect x="130" y="195" width="40" height="30" rx="6" fill="#1e293b"/>
  <rect x="135" y="200" width="30" height="20" rx="4" fill="#2dd4bf" opacity="0.8"/>
  
  <!-- Vent -->
  <rect x="105" y="255" width="90" height="25" rx="4" fill="#64748b"/>
  <line x1="120" y1="260" x2="120" y2="275" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  <line x1="135" y1="260" x2="135" y2="275" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="260" x2="150" y2="275" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  <line x1="165" y1="260" x2="165" y2="275" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="260" x2="180" y2="275" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  
  <!-- === ARMS (one reaching out curiously) === -->
  <!-- Left arm (normal) -->
  <rect x="45" y="200" width="40" height="14" rx="7" fill="url(#armMetal)"/>
  <rect x="35" y="195" width="15" height="24" rx="4" fill="url(#armMetal)"/>
  <rect x="25" y="192" width="12" height="10" rx="2" fill="#64748b"/>
  <rect x="25" y="205" width="12" height="10" rx="2" fill="#64748b"/>
  
  <!-- Right arm (reaching forward!) -->
  <g transform="rotate(-15 215 195)">
    <rect x="215" y="180" width="55" height="14" rx="7" fill="url(#armMetal)"/>
    <rect x="265" y="175" width="15" height="24" rx="4" fill="url(#armMetal)"/>
    <!-- Claw open (curious grab) -->
    <rect x="278" y="168" width="14" height="8" rx="2" fill="#64748b" transform="rotate(-20 285 172)"/>
    <rect x="278" y="192" width="14" height="8" rx="2" fill="#64748b" transform="rotate(20 285 196)"/>
  </g>
  
  <!-- === TREADS === -->
  <rect x="75" y="290" width="50" height="50" rx="10" fill="#475569"/>
  <ellipse cx="90" cy="315" rx="12" ry="12" fill="#334155"/>
  <ellipse cx="110" cy="315" rx="12" ry="12" fill="#334155"/>
  <ellipse cx="90" cy="315" rx="6" ry="6" fill="#1e293b"/>
  <ellipse cx="110" cy="315" rx="6" ry="6" fill="#1e293b"/>
  
  <rect x="175" y="290" width="50" height="50" rx="10" fill="#475569"/>
  <ellipse cx="190" cy="315" rx="12" ry="12" fill="#334155"/>
  <ellipse cx="210" cy="315" rx="12" ry="12" fill="#334155"/>
  <ellipse cx="190" cy="315" rx="6" ry="6" fill="#1e293b"/>
  <ellipse cx="210" cy="315" rx="6" ry="6" fill="#1e293b"/>
  
  <rect x="125" y="300" width="50" height="30" rx="4" fill="#64748b"/>
  
  <!-- === HEAD (tilted - curious!) === -->
  <g transform="rotate(12 150 80)">
    <ellipse 
      cx="150" cy="80" 
      rx="110" ry="65" 
      fill="url(#auroraHead)"
      filter="url(#shadow)"
    />
    
    <!-- Shine -->
    <ellipse cx="150" cy="55" rx="85" ry="35" fill="rgba(255,255,255,0.08)"/>
    
    <!-- FE EYE (wide, curious!) -->
    <circle cx="105" cy="80" r="35" fill="rgba(0,0,0,0.3)"/>
    <circle cx="105" cy="80" r="30" fill="#1e293b"/>
    <circle cx="105" cy="80" r="24" fill="#0f172a"/>
    <!-- Wide pupil -->
    <circle cx="108" cy="78" r="14" fill="#2dd4bf"/>
    <circle cx="102" cy="72" r="6" fill="#FFFDFB"/>
    
    <!-- AI EYE (wide, curious!) -->
    <circle cx="195" cy="80" r="35" fill="rgba(255,255,255,0.95)"/>
    <circle cx="195" cy="80" r="30" fill="#f8fafc"/>
    <circle cx="195" cy="80" r="24" fill="#FFFDFB"/>
    <!-- Wide pupil (looking at same thing) -->
    <circle cx="198" cy="78" r="14" fill="#1e293b"/>
    <circle cx="192" cy="72" r="6" fill="#FFFDFB"/>
    
    <!-- Raised eyebrow (curious!) -->
    <path d="M 75 48 Q 105 38, 130 50" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 170 50 Q 195 42, 225 52" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- ? bubble -->
  <circle cx="260" cy="35" r="20" fill="#c084fc" opacity="0.2"/>
  <text x="260" y="43" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#c084fc" text-anchor="middle">?</text>
</svg>
