<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- Ferni sage gradient for head -->
    <linearGradient id="ferniHead" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3d5a35"/>
      <stop offset="50%" style="stop-color:#4a6741"/>
      <stop offset="100%" style="stop-color:#5a7751"/>
    </linearGradient>
    
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#dcfce7"/>
    </linearGradient>
    
    <linearGradient id="limbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6741"/>
      <stop offset="100%" style="stop-color:#3d5a35"/>
    </linearGradient>
    
    <filter id="softShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2C2520" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Sound waves (listening) -->
  <path d="M 50 100 Q 30 120, 50 140" fill="none" stroke="#4a6741" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
  <path d="M 40 90 Q 10 120, 40 150" fill="none" stroke="#4a6741" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
  <path d="M 30 80 Q -10 120, 30 160" fill="none" stroke="#4a6741" stroke-width="3" opacity="0.1" stroke-linecap="round"/>
  
  <!-- === BODY === -->
  <rect 
    x="120" y="200" 
    width="160" height="180" 
    rx="40" ry="40"
    fill="url(#bodyGradient)"
    stroke="url(#limbGradient)"
    stroke-width="3"
    filter="url(#softShadow)"
  />
  
  <!-- Heart (warm, gentle pulse) -->
  <circle cx="200" cy="280" r="25" fill="#4a6741" opacity="0.15"/>
  <circle cx="200" cy="280" r="15" fill="#4a6741" opacity="0.3"/>
  <circle cx="200" cy="280" r="8" fill="#4a6741"/>
  
  <!-- === ARMS === -->
  <!-- Left arm (open, welcoming) -->
  <rect x="60" y="250" width="55" height="22" rx="11" fill="url(#limbGradient)" transform="rotate(-15 87 261)"/>
  <circle cx="50" cy="235" r="18" fill="url(#limbGradient)"/>
  
  <!-- Right arm (resting) -->
  <rect x="280" y="255" width="50" height="22" rx="11" fill="url(#limbGradient)"/>
  <circle cx="345" cy="266" r="18" fill="url(#limbGradient)"/>
  
  <!-- === LEGS === -->
  <rect x="145" y="380" width="26" height="55" rx="13" fill="url(#limbGradient)"/>
  <ellipse cx="158" cy="445" rx="22" ry="12" fill="url(#limbGradient)"/>
  
  <rect x="229" y="380" width="26" height="55" rx="13" fill="url(#limbGradient)"/>
  <ellipse cx="242" cy="445" rx="22" ry="12" fill="url(#limbGradient)"/>
  
  <!-- === HEAD (tilted slightly - listening) === -->
  <g transform="rotate(-5 200 110)">
    <ellipse 
      cx="200" cy="110" 
      rx="130" ry="75" 
      fill="url(#ferniHead)"
      filter="url(#softShadow)"
    />
    
    <!-- Shine -->
    <ellipse cx="200" cy="85" rx="100" ry="45" fill="rgba(255,255,255,0.08)"/>
    
    <!-- FE circle -->
    <circle cx="150" cy="110" r="32" fill="rgba(0,0,0,0.2)"/>
    <!-- Soft, attentive eye -->
    <ellipse cx="150" cy="112" rx="14" ry="16" fill="#FFFDFB"/>
    <circle cx="148" cy="112" r="7" fill="#2C2520"/>
    <circle cx="146" cy="110" r="2.5" fill="#FFFDFB"/>
    
    <!-- AI circle -->
    <circle cx="250" cy="110" r="32" fill="rgba(255,255,255,0.9)"/>
    <!-- Soft, attentive eye -->
    <ellipse cx="250" cy="112" rx="14" ry="16" fill="#FFFDFB"/>
    <circle cx="248" cy="112" r="7" fill="#2C2520"/>
    <circle cx="246" cy="110" r="2.5" fill="#FFFDFB"/>
    
    <!-- Gentle, understanding smile -->
    <path 
      d="M 175 145 Q 200 158, 225 145" 
      fill="none" 
      stroke="#FFFDFB" 
      stroke-width="3.5" 
      stroke-linecap="round"
    />
    
    <!-- Eyebrows (caring) -->
    <path d="M 130 88 Q 150 82, 165 88" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 235 88 Q 250 82, 270 88" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Antenna -->
  <line x1="195" y1="38" x2="195" y2="8" stroke="url(#limbGradient)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="195" cy="6" r="8" fill="#4a6741"/>
  <circle cx="195" cy="6" r="4" fill="#FFFDFB"/>
</svg>
