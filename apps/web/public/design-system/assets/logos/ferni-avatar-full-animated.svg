<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Full Avatar - Animated with circular base, heartbeat, expressive eyes -->
<!-- Follows Ferni EQ principles: breathing, active listening, micro-expressions -->
<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3a5731"/>
    </linearGradient>
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>

    <!-- Outer Glow for halo effects (soul shimmer) -->
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="40%" stop-color="#4a6741" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#4a6741" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4a6741" stop-opacity="0"/>
    </radialGradient>

    <filter id="eyeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="black" flood-opacity="0.1"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="2" flood-color="white" flood-opacity="0.5"/>
    </filter>

    <filter id="sparkleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @media (prefers-reduced-motion: reduce) {
      .animated { animation: none !important; }
      .heartbeat { transform: scale(1) !important; opacity: 0.5 !important; }
    }
  </style>

  <!-- Layer 1: Outer ambient glow with breathing (8s cycle - Ferni breath sync) -->
  <circle cx="150" cy="150" r="130" fill="url(#outerGlow)">
    <animate class="animated" attributeName="r" values="130;136;130" dur="8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate class="animated" attributeName="opacity" values="1;1.15;1" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Layer 2: Heartbeat ring (lub-dub pattern - 1.8s cycle) -->
  <circle class="heartbeat" cx="150" cy="150" r="95" fill="none" stroke="#4a6741" stroke-width="2.5">
    <animate class="animated" attributeName="r"
      values="95;105;96;102;95;95;95;95;95;95"
      keyTimes="0;0.1;0.2;0.3;0.5;0.55;0.6;0.7;0.9;1"
      dur="1.8s" repeatCount="indefinite"/>
    <animate class="animated" attributeName="stroke-opacity"
      values="0.4;0.9;0.7;0.85;0.4;0.4;0.4;0.4;0.4;0.4"
      keyTimes="0;0.1;0.2;0.3;0.5;0.55;0.6;0.7;0.9;1"
      dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Layer 3: Inner presence ring with subtle breathing -->
  <circle cx="150" cy="150" r="88" fill="none" stroke="#4a6741" stroke-width="1.5" stroke-opacity="0.35">
    <animate class="animated" attributeName="r" values="88;90;88" dur="5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </circle>

  <!-- Layer 4: Main circular orb with subtle breathing (synced to 8s) -->
  <circle cx="150" cy="150" r="80" fill="url(#orbGradient)">
    <animate class="animated" attributeName="r" values="80;82;80" dur="8s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </circle>

  <!-- Layer 5: Eyes with natural blinking, looking, and breathing -->
  <g id="bothEyes">
    <!-- Subtle looking movement (8s cycle - subtle, not jarring) -->
    <animateTransform class="animated" attributeName="transform" type="translate"
      values="0,0; 2,-1; 0,0; -1.5,0.5; 0,0"
      dur="12s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>

    <!-- Left Eye - larger and more expressive -->
    <g transform="translate(122, 148)">
      <!-- Eye outer glow (subtle presence) -->
      <ellipse cx="0" cy="0" rx="22" ry="28" fill="url(#eyeFill)" opacity="0.3" filter="url(#eyeShadow)"/>

      <!-- Main eye ellipse with natural blinking -->
      <ellipse cx="0" cy="0" rx="18" fill="url(#eyeFill)" filter="url(#eyeShadow)">
        <!-- Natural blink pattern: quick blinks at irregular intervals -->
        <animate class="animated" attributeName="ry"
          values="24;24;24;24;24;1.5;24;24;24;24;24;24;24;24;24;1.5;1.5;24"
          keyTimes="0;0.15;0.25;0.35;0.42;0.43;0.45;0.5;0.6;0.7;0.75;0.85;0.92;0.93;0.935;0.94;0.945;0.98"
          dur="6s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Primary sparkle (larger, more visible) -->
      <g transform="translate(-7, -10)" filter="url(#sparkleGlow)">
        <circle cx="0" cy="0" r="5" fill="white">
          <animate class="animated" attributeName="opacity" values="1;0.8;1;0.9;1" dur="3s" repeatCount="indefinite"/>
          <!-- Sparkle disappears during blink -->
          <animate class="animated" attributeName="r"
            values="5;5;5;5;5;0;5;5;5;5;5;5;5;5;5;0;0;5"
            keyTimes="0;0.15;0.25;0.35;0.42;0.43;0.45;0.5;0.6;0.7;0.75;0.85;0.92;0.93;0.935;0.94;0.945;0.98"
            dur="6s" repeatCount="indefinite"/>
        </circle>
        <!-- Secondary sparkle -->
        <circle cx="3.5" cy="2.5" r="2" fill="white" opacity="0.7">
          <animate class="animated" attributeName="r"
            values="2;2;2;2;2;0;2;2;2;2;2;2;2;2;2;0;0;2"
            keyTimes="0;0.15;0.25;0.35;0.42;0.43;0.45;0.5;0.6;0.7;0.75;0.85;0.92;0.93;0.935;0.94;0.945;0.98"
            dur="6s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>

    <!-- Right Eye - larger and more expressive -->
    <g transform="translate(178, 148)">
      <!-- Eye outer glow (subtle presence) -->
      <ellipse cx="0" cy="0" rx="22" ry="28" fill="url(#eyeFill)" opacity="0.3" filter="url(#eyeShadow)"/>

      <!-- Main eye ellipse with natural blinking -->
      <ellipse cx="0" cy="0" rx="18" fill="url(#eyeFill)" filter="url(#eyeShadow)">
        <!-- Synced with left eye for natural blink -->
        <animate class="animated" attributeName="ry"
          values="24;24;24;24;24;1.5;24;24;24;24;24;24;24;24;24;1.5;1.5;24"
          keyTimes="0;0.15;0.25;0.35;0.42;0.43;0.45;0.5;0.6;0.7;0.75;0.85;0.92;0.93;0.935;0.94;0.945;0.98"
          dur="6s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Primary sparkle -->
      <g transform="translate(-6, -10)" filter="url(#sparkleGlow)">
        <circle cx="0" cy="0" r="5" fill="white">
          <animate class="animated" attributeName="opacity" values="1;0.85;1;0.75;1" dur="3.5s" repeatCount="indefinite"/>
          <animate class="animated" attributeName="r"
            values="5;5;5;5;5;0;5;5;5;5;5;5;5;5;5;0;0;5"
            keyTimes="0;0.15;0.25;0.35;0.42;0.43;0.45;0.5;0.6;0.7;0.75;0.85;0.92;0.93;0.935;0.94;0.945;0.98"
            dur="6s" repeatCount="indefinite"/>
        </circle>
        <!-- Secondary sparkle -->
        <circle cx="3.5" cy="2.5" r="2" fill="white" opacity="0.7">
          <animate class="animated" attributeName="r"
            values="2;2;2;2;2;0;2;2;2;2;2;2;2;2;2;0;0;2"
            keyTimes="0;0.15;0.25;0.35;0.42;0.43;0.45;0.5;0.6;0.7;0.75;0.85;0.92;0.93;0.935;0.94;0.945;0.98"
            dur="6s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
  </g>
</svg>
