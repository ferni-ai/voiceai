<?xml version="1.0" encoding="UTF-8"?>
<!-- Ferni Full Avatar - Complete circular orb with halo effects and expressive eyes -->
<!-- Static version with larger, more prominent eyes -->
<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ferni Green Colors -->
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3d5a35"/>
    </linearGradient>

    <!-- Outer Glow (soul shimmer) -->
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="35%" stop-color="#4a6741" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#4a6741" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4a6741" stop-opacity="0"/>
    </radialGradient>

    <!-- Soul Warmth (golden glow) -->
    <radialGradient id="soulWarmth" cx="50%" cy="50%" r="50%">
      <stop offset="20%" stop-color="#c4a265" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#c4a265" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c4a265" stop-opacity="0"/>
    </radialGradient>

    <!-- Eye fill gradient -->
    <linearGradient id="eyeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="orbGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="eyeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="black" flood-opacity="0.1"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="2" flood-color="white" flood-opacity="0.5"/>
    </filter>

    <filter id="sparkleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="ringBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Layer 1: Outer ambient glow -->
  <circle cx="150" cy="150" r="130" fill="url(#outerGlow)"/>

  <!-- Layer 2: Soul warmth bloom -->
  <circle cx="150" cy="150" r="110" fill="url(#soulWarmth)"/>

  <!-- Layer 3: Heartbeat ring -->
  <circle cx="150" cy="150" r="95" fill="none" stroke="#4a6741" stroke-width="2.5" stroke-opacity="0.4"/>

  <!-- Layer 4: Inner presence ring -->
  <circle cx="150" cy="150" r="88" fill="none" stroke="#4a6741" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- Layer 5: Main circular orb body -->
  <circle cx="150" cy="150" r="80" fill="url(#orbGradient)" filter="url(#orbGlowFilter)"/>

  <!-- Layer 6: Wave ring (audio-reactive ring around orb) -->
  <circle cx="150" cy="150" r="72" fill="none" stroke="#4a6741" stroke-width="1.5" stroke-opacity="0.3" filter="url(#ringBlur)"/>

  <!-- Layer 7: Eyes - larger and more expressive -->
  <g id="bothEyes">
    <!-- Left Eye -->
    <g transform="translate(122, 148)">
      <!-- Eye outer glow -->
      <ellipse cx="0" cy="0" rx="22" ry="28" fill="url(#eyeFill)" opacity="0.3"/>
      <!-- Main eye -->
      <ellipse cx="0" cy="0" rx="18" ry="24" fill="url(#eyeFill)" filter="url(#eyeShadow)"/>
      <!-- Sparkles -->
      <g transform="translate(-7, -10)" filter="url(#sparkleGlow)">
        <circle cx="0" cy="0" r="5" fill="white"/>
        <circle cx="3.5" cy="2.5" r="2" fill="white" opacity="0.7"/>
      </g>
    </g>

    <!-- Right Eye -->
    <g transform="translate(178, 148)">
      <!-- Eye outer glow -->
      <ellipse cx="0" cy="0" rx="22" ry="28" fill="url(#eyeFill)" opacity="0.3"/>
      <!-- Main eye -->
      <ellipse cx="0" cy="0" rx="18" ry="24" fill="url(#eyeFill)" filter="url(#eyeShadow)"/>
      <!-- Sparkles -->
      <g transform="translate(-6, -10)" filter="url(#sparkleGlow)">
        <circle cx="0" cy="0" r="5" fill="white"/>
        <circle cx="3.5" cy="2.5" r="2" fill="white" opacity="0.7"/>
      </g>
    </g>
  </g>
</svg>
