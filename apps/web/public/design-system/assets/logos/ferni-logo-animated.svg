<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="ferni-logo">
  <!-- 
    Ferni Logo - Animated (Expressive)
    
    Default: Three zen stones (eye centered at y=50)
    Animated: Eye rises, mouth reveals below
    
    Expression states (add class to svg):
    - .happy: Eye rises up, big smile appears
    - .curious: Eye shifts up-left, small smile peeks
    - .excited: Eye bounces up, wide grin
    - .sad: Eye stays, frown slides down gently  
    - .surprised: Eye pops up fast, 'O' mouth
    - .thinking: Eye shifts side to side
    - .chuckle: Eye squints, smile wobbles
  -->
  
  <defs>
    <!-- Mouth clip to hide behind eye when not active -->
    <clipPath id="mouth-clip">
      <rect x="0" y="55" width="100" height="45"/>
    </clipPath>
    
    <!-- Glow filter for emotions -->
    <filter id="warmGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    .ferni-logo {
      --transition-speed: 400ms;
      --easing: cubic-bezier(0.34, 1.56, 0.64, 1);
      --gentle-easing: cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Eye group - moves up to reveal mouth */
    .eye-group {
      transform-origin: 50px 50px;
      transition: transform var(--transition-speed) var(--easing);
    }
    
    /* Mouth group - hidden by default, slides down */
    .mouth-group {
      opacity: 0;
      transform: translateY(-15px);
      transform-origin: 50px 68px;
      transition: 
        opacity calc(var(--transition-speed) * 0.8) var(--gentle-easing),
        transform var(--transition-speed) var(--easing);
    }
    
    /* ========== HAPPY ========== */
    .ferni-logo.happy .eye-group {
      transform: translateY(-12px);
    }
    .ferni-logo.happy .mouth-group {
      opacity: 1;
      transform: translateY(0);
    }
    .ferni-logo.happy .eye-white {
      transform: scaleY(0.9);
      transform-origin: 50px 50px;
    }
    
    /* ========== EXCITED ========== */
    .ferni-logo.excited .eye-group {
      transform: translateY(-14px) scale(1.05);
      animation: excited-bounce 600ms var(--easing);
    }
    .ferni-logo.excited .mouth-group {
      opacity: 1;
      transform: translateY(0) scaleX(1.1);
    }
    @keyframes excited-bounce {
      0% { transform: translateY(0) scale(1); }
      30% { transform: translateY(-18px) scale(1.08); }
      60% { transform: translateY(-12px) scale(1.03); }
      100% { transform: translateY(-14px) scale(1.05); }
    }
    
    /* ========== CURIOUS ========== */
    .ferni-logo.curious .eye-group {
      transform: translateY(-8px) translateX(-3px);
    }
    .ferni-logo.curious .mouth-group {
      opacity: 0.7;
      transform: translateY(0) scale(0.8);
    }
    .ferni-logo.curious .pupil-group {
      transform: translateX(3px) translateY(-2px);
    }
    
    /* ========== SAD ========== */
    .ferni-logo.sad .eye-group {
      transform: translateY(-6px);
    }
    .ferni-logo.sad .mouth-group {
      opacity: 1;
      transform: translateY(0);
    }
    .ferni-logo.sad .eye-white {
      transform: scaleY(0.85);
      transform-origin: 50px 50px;
    }
    
    /* ========== SURPRISED ========== */
    .ferni-logo.surprised .eye-group {
      transform: translateY(-16px) scale(1.1);
      animation: surprised-pop 300ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .ferni-logo.surprised .mouth-group {
      opacity: 1;
      transform: translateY(2px);
    }
    @keyframes surprised-pop {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.15); }
      100% { transform: translateY(-16px) scale(1.1); }
    }
    
    /* ========== THINKING ========== */
    .ferni-logo.thinking .eye-group {
      transform: translateY(-4px) translateX(4px);
      animation: thinking-wander 2000ms ease-in-out infinite;
    }
    .ferni-logo.thinking .mouth-group {
      opacity: 0;
    }
    @keyframes thinking-wander {
      0%, 100% { transform: translateY(-4px) translateX(4px); }
      25% { transform: translateY(-6px) translateX(-3px); }
      50% { transform: translateY(-3px) translateX(2px); }
      75% { transform: translateY(-5px) translateX(-4px); }
    }
    
    /* ========== CHUCKLE ========== */
    .ferni-logo.chuckle .eye-group {
      transform: translateY(-10px);
      animation: chuckle-squint 600ms var(--easing);
    }
    .ferni-logo.chuckle .mouth-group {
      opacity: 1;
      transform: translateY(0);
      animation: chuckle-wobble 600ms var(--easing);
    }
    .ferni-logo.chuckle .eye-white {
      transform: scaleY(0.75);
      transform-origin: 50px 50px;
    }
    @keyframes chuckle-squint {
      0%, 100% { transform: translateY(-10px); }
      25% { transform: translateY(-11px) rotate(-2deg); }
      75% { transform: translateY(-9px) rotate(2deg); }
    }
    @keyframes chuckle-wobble {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(0) rotate(-3deg); }
      75% { transform: translateY(0) rotate(3deg); }
    }
    
    /* ========== LISTENING ========== */
    .ferni-logo.listening .eye-group {
      transform: translateY(-2px);
    }
    .ferni-logo.listening .pupil-group {
      animation: listening-focus 1500ms ease-in-out infinite;
    }
    @keyframes listening-focus {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(0.95); }
    }
    
    /* Pupil tracking helper */
    .pupil-group {
      transform-origin: 50px 50px;
      transition: transform 200ms var(--gentle-easing);
    }
    
    /* Eye white can squint */
    .eye-white {
      transition: transform var(--transition-speed) var(--gentle-easing);
    }
  </style>
  
  <!-- Outer Stone: Body/World -->
  <circle cx="50" cy="50" r="45" fill="#4a6741"/>
  
  <!-- Eye Group (moves up to reveal mouth) -->
  <g class="eye-group">
    <!-- Eye White (centered by default at y=50) -->
    <circle class="eye-white" cx="50" cy="50" r="18" fill="white"/>
    
    <!-- Iris -->
    <circle cx="50" cy="50" r="12" fill="#5a8060"/>
    
    <!-- Pupil Group (can look around) -->
    <g class="pupil-group">
      <circle cx="50" cy="50" r="6" fill="#2c2520"/>
      <!-- Catchlight (life spark) -->
      <circle cx="47" cy="47" r="2" fill="white" opacity="0.9"/>
    </g>
  </g>
  
  <!-- Mouth Group (hidden, slides down when revealed) -->
  <g class="mouth-group" clip-path="url(#mouth-clip)">
    <!-- Happy/Default Smile -->
    <path class="mouth-smile" d="M 35 68 A 18 12 0 0 0 65 68" 
          stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>
</svg>

