<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Ferni Orb - Brand Icon
    The living, breathing heart of Ferni's identity.
    A warm sage green orb with organic highlight and gentle border.
  -->
  <defs>
    <!-- Main orb gradient - subtle depth -->
    <linearGradient id="orbGradient" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#5a7a52"/>
      <stop offset="50%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#3d5a35"/>
    </linearGradient>

    <!-- Soft outer glow -->
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#4a6741" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Highlight gradient for the gloss effect -->
    <radialGradient id="highlightGradient" cx="50%" cy="25%" r="45%" fx="50%" fy="20%">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Border gradient -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8aa880"/>
      <stop offset="50%" stop-color="#6a8a62"/>
      <stop offset="100%" stop-color="#5a7a52"/>
    </linearGradient>
  </defs>

  <!-- Outer ring/border -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#borderGradient)" stroke-width="12" opacity="0.6"/>

  <!-- Main orb with subtle glow -->
  <circle cx="256" cy="256" r="200" fill="url(#orbGradient)" filter="url(#outerGlow)"/>

  <!-- Highlight/gloss ellipse at top -->
  <ellipse cx="256" cy="180" rx="100" ry="60" fill="url(#highlightGradient)"/>

  <!-- FE text -->
  <text x="256" y="290"
        font-family="system-ui, -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif"
        font-size="140"
        font-weight="700"
        fill="white"
        text-anchor="middle"
        letter-spacing="-5">FE</text>
</svg>
