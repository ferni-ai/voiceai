<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Errors & Recovery | Ferni Observability</title>
  <link rel="stylesheet" href="/design-system/tokens.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Fonts loaded via Google Fonts link, using tokens.css variables */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--color-background-primary); color: var(--color-text-primary); min-height: 100vh; line-height: 1.6; }
    
    /* Skip link for accessibility */
    .skip-link { position: absolute; top: -40px; left: 0; background: var(--color-accent-primary); color: white; padding: 8px 16px; z-index: 1000; transition: top 0.3s; }
    .skip-link:focus { top: 0; }
    .nav-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--color-background-secondary); border-bottom: 1px solid var(--color-border-subtle); position: sticky; top: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 0.75rem; }
    .nav-brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #4a6741, #3d5a35); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .nav-brand-text { font-family: var(--font-display); font-size: 1.125rem; font-weight: 600; }
    .nav-links { display: flex; gap: 0.5rem; }
    .nav-link { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 8px; color: var(--color-text-secondary, #e8e2da); text-decoration: none; font-size: 0.875rem; transition: all 200ms ease; }
    .nav-link:hover { background: rgba(250, 246, 240, 0.05); color: var(--color-text-primary); }
    .nav-link.active { background: #4a6741; color: white; }
    .nav-link .icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }
    .main-content { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .page-header { margin-bottom: 2rem; display: flex; align-items: flex-start; justify-content: space-between; }
    .page-eyebrow { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #4a6741; margin-bottom: 0.5rem; }
    .page-title { font-family: var(--font-display); font-size: 2rem; font-weight: 700; }
    .page-subtitle { color: var(--color-text-secondary, #c4bdb4); font-size: 1rem; margin-top: 0.25rem; }
    .health-banner { background: var(--color-background-elevated, #252220); border-radius: 16px; padding: 1.5rem 2rem; border: 1px solid rgba(250, 246, 240, 0.1); margin-bottom: 2rem; display: flex; align-items: center; gap: 2rem; }
    .health-score { font-family: var(--font-display); font-size: 4rem; font-weight: 700; line-height: 1; }
    .health-score.excellent { color: #4a6741; }
    .health-score.good { color: #6b8f60; }
    .health-score.warning { color: #c4856a; }
    .health-score.critical { color: #e07070; }
    .health-label { font-size: 0.875rem; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .health-details { flex: 1; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--color-background-elevated, #252220); border-radius: 12px; padding: 1.25rem; border: 1px solid rgba(250, 246, 240, 0.1); }
    .stat-label { font-size: 0.75rem; color: var(--color-text-muted, #a09890); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .stat-value { font-family: var(--font-mono); font-size: 1.5rem; font-weight: 700; }
    .stat-subtext { font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.25rem; }
    .section { background: var(--color-background-elevated, #252220); border-radius: 16px; padding: 1.5rem; border: 1px solid rgba(250, 246, 240, 0.1); margin-bottom: 1.5rem; }
    .section-title { font-family: var(--font-display); font-weight: 600; font-size: 1.125rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .section-title .icon { width: 20px; height: 20px; stroke: #4a6741; stroke-width: 2; fill: none; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
    .error-bar { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: var(--color-background-base, #1a1614); border-radius: 8px; margin-bottom: 0.5rem; }
    .error-bar:last-child { margin-bottom: 0; }
    .error-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .error-dot.network { background: #3a6b73; }
    .error-dot.api { background: #5a6b8a; }
    .error-dot.llm { background: #4a6741; }
    .error-dot.tts { background: #9a7b5a; }
    .error-dot.stt { background: #c4856a; }
    .error-dot.memory { background: #a67a6a; }
    .error-dot.handoff { background: #7a6f63; }
    .error-dot.auth { background: #e07070; }
    .error-dot.unknown { background: #5a524a; }
    .error-name { flex: 1; font-size: 0.875rem; }
    .error-count { font-family: var(--font-mono); font-weight: 600; }
    .error-rate { font-size: 0.75rem; color: var(--color-text-muted); }
    .cluster-bar { display: flex; align-items: flex-end; gap: 2px; height: 60px; margin-top: 1rem; }
    .cluster-segment { background: var(--color-accent-sage, #4a6741); border-radius: 2px 2px 0 0; min-width: 20px; transition: height 0.3s ease; }
    .cluster-labels { display: flex; gap: 2px; font-size: 0.6rem; color: var(--color-text-muted); margin-top: 0.25rem; }
    .cluster-labels span { min-width: 20px; text-align: center; }
    .common-error { padding: 0.75rem; background: var(--color-background-base, #1a1614); border-radius: 8px; margin-bottom: 0.5rem; }
    .common-error-msg { font-size: 0.8125rem; font-family: var(--font-mono); margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .common-error-count { font-size: 0.75rem; color: var(--color-text-muted); }
    .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid rgba(250, 246, 240, 0.05); }
    .metric-row:last-child { border-bottom: none; }
    .metric-name { color: var(--color-text-secondary, #c4bdb4); font-size: 0.875rem; }
    .metric-value { font-family: var(--font-mono); font-weight: 600; }
    .progress-bar { height: 8px; background: var(--color-background-base, #1a1614); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .progress-fill.green { background: linear-gradient(90deg, #3d5a35, #4a6741); }
    .progress-fill.yellow { background: linear-gradient(90deg, #9a7b5a, #c4856a); }
    .progress-fill.red { background: linear-gradient(90deg, #b05050, #e07070); }
    .refresh-btn { display: flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid rgba(250, 246, 240, 0.1); background: transparent; color: var(--color-text-secondary); font-size: 0.875rem; cursor: pointer; transition: all 200ms ease; }
    .refresh-btn:hover { background: rgba(250, 246, 240, 0.05); color: var(--color-text-primary); }
    .refresh-btn .icon { width: 16px; height: 16px; }
    .loading-overlay { display: flex; align-items: center; justify-content: center; padding: 4rem; color: var(--color-text-muted); }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--color-background-elevated); border-top-color: #4a6741; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 1rem; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    [data-theme="light"] { --color-background-base: #faf6f0; --color-background-elevated: #ffffff; --color-text-primary: #2C2520; --color-text-secondary: #5a524a; --color-text-muted: #8a827a; }
    .theme-toggle { padding: 0.375rem; border-radius: 8px; border: 1px solid rgba(250, 246, 240, 0.1); background: transparent; cursor: pointer; }
    .theme-toggle .icon { width: 18px; height: 18px; stroke: var(--color-text-secondary); stroke-width: 2; fill: none; }
    
    /* Reduced Motion Support - WCAG Compliance */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
      .loading-spinner { animation: none; border-top-color: var(--color-accent-primary); }
    }
    
    /* Focus indicators for accessibility */
    .nav-link:focus-visible, .refresh-btn:focus-visible, .theme-toggle:focus-visible {
      outline: 2px solid var(--color-accent-primary);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <nav class="nav-header" aria-label="Dashboard navigation">
    <div class="nav-brand">
      <div class="nav-brand-icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" aria-hidden="true"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <span class="nav-brand-text">Ferni Observability</span>
    </div>
    <div class="nav-links">
      <a href="/observability-hub.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Hub</a>
      <a href="/llm-dashboard.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/></svg>LLM</a>
      <a href="/ux-dashboard.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>UX</a>
      <a href="/error-dashboard.html" class="nav-link active"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>Errors</a>
      <a href="/cost-dashboard.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Cost</a>
      <button class="theme-toggle" onclick="toggleTheme()"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/></svg></button>
    </div>
  </nav>

  <main class="main-content" id="main-content">
    <div class="loading-overlay"><div class="loading-spinner"></div><span>Loading error metrics...</span></div>
  </main>

  <script>
    let data = null;
    const appEl = document.getElementById('main-content');
    
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
      localStorage.setItem('ferni-theme', current === 'dark' ? 'light' : 'dark');
    }
    const savedTheme = localStorage.getItem('ferni-theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

    async function fetchData() {
      try {
        const response = await fetch('/api/observability/errors');
        if (!response.ok) throw new Error('Failed to fetch');
        data = await response.json();
        render();
      } catch (err) {
        // Use structured approach instead of console.error in production
        appEl.innerHTML = `<div class="loading-overlay"><span style="color: var(--color-semantic-warning)">Failed to load data. Is the server running?</span></div>`;
      }
    }

    function formatDuration(ms) {
      if (ms < 1000) return `${ms.toFixed(0)}ms`;
      return `${(ms / 1000).toFixed(1)}s`;
    }
    function formatPercent(v) { return `${(v * 100).toFixed(1)}%`; }
    function getHealthClass(score) {
      if (score >= 90) return 'excellent';
      if (score >= 70) return 'good';
      if (score >= 50) return 'warning';
      return 'critical';
    }

    function render() {
      if (!data) return;
      const categories = Object.entries(data.errorsByCategory || {}).filter(([_, count]) => count > 0).sort((a, b) => b[1] - a[1]);
      const clusters = data.errorClusters || [];
      const maxCluster = Math.max(...clusters.map(c => c.count), 1);
      const commonErrors = data.mostCommonErrors || [];
      appEl.innerHTML = `
        <header class="page-header">
          <div>
            <p class="page-eyebrow">System Reliability</p>
            <h1 class="page-title">Errors & Recovery</h1>
            <p class="page-subtitle">Monitor error rates, recovery patterns, and system resilience</p>
          </div>
          <button class="refresh-btn" aria-label="Refresh data" onclick="fetchData()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Refresh
          </button>
        </header>

        <div class="health-banner">
          <div>
            <div class="health-score ${getHealthClass(data.errorHealthScore || 100)}">${data.errorHealthScore || 100}</div>
            <div class="health-label">Error Health Score</div>
          </div>
          <div class="health-details">
            <div class="stats-row" style="margin: 0;">
              <div class="stat-card" style="padding: 1rem;">
                <div class="stat-label">Last 5 min</div>
                <div class="stat-value" style="color: ${(data.errorsLast5Min || 0) > 5 ? '#e07070' : '#4a6741'}">${data.errorsLast5Min || 0}</div>
              </div>
              <div class="stat-card" style="padding: 1rem;">
                <div class="stat-label">Last Hour</div>
                <div class="stat-value">${data.errorsLastHour || 0}</div>
              </div>
              <div class="stat-card" style="padding: 1rem;">
                <div class="stat-label">Total</div>
                <div class="stat-value">${data.totalErrors || 0}</div>
              </div>
              <div class="stat-card" style="padding: 1rem;">
                <div class="stat-label">Recovery Rate</div>
                <div class="stat-value" style="color: #4a6741">${formatPercent(data.recoveryRate || 1)}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="two-col">
          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
              Errors by Category
            </h2>
            ${categories.length > 0 ? categories.map(([cat, count]) => `
              <div class="error-bar">
                <div class="error-dot ${cat}"></div>
                <span class="error-name">${cat.charAt(0).toUpperCase() + cat.slice(1)}</span>
                <span class="error-count">${count}</span>
                <span class="error-rate">${((data.errorRateByCategory?.[cat] || 0) * 100).toFixed(0)}%</span>
              </div>
            `).join('') : '<p style="text-align: center; color: var(--color-text-muted); padding: 2rem;">No errors recorded - system healthy!</p>'}
          </div>

          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Error Timeline (Last Hour)
            </h2>
            <div class="cluster-bar">
              ${clusters.slice().reverse().map(c => `
                <div class="cluster-segment" style="height: ${Math.max(4, (c.count / maxCluster) * 100)}%; background: ${c.count > 5 ? '#e07070' : c.count > 2 ? '#c4856a' : '#4a6741'};"></div>
              `).join('')}
            </div>
            <div class="cluster-labels">
              ${clusters.slice().reverse().map(c => `<span>${c.count}</span>`).join('')}
            </div>
            <p style="font-size: 0.75rem; color: var(--color-text-muted); text-align: center; margin-top: 0.5rem;">Older ← → Recent</p>
          </div>
        </div>

        <div class="two-col">
          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
              Recovery Metrics
            </h2>
            <div class="metric-row">
              <span class="metric-name">Recovery Rate</span>
              <span class="metric-value" aria-live="polite">${formatPercent(data.recoveryRate || 1)}</span>
            </div>
            <div class="progress-bar" style="margin-bottom: 1rem;">
              <div class="progress-fill green" style="width: ${(data.recoveryRate || 1) * 100}%"></div>
            </div>
            <div class="metric-row">
              <span class="metric-name">Avg Recovery Time</span>
              <span class="metric-value" aria-live="polite">${formatDuration(data.avgRecoveryTimeMs || 0)}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Retry Success Rate</span>
              <span class="metric-value" aria-live="polite">${formatPercent(data.retrySuccessRate || 1)}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Fallback Activations</span>
              <span class="metric-value" aria-live="polite">${data.fallbackActivations || 0}</span>
            </div>
          </div>

          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              Most Common Errors
            </h2>
            ${commonErrors.length > 0 ? commonErrors.map(e => `
              <div class="common-error">
                <div class="common-error-msg">${e.message}</div>
                <div class="common-error-count">${e.count} occurrences</div>
              </div>
            `).join('') : '<p style="text-align: center; color: var(--color-text-muted); padding: 2rem;">No errors to display</p>'}
          </div>
        </div>
      `;
    }

    fetchData();
    setInterval(fetchData, 15000);
  </script>
</body>
</html>
