<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cameo Analytics | Ferni Admin</title>
    <link rel="stylesheet" href="/design-system/tokens.css" />
    <style>
      /* Skip link for accessibility */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: var(--color-accent, #4a6741);
        color: var(--color-text-primary, #faf6f0);
        padding: 8px 16px;
        z-index: 100;
        text-decoration: none;
        border-radius: 0 0 4px 0;
      }
      .skip-link:focus {
        top: 0;
      }

      /* Reduced motion support */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
      :root {
        --color-bg: #1a1612;
        --color-surface: #252019;
        --color-surface-elevated: #302820;
        --color-border: rgba(255, 253, 251, 0.1);
        --color-text-primary: #faf6f0;
        --color-text-secondary: #c4b8a8;
        --color-text-muted: #8a7a6a;
        --color-accent: #4a6741;
        --color-success: #4a6741;
        --color-warning: #c4856a;
        --color-error: #a86d55;
        --font-body: 'Plus Jakarta Sans', -apple-system, sans-serif;
        --radius-md: 8px;
        --radius-lg: 12px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-body);
        background: var(--color-bg);
        color: var(--color-text-primary);
        min-height: 100vh;
        padding: 2rem;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        margin-bottom: 2rem;
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      .subtitle {
        color: var(--color-text-secondary);
        font-size: 1rem;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
      }

      .stat-card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
      }

      .stat-card__label {
        color: var(--color-text-muted);
        font-size: 0.875rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
      }

      .stat-card__value {
        font-size: 2.5rem;
        font-weight: 700;
      }

      .stat-card__subtitle {
        color: var(--color-text-secondary);
        font-size: 0.875rem;
        margin-top: 0.25rem;
      }

      .stat-card--success .stat-card__value {
        color: var(--color-success);
      }
      .stat-card--warning .stat-card__value {
        color: var(--color-warning);
      }
      .stat-card--accent .stat-card__value {
        color: var(--color-accent);
      }

      .section {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 2rem;
      }

      .section__title {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .persona-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
      }

      .persona-card {
        background: var(--color-surface-elevated);
        border-radius: var(--radius-md);
        padding: 1rem;
        border-left: 3px solid var(--color-accent);
      }

      .persona-card__name {
        font-weight: 600;
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .persona-card__stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        font-size: 0.875rem;
      }

      .persona-card__stat {
        display: flex;
        flex-direction: column;
      }

      .persona-card__stat-label {
        color: var(--color-text-muted);
        font-size: 0.75rem;
      }

      .persona-card__stat-value {
        font-weight: 600;
      }

      .engagement-bar {
        height: 8px;
        background: var(--color-surface);
        border-radius: 4px;
        overflow: hidden;
        margin-top: 0.75rem;
      }

      .engagement-bar__fill {
        height: 100%;
        background: var(--color-accent);
        border-radius: 4px;
        transition: width 0.5s ease;
      }

      .loading {
        text-align: center;
        padding: 3rem;
        color: var(--color-text-muted);
      }

      .error {
        background: rgba(168, 109, 85, 0.2);
        border: 1px solid var(--color-error);
        border-radius: var(--radius-md);
        padding: 1rem;
        color: var(--color-error);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 0.25rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 500;
      }

      .badge--success {
        background: rgba(74, 103, 65, 0.2);
        color: var(--color-success);
      }

      .badge--warning {
        background: rgba(196, 133, 106, 0.2);
        color: var(--color-warning);
      }

      .refresh-btn {
        background: var(--color-surface-elevated);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: 0.5rem 1rem;
        color: var(--color-text-primary);
        font-family: inherit;
        font-size: 0.875rem;
        cursor: pointer;
        transition: background 0.2s;
      }

      .refresh-btn:hover {
        background: var(--color-surface);
      }

      @media (max-width: 640px) {
        body {
          padding: 1rem;
        }
        h1 {
          font-size: 1.5rem;
        }
        .stat-card__value {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <main id="main-content">
      <div class="container">
        <header>
          <h1>🎭 Cameo Analytics</h1>
          <p class="subtitle">Track how users engage with persona cameos</p>
        </header>

        <div id="content">
          <div class="loading">Loading cameo analytics...</div>
        </div>
      </div>

      <script>
        const PERSONA_NAMES = {
          'peter-john': { name: 'Peter', emoji: '📊' },
          'alex-chen': { name: 'Alex', emoji: '📱' },
          'maya-santos': { name: 'Maya', emoji: '🧘' },
          'jordan-taylor': { name: 'Jordan', emoji: '📅' },
          'nayan-patel': { name: 'Nayan', emoji: '🧠' },
        };

        async function loadAnalytics() {
          const content = document.getElementById('content');

          try {
            const response = await fetch('/api/cameo/analytics');
            if (!response.ok) {
              throw new Error(`API error: ${response.status}`);
            }

            const data = await response.json();
            renderDashboard(data);
          } catch (error) {
            content.innerHTML = `
          <div class="error">
            Failed to load cameo analytics: ${error.message}
          </div>
        `;
          }
        }

        function renderDashboard(data) {
          const content = document.getElementById('content');

          const engagementPercent = Math.round(data.overallEngagementRate * 100);
          const mostEngaging = data.mostEngagingPersona
            ? PERSONA_NAMES[data.mostEngagingPersona]
            : null;

          content.innerHTML = `
        <div class="dashboard-grid">
          <div class="stat-card stat-card--accent">
            <div class="stat-card__label">Total Cameos</div>
            <div class="stat-card__value">${data.totalCameos.toLocaleString()}</div>
            <div class="stat-card__subtitle">All-time cameo appearances</div>
          </div>
          
          <div class="stat-card stat-card--success">
            <div class="stat-card__label">Positive Responses</div>
            <div class="stat-card__value">${data.totalPositiveResponses.toLocaleString()}</div>
            <div class="stat-card__subtitle">${engagementPercent}% engagement rate</div>
          </div>
          
          <div class="stat-card">
            <div class="stat-card__label">Top Performer</div>
            <div class="stat-card__value">
              ${mostEngaging ? `${mostEngaging.emoji} ${mostEngaging.name}` : 'N/A'}
            </div>
            <div class="stat-card__subtitle">Most engaging persona</div>
          </div>
        </div>

        <div class="section">
          <h2 class="section__title">
            📈 Persona Performance
            <button class="refresh-btn" aria-label="Refresh data" onclick="loadAnalytics()">Refresh</button>
          </h2>
          <div class="persona-grid">
            ${renderPersonaCards(data.personaStats)}
          </div>
        </div>

        <p style="color: var(--color-text-muted); font-size: 0.875rem; text-align: center;">
          Last updated: ${new Date(data.updatedAt).toLocaleString()}
        </p>
      `;
        }

        function renderPersonaCards(stats) {
          if (!stats || stats.length === 0) {
            return '<p style="color: var(--color-text-muted);">No cameo data yet. Analytics will appear as users interact with cameos.</p>';
          }

          return stats
            .map((stat) => {
              const persona = PERSONA_NAMES[stat.personaId] || {
                name: stat.personaId,
                emoji: '🎭',
              };
              const engagementPercent = Math.round(stat.engagementRate * 100);
              const avgDuration = Math.round(stat.averageDurationMs / 1000);

              return `
          <div class="persona-card">
            <div class="persona-card__name">
              ${persona.emoji} ${persona.name}
              ${
                stat.totalCameos >= 10 && engagementPercent >= 70
                  ? '<span class="badge badge--success">Top</span>'
                  : ''
              }
            </div>
            <div class="persona-card__stats">
              <div class="persona-card__stat">
                <span class="persona-card__stat-label">Cameos</span>
                <span class="persona-card__stat-value">${stat.totalCameos}</span>
              </div>
              <div class="persona-card__stat">
                <span class="persona-card__stat-label">Engagement</span>
                <span class="persona-card__stat-value">${engagementPercent}%</span>
              </div>
              <div class="persona-card__stat">
                <span class="persona-card__stat-label">Avg Duration</span>
                <span class="persona-card__stat-value">${avgDuration}s</span>
              </div>
              <div class="persona-card__stat">
                <span class="persona-card__stat-label">Handoffs</span>
                <span class="persona-card__stat-value">${stat.handoffRequests}</span>
              </div>
            </div>
            <div class="engagement-bar">
              <div class="engagement-bar__fill" style="width: ${engagementPercent}%"></div>
            </div>
          </div>
        `;
            })
            .join('');
        }

        // Load on page load
        loadAnalytics();
      </script>
    </main>
  </body>
</html>
