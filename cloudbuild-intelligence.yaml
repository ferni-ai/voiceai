# Cloud Build - Intelligence Worker
#
# Builds and deploys the intelligence worker to Cloud Run.
# Processes pattern detection, predictive intelligence, and trust recording.
#
# Usage:
#   gcloud builds submit --config=cloudbuild-intelligence.yaml
#   ferni deploy intelligence

timeout: 1800s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: ferni-intelligence-worker
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '10'
  _MEMORY: 512Mi
  _CPU: '1'

steps:
  # Step 1: Build with Kaniko for layer caching
  - name: 'gcr.io/kaniko-project/executor:latest'
    id: 'build-image'
    args:
      - '--dockerfile=apps/intelligence-worker/Dockerfile'
      - '--context=dir://apps/intelligence-worker'
      - '--destination=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--destination=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '--cache=true'
      - '--cache-ttl=168h'
      - '--snapshot-mode=redo'
      - '--use-new-run'

  # Step 2: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=${_MIN_INSTANCES}'
      - '--max-instances=${_MAX_INSTANCES}'
      - '--memory=${_MEMORY}'
      - '--cpu=${_CPU}'
      - '--concurrency=80'
      - '--timeout=300s'
      - '--set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID'
      - '--port=8081'

  # Step 3: Create Pub/Sub subscription (if not exists)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'setup-pubsub'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Create topic if not exists
        gcloud pubsub topics describe intelligence-events --project=$PROJECT_ID 2>/dev/null || \
        gcloud pubsub topics create intelligence-events --project=$PROJECT_ID

        # Get Cloud Run service URL
        SERVICE_URL=$(gcloud run services describe ${_SERVICE_NAME} --region=${_REGION} --format='value(status.url)')

        # Create or update push subscription
        gcloud pubsub subscriptions describe intelligence-worker-push --project=$PROJECT_ID 2>/dev/null && \
        gcloud pubsub subscriptions update intelligence-worker-push \
          --push-endpoint="$SERVICE_URL/process-event" \
          --project=$PROJECT_ID || \
        gcloud pubsub subscriptions create intelligence-worker-push \
          --topic=intelligence-events \
          --push-endpoint="$SERVICE_URL/process-event" \
          --ack-deadline=60 \
          --message-retention-duration=1d \
          --project=$PROJECT_ID

        echo "✅ Pub/Sub subscription configured: $SERVICE_URL/process-event"

  # Step 4: Verify deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'verify-deployment'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_URL=$(gcloud run services describe ${_SERVICE_NAME} --region=${_REGION} --format='value(status.url)')
        echo "🔍 Verifying deployment at $SERVICE_URL/health"
        
        for i in 1 2 3 4 5; do
          if curl -sf "$SERVICE_URL/health" > /dev/null; then
            echo "✅ Intelligence worker is healthy!"
            curl -s "$SERVICE_URL/health" | jq .
            exit 0
          fi
          echo "Attempt $i failed, retrying in 5s..."
          sleep 5
        done
        
        echo "❌ Health check failed after 5 attempts"
        exit 1

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

tags:
  - 'intelligence-worker'
  - 'ferni'

