version: '3.8'

services:
  ferni-tts:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"  # Metrics
    environment:
      - FERNI_TTS_HOST=0.0.0.0
      - FERNI_TTS_PORT=8080
      - FERNI_TTS_LOG_LEVEL=debug
      - FERNI_TTS_JSON_LOGS=false
      - FERNI_TTS_BACKEND=mock
      - FERNI_TTS_METRICS=true
      - FERNI_TTS_METRICS_PORT=9090
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # CosyVoice backend (when available)
  cosy-voice:
    image: ferni/cosy-voice:latest
    ports:
      - "50051:50051"  # gRPC
      - "8081:8080"    # HTTP
    environment:
      - MODEL_PATH=/models
    volumes:
      - ./models:/models:ro
    profiles:
      - with-backend
    restart: unless-stopped

  # Development with CosyVoice
  ferni-tts-dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - FERNI_TTS_BACKEND=cosy_voice
      - COSY_VOICE_ENDPOINT=http://cosy-voice:50051
      - FERNI_TTS_LOG_LEVEL=debug
      - FERNI_TTS_JSON_LOGS=false
    depends_on:
      - cosy-voice
    profiles:
      - with-backend
    restart: unless-stopped
