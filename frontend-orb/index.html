<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanguard Personal Advisor</title>

  <!-- Mark Pro Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    @font-face {
      font-family: 'Mark Pro';
      src: url('/assets/fonts/MarkPro.woff2') format('woff2'),
           url('/assets/fonts/MarkPro.woff') format('woff');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Mark Pro';
      src: url('/assets/fonts/MarkPro-Medium.woff2') format('woff2'),
           url('/assets/fonts/MarkPro-Medium.woff') format('woff');
      font-weight: 500;
      font-style: normal;
    }

    @font-face {
      font-family: 'Mark Pro';
      src: url('/assets/fonts/MarkPro-Bold.woff2') format('woff2'),
           url('/assets/fonts/MarkPro-Bold.woff') format('woff');
      font-weight: 700;
      font-style: normal;
    }

    /* Fallback to Inter if Mark Pro not available */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Mark Pro', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
