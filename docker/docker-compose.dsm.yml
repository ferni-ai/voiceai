# ============================================================================
# Kyutai DSM sidecars: STT + TTS
# ============================================================================
# Two profiles:
#   1. `moshi-server` (default) — upstream Kyutai workers from crates.io
#   2. `kyutai-bridge` — Ferni's Rust/Candle bridge with real inference
#
# Build images (from repo root):
#   docker build -f docker/Dockerfile.dsm -t moshi-server:dsm .                     # upstream
#   docker build -f services/kyutai-bridge/Dockerfile -t kyutai-bridge:latest .      # bridge
#
# Run sidecars only:
#   docker compose -f docker/docker-compose.dsm.yml up -d
#
# Run with bridge instead:
#   docker compose -f docker/docker-compose.dsm.yml --profile bridge up -d
#
# Run with Ferni agent:
#   docker compose -f docker/docker-compose.dsm.yml up -d
#   USE_KYUTAI_STT=true KYUTAI_STT_URL=ws://localhost:8089/api/asr-streaming \
#   TTS_PROVIDER=kyutai KYUTAI_TTS_URL=ws://localhost:8090/api/tts_streaming pnpm dev
# ============================================================================

version: '3.8'

services:
  kyutai-stt:
    image: moshi-server:dsm
    build:
      context: .
      dockerfile: Dockerfile.dsm
    ports:
      - '8089:8089'
    volumes:
      - ../configs:/config:ro
    command: ['moshi-server', 'worker', '--config', '/config/kyutai-stt.toml']
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
      test: ['CMD-SHELL', 'curl -sf http://localhost:8089/health/ready || exit 1']

  kyutai-tts:
    image: moshi-server:dsm
    build:
      context: .
      dockerfile: Dockerfile.dsm
    ports:
      - '8090:8090'
    volumes:
      - ../configs:/config:ro
    command: ['moshi-server', 'worker', '--config', '/config/kyutai-tts.toml']
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
      test: ['CMD-SHELL', 'curl -sf http://localhost:8090/health/ready || exit 1']
