# Cloud Build Configuration for GCE Voice Agent Deployment
#
# This builds the voice agent for GCE with custom tag support.
# Used by: scripts/deploy-gce.ts
#
# Substitutions:
#   _IMAGE_TAG: Timestamp-based tag for the build

substitutions:
  _IMAGE_TAG: 'latest'

steps:
  # ============================================================================
  # Step 1: Pre-build Type Check (FAIL FAST)
  # ============================================================================
  # Catches type errors BEFORE expensive Docker build (~5 min saved on failure)
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        corepack enable && corepack prepare pnpm@10.29.3 --activate
        pnpm install --prefer-offline --frozen-lockfile
        echo "=== Running type check ==="
        pnpm typecheck || (echo "❌ Type check failed! Fix errors before deploying." && exit 1)
        echo "✅ Type check passed"
    id: 'typecheck'

  # ============================================================================
  # Step 2: Build with Kaniko for efficient caching
  # ============================================================================
  - name: 'gcr.io/kaniko-project/executor:latest'
    waitFor: ['typecheck']
    args:
      - '--dockerfile=docker/Dockerfile.agent'
      - '--destination=gcr.io/$PROJECT_ID/voiceai-agent:${_IMAGE_TAG}'
      - '--destination=gcr.io/$PROJECT_ID/voiceai-agent:latest'
      - '--cache=true'
      - '--cache-ttl=168h'
      - '--snapshot-mode=redo'
      - '--use-new-run'
      - '--push-retry=3'
    id: 'build-agent'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s' # 20 minutes (with Kaniko caching, builds ~5 min)

