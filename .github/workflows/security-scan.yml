name: Security Scan

# Scans for security vulnerabilities in dependencies and code
# Runs daily and on PRs

on:
  schedule:
    # Daily at 6 AM UTC
    - cron: '0 6 * * *'
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.js'
      - 'package*.json'
      - 'apps/web/package*.json'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # Dependency vulnerability scan
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Audit backend dependencies
        id: backend-audit
        run: |
          echo "## Backend Dependencies" >> $GITHUB_STEP_SUMMARY
          pnpm audit --json > /tmp/backend-audit.json 2>/dev/null || true

          CRITICAL=$(jq '.advisories | to_entries | map(select(.value.severity == "critical")) | length // 0' /tmp/backend-audit.json 2>/dev/null || echo "0")
          HIGH=$(jq '.advisories | to_entries | map(select(.value.severity == "high")) | length // 0' /tmp/backend-audit.json 2>/dev/null || echo "0")
          MODERATE=$(jq '.advisories | to_entries | map(select(.value.severity == "moderate")) | length // 0' /tmp/backend-audit.json 2>/dev/null || echo "0")

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| Moderate | $MODERATE |" >> $GITHUB_STEP_SUMMARY

      - name: Audit frontend dependencies
        id: frontend-audit
        run: |
          cd apps/web
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Frontend Dependencies" >> $GITHUB_STEP_SUMMARY
          pnpm audit --json > /tmp/frontend-audit.json 2>/dev/null || true

          CRITICAL=$(jq '.advisories | to_entries | map(select(.value.severity == "critical")) | length // 0' /tmp/frontend-audit.json 2>/dev/null || echo "0")
          HIGH=$(jq '.advisories | to_entries | map(select(.value.severity == "high")) | length // 0' /tmp/frontend-audit.json 2>/dev/null || echo "0")
          MODERATE=$(jq '.advisories | to_entries | map(select(.value.severity == "moderate")) | length // 0' /tmp/frontend-audit.json 2>/dev/null || echo "0")

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| Moderate | $MODERATE |" >> $GITHUB_STEP_SUMMARY

      - name: Check for critical vulnerabilities
        continue-on-error: true
        run: |
          BACKEND_CRITICAL=${{ steps.backend-audit.outputs.critical }}
          BACKEND_HIGH=${{ steps.backend-audit.outputs.high }}
          FRONTEND_CRITICAL=${{ steps.frontend-audit.outputs.critical }}
          FRONTEND_HIGH=${{ steps.frontend-audit.outputs.high }}

          TOTAL_CRITICAL=$((${BACKEND_CRITICAL:-0} + ${FRONTEND_CRITICAL:-0}))
          TOTAL_HIGH=$((${BACKEND_HIGH:-0} + ${FRONTEND_HIGH:-0}))

          if [ "$TOTAL_CRITICAL" -gt 0 ]; then
            echo "❌ Found $TOTAL_CRITICAL critical vulnerabilities!"
            exit 1
          fi

          if [ "$TOTAL_HIGH" -gt 5 ]; then
            echo "⚠️ Found $TOTAL_HIGH high-severity vulnerabilities (threshold: 5)"
            exit 1
          fi

          echo "✅ Security audit passed"

      - name: Alert on vulnerabilities (scheduled runs only)
        if: github.event_name == 'schedule' && (steps.backend-audit.outputs.critical > 0 || steps.frontend-audit.outputs.critical > 0)
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "🔒 *Security Alert*: Critical vulnerabilities found in dependencies. Run `npm audit` for details."
            }'

  # CodeQL static analysis
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # Secret scanning (check for accidentally committed secrets)
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          # Get the latest release tag dynamically instead of hardcoding version
          GITLEAKS_VERSION=$(curl -sI https://github.com/gitleaks/gitleaks/releases/latest | grep -i '^location:' | sed 's|.*/v||;s/\r//')
          echo "Installing gitleaks v${GITLEAKS_VERSION}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks
          gitleaks version
        continue-on-error: true

      - name: Run Gitleaks
        run: |
          gitleaks detect --source . --verbose --no-banner 2>&1 || true
          echo "Secret scan complete (non-blocking)"
