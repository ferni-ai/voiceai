name: Brand Compliance

on:
  pull_request:
    paths:
      - 'apps/web/src/**'
      - 'src/**'
      - 'design-system/**'
      - 'brand/**'
  push:
    branches:
      - main
    paths:
      - 'apps/web/src/**'
      - 'src/**'
      - 'design-system/**'

concurrency:
  group: brand-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-brand:
    name: Brand Compliance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run brand compliance linter
        id: brand-lint
        run: pnpm tsx apps/cli/src/commands/quality/lint-brand.ts
        continue-on-error: true
        
      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.brand-lint.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            // Run linter and capture output
            let output;
            try {
              output = execSync('pnpm tsx apps/cli/src/commands/quality/lint-brand.ts 2>&1', { encoding: 'utf-8' });
            } catch (e) {
              output = e.stdout || e.message;
            }

            // Truncate output to prevent exceeding GitHub's 65536 char limit
            const MAX_OUTPUT_CHARS = 50000;
            let truncatedOutput = output;
            let truncatedNote = '';
            if (output.length > MAX_OUTPUT_CHARS) {
              truncatedOutput = output.substring(0, MAX_OUTPUT_CHARS);
              const remainingCount = output.split('\n').length - truncatedOutput.split('\n').length;
              truncatedNote = `\n\n... (truncated, ${remainingCount}+ more violations. Run \`pnpm tsx apps/cli/src/commands/quality/lint-brand.ts\` locally for full output)`;
            }

            const comment = `## 🎨 Brand Compliance Check Failed

            The following brand guideline violations were found:

            \`\`\`
            ${truncatedOutput}${truncatedNote}
            \`\`\`

            Please fix these issues before merging. See \`brand/FERNI-BRAND-GUIDELINES.md\` for details.

            ### Quick Reference
            - Use \`createLogger()\` instead of \`console.log\`
            - Use CSS variables instead of hardcoded colors
            - Use \`DURATION\` and \`EASING\` constants for animations
            - Use Lucide icons instead of emoji
            - Add HMR cleanup to UI components
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            
      - name: Report brand lint status
        if: steps.brand-lint.outcome == 'failure'
        run: |
          echo "::warning::Brand compliance check found violations. See PR comment for details."
          echo "Note: Brand compliance is currently non-blocking to address pre-existing tech debt."
          echo "Please address violations when possible. See brand/FERNI-BRAND-GUIDELINES.md"

  lint-tokens:
    name: Token Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build design tokens
        run: |
          cd design-system
          pnpm install --frozen-lockfile
          pnpm build
          
      - name: Verify token outputs
        run: |
          # Check that all token files were generated
          test -f design-system/dist/tokens.css || (echo "Missing tokens.css" && exit 1)
          test -f design-system/dist/tokens.ts || (echo "Missing tokens.ts" && exit 1)
          echo "✅ Token files generated successfully"

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install Playwright
        run: pnpm playwright install --with-deps chromium

      - name: Build frontend
        run: |
          cd apps/web
          pnpm install --frozen-lockfile
          pnpm build

      - name: Run visual regression tests
        run: |
          cd apps/web
          pnpm test:visual || true
        continue-on-error: true
        
      - name: Upload visual diff artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diff
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 7

  accessibility:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install Playwright
        run: pnpm playwright install --with-deps chromium
        
      - name: Build frontend
        run: |
          cd apps/web
          pnpm install --frozen-lockfile
          pnpm build
          
      - name: Run accessibility tests
        run: |
          cd apps/web
          pnpm test:a11y || true
        continue-on-error: true
        
      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: apps/web/a11y-report/
          retention-days: 7

