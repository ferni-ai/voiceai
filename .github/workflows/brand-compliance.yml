name: Brand Compliance

on:
  pull_request:
    paths:
      - 'frontend-typescript/src/**'
      - 'src/**'
      - 'design-system/**'
      - 'brand/**'
  push:
    branches:
      - main
    paths:
      - 'frontend-typescript/src/**'
      - 'src/**'
      - 'design-system/**'

concurrency:
  group: brand-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint-brand:
    name: Brand Compliance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run brand compliance linter
        id: brand-lint
        run: pnpm tsx apps/cli/src/commands/quality/lint-brand.ts
        continue-on-error: true
        
      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.brand-lint.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            
            // Run linter and capture output
            let output;
            try {
              output = execSync('pnpm tsx apps/cli/src/commands/quality/lint-brand.ts 2>&1', { encoding: 'utf-8' });
            } catch (e) {
              output = e.stdout || e.message;
            }
            
            const comment = `## 🎨 Brand Compliance Check Failed
            
            The following brand guideline violations were found:
            
            \`\`\`
            ${output}
            \`\`\`
            
            Please fix these issues before merging. See \`brand/FERNI-BRAND-GUIDELINES.md\` for details.
            
            ### Quick Reference
            - Use \`createLogger()\` instead of \`console.log\`
            - Use CSS variables instead of hardcoded colors
            - Use \`DURATION\` and \`EASING\` constants for animations
            - Use Lucide icons instead of emoji
            - Add HMR cleanup to UI components
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            
      - name: Fail if brand lint failed
        if: steps.brand-lint.outcome == 'failure'
        run: exit 1

  lint-tokens:
    name: Token Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Build design tokens
        run: |
          cd design-system
          pnpm install --frozen-lockfile
          pnpm build
          
      - name: Verify token outputs
        run: |
          # Check that all token files were generated
          test -f design-system/dist/tokens.css || (echo "Missing tokens.css" && exit 1)
          test -f design-system/dist/tokens.ts || (echo "Missing tokens.ts" && exit 1)
          echo "✅ Token files generated successfully"

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Install Playwright
        run: pnpm playwright install --with-deps chromium
        
      - name: Build frontend
        run: |
          cd frontend-typescript
          pnpm install --frozen-lockfile
          pnpm build
          
      - name: Run visual regression tests
        run: |
          cd frontend-typescript
          pnpm test:visual || true
        continue-on-error: true
        
      - name: Upload visual diff artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diff
          path: |
            frontend-typescript/test-results/
            frontend-typescript/playwright-report/
          retention-days: 7

  accessibility:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Install Playwright
        run: pnpm playwright install --with-deps chromium
        
      - name: Build frontend
        run: |
          cd frontend-typescript
          pnpm install --frozen-lockfile
          pnpm build
          
      - name: Run accessibility tests
        run: |
          cd frontend-typescript
          pnpm test:a11y || true
        continue-on-error: true
        
      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: frontend-typescript/a11y-report/
          retention-days: 7

