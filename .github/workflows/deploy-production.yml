name: Deploy Production (Blue-Green)

# ============================================================================
# BLUE-GREEN DEPLOYMENT PIPELINE
# ============================================================================
#
# BLUE-GREEN STRATEGY:
# ┌─────────────────────────────────────────────────────────────────────────┐
# │                                                                         │
# │   CURRENT STATE           DEPLOY GREEN         TRAFFIC SHIFT           │
# │   ┌─────────┐            ┌─────────┐          ┌─────────┐              │
# │   │  BLUE   │──100%──>   │  BLUE   │──100%    │  BLUE   │──0%         │
# │   │(current)│            │         │          │         │              │
# │   └─────────┘            └─────────┘          └─────────┘              │
# │                          ┌─────────┐          ┌─────────┐              │
# │                          │  GREEN  │──0%      │  GREEN  │──100%       │
# │                          │ (new)   │          │ (new)   │              │
# │                          └─────────┘          └─────────┘              │
# │                                                                         │
# │   1. Deploy new revision as "green" with NO traffic                    │
# │   2. Health check green revision                                       │
# │   3. If healthy: shift 100% traffic to green                          │
# │   4. If unhealthy: keep traffic on blue, delete green                 │
# │   5. Cleanup old revisions (prevent zombies)                          │
# │                                                                         │
# └─────────────────────────────────────────────────────────────────────────┘
#
# PIPELINE STAGES:
# 1. Prepare  → Validate secrets, determine services
# 2. Test     → Type check, unit tests, build
# 3. Build    → Docker images (parallel, cached)
# 4. Deploy   → Blue-green with health checks
# 5. Verify   → Smoke tests
# 6. Notify   → Slack, DORA metrics
#
# ============================================================================

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - voice-agent
          - ui-server
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        type: boolean
        default: false
      traffic_percent:
        description: 'Traffic % to new revision (canary)'
        type: number
        default: 100

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  # Docker registries
  REGISTRY: gcr.io
  VOICE_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/ferni-voice-agent
  UI_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/john-bogle-ui

jobs:
  # ============================================================================
  # STAGE 1: VALIDATE & PREPARE
  # ============================================================================
  prepare:
    name: 🔍 Validate & Prepare
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      deploy_voice: ${{ steps.services.outputs.voice }}
      deploy_ui: ${{ steps.services.outputs.ui }}
      version: ${{ steps.meta.outputs.version }}
    
    steps:
      - name: Validate secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.GCP_SA_KEY }}" ] && MISSING="$MISSING GCP_SA_KEY"
          [ -z "${{ secrets.GCP_PROJECT_ID }}" ] && MISSING="$MISSING GCP_PROJECT_ID"
          
          if [ -n "$MISSING" ]; then
            echo "❌ Missing secrets:$MISSING"
            exit 1
          fi
          echo "✅ All secrets configured"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate metadata
        id: meta
        run: |
          echo "short_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "version=$(date +%Y%m%d)-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Determine services to deploy
        id: services
        run: |
          INPUT="${{ github.event.inputs.service }}"
          if [[ "$INPUT" == "all" || "$INPUT" == "" ]]; then
            echo "voice=true" >> $GITHUB_OUTPUT
            echo "ui=true" >> $GITHUB_OUTPUT
          elif [[ "$INPUT" == "voice-agent" ]]; then
            echo "voice=true" >> $GITHUB_OUTPUT
            echo "ui=false" >> $GITHUB_OUTPUT
          else
            echo "voice=false" >> $GITHUB_OUTPUT
            echo "ui=true" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # STAGE 2: BUILD & TEST
  # ============================================================================
  build-test:
    name: 🧪 Build & Test
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ !inputs.skip_tests }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deployment safety check
        run: |
          echo "🔍 Scanning for unsafe deployment patterns..."
          npx tsx apps/cli/src/commands/quality/check-deploy-safety.ts --all || {
            echo "❌ Unsafe deployment patterns detected!"
            echo "Direct gcloud/firebase commands are forbidden."
            echo "Use 'ferni deploy' CLI instead."
            exit 1
          }
          echo "✅ Deployment safety passed"

      - name: Type check
        run: pnpm typecheck
        continue-on-error: true

      - name: Run tests
        run: pnpm test -- --reporter=dot
        continue-on-error: true
        env:
          NODE_ENV: test

      - name: Build backend
        run: pnpm build:fast

      - name: Build design-system
        run: node design-system/build.js

      - name: Build frontend
        run: |
          cd frontend-typescript
          pnpm install --frozen-lockfile
          pnpm build

  # ============================================================================
  # STAGE 3A: BUILD VOICE AGENT DOCKER IMAGE
  # ============================================================================
  build-voice-image:
    name: 🐳 Build Voice Agent Image
    runs-on: ubuntu-latest
    needs: [prepare]
    if: ${{ needs.prepare.outputs.deploy_voice == 'true' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.agent
          push: true
          tags: |
            ${{ env.VOICE_IMAGE }}:${{ github.sha }}
            ${{ env.VOICE_IMAGE }}:${{ needs.prepare.outputs.short_sha }}
            ${{ env.VOICE_IMAGE }}:latest
          cache-from: type=gha,scope=voice-agent
          cache-to: type=gha,scope=voice-agent,mode=max
          build-args: |
            NODE_VERSION=20

      - name: Image summary
        run: |
          echo "### 🐳 Voice Agent Image Built" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.VOICE_IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Short tag:** \`${{ needs.prepare.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # STAGE 3B: BUILD UI SERVER DOCKER IMAGE
  # ============================================================================
  build-ui-image:
    name: 🐳 Build UI Server Image
    runs-on: ubuntu-latest
    needs: [prepare]
    if: ${{ needs.prepare.outputs.deploy_ui == 'true' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm (for design-system build)
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Build design-system (required for Docker)
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          node design-system/build.js

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ui
          push: true
          tags: |
            ${{ env.UI_IMAGE }}:${{ github.sha }}
            ${{ env.UI_IMAGE }}:${{ needs.prepare.outputs.short_sha }}
            ${{ env.UI_IMAGE }}:latest
          cache-from: type=gha,scope=ui-server
          cache-to: type=gha,scope=ui-server,mode=max
          build-args: |
            NODE_VERSION=20

      - name: Image summary
        run: |
          echo "### 🐳 UI Server Image Built" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.UI_IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # STAGE 4A: DEPLOY VOICE AGENT (Blue-Green)
  # ============================================================================
  # BLUE-GREEN STRATEGY:
  # 1. Deploy new "green" revision with --no-traffic
  # 2. Health check green revision
  # 3. If healthy: shift traffic blue→green (100%)
  # 4. If unhealthy: delete green, keep blue
  # 5. Cleanup zombie revisions (critical for LiveKit)
  # ============================================================================
  deploy-voice:
    name: 🔵🟢 Deploy Voice Agent (Blue-Green)
    runs-on: ubuntu-latest
    needs: [prepare, build-test, build-voice-image]
    # Run if build-test succeeded OR was skipped (emergency deploy)
    if: |
      always() && 
      needs.prepare.outputs.deploy_voice == 'true' &&
      needs.build-voice-image.result == 'success' &&
      (needs.build-test.result == 'success' || needs.build-test.result == 'skipped')
    outputs:
      revision: ${{ steps.deploy.outputs.revision }}
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: 🟢 Deploy GREEN revision (no traffic)
        id: deploy
        run: |
          REVISION_SUFFIX=${{ needs.prepare.outputs.short_sha }}
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔵🟢 BLUE-GREEN DEPLOYMENT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🟢 Deploying GREEN revision with NO traffic..."
          echo ""
          
          gcloud run deploy voiceai-agent \
            --image ${{ env.VOICE_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --no-traffic \
            --tag green \
            --revision-suffix $REVISION_SUFFIX \
            --memory 2Gi \
            --cpu 2 \
            --timeout 3600 \
            --concurrency 1 \
            --min-instances 0 \
            --max-instances 20 \
            --set-env-vars "NODE_ENV=production,BUILD_SHA=${{ github.sha }}" \
            --set-secrets "GOOGLE_API_KEY=google-api-key:latest,CARTESIA_API_KEY=cartesia-api-key:latest,LIVEKIT_URL=livekit-url:latest,LIVEKIT_API_KEY=livekit-api-key:latest,LIVEKIT_API_SECRET=livekit-api-secret:latest"
          
          REVISION=$(gcloud run revisions list --service=voiceai-agent --region=${{ env.GCP_REGION }} --format="value(REVISION)" --limit=1)
          URL=$(gcloud run services describe voiceai-agent --region=${{ env.GCP_REGION }} --format="value(status.url)")
          
          echo "revision=$REVISION" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed revision: $REVISION"

      - name: 🏥 Health check GREEN revision
        id: health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🏥 HEALTH CHECK - GREEN revision must be healthy before traffic shift"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔗 URL: $URL/health"
          echo ""
          
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed!"
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "  Attempt $i: HTTP $HTTP_CODE, retrying in 10s..."
            sleep 10
          done
          
          echo "❌ Health check failed after 10 attempts"
          echo "healthy=false" >> $GITHUB_OUTPUT

      - name: 🔀 Shift traffic BLUE → GREEN
        if: steps.health.outputs.healthy == 'true'
        run: |
          TRAFFIC=${{ inputs.traffic_percent || 100 }}
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔀 TRAFFIC SHIFT - Moving traffic from BLUE to GREEN"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ "$TRAFFIC" = "100" ]; then
            echo "🔵 BLUE (current) → 0%"
            echo "🟢 GREEN (new)    → 100%"
            echo ""
            gcloud run services update-traffic voiceai-agent \
              --region=${{ env.GCP_REGION }} \
              --to-latest
            echo ""
            echo "✅ Traffic shift complete! GREEN is now live."
          else
            echo "🔵 BLUE (current) → $((100-TRAFFIC))%"
            echo "🟢 GREEN (new)    → $TRAFFIC%"
            echo ""
            gcloud run services update-traffic voiceai-agent \
              --region=${{ env.GCP_REGION }} \
              --to-tags green=$TRAFFIC
            echo ""
            echo "✅ Canary deployment: $TRAFFIC% traffic on GREEN"
          fi

      - name: 🧹 Cleanup old BLUE revision (prevent zombies)
        if: steps.health.outputs.healthy == 'true'
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧹 CLEANUP - Delete old revisions to prevent zombie workers"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  Old revisions with min-instances can stay alive even with 0% traffic"
          echo "⚠️  For LiveKit, these 'zombies' register and receive job dispatches!"
          echo ""
          
          sleep 5
          
          CURRENT=$(gcloud run services describe voiceai-agent \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.traffic[0].revisionName)')
          
          echo "🟢 Active GREEN revision: $CURRENT"
          echo ""
          
          DELETED=0
          for rev in $(gcloud run revisions list --service=voiceai-agent --region=${{ env.GCP_REGION }} --format='value(name)'); do
            if [ "$rev" != "$CURRENT" ]; then
              echo "🔵 Deleting old BLUE: $rev"
              if gcloud run revisions delete $rev --region=${{ env.GCP_REGION }} --quiet 2>/dev/null; then
                DELETED=$((DELETED + 1))
              else
                echo "   (could not delete - may be marked as 'latest')"
              fi
            fi
          done
          
          echo ""
          echo "✅ Cleanup complete: deleted $DELETED old revision(s)"

      - name: ⏪ Rollback - Keep traffic on BLUE
        if: steps.health.outputs.healthy != 'true'
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⏪ ROLLBACK - GREEN failed health check, keeping traffic on BLUE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔵 BLUE remains at 100% (unchanged)"
          echo "🟢 GREEN will be deleted"
          echo ""
          gcloud run services update-traffic voiceai-agent \
            --region=${{ env.GCP_REGION }} \
            --remove-tags green || true
          echo ""
          echo "❌ Deployment failed - no impact to production (blue-green rollback)"
          exit 1

  # ============================================================================
  # STAGE 4B: DEPLOY UI SERVER (Blue-Green)
  # ============================================================================
  # BLUE-GREEN STRATEGY: Same as voice agent
  # ============================================================================
  deploy-ui:
    name: 🔵🟢 Deploy UI Server (Blue-Green)
    runs-on: ubuntu-latest
    needs: [prepare, build-test, build-ui-image]
    if: |
      always() && 
      needs.prepare.outputs.deploy_ui == 'true' &&
      needs.build-ui-image.result == 'success' &&
      (needs.build-test.result == 'success' || needs.build-test.result == 'skipped')
    outputs:
      revision: ${{ steps.deploy.outputs.revision }}
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy green revision (no traffic)
        id: deploy
        run: |
          REVISION_SUFFIX=${{ needs.prepare.outputs.short_sha }}
          
          gcloud run deploy john-bogle-ui \
            --image ${{ env.UI_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --no-traffic \
            --tag green \
            --revision-suffix $REVISION_SUFFIX \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300 \
            --concurrency 80 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "NODE_ENV=production,BUILD_SHA=${{ github.sha }}"
          
          REVISION=$(gcloud run revisions list --service=john-bogle-ui --region=${{ env.GCP_REGION }} --format="value(REVISION)" --limit=1)
          URL=$(gcloud run services describe john-bogle-ui --region=${{ env.GCP_REGION }} --format="value(status.url)")
          
          echo "revision=$REVISION" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Health check green revision
        id: health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          
          for i in {1..10}; do
            if curl -sf "$URL/health" > /dev/null 2>&1; then
              echo "✅ Health check passed!"
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          
          echo "healthy=false" >> $GITHUB_OUTPUT

      - name: Shift traffic to green
        if: steps.health.outputs.healthy == 'true'
        run: |
          TRAFFIC=${{ inputs.traffic_percent || 100 }}
          
          if [ "$TRAFFIC" = "100" ]; then
            gcloud run services update-traffic john-bogle-ui \
              --region=${{ env.GCP_REGION }} \
              --to-latest
          else
            gcloud run services update-traffic john-bogle-ui \
              --region=${{ env.GCP_REGION }} \
              --to-tags green=$TRAFFIC
          fi

      - name: Rollback on failure
        if: steps.health.outputs.healthy != 'true'
        run: |
          gcloud run services update-traffic john-bogle-ui \
            --region=${{ env.GCP_REGION }} \
            --remove-tags green || true
          exit 1

  # ============================================================================
  # STAGE 5: POST-DEPLOY VERIFICATION
  # ============================================================================
  verify:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: [prepare, deploy-voice, deploy-ui]
    if: always() && (needs.deploy-voice.result == 'success' || needs.deploy-ui.result == 'success')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke tests
        run: |
          if [ -f "apps/cli/src/commands/test/smoke-test.ts" ]; then
            npx tsx apps/cli/src/commands/test/smoke-test.ts
          else
            echo "No smoke tests found, skipping"
          fi
        continue-on-error: true

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status | Revision |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|----------|" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.deploy-voice.result }}" == "success" ]]; then
            echo "| Voice Agent | ✅ Success | \`${{ needs.deploy-voice.outputs.revision }}\` |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.deploy-voice.result }}" == "failure" ]]; then
            echo "| Voice Agent | ❌ Failed | - |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Voice Agent | ⏭️ Skipped | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ needs.deploy-ui.result }}" == "success" ]]; then
            echo "| UI Server | ✅ Success | \`${{ needs.deploy-ui.outputs.revision }}\` |" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.deploy-ui.result }}" == "failure" ]]; then
            echo "| UI Server | ❌ Failed | - |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| UI Server | ⏭️ Skipped | - |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # STAGE 6: NOTIFICATIONS & METRICS
  # ============================================================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [prepare, deploy-voice, deploy-ui, verify]
    if: always()
    
    steps:
      - name: Determine status
        id: status
        run: |
          VOICE="${{ needs.deploy-voice.result }}"
          UI="${{ needs.deploy-ui.result }}"
          
          if [[ "$VOICE" == "failure" || "$UI" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          elif [[ "$VOICE" == "success" || "$UI" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "emoji=⏭️" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "attachments": [{
                "color": "${{ steps.status.outputs.color }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${{ steps.status.outputs.emoji }} Ferni Deploy: ${{ steps.status.outputs.status }}"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {"type": "mrkdwn", "text": "*Voice:* ${{ needs.deploy-voice.result }}"},
                      {"type": "mrkdwn", "text": "*UI:* ${{ needs.deploy-ui.result }}"},
                      {"type": "mrkdwn", "text": "*Commit:* `${{ needs.prepare.outputs.short_sha }}`"},
                      {"type": "mrkdwn", "text": "*By:* ${{ github.actor }}"}
                    ]
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {"type": "plain_text", "text": "View Run"},
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      }
                    ]
                  }
                ]
              }]
            }' || true

      - name: Track DORA metrics
        if: ${{ env.DORA_API_URL != '' && env.DORA_API_KEY != '' }}
        env:
          DORA_API_URL: ${{ secrets.DORA_API_URL }}
          DORA_API_KEY: ${{ secrets.DORA_API_KEY }}
        run: |
          curl -X POST "$DORA_API_URL/deployments" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DORA_API_KEY" \
            -d '{
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
              "commitSha": "${{ github.sha }}",
              "environment": "production",
              "success": ${{ steps.status.outputs.status == 'success' }},
              "triggeredBy": "${{ github.actor }}"
            }' || true
