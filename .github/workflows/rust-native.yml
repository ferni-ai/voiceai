name: Rust Native Modules

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/rust-perf/**'
      - 'apps/rust-audio/**'
      - 'apps/rust-omni/**'
      - 'crates/ferni-tts-core/**'
      - '.github/workflows/rust-native.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/rust-perf/**'
      - 'apps/rust-audio/**'
      - 'apps/rust-omni/**'
      - 'crates/ferni-tts-core/**'
      - '.github/workflows/rust-native.yml'

env:
  RUST_VERSION: 'stable'
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # RUST TESTS (Fast - runs on Linux only)
  # ============================================================================
  test:
    name: Test Rust Crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/rust-perf/target/
            apps/rust-audio/target/
            apps/rust-omni/target/
            crates/ferni-tts-core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # NAPI crates can't link test binaries (undefined napi_* symbols).
      # Use `cargo check` for compile verification; integration tests run in Verify job via Node.js.
      - name: Check rust-perf (compile)
        working-directory: apps/rust-perf
        run: cargo check --release --lib

      # Run pure Rust tests (Candle pipeline: Thinker, Talker, Code2Wav, MoE, Mel, full pipeline)
      # --no-default-features disables NAPI so tests can build without Node.js bindings
      - name: Test rust-perf (unit tests)
        working-directory: apps/rust-perf
        run: cargo test --no-default-features --lib -- --test-threads=1
        timeout-minutes: 5

      # Run Candle pipeline integration tests (Thinker → Talker → Code2Wav shape chain)
      - name: Test rust-perf (integration tests)
        working-directory: apps/rust-perf
        run: cargo test --no-default-features --test pipeline_integration -- --test-threads=1
        timeout-minutes: 5

      - name: Check rust-audio (compile)
        working-directory: apps/rust-audio
        run: cargo check --release --lib

      - name: Check rust-omni (compile)
        working-directory: apps/rust-omni
        run: cargo check --release --lib

  # ============================================================================
  # BUILD NATIVE MODULES (Multi-platform matrix)
  # ============================================================================
  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (production - GCE)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node_arch: linux-x64

          # macOS ARM64 (development - M-series Macs)
          - os: macos-latest
            target: aarch64-apple-darwin
            node_arch: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/rust-perf/target/
            apps/rust-audio/target/
            apps/rust-omni/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Install napi-cli
        run: pnpm add -g @napi-rs/cli

      # Build rust-perf
      - name: Build rust-perf
        working-directory: apps/rust-perf
        run: |
          pnpm install
          napi build --platform --release --target ${{ matrix.target }}

      # Build rust-audio
      - name: Build rust-audio
        working-directory: apps/rust-audio
        run: |
          pnpm install
          napi build --platform --release --target ${{ matrix.target }}

      # Build rust-omni (depends on rust-perf + rust-audio + ferni-tts-core)
      - name: Build rust-omni
        working-directory: apps/rust-omni
        run: |
          pnpm install
          napi build --platform --release --target ${{ matrix.target }}

      # Upload artifacts
      - name: Upload rust-perf artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-perf-${{ matrix.node_arch }}
          path: apps/rust-perf/*.node
          if-no-files-found: error

      - name: Upload rust-audio artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-audio-${{ matrix.node_arch }}
          path: apps/rust-audio/*.node
          if-no-files-found: warn

      - name: Upload rust-omni artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-omni-${{ matrix.node_arch }}
          path: apps/rust-omni/*.node
          if-no-files-found: warn

  # ============================================================================
  # VERIFY INTEGRATION (Test that bindings work in Node.js)
  # ============================================================================
  verify:
    name: Verify Node.js Integration
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Download rust-perf artifact
        uses: actions/download-artifact@v4
        with:
          name: rust-perf-linux-x64
          path: apps/rust-perf/

      - name: Download rust-audio artifact
        uses: actions/download-artifact@v4
        with:
          name: rust-audio-linux-x64
          path: apps/rust-audio/
        continue-on-error: true

      - name: Download rust-omni artifact
        uses: actions/download-artifact@v4
        with:
          name: rust-omni-linux-x64
          path: apps/rust-omni/
        continue-on-error: true

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify rust-perf loads
        run: node -e "const p = require('./apps/rust-perf'); console.log('rust-perf exports:', Object.keys(p));"

      - name: Verify rust-audio loads
        run: node -e "try { const a = require('./apps/rust-audio'); console.log('rust-audio exports:', Object.keys(a)); } catch(e) { console.log('rust-audio not available'); }"
        continue-on-error: true

      - name: Verify rust-omni loads
        run: |
          node -e "
            try {
              const omni = require('./apps/rust-omni');
              console.log('rust-omni exports:', Object.keys(omni));
              if (typeof omni.OmniEngine !== 'function') {
                throw new Error('OmniEngine not found');
              }
              console.log('✅ rust-omni verified: OmniEngine constructor available');
            } catch (e) {
              console.log('⚠️ rust-omni verification skipped:', e.message);
            }
          "
        continue-on-error: true

      - name: Verify native module APIs
        run: |
          node -e "
            const perf = require('./apps/rust-perf');

            // Verify @ferni/perf core functions exist
            const expectedPerf = ['getLibraryInfo', 'cosineSimilarity', 'batchCosineSimilarity'];
            for (const fn of expectedPerf) {
              if (typeof perf[fn] !== 'function') {
                throw new Error('@ferni/perf missing function: ' + fn);
              }
            }

            // Verify library info structure
            const info = perf.getLibraryInfo();
            if (!info.version || typeof info.simdAvailable !== 'boolean') {
              throw new Error('Invalid @ferni/perf library info');
            }

            console.log('✅ @ferni/perf verified:', info.version, 'SIMD:', info.simdAvailable);
          "

      - name: Verify rust-audio APIs
        run: |
          node -e "
            try {
              const audio = require('./apps/rust-audio');

              // Verify @ferni/audio FFT functions
              const expectedAudio = ['getLibraryInfo', 'fftF32', 'applyHanningWindow', 'analyzeSpectrum'];
              for (const fn of expectedAudio) {
                if (typeof audio[fn] !== 'function') {
                  console.warn('@ferni/audio missing function: ' + fn);
                }
              }

              // Test FFT with sample data
              const samples = new Float32Array(256);
              for (let i = 0; i < 256; i++) {
                samples[i] = Math.sin(2 * Math.PI * 440 * i / 44100);
              }

              const result = audio.analyzeSpectrum(samples, 44100);

              // Verify field names match TypeScript interface (critical fix verification)
              if (result.centroid === undefined) throw new Error('Missing centroid field');
              if (result.rolloff === undefined) throw new Error('Missing rolloff field');
              if (result.dominantFrequency === undefined) throw new Error('Missing dominantFrequency field');
              if (result.dominantMagnitude === undefined) throw new Error('Missing dominantMagnitude field');
              if (result.bandEnergies === undefined) throw new Error('Missing bandEnergies field');

              // Verify bandEnergies has 7 elements
              if (result.bandEnergies.length !== 7) {
                throw new Error('bandEnergies should have 7 elements, got: ' + result.bandEnergies.length);
              }

              console.log('✅ @ferni/audio verified - FFT field names correct');
              console.log('   centroid:', result.centroid.toFixed(2), 'Hz');
              console.log('   bandEnergies:', result.bandEnergies.length, 'bands');
            } catch (e) {
              console.log('⚠️ @ferni/audio verification skipped:', e.message);
            }
          "
        continue-on-error: true

      - name: Run native FFT E2E tests
        run: |
          pnpm build:fast || true
          pnpm vitest run src/speech/fft-analyzer/__tests__/native-fft-e2e.test.ts --reporter=verbose
        env:
          NODE_ENV: test
        continue-on-error: true

      - name: Run Qwen3-Omni E2E tests
        run: |
          pnpm build:fast || true
          pnpm vitest run src/tests/e2e/qwen3-omni-e2e.test.ts --reporter=verbose
        env:
          NODE_ENV: test
        continue-on-error: true
