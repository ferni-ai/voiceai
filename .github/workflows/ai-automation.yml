name: AI Automation Suite

# ============================================================================
# AI-POWERED AUTOMATION PIPELINE
# ============================================================================
#
# Integrates Ferni CLI AI tools into CI/CD:
#
# ON PULL REQUEST:
#   - AI Code Review (security + performance)
#   - API Contract Diff (detect breaking changes)
#   - Bundle Size Check
#   - Brand Voice Check
#
# ON PUSH TO MAIN:
#   - Generate Release Notes (if tag)
#   - Cost Forecast Update
#   - Translate Scan Report
#
# WEEKLY:
#   - Dependency Intelligence
#   - Stale Feature Flag Cleanup
#   - Refactoring Suggestions
#
# ============================================================================

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'src/**'
      - 'apps/**'
      - 'packages/**'
      - 'design-system/**'
      - 'package.json'
  schedule:
    # Weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        type: choice
        options:
          - all
          - review
          - deps
          - refactor
          - translate
          - flags
          - costs

env:
  NODE_VERSION: '20'
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

jobs:
  # ============================================================================
  # PR CHECKS - Run on every pull request
  # ============================================================================

  pr-ai-review:
    name: 🤖 AI Code Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: AI Code Review
        id: review
        run: |
          # Run AI review and capture output
          REVIEW=$(pnpm tsx apps/cli/src/index.ts review full 2>&1 || true)
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Check for critical issues
          if echo "$REVIEW" | grep -q "🔴"; then
            echo "has_critical=true" >> $GITHUB_OUTPUT
          else
            echo "has_critical=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.review }}`;
            const hasCritical = '${{ steps.review.outputs.has_critical }}' === 'true';

            const body = `## 🤖 AI Code Review

            ${review}

            ---
            ${hasCritical ? '⚠️ **Critical issues found - please address before merging**' : '✅ No critical issues found'}

            <sub>Generated by Ferni AI</sub>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  pr-api-diff:
    name: 📡 API Contract Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: Check API Changes
        id: api_diff
        run: |
          DIFF=$(pnpm tsx apps/cli/src/index.ts api diff 2>&1 || true)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Check for breaking changes
          if echo "$DIFF" | grep -q "BREAKING"; then
            echo "has_breaking=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "has_breaking=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Comment on Breaking Changes
        if: steps.api_diff.outputs.has_breaking == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚨 Breaking API Changes Detected\n\n${{ steps.api_diff.outputs.diff }}\n\n**Please update API consumers before merging.**`
            });

  pr-bundle-check:
    name: 📦 Bundle Size Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: Build frontend
        run: pnpm build:frontend
        continue-on-error: true

      - name: Check Bundle Budget
        id: bundle
        run: |
          RESULT=$(pnpm tsx apps/cli/src/index.ts perf budget 2>&1)
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if echo "$RESULT" | grep -q "exceeded"; then
            echo "exceeded=true" >> $GITHUB_OUTPUT
          else
            echo "exceeded=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment Bundle Size
        uses: actions/github-script@v7
        with:
          script: |
            const exceeded = '${{ steps.bundle.outputs.exceeded }}' === 'true';
            const emoji = exceeded ? '⚠️' : '✅';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${emoji} Bundle Size Report\n\n\`\`\`\n${{ steps.bundle.outputs.result }}\n\`\`\``
            });

  pr-brand-check:
    name: ✍️ Brand Voice Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: Check Brand Compliance
        run: |
          pnpm tsx apps/cli/src/index.ts design brand-words || true

  # ============================================================================
  # RELEASE - Run on version tags
  # ============================================================================

  release-notes:
    name: 📝 Generate Release Notes
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: Generate Release Notes
        id: notes
        env:
          VERSION_TAG: ${{ github.ref }}
        run: |
          VERSION=${VERSION_TAG#refs/tags/}
          NOTES=$(pnpm tsx apps/cli/src/index.ts release-auto notes $VERSION 2>&1 || true)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `${{ steps.notes.outputs.notes }}`,
              draft: false,
              prerelease: tag.includes('-')
            });

  # ============================================================================
  # WEEKLY MAINTENANCE - Run on schedule
  # ============================================================================

  weekly-deps:
    name: 📦 Dependency Check
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'deps'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: Check Dependencies
        id: deps
        run: |
          RESULT=$(pnpm tsx apps/cli/src/index.ts deps-ai update 2>&1 || true)
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Issue for Updates
        uses: actions/github-script@v7
        with:
          script: |
            const result = `${{ steps.deps.outputs.result }}`;

            // Only create issue if there are updates
            if (result.includes('outdated') || result.includes('Major')) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '📦 Weekly Dependency Update Report',
                body: `## Dependency Analysis\n\n\`\`\`\n${result}\n\`\`\`\n\n---\nGenerated by weekly automation`,
                labels: ['dependencies', 'automation']
              });
            }

  weekly-flags:
    name: 🚩 Stale Flag Check
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'flags'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: Check Feature Flags
        run: |
          pnpm tsx apps/cli/src/index.ts flags cleanup

  weekly-refactor:
    name: 🔄 Refactoring Suggestions
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'refactor'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: Generate Suggestions
        id: refactor
        run: |
          RESULT=$(pnpm tsx apps/cli/src/index.ts refactor suggest 2>&1 || true)
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

  weekly-translate:
    name: 🌍 Translation Scan
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'translate'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: Scan for Hardcoded Strings
        run: |
          pnpm tsx apps/cli/src/index.ts translate scan

  # ============================================================================
  # COST TRACKING - Run on main push
  # ============================================================================

  cost-forecast:
    name: 💰 Cost Forecast
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: Generate Forecast
        run: |
          pnpm tsx apps/cli/src/index.ts costs-ai forecast
