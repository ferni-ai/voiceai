name: Lighthouse CI

# Automated accessibility and performance audits for landing page
# Runs on PRs and scheduled weekly

on:
  pull_request:
    paths:
      - 'promo/ferni-website/**'
      - '.github/workflows/lighthouse-ci.yml'
  schedule:
    # Run weekly on Sundays at 6am UTC
    - cron: '0 6 * * 0'
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  # Performance budgets
  PERFORMANCE_BUDGET: 80
  ACCESSIBILITY_BUDGET: 90
  BEST_PRACTICES_BUDGET: 85
  SEO_BUDGET: 90

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Lighthouse CI
        run: pnpm add -g @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        id: lighthouse
        run: |
          # Create lighthouserc config
          cat > lighthouserc.json << 'EOF'
          {
            "ci": {
              "collect": {
                "url": ["https://ferni.ai", "https://ferni.ai/pricing", "https://ferni.ai/about"],
                "numberOfRuns": 3,
                "settings": {
                  "preset": "desktop",
                  "throttling": {
                    "cpuSlowdownMultiplier": 1
                  }
                }
              },
              "assert": {
                "assertions": {
                  "categories:performance": ["warn", {"minScore": 0.8}],
                  "categories:accessibility": ["error", {"minScore": 0.9}],
                  "categories:best-practices": ["warn", {"minScore": 0.85}],
                  "categories:seo": ["warn", {"minScore": 0.9}]
                }
              },
              "upload": {
                "target": "temporary-public-storage"
              }
            }
          }
          EOF

          # Run Lighthouse
          lhci autorun --config=lighthouserc.json 2>&1 | tee lighthouse-output.txt

          # Extract scores
          PERF=$(grep -oP 'performance: \K[0-9]+' lighthouse-output.txt | head -1 || echo "0")
          A11Y=$(grep -oP 'accessibility: \K[0-9]+' lighthouse-output.txt | head -1 || echo "0")
          BP=$(grep -oP 'best-practices: \K[0-9]+' lighthouse-output.txt | head -1 || echo "0")
          SEO=$(grep -oP 'seo: \K[0-9]+' lighthouse-output.txt | head -1 || echo "0")

          echo "performance=$PERF" >> $GITHUB_OUTPUT
          echo "accessibility=$A11Y" >> $GITHUB_OUTPUT
          echo "best_practices=$BP" >> $GITHUB_OUTPUT
          echo "seo=$SEO" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Generate Summary
        run: |
          echo "## 🔦 Lighthouse Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Score | Budget | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|--------|--------|" >> $GITHUB_STEP_SUMMARY

          PERF="${{ steps.lighthouse.outputs.performance }}"
          A11Y="${{ steps.lighthouse.outputs.accessibility }}"
          BP="${{ steps.lighthouse.outputs.best_practices }}"
          SEO="${{ steps.lighthouse.outputs.seo }}"

          # Performance
          if [ "${PERF:-0}" -ge "$PERFORMANCE_BUDGET" ]; then
            echo "| Performance | ${PERF:-N/A} | $PERFORMANCE_BUDGET | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Performance | ${PERF:-N/A} | $PERFORMANCE_BUDGET | ⚠️ |" >> $GITHUB_STEP_SUMMARY
          fi

          # Accessibility
          if [ "${A11Y:-0}" -ge "$ACCESSIBILITY_BUDGET" ]; then
            echo "| Accessibility | ${A11Y:-N/A} | $ACCESSIBILITY_BUDGET | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Accessibility | ${A11Y:-N/A} | $ACCESSIBILITY_BUDGET | ❌ |" >> $GITHUB_STEP_SUMMARY
          fi

          # Best Practices
          if [ "${BP:-0}" -ge "$BEST_PRACTICES_BUDGET" ]; then
            echo "| Best Practices | ${BP:-N/A} | $BEST_PRACTICES_BUDGET | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Best Practices | ${BP:-N/A} | $BEST_PRACTICES_BUDGET | ⚠️ |" >> $GITHUB_STEP_SUMMARY
          fi

          # SEO
          if [ "${SEO:-0}" -ge "$SEO_BUDGET" ]; then
            echo "| SEO | ${SEO:-N/A} | $SEO_BUDGET | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SEO | ${SEO:-N/A} | $SEO_BUDGET | ⚠️ |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View full Lighthouse report](https://googlechrome.github.io/lighthouse/viewer/)" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const perf = '${{ steps.lighthouse.outputs.performance }}' || 'N/A';
            const a11y = '${{ steps.lighthouse.outputs.accessibility }}' || 'N/A';
            const bp = '${{ steps.lighthouse.outputs.best_practices }}' || 'N/A';
            const seo = '${{ steps.lighthouse.outputs.seo }}' || 'N/A';

            const perfOk = parseInt(perf) >= ${{ env.PERFORMANCE_BUDGET }};
            const a11yOk = parseInt(a11y) >= ${{ env.ACCESSIBILITY_BUDGET }};
            const bpOk = parseInt(bp) >= ${{ env.BEST_PRACTICES_BUDGET }};
            const seoOk = parseInt(seo) >= ${{ env.SEO_BUDGET }};

            const body = `## 🔦 Lighthouse Audit Results

            | Category | Score | Budget | Status |
            |----------|-------|--------|--------|
            | Performance | ${perf} | ${{ env.PERFORMANCE_BUDGET }} | ${perfOk ? '✅' : '⚠️'} |
            | Accessibility | ${a11y} | ${{ env.ACCESSIBILITY_BUDGET }} | ${a11yOk ? '✅' : '❌'} |
            | Best Practices | ${bp} | ${{ env.BEST_PRACTICES_BUDGET }} | ${bpOk ? '✅' : '⚠️'} |
            | SEO | ${seo} | ${{ env.SEO_BUDGET }} | ${seoOk ? '✅' : '⚠️'} |

            ${a11yOk ? '✅ Accessibility budget passed!' : '❌ Accessibility below budget - please review before merging.'}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail on accessibility issues
        if: steps.lighthouse.outputs.accessibility < env.ACCESSIBILITY_BUDGET
        run: |
          echo "❌ Accessibility score (${{ steps.lighthouse.outputs.accessibility }}) is below budget (${{ env.ACCESSIBILITY_BUDGET }})"
          exit 1

  axe-audit:
    name: Axe Accessibility Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install axe-core/cli
        run: pnpm add -g @axe-core/cli

      - name: Run axe accessibility scan
        id: axe
        run: |
          axe https://ferni.ai --save axe-results.json --tags wcag2a,wcag2aa,wcag21aa || true

          # Count violations
          VIOLATIONS=$(jq '.violations | length' axe-results.json 2>/dev/null || echo "0")
          CRITICAL=$(jq '[.violations[] | select(.impact == "critical")] | length' axe-results.json 2>/dev/null || echo "0")
          SERIOUS=$(jq '[.violations[] | select(.impact == "serious")] | length' axe-results.json 2>/dev/null || echo "0")

          echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "serious=$SERIOUS" >> $GITHUB_OUTPUT

          echo "## 🔍 Axe Accessibility Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Impact | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Serious | $SERIOUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Total | $VIOLATIONS |" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Fail on critical issues
        if: steps.axe.outputs.critical > 0
        run: |
          echo "❌ Found ${{ steps.axe.outputs.critical }} critical accessibility violations"
          jq '.violations[] | select(.impact == "critical") | {id, description, nodes: [.nodes[].html]}' axe-results.json
          exit 1
