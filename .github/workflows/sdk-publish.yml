name: SDK Publish

on:
  push:
    branches:
      - main
    paths:
      - 'packages/ferni-sdk/**'
    tags:
      - 'sdk-v*.*.*'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  test:
    name: Test SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        working-directory: packages/ferni-sdk
        run: pnpm typecheck

      - name: Run lint
        working-directory: packages/ferni-sdk
        run: pnpm lint

      - name: Run tests
        working-directory: packages/ferni-sdk
        run: pnpm test run

  build:
    name: Build SDK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        working-directory: packages/ferni-sdk
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: packages/ferni-sdk/dist
          retention-days: 7

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    # Only publish on tags or manual workflow dispatch
    if: startsWith(github.ref, 'refs/tags/sdk-v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: packages/ferni-sdk/dist

      - name: Bump version (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        working-directory: packages/ferni-sdk
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          pnpm version ${{ github.event.inputs.version_bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV
          git add package.json
          git commit -m "chore(sdk): bump version to ${NEW_VERSION}"
          git tag "sdk-v${NEW_VERSION}"
          git push origin main --tags

      - name: Publish to npm
        working-directory: packages/ferni-sdk
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: SDK ${{ github.ref_name }}
          body: |
            SDK Release ${{ github.ref_name }}

            Published to npm: https://www.npmjs.com/package/@ferni/sdk

            ## Installation
            ```bash
            npm install @ferni/sdk
            # or
            pnpm add @ferni/sdk
            ```
          draft: false
          prerelease: false
