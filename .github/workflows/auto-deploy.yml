name: Auto Deploy on Push

# Triggers deploy-production workflow which has full blue-green deployment
# This workflow just does quick quality checks - actual deployment is in deploy-production.yml

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  LIVEKIT_AGENTS_VERSION: '1.0.31'

jobs:
  # Quick quality gate (fails fast, saves minutes)
  quality:
    name: Quick Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Fix local dependencies for CI
        run: |
          sed -i 's|"file:../agents-js/agents"|"^${{ env.LIVEKIT_AGENTS_VERSION }}"|g' package.json
          sed -i 's|"file:../agents-js/plugins/cartesia"|"^${{ env.LIVEKIT_AGENTS_VERSION }}"|g' package.json
          sed -i 's|"file:../agents-js/plugins/deepgram"|"^${{ env.LIVEKIT_AGENTS_VERSION }}"|g' package.json
          sed -i 's|"file:../agents-js/plugins/google"|"^${{ env.LIVEKIT_AGENTS_VERSION }}"|g' package.json
          sed -i 's|"file:../agents-js/plugins/openai"|"^${{ env.LIVEKIT_AGENTS_VERSION }}"|g' package.json
          sed -i 's|"file:../agents-js/plugins/silero"|"^${{ env.LIVEKIT_AGENTS_VERSION }}"|g' package.json

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test -- --run --reporter=dot

  # Note: Actual deployment happens via deploy-production.yml (also triggered on main push)
  # That workflow has full blue-green deployment with:
  # - Deploy green revision with 0% traffic
  # - Health checks on green
  # - Traffic shift only if healthy
  # - Automatic rollback on failure
  # - DORA metrics tracking
