name: Deploy Firebase Hosting

# Auto-deploy frontend to Firebase Hosting when pushed to main
# Deploys to BOTH sites: ferni-prod AND johnb-app (app.ferni.ai)
#
# Deployment Strategy:
# 1. Build frontend
# 2. Deploy to Firebase (atomic - instant switch)
# 3. Run health checks on deployed site
# 4. If unhealthy, auto-rollback to previous version
#
# NOTE: Deploys on ALL pushes to main (not just frontend changes) because:
# - Backend persona changes affect the app experience
# - System prompt changes need fresh frontend for consistency
# - Ensures frontend and backend stay in sync

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        type: choice
        options:
          - app
          - landing
          - both
        default: 'app'

# Serialize Firebase deploys - don't cancel active deploys
concurrency:
  group: deploy-firebase
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # DEPLOY APP (ferni-prod + johnb-app)
  # ============================================================================
  deploy-app:
    name: Deploy App
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.target == 'app' || inputs.target == 'both' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build design-system
        run: node design-system/build.js

      - name: Install frontend dependencies
        run: |
          cd frontend-typescript
          pnpm install --frozen-lockfile

      - name: Build frontend
        run: |
          cd frontend-typescript
          pnpm build
        env:
          NODE_ENV: production

      - name: Deploy to Firebase (ferni-prod)
        id: deploy-ferni
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          target: ferni-prod
          entryPoint: ./frontend-typescript

      - name: Deploy to Firebase (johnb-app / app.ferni.ai)
        id: deploy-app
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          target: johnb-app
          entryPoint: ./frontend-typescript

      - name: Health check deployed sites
        id: health
        run: |
          echo "Waiting 10s for deployment propagation..."
          sleep 10

          HEALTHY=true

          # Check ferni-prod
          echo "Checking https://ferni-prod.web.app..."
          for i in {1..3}; do
            if curl -sf "https://ferni-prod.web.app" > /dev/null 2>&1; then
              echo "✅ ferni-prod is healthy"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "❌ ferni-prod health check failed"
              HEALTHY=false
            fi
            sleep 5
          done

          # Check app.ferni.ai
          echo "Checking https://app.ferni.ai..."
          for i in {1..3}; do
            if curl -sf "https://app.ferni.ai" > /dev/null 2>&1; then
              echo "✅ app.ferni.ai is healthy"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "❌ app.ferni.ai health check failed"
              HEALTHY=false
            fi
            sleep 5
          done

          echo "healthy=$HEALTHY" >> $GITHUB_OUTPUT

      - name: Rollback on health check failure
        if: steps.health.outputs.healthy == 'false'
        run: |
          echo "⚠️ Health check failed - initiating rollback"

          # Install Firebase CLI
          npm install -g firebase-tools

          # Rollback to previous version
          cd frontend-typescript
          firebase hosting:rollback --site ferni-prod --confirm || echo "Rollback ferni-prod failed"
          firebase hosting:rollback --site johnb-app --confirm || echo "Rollback johnb-app failed"

          echo "🔄 Rollback initiated - check Firebase console for status"
          exit 1
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deployment summary
        if: steps.health.outputs.healthy == 'true'
        run: |
          echo "## 🚀 Firebase Hosting Deployed (Healthy)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Site | URL | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ferni-prod | https://ferni-prod.web.app | ✅ Healthy |" >> $GITHUB_STEP_SUMMARY
          echo "| johnb-app | https://app.ferni.ai | ✅ Healthy |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # DEPLOY LANDING PAGE
  # ============================================================================
  deploy-landing:
    name: Deploy Landing
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'landing' || inputs.target == 'both' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install landing dependencies
        run: |
          cd promo/ferni-website
          pnpm install --frozen-lockfile

      - name: Build landing page
        run: |
          cd promo/ferni-website
          pnpm build

      - name: Deploy landing to Firebase
        id: deploy-landing
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          target: ferni-landing
          entryPoint: ./promo/ferni-website

      - name: Health check landing page
        id: health
        run: |
          echo "Waiting 10s for deployment propagation..."
          sleep 10

          echo "Checking https://ferni.ai..."
          for i in {1..3}; do
            if curl -sf "https://ferni.ai" > /dev/null 2>&1; then
              echo "✅ ferni.ai is healthy"
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done

          echo "healthy=false" >> $GITHUB_OUTPUT
          echo "❌ ferni.ai health check failed"

      - name: Rollback on health check failure
        if: steps.health.outputs.healthy == 'false'
        run: |
          echo "⚠️ Health check failed - initiating rollback"
          npm install -g firebase-tools
          cd promo/ferni-website
          firebase hosting:rollback --site ferni-landing --confirm || echo "Rollback failed"
          exit 1
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deployment summary
        if: steps.health.outputs.healthy == 'true'
        run: |
          echo "## 🌐 Landing Page Deployed (Healthy)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Site | URL | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Landing | https://ferni.ai | ✅ Healthy |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # NOTIFY ON FAILURE
  # ============================================================================
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [deploy-app, deploy-landing]
    if: failure()
    steps:
      - name: Send Slack notification
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{"text":"❌ Firebase deploy failed or rolled back: ${{ github.event.head_commit.message }}\n\n🔗 <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"}'
        continue-on-error: true
