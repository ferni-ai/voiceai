name: Feature Rollout

# Automated feature validation and progressive rollout workflow
# 
# Usage:
#   gh workflow run feature-rollout.yml \
#     -f feature_id=new-voice-model \
#     -f preset=standard
#
# Or via GitHub UI: Actions → Feature Rollout → Run workflow

on:
  workflow_dispatch:
    inputs:
      feature_id:
        description: 'Feature flag ID to rollout'
        required: true
        type: string
      preset:
        description: 'Rollout preset (speed/safety tradeoff)'
        required: true
        type: choice
        default: 'standard'
        options:
          - conservative  # 1% → 5% → 10% → 25% → 50% → 75% → 100% (30min each)
          - standard      # 5% → 25% → 50% → 100% (15min each)
          - aggressive    # 10% → 50% → 100% (5min each)
          - canary        # 1% → 5% only, manual advance
      auto_advance:
        description: 'Auto-advance when validations pass'
        type: boolean
        default: true
      auto_rollback:
        description: 'Auto-rollback on validation failure'
        type: boolean
        default: true
      skip_validation:
        description: 'Skip pre-rollout validation (emergency only)'
        type: boolean
        default: false
      notify_slack:
        description: 'Send Slack notifications'
        type: boolean
        default: true

env:
  NODE_VERSION: '20'
  API_URL: ${{ secrets.API_URL || 'https://john-bogle-ui-1031920444452.us-central1.run.app' }}

jobs:
  # ============================================================================
  # PRE-ROLLOUT VALIDATION
  # ============================================================================
  validate:
    name: Pre-Rollout Validation
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_validation }}
    outputs:
      can_proceed: ${{ steps.validate.outputs.can_proceed }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate feature flag exists
        id: validate
        run: |
          echo "Validating feature flag: ${{ inputs.feature_id }}"
          
          # Check if flag exists via API
          RESPONSE=$(curl -sf "${{ env.API_URL }}/api/flags/${{ inputs.feature_id }}" \
            -H "X-API-Key: ${{ secrets.API_KEY }}" || echo '{"error": "not_found"}')
          
          if echo "$RESPONSE" | grep -q "error"; then
            echo "❌ Feature flag '${{ inputs.feature_id }}' not found"
            echo "can_proceed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "✅ Feature flag found"
          echo "$RESPONSE" | jq .
          echo "can_proceed=true" >> $GITHUB_OUTPUT

      - name: Run smoke tests
        run: |
          echo "Running pre-rollout smoke tests..."
          pnpm tsx apps/cli/src/commands/test/smoke-test.ts --url=${{ env.API_URL }}

      - name: Check current system health
        run: |
          echo "Checking system health..."
          
          HEALTH=$(curl -sf "${{ env.API_URL }}/health" || echo '{"status": "error"}')
          STATUS=$(echo "$HEALTH" | jq -r '.status // "error"')
          
          if [ "$STATUS" != "ok" ] && [ "$STATUS" != "healthy" ]; then
            echo "❌ System health check failed: $STATUS"
            exit 1
          fi
          
          echo "✅ System is healthy"

  # ============================================================================
  # START ROLLOUT
  # ============================================================================
  start-rollout:
    name: Start Rollout
    runs-on: ubuntu-latest
    needs: [validate]
    if: ${{ always() && (needs.validate.result == 'success' || inputs.skip_validation) }}
    outputs:
      rollout_started: ${{ steps.start.outputs.started }}
    
    steps:
      - name: Start feature rollout
        id: start
        run: |
          echo "🚀 Starting rollout for: ${{ inputs.feature_id }}"
          echo "   Preset: ${{ inputs.preset }}"
          echo "   Auto-advance: ${{ inputs.auto_advance }}"
          echo "   Auto-rollback: ${{ inputs.auto_rollback }}"
          
          # Start rollout via API
          RESPONSE=$(curl -sf -X POST "${{ env.API_URL }}/api/rollouts" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.ADMIN_API_KEY }}" \
            -d '{
              "featureId": "${{ inputs.feature_id }}",
              "preset": "${{ inputs.preset }}",
              "autoAdvance": ${{ inputs.auto_advance }},
              "autoRollback": ${{ inputs.auto_rollback }},
              "webhookUrl": "${{ secrets.SLACK_WEBHOOK_URL }}"
            }' || echo '{"error": "failed"}')
          
          if echo "$RESPONSE" | grep -q "error"; then
            echo "❌ Failed to start rollout"
            echo "$RESPONSE"
            echo "started=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "✅ Rollout started successfully"
          echo "$RESPONSE" | jq .
          echo "started=true" >> $GITHUB_OUTPUT

      - name: Notify start
        if: inputs.notify_slack && success()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "🚀 Feature Rollout Started",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚀 Feature Rollout Started*\n\n*Feature:* `${{ inputs.feature_id }}`\n*Preset:* ${{ inputs.preset }}\n*Initiated by:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Workflow"},
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }' || true

  # ============================================================================
  # MONITOR ROLLOUT
  # ============================================================================
  monitor:
    name: Monitor Rollout
    runs-on: ubuntu-latest
    needs: [start-rollout]
    if: needs.start-rollout.outputs.rollout_started == 'true'
    
    steps:
      - name: Monitor rollout progress
        run: |
          echo "📊 Monitoring rollout progress..."
          
          MAX_CHECKS=60  # 30 minutes with 30s intervals
          CHECK_INTERVAL=30
          
          for i in $(seq 1 $MAX_CHECKS); do
            echo ""
            echo "=== Check $i / $MAX_CHECKS ==="
            
            STATUS=$(curl -sf "${{ env.API_URL }}/api/rollouts/${{ inputs.feature_id }}" \
              -H "X-API-Key: ${{ secrets.ADMIN_API_KEY }}" || echo '{"rollout": {"stage": "error"}}')
            
            STAGE=$(echo "$STATUS" | jq -r '.rollout.stage // "unknown"')
            PERCENTAGE=$(echo "$STATUS" | jq -r '.rollout.currentPercentage // 0')
            
            echo "Stage: $STAGE"
            echo "Percentage: $PERCENTAGE%"
            
            case "$STAGE" in
              "stable")
                echo "✅ Rollout completed successfully!"
                exit 0
                ;;
              "rolled_back")
                echo "⚠️ Rollout was rolled back"
                REASON=$(echo "$STATUS" | jq -r '.rollout.rollbackReason // "Unknown"')
                echo "Reason: $REASON"
                exit 1
                ;;
              "failed")
                echo "❌ Rollout failed"
                exit 1
                ;;
              "rolling_out"|"validating")
                echo "🔄 In progress..."
                ;;
              *)
                echo "❓ Unknown stage: $STAGE"
                ;;
            esac
            
            if [ $i -lt $MAX_CHECKS ]; then
              sleep $CHECK_INTERVAL
            fi
          done
          
          echo "⏰ Monitoring timeout - rollout still in progress"
          echo "Check status manually: ${{ env.API_URL }}/api/rollouts/${{ inputs.feature_id }}"

  # ============================================================================
  # NOTIFY COMPLETION
  # ============================================================================
  notify-completion:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [monitor]
    if: always() && inputs.notify_slack
    
    steps:
      - name: Get final status
        id: status
        run: |
          STATUS=$(curl -sf "${{ env.API_URL }}/api/rollouts/${{ inputs.feature_id }}" \
            -H "X-API-Key: ${{ secrets.ADMIN_API_KEY }}" || echo '{}')
          
          STAGE=$(echo "$STATUS" | jq -r '.rollout.stage // "unknown"')
          PERCENTAGE=$(echo "$STATUS" | jq -r '.rollout.currentPercentage // 0')
          
          echo "stage=$STAGE" >> $GITHUB_OUTPUT
          echo "percentage=$PERCENTAGE" >> $GITHUB_OUTPUT
          
          if [ "$STAGE" = "stable" ]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "status_text=Completed Successfully" >> $GITHUB_OUTPUT
          elif [ "$STAGE" = "rolled_back" ]; then
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
            echo "status_text=Rolled Back" >> $GITHUB_OUTPUT
          else
            echo "emoji=❓" >> $GITHUB_OUTPUT
            echo "status_text=Status: $STAGE" >> $GITHUB_OUTPUT
          fi

      - name: Send completion notification
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "${{ steps.status.outputs.emoji }} Feature Rollout ${{ steps.status.outputs.status_text }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ steps.status.outputs.emoji }} Feature Rollout ${{ steps.status.outputs.status_text }}*\n\n*Feature:* `${{ inputs.feature_id }}`\n*Final Percentage:* ${{ steps.status.outputs.percentage }}%\n*Stage:* ${{ steps.status.outputs.stage }}"
                  }
                }
              ]
            }' || true

