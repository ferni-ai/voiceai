# Ferni Design System CI/CD
# Validates tokens, builds packages, and publishes to npm

name: Design System

on:
  push:
    branches: [main]
    paths:
      - 'design-system/**'
      - 'packages/ferni-react/**'
      - 'apps/vscode-extension/**'
      - 'apps/figma-plugin/**'
  pull_request:
    paths:
      - 'design-system/**'
      - 'packages/ferni-react/**'
      - 'apps/vscode-extension/**'
      - 'apps/figma-plugin/**'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish packages to npm'
        required: false
        type: boolean
        default: false

jobs:
  # ============================================================================
  # Token Validation
  # ============================================================================
  validate-tokens:
    name: Validate Design Tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: Check token drift
        run: pnpm tokens:check
        working-directory: .

      - name: Validate brand alignment
        run: pnpm brand:check
        working-directory: .
        continue-on-error: true

      - name: Check accessibility
        run: pnpm run check:a11y
        working-directory: design-system
        continue-on-error: true

  # ============================================================================
  # Build Packages
  # ============================================================================
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: validate-tokens
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      # Build @ferni/react
      - name: Build React package
        run: pnpm build
        working-directory: packages/ferni-react

      - name: Upload React package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ferni-react-dist
          path: packages/ferni-react/dist/
          retention-days: 7

      # Build VS Code extension
      - name: Build VS Code extension
        run: pnpm build
        working-directory: apps/vscode-extension

      - name: Upload VS Code extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-dist
          path: apps/vscode-extension/dist/
          retention-days: 7

      # Build Figma plugin
      - name: Build Figma plugin
        run: pnpm build
        working-directory: apps/figma-plugin

      - name: Upload Figma plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: figma-plugin-dist
          path: apps/figma-plugin/dist/
          retention-days: 7

  # ============================================================================
  # Storybook Build
  # ============================================================================
  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: Build React package (needed for stories)
        run: pnpm build
        working-directory: packages/ferni-react

      - name: Build Storybook
        run: pnpm run build-storybook
        working-directory: design-system

      - name: Upload Storybook
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: design-system/storybook-static/
          retention-days: 7

  # ============================================================================
  # Publish to npm (manual trigger or main branch)
  # ============================================================================
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build, storybook]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.publish) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[publish]'))
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: Download React package artifacts
        uses: actions/download-artifact@v4
        with:
          name: ferni-react-dist
          path: packages/ferni-react/dist/

      - name: Publish @ferni/react
        run: pnpm publish --access public --no-git-checks
        working-directory: packages/ferni-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ============================================================================
  # VS Code Extension Publish
  # ============================================================================
  publish-vscode:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.publish) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[publish-vscode]'))
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'false'

      - name: Download VS Code extension artifacts
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension-dist
          path: apps/vscode-extension/dist/

      - name: Package extension
        run: pnpm run package
        working-directory: apps/vscode-extension

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_TOKEN }}
        working-directory: apps/vscode-extension
        continue-on-error: true # May fail if VSCE_TOKEN not set

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferni-design-system.vsix
          path: apps/vscode-extension/*.vsix
          retention-days: 30
