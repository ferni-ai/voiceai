name: Design System Validation

# ============================================================================
# DESIGN SYSTEM CI PIPELINE
# ============================================================================
# Validates design system integrity on every PR and push to main.
#
# Checks:
# - Token drift (JSON → generated files)
# - Brand compliance (colors, copy, patterns)
# - Design system violations in code
# - Accessibility (WCAG AA)
# - Design system health metrics
# - Token usage analytics
# - Storybook builds
# ============================================================================

on:
  push:
    branches: [main]
    paths:
      - 'design-system/**'
      - 'frontend-typescript/src/**'
      - 'promo/**'
  pull_request:
    paths:
      - 'design-system/**'
      - 'frontend-typescript/src/**'
      - 'promo/**'

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # TOKEN VALIDATION
  # ============================================================================
  tokens:
    name: 🎨 Token Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for token drift
        run: node design-system/check-drift.js

      - name: Regenerate tokens (verify idempotent)
        run: |
          npm run build:design-system
          # Verify no changes after regeneration
          if [[ -n $(git status --porcelain design-system/dist frontend-typescript/src/config/*.generated.ts) ]]; then
            echo "❌ Token drift detected! Run 'npm run tokens:sync' locally"
            git diff --stat
            exit 1
          fi
          echo "✅ Tokens are in sync"

      - name: Validate brand colors
        run: node design-system/check-brand.js

  # ============================================================================
  # DESIGN SYSTEM HEALTH
  # ============================================================================
  health:
    name: 🌿 Design System Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run health check
        id: health
        run: |
          cd design-system
          npm ci
          npx ts-node dashboard/health-metrics.ts --json > health-report.json
          cat health-report.json

      - name: Check health score
        run: |
          SCORE=$(cat design-system/health-report.json | jq '.overall.score')
          echo "Design System Health Score: $SCORE/100"
          if [ "$SCORE" -lt 70 ]; then
            echo "⚠️ Health score below 70% - review recommended"
          else
            echo "✅ Health score is healthy"
          fi

      - name: Upload health report
        uses: actions/upload-artifact@v6
        with:
          name: design-system-health
          path: design-system/health-report.json
          retention-days: 30

  # ============================================================================
  # TOKEN ANALYTICS
  # ============================================================================
  token-analytics:
    name: 📊 Token Analytics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run token analytics
        run: |
          cd design-system
          npm ci
          npx ts-node dashboard/token-analytics.ts --json > token-analytics.json
          cat token-analytics.json

      - name: Check token usage
        run: |
          USAGE=$(cat design-system/token-analytics.json | jq '.summary.usageRate')
          echo "Token Usage Rate: $USAGE%"
          UNUSED=$(cat design-system/token-analytics.json | jq '.summary.unusedTokens')
          echo "Unused Tokens: $UNUSED"

      - name: Upload analytics report
        uses: actions/upload-artifact@v6
        with:
          name: token-analytics
          path: design-system/token-analytics.json
          retention-days: 30

  # ============================================================================
  # CODE COMPLIANCE
  # ============================================================================
  compliance:
    name: 🔍 Design Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check design system violations
        run: node design-system/check-design-compliance.js
        continue-on-error: true  # Report but don't block (for now)
      
      - name: Check brand language
        run: |
          # Check for forbidden words in UI files
          FORBIDDEN="chatbot|virtual assistant|bot|AI assistant"
          if grep -rn --include="*.ts" -E "$FORBIDDEN" frontend-typescript/src/ui/; then
            echo "⚠️ Found forbidden brand words - review recommended"
          fi

  # ============================================================================
  # ACCESSIBILITY
  # ============================================================================
  accessibility:
    name: ♿ Accessibility Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run accessibility checks
        run: node design-system/check-accessibility.js
        continue-on-error: true  # WCAG warnings don't block

  # ============================================================================
  # STORYBOOK BUILD
  # ============================================================================
  storybook:
    name: 📚 Storybook Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          cd design-system && npm ci
      
      - name: Build Storybook
        run: npm run build-storybook
      
      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v6
        with:
          name: storybook
          path: design-system/storybook-static
          retention-days: 7

  # ============================================================================
  # DEPLOY STORYBOOK (main branch only)
  # ============================================================================
  deploy-storybook:
    name: 🚀 Deploy Storybook
    needs: [tokens, storybook]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Storybook artifact
        uses: actions/download-artifact@v4
        with:
          name: storybook
          path: storybook-static
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
