name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'apps/**'
      - 'packages/**'
      - 'design-system/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
      - '.github/actions/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'apps/**'
      - 'packages/**'
      - 'design-system/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
      - '.github/actions/**'

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  # ============================================================================
  # SETUP - Shared dependency installation and caching
  # ============================================================================
  setup:
    name: Setup & Cache Dependencies
    runs-on: [self-hosted, Linux, X64, gce]
    timeout-minutes: 15
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate cache key
        id: cache-key
        run: echo "key=node-modules-${{ hashFiles('pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          frozen-lockfile: 'true'

      - name: Verify installation success
        run: |
          if [ ! -d "node_modules" ]; then
            echo "❌ node_modules not found - install failed"
            exit 1
          fi
          echo "✅ node_modules verified"

      - name: Save node_modules cache
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ steps.cache-key.outputs.key }}

  # ============================================================================
  # LINT & TYPE CHECK
  # ============================================================================
  lint:
    name: Lint & Type Check
    runs-on: [self-hosted, Linux, X64, gce]
    timeout-minutes: 15
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: TypeScript type check
        run: pnpm typecheck

      - name: Lint check
        run: pnpm lint --if-present

      - name: Tool schema validation
        run: pnpm tools:schemas:validate

      - name: Tool schema check (no drift)
        run: pnpm tools:schemas:check

  # ============================================================================
  # UNIT TESTS (Fast - ~30-60 seconds)
  # ============================================================================
  test-unit:
    name: Unit Tests
    runs-on: [self-hosted, Linux, X64, gce]
    timeout-minutes: 20
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Run unit tests with coverage
        run: pnpm test:unit:coverage -- --reporter=verbose
        env:
          NODE_ENV: test

      - name: Upload unit coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

  # ============================================================================
  # INTEGRATION TESTS (Slower - ~2-5 minutes)
  # ============================================================================
  test-integration:
    name: Integration Tests
    runs-on: [self-hosted, Linux, X64, gce]
    timeout-minutes: 30
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Run integration tests
        run: pnpm test:integration -- --reporter=verbose
        env:
          NODE_ENV: test
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

      - name: Check coverage threshold
        run: |
          # Extract coverage percentage from coverage summary
          COVERAGE=$(cat coverage/coverage-summary.json 2>/dev/null | grep -o '"pct":[0-9.]*' | head -1 | grep -o '[0-9.]*' || echo "0")
          echo "Coverage: ${COVERAGE}%"
          # Warn if coverage is below 60% (don't block for now)
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "⚠️ Coverage ${COVERAGE}% is below 60% threshold"
          else
            echo "✅ Coverage ${COVERAGE}% meets 60% threshold"
          fi

      - name: Upload integration coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: integration
          fail_ci_if_error: false

  # ============================================================================
  # AGI FEATURE TESTS
  # ============================================================================
  test-agi-features:
    name: AGI Feature Tests
    runs-on: [self-hosted, Linux, X64, gce]
    timeout-minutes: 20
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Run AGI Feature Unit Tests
        run: pnpm test:agi-features -- --reporter=verbose
        env:
          NODE_ENV: test

      - name: Run AGI Actions API E2E Tests
        run: pnpm test:agi-actions-api -- --reporter=verbose
        env:
          NODE_ENV: test

  # ============================================================================
  # BUILD
  # ============================================================================
  build:
    name: Build
    runs-on: [self-hosted, Linux, X64, gce]
    timeout-minutes: 30
    needs: [setup, lint, test-unit, test-integration, test-agi-features]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Build backend
        run: pnpm build --if-present

      - name: Build design-system
        run: pnpm build:design-system

      - name: Build frontend
        run: |
          cd apps/web
          pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            dist/
            apps/web/dist/
          retention-days: 7

  # ============================================================================
  # SECURITY SCAN
  # ============================================================================
  security:
    name: Security Scan
    runs-on: [self-hosted, Linux, X64, gce]
    timeout-minutes: 15
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high || echo "⚠️ Security vulnerabilities found - review required"

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ============================================================================
  # CODE QUALITY METRICS (using unified audit CLI)
  # ============================================================================
  code-quality:
    name: Code Quality Metrics
    runs-on: [self-hosted, Linux, X64, gce]
    timeout-minutes: 15
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Run unified audit
        run: pnpm audit all
        continue-on-error: true

  # ============================================================================
  # STRICT QUALITY GATES (blocking - fails build if thresholds exceeded)
  # ============================================================================
  quality-gates:
    name: Quality Gates (Blocking)
    runs-on: [self-hosted, Linux, X64, gce]
    timeout-minutes: 15
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Run CI Quality Gates
        run: pnpm ci:quality-gates

  # ============================================================================
  # VALIDATION (using unified validate CLI)
  # ============================================================================
  validation:
    name: Validation Checks
    runs-on: [self-hosted, Linux, X64, gce]
    timeout-minutes: 15
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Validate voices
        run: pnpm validate voices
        continue-on-error: true

      - name: Validate integrations
        run: pnpm validate integrations
        continue-on-error: true

  # ============================================================================
  # E2E VALIDATION - Validate all user actions (tools, commands, API)
  # ============================================================================
  e2e-validation:
    name: E2E Validation
    runs-on: [self-hosted, Linux, X64, gce]
    timeout-minutes: 30
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Build CLI and backend
        run: pnpm build:fast

      - name: Run E2E validation
        run: node dist/apps/cli/src/index.js validate e2e --ci --report json > e2e-report.json || true

      - name: Check E2E coverage threshold
        run: |
          if [ -f e2e-report.json ]; then
            COVERAGE=$(cat e2e-report.json | grep -o '"coverage":[0-9]*' | head -1 | grep -o '[0-9]*' || echo "0")
            CI_PASSED=$(cat e2e-report.json | grep -o '"ciPassed":[a-z]*' | head -1 | grep -o '[a-z]*' || echo "false")
            echo "E2E Coverage: ${COVERAGE}%"
            echo "CI Passed: ${CI_PASSED}"
            if [ "$CI_PASSED" = "false" ]; then
              echo "❌ E2E coverage ${COVERAGE}% is below 80% threshold"
              # Don't fail build for now, just warn
              # exit 1
            else
              echo "✅ E2E coverage ${COVERAGE}% meets 80% threshold"
            fi
          else
            echo "⚠️ E2E report not generated - skipping threshold check"
          fi

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-validation-report
          path: e2e-report.json
          retention-days: 30

  # ============================================================================
  # FRONTEND QUALITY
  # ============================================================================
  frontend-quality:
    name: Frontend Quality
    runs-on: [self-hosted, Linux, X64, gce]
    timeout-minutes: 20
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Build design-system
        run: pnpm build:design-system

      - name: TypeScript type check
        run: |
          cd apps/web
          pnpm typecheck

      - name: ESLint check
        run: |
          cd apps/web
          pnpm lint

      - name: Design token validation
        run: |
          cd apps/web
          pnpm lint:tokens

      - name: UI audit
        run: |
          cd apps/web
          pnpm audit:ui || true
        continue-on-error: true

      - name: Build and check bundle size
        run: |
          cd apps/web
          pnpm build:check || true
        continue-on-error: true

  # ============================================================================
  # DEPENDENCY CHECK
  # ============================================================================
  dependencies:
    name: Dependency Check
    runs-on: [self-hosted, Linux, X64, gce]
    timeout-minutes: 10
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Check for outdated dependencies
        run: pnpm outdated || true

      - name: Check for duplicate dependencies
        run: pnpm dlx depcheck --ignores="@types/*" || true
