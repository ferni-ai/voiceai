name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'apps/**'
      - 'packages/**'
      - 'design-system/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
      - '.github/actions/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'apps/**'
      - 'packages/**'
      - 'design-system/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
      - '.github/actions/**'

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  # ============================================================================
  # LINT & TYPE CHECK
  # ============================================================================
  lint:
    name: Lint & Type Check
    runs-on: [self-hosted, Linux, X64, gce]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: TypeScript type check
        run: pnpm typecheck

      - name: Lint check
        run: pnpm lint --if-present

  # ============================================================================
  # UNIT TESTS (Fast - ~30-60 seconds)
  # ============================================================================
  test-unit:
    name: Unit Tests
    runs-on: [self-hosted, Linux, X64, gce]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run unit tests with coverage
        run: pnpm test:unit:coverage -- --reporter=verbose
        env:
          NODE_ENV: test

      - name: Upload unit coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

  # ============================================================================
  # INTEGRATION TESTS (Slower - ~2-5 minutes)
  # ============================================================================
  test-integration:
    name: Integration Tests
    runs-on: [self-hosted, Linux, X64, gce]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run integration tests
        run: pnpm test:integration -- --reporter=verbose
        env:
          NODE_ENV: test
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

      - name: Check coverage threshold
        run: |
          # Extract coverage percentage from coverage summary
          COVERAGE=$(cat coverage/coverage-summary.json 2>/dev/null | grep -o '"pct":[0-9.]*' | head -1 | grep -o '[0-9.]*' || echo "0")
          echo "Coverage: ${COVERAGE}%"
          # Warn if coverage is below 60% (don't block for now)
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "⚠️ Coverage ${COVERAGE}% is below 60% threshold"
          else
            echo "✅ Coverage ${COVERAGE}% meets 60% threshold"
          fi

      - name: Upload integration coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: integration
          fail_ci_if_error: false

  # ============================================================================
  # AGI FEATURE TESTS
  # ============================================================================
  test-agi-features:
    name: AGI Feature Tests
    runs-on: [self-hosted, Linux, X64, gce]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run AGI Feature Unit Tests
        run: pnpm test:agi-features -- --reporter=verbose
        env:
          NODE_ENV: test

      - name: Run AGI Actions API E2E Tests
        run: pnpm test:agi-actions-api -- --reporter=verbose
        env:
          NODE_ENV: test

  # ============================================================================
  # BUILD
  # ============================================================================
  build:
    name: Build
    runs-on: [self-hosted, Linux, X64, gce]
    needs: [lint, test-unit, test-integration, test-agi-features]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build backend
        run: pnpm build --if-present

      - name: Build design-system
        run: pnpm build:design-system

      - name: Build frontend
        run: |
          cd apps/web
          pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build
          path: |
            dist/
            apps/web/dist/
          retention-days: 7

  # ============================================================================
  # SECURITY SCAN
  # ============================================================================
  security:
    name: Security Scan
    runs-on: [self-hosted, Linux, X64, gce]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high || echo "⚠️ Security vulnerabilities found - review required"

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ============================================================================
  # CODE QUALITY METRICS (using unified audit CLI)
  # ============================================================================
  code-quality:
    name: Code Quality Metrics
    runs-on: [self-hosted, Linux, X64, gce]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run unified audit
        run: pnpm audit all
        continue-on-error: true

  # ============================================================================
  # STRICT QUALITY GATES (blocking - fails build if thresholds exceeded)
  # ============================================================================
  quality-gates:
    name: Quality Gates (Blocking)
    runs-on: [self-hosted, Linux, X64, gce]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run CI Quality Gates
        run: pnpm ci:quality-gates

  # ============================================================================
  # VALIDATION (using unified validate CLI)
  # ============================================================================
  validation:
    name: Validation Checks
    runs-on: [self-hosted, Linux, X64, gce]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Validate voices
        run: pnpm validate voices
        continue-on-error: true

      - name: Validate integrations
        run: pnpm validate integrations
        continue-on-error: true

  # ============================================================================
  # FRONTEND QUALITY
  # ============================================================================
  frontend-quality:
    name: Frontend Quality
    runs-on: [self-hosted, Linux, X64, gce]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build design-system
        run: pnpm build:design-system

      - name: TypeScript type check
        run: |
          cd apps/web
          pnpm typecheck

      - name: ESLint check
        run: |
          cd apps/web
          pnpm lint

      - name: Design token validation
        run: |
          cd apps/web
          pnpm lint:tokens

      - name: UI audit
        run: |
          cd apps/web
          pnpm audit:ui || true
        continue-on-error: true

      - name: Build and check bundle size
        run: |
          cd apps/web
          pnpm build:check || true
        continue-on-error: true

  # ============================================================================
  # DEPENDENCY CHECK
  # ============================================================================
  dependencies:
    name: Dependency Check
    runs-on: [self-hosted, Linux, X64, gce]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Check for outdated dependencies
        run: pnpm outdated || true

      - name: Check for duplicate dependencies
        run: pnpm dlx depcheck --ignores="@types/*" || true
