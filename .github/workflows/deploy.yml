name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      persona:
        description: 'Persona to deploy (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ferni
          - peter-john
          - alex-chen
          - maya-santos
          - jordan-taylor
          - nayan-patel

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  NODE_VERSION: '20'

jobs:
  # ============================================================================
  # BUILD & TEST
  # ============================================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --reporter=dot
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build --if-present

  # ============================================================================
  # DEPLOY TO CLOUD RUN
  # ============================================================================
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        persona: ${{ github.event.inputs.persona == 'all' && fromJson('["ferni", "peter-john", "alex-chen", "maya-santos", "jordan-taylor", "nayan-patel"]') || fromJson(format('["{0}"]', github.event.inputs.persona)) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/ferni-agents/${{ matrix.persona }}:${{ github.sha }}"
          docker build \
            --build-arg PERSONA_ID=${{ matrix.persona }} \
            -t $IMAGE \
            -f Dockerfile .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ferni-${{ matrix.persona }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/ferni-agents/${{ matrix.persona }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 300 \
            --concurrency 10 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "NODE_ENV=production,PERSONA_ID=${{ matrix.persona }},GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT_ID }}" \
            --set-secrets "OPENAI_API_KEY=openai-api-key:latest,LIVEKIT_API_KEY=livekit-api-key:latest,LIVEKIT_API_SECRET=livekit-api-secret:latest"

      - name: Get deployment URL
        run: |
          URL=$(gcloud run services describe ferni-${{ matrix.persona }} --region ${{ env.GCP_REGION }} --format 'value(status.url)')
          echo "Deployed ${{ matrix.persona }} to: $URL"

  # ============================================================================
  # DEPLOY FRONTEND
  # ============================================================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd frontend-typescript
          npm ci

      - name: Build frontend
        run: |
          cd frontend-typescript
          npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ env.GCP_PROJECT_ID }}
        continue-on-error: true

  # ============================================================================
  # POST-DEPLOY VERIFICATION
  # ============================================================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy, deploy-frontend]
    if: always() && needs.deploy.result == 'success'
    
    steps:
      - name: Health check - Ferni
        run: |
          URL=$(curl -s "https://run.googleapis.com/v2/projects/${{ env.GCP_PROJECT_ID }}/locations/${{ env.GCP_REGION }}/services/ferni-ferni" \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            | jq -r '.uri')
          curl -f "$URL/health" || echo "Health check failed for ferni"
        continue-on-error: true

      - name: Notify on success
        if: success()
        run: echo "Deployment completed successfully!"

      - name: Notify on failure
        if: failure()
        run: echo "Deployment had issues - check logs"


