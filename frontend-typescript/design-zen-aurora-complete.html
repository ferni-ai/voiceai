<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferni - Complete Interactive Prototype</title>
  
  <!-- Ferni Design System Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* ========================================
       DESIGN TOKENS
       ======================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --font-display: 'Plus Jakarta Sans', -apple-system, sans-serif;
      --font-body: 'Inter', -apple-system, sans-serif;
      --font-accent: 'Sora', sans-serif;
      
      --ferni-sage: #4a6741;
      --ferni-sage-dark: #3d5a35;
      --ferni-sage-light: #5a7751;
      --peter-teal: #3a6b73;
      --peter-teal-light: #4a7b83;
      --maya-terracotta: #a67a6a;
      --maya-terracotta-light: #b68a7a;
      --alex-indigo: #5a6b8a;
      --alex-indigo-light: #6a7b9a;
      --jordan-coral: #c4856a;
      --nayan-amber: #b8956a;
      
      --ease-gentle: cubic-bezier(0.25, 0.1, 0.25, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
      
      --duration-micro: 100ms;
      --duration-fast: 150ms;
      --duration-normal: 300ms;
      --duration-slow: 500ms;
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;
    }
    
    /* Dark Theme */
    body {
      --bg-primary: #584840;
      --bg-secondary: #60504a;
      --bg-elevated: #70605a;
      --bg-glass: rgba(58, 49, 42, 0.6);
      --bg-deep: #3a312a;
      
      --text-primary: #faf6f0;
      --text-secondary: #f0ebe4;
      --text-muted: #e8e2da;
      --text-dimmed: #c4b8aa;
      
      --border-subtle: rgba(215, 185, 145, 0.1);
      --border-medium: rgba(215, 185, 145, 0.18);
      
      --accent-gold: #d4a84a;
      --accent-gold-glow: rgba(212, 168, 74, 0.25);
      
      --error-red: #e07575;
      --error-glow: rgba(224, 117, 117, 0.25);
      --success-green: #6bc48f;
      --success-glow: rgba(107, 196, 143, 0.3);
      --warning-amber: #e0b860;
      
      --ferni-glow: rgba(74, 103, 65, 0.4);
      --ferni-ring: rgba(74, 103, 65, 0.2);
      
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    body.theme-light {
      --bg-primary: #faf8f5;
      --bg-secondary: #f5f2ed;
      --bg-elevated: #fffdfb;
      --bg-glass: rgba(255, 253, 251, 0.7);
      --bg-deep: #ebe6df;
      
      --text-primary: #2c2520;
      --text-secondary: #5c544a;
      --text-muted: #756a5e;
      --text-dimmed: #a09488;
      
      --border-subtle: rgba(44, 37, 32, 0.06);
      --border-medium: rgba(44, 37, 32, 0.12);
      
      --accent-gold: #8a7a52;
      --accent-gold-glow: rgba(138, 122, 82, 0.15);
      
      --ferni-glow: rgba(74, 103, 65, 0.2);
      --ferni-ring: rgba(74, 103, 65, 0.12);
    }
    
    /* ========================================
       LAYOUT
       ======================================== */
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 60px;
      min-height: 100vh;
    }
    
    /* Controls */
    .controls {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    
    .control-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 600px;
    }
    
    .theme-toggle {
      display: flex;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full);
      padding: 3px;
    }
    
    .theme-btn, .state-btn {
      padding: 8px 14px;
      border: none;
      background: transparent;
      border-radius: var(--radius-full);
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s var(--ease-spring);
      position: relative;
      overflow: hidden;
    }
    
    .theme-btn:hover, .state-btn:hover {
      color: var(--text-primary);
      transform: translateY(-1px);
    }
    
    .theme-btn:active, .state-btn:active {
      transform: translateY(0) scale(0.97);
    }
    
    .theme-btn.active, .state-btn.active {
      background: var(--ferni-sage);
      color: white;
    }
    
    .state-btn {
      border: 1px solid var(--border-medium);
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
    }
    
    .state-btn.error { border-color: var(--error-red); color: var(--error-red); }
    .state-btn.success { border-color: var(--success-green); color: var(--success-green); }
    
    /* ========================================
       PHONE
       ======================================== */
    .phone-container { margin-top: 130px; }
    
    .phone {
      position: relative;
      width: 375px;
      height: 750px;
      border-radius: 52px;
      overflow: hidden;
      background: var(--bg-deep);
      box-shadow: 
        0 0 0 1px var(--border-subtle),
        0 50px 100px -20px rgba(0, 0, 0, 0.4);
      transition: all 0.5s var(--ease-gentle);
    }
    
    /* Shake animation for errors */
    .phone.shake {
      animation: phone-shake 0.6s var(--ease-spring);
    }
    
    @keyframes phone-shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    
    /* Aurora */
    .aurora {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    
    .aurora-layer {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: 
        radial-gradient(ellipse 50% 35% at 30% 70%, rgba(74, 103, 65, 0.12), transparent 50%),
        radial-gradient(ellipse 40% 30% at 70% 30%, rgba(58, 107, 115, 0.08), transparent 50%),
        radial-gradient(ellipse 45% 25% at 50% 90%, rgba(184, 149, 106, 0.06), transparent 50%);
      animation: aurora 30s ease-in-out infinite;
      transition: all 1s ease;
    }
    
    @keyframes aurora {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(2%, 1%) scale(1.02); }
      66% { transform: translate(-1%, 2%) scale(0.98); }
    }
    
    /* Error aurora */
    .phone.error .aurora-layer {
      background: 
        radial-gradient(ellipse 50% 35% at 30% 70%, rgba(224, 117, 117, 0.15), transparent 50%),
        radial-gradient(ellipse 40% 30% at 70% 30%, rgba(224, 117, 117, 0.1), transparent 50%);
    }
    
    /* Celebration aurora */
    .phone.celebration .aurora-layer {
      background: 
        radial-gradient(ellipse 50% 35% at 30% 70%, rgba(107, 196, 143, 0.15), transparent 50%),
        radial-gradient(ellipse 40% 30% at 70% 30%, rgba(212, 168, 74, 0.12), transparent 50%),
        radial-gradient(ellipse 45% 25% at 50% 90%, rgba(196, 133, 106, 0.1), transparent 50%);
      animation: aurora 15s ease-in-out infinite;
    }
    
    .glass {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, var(--bg-glass) 0%, rgba(58, 49, 42, 0.8) 100%);
      backdrop-filter: blur(60px);
      border-radius: 52px;
    }
    
    .noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.02;
      mix-blend-mode: overlay;
      pointer-events: none;
    }
    
    .content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 60px 28px 44px;
    }
    
    /* ========================================
       TOP BAR
       ======================================== */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .status-text {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-muted);
      transition: all 0.3s ease;
    }
    
    .status-text strong { color: var(--text-secondary); font-weight: 500; }
    .status-text.error { color: var(--error-red); }
    .status-text.success { color: var(--success-green); }
    
    .menu-btn {
      width: 40px;
      height: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      gap: 5px;
      cursor: pointer;
      padding: 10px;
      border-radius: var(--radius-md);
      transition: all 0.2s var(--ease-spring);
    }
    
    .menu-btn:hover {
      background: var(--bg-glass);
      transform: scale(1.05);
    }
    
    .menu-btn:active { transform: scale(0.95); }
    
    .menu-line {
      height: 2px;
      background: var(--text-muted);
      border-radius: 1px;
      transition: all 0.3s var(--ease-spring);
    }
    
    .menu-line:first-child { width: 20px; }
    .menu-line:last-child { width: 14px; }
    
    .menu-btn:hover .menu-line {
      background: var(--text-primary);
    }
    
    .menu-btn:hover .menu-line:first-child { width: 14px; }
    .menu-btn:hover .menu-line:last-child { width: 20px; }
    
    /* ========================================
       AVATAR
       ======================================== */
    .avatar-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.6s var(--ease-expo);
    }
    
    .avatar-container {
      position: relative;
      width: 180px;
      height: 180px;
      transition: all 0.6s var(--ease-expo);
      cursor: pointer;
    }
    
    /* Hover effect on avatar */
    .avatar-container:hover .avatar {
      transform: scale(1.03);
      box-shadow: 
        0 12px 40px rgba(74, 103, 65, 0.35),
        inset 0 -4px 12px rgba(0, 0, 0, 0.15),
        inset 0 4px 12px rgba(255, 255, 255, 0.1);
    }
    
    .avatar-container:hover .avatar-glow {
      opacity: 0.8;
      transform: scale(1.1);
    }
    
    .avatar-container:active .avatar {
      transform: scale(0.98);
    }
    
    /* Rings */
    .rings {
      position: absolute;
      inset: -50px;
      pointer-events: none;
    }
    
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--ferni-ring);
      transition: all 0.6s var(--ease-gentle);
    }
    
    .ring-1 { inset: 0; animation: ring-breathe 6s ease-in-out infinite; }
    .ring-2 { inset: 10px; animation: ring-breathe 6s ease-in-out infinite -1.5s; }
    .ring-3 { inset: 20px; animation: ring-breathe 6s ease-in-out infinite -3s; }
    .ring-4 { inset: 30px; animation: ring-breathe 6s ease-in-out infinite -4.5s; }
    
    .ring-1 { border-color: rgba(74, 103, 65, 0.08); }
    .ring-2 { border-color: rgba(74, 103, 65, 0.12); }
    .ring-3 { border-color: rgba(74, 103, 65, 0.18); }
    .ring-4 { border-color: rgba(74, 103, 65, 0.25); }
    
    /* Error rings */
    .phone.error .ring { border-color: rgba(224, 117, 117, 0.2) !important; }
    
    /* Celebration rings */
    .phone.celebration .ring {
      animation-duration: 2s !important;
    }
    
    @keyframes ring-breathe {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.5; }
    }
    
    /* Glow */
    .avatar-glow {
      position: absolute;
      inset: 20px;
      background: radial-gradient(circle, var(--ferni-glow), transparent 60%);
      filter: blur(30px);
      opacity: 0.6;
      animation: glow-pulse 6s ease-in-out infinite;
      transition: all 0.4s ease;
    }
    
    .phone.error .avatar-glow {
      background: radial-gradient(circle, var(--error-glow), transparent 60%);
    }
    
    .phone.celebration .avatar-glow {
      background: radial-gradient(circle, var(--success-glow), transparent 60%);
      opacity: 0.9;
      animation-duration: 2s;
    }
    
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.1); }
    }
    
    /* Avatar */
    .avatar {
      position: absolute;
      inset: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s var(--ease-spring);
      box-shadow: 
        0 8px 32px rgba(74, 103, 65, 0.3),
        inset 0 -4px 12px rgba(0, 0, 0, 0.15),
        inset 0 4px 12px rgba(255, 255, 255, 0.1);
    }
    
    .avatar.ferni { background: linear-gradient(145deg, var(--ferni-sage-light), var(--ferni-sage-dark)); }
    .avatar.peter { background: linear-gradient(145deg, var(--peter-teal-light), var(--peter-teal)); }
    .avatar.maya { background: linear-gradient(145deg, var(--maya-terracotta-light), var(--maya-terracotta)); }
    .avatar.alex { background: linear-gradient(145deg, var(--alex-indigo-light), var(--alex-indigo)); }
    
    /* Error avatar */
    .phone.error .avatar {
      background: linear-gradient(145deg, #c06060, #a05050) !important;
      animation: avatar-error 0.5s var(--ease-spring);
    }
    
    @keyframes avatar-error {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.05); }
      50% { transform: scale(0.95); }
      75% { transform: scale(1.02); }
    }
    
    /* Celebration avatar */
    .phone.celebration .avatar {
      animation: avatar-celebrate 1s var(--ease-spring);
    }
    
    @keyframes avatar-celebrate {
      0% { transform: scale(1) rotate(0deg); }
      20% { transform: scale(1.1) rotate(-5deg); }
      40% { transform: scale(1.1) rotate(5deg); }
      60% { transform: scale(1.1) rotate(-3deg); }
      80% { transform: scale(1.05) rotate(2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    
    .initials {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
      color: white;
      letter-spacing: -1px;
      transition: all 0.4s var(--ease-spring);
      user-select: none;
    }
    
    /* ========================================
       NAME SECTION
       ======================================== */
    .name-section {
      margin-top: 32px;
      text-align: center;
      transition: all 0.5s var(--ease-expo);
    }
    
    .name {
      font-family: var(--font-display);
      font-size: 38px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      transition: all 0.4s var(--ease-expo);
    }
    
    .subtitle {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    
    .usage-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius-full);
      font-family: var(--font-accent);
      font-size: 12px;
      font-weight: 500;
      background: var(--accent-gold-glow);
      color: var(--accent-gold);
      margin-bottom: 14px;
      cursor: pointer;
      transition: all 0.2s var(--ease-spring);
    }
    
    .usage-badge:hover {
      transform: scale(1.05);
      background: rgba(212, 168, 74, 0.35);
    }
    
    .usage-badge:active { transform: scale(0.98); }
    
    .usage-badge svg { width: 14px; height: 14px; }
    
    /* Status Pill */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: var(--radius-full);
      background: rgba(74, 103, 65, 0.12);
      border: 1px solid rgba(74, 103, 65, 0.15);
      cursor: pointer;
      transition: all 0.3s var(--ease-spring);
    }
    
    .status-pill:hover {
      background: rgba(74, 103, 65, 0.18);
      transform: scale(1.02);
    }
    
    .status-pill:active { transform: scale(0.98); }
    
    .phone.error .status-pill {
      background: rgba(224, 117, 117, 0.12);
      border-color: rgba(224, 117, 117, 0.2);
    }
    
    .phone.celebration .status-pill {
      background: rgba(107, 196, 143, 0.15);
      border-color: rgba(107, 196, 143, 0.25);
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--ferni-sage);
      border-radius: 50%;
      animation: dot-pulse 3s ease-in-out infinite;
      transition: all 0.3s ease;
    }
    
    .phone.error .status-dot { background: var(--error-red); }
    .phone.celebration .status-dot { background: var(--success-green); }
    
    @keyframes dot-pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    
    .status-pill span {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--ferni-sage);
      font-weight: 500;
    }
    
    .phone.error .status-pill span { color: var(--error-red); }
    .phone.celebration .status-pill span { color: var(--success-green); }
    
    /* ========================================
       WAVEFORM & INDICATORS
       ======================================== */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 48px;
      margin-top: 24px;
      opacity: 0;
      transform: scaleY(0);
      transition: all 0.4s var(--ease-spring);
    }
    
    .waveform.visible { opacity: 1; transform: scaleY(1); }
    
    .wave-bar {
      width: 4px;
      height: 100%;
      background: linear-gradient(to top, var(--ferni-sage), var(--ferni-sage-light));
      border-radius: 2px;
      transform-origin: center;
    }
    
    .waveform.active .wave-bar { animation: wave 0.8s ease-in-out infinite; }
    
    @keyframes wave {
      0%, 100% { transform: scaleY(0.15); opacity: 0.4; }
      50% { transform: scaleY(1); opacity: 1; }
    }
    
    .wave-bar:nth-child(1) { animation-delay: 0s; }
    .wave-bar:nth-child(2) { animation-delay: 0.08s; }
    .wave-bar:nth-child(3) { animation-delay: 0.16s; }
    .wave-bar:nth-child(4) { animation-delay: 0.24s; }
    .wave-bar:nth-child(5) { animation-delay: 0.16s; }
    .wave-bar:nth-child(6) { animation-delay: 0.08s; }
    .wave-bar:nth-child(7) { animation-delay: 0s; }
    
    /* Listening */
    .listening-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
      opacity: 0;
      transition: all 0.4s var(--ease-expo);
    }
    
    .listening-indicator.visible { opacity: 1; }
    
    .listening-line { width: 24px; height: 1px; background: rgba(74, 103, 65, 0.3); }
    
    .listening-dot {
      width: 10px;
      height: 10px;
      background: var(--ferni-sage);
      border-radius: 50%;
      animation: listening-pulse 2s ease-in-out infinite;
    }
    
    @keyframes listening-pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    
    /* Thinking */
    .thinking-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
      opacity: 0;
      transition: all 0.4s var(--ease-expo);
    }
    
    .thinking-dots.visible { opacity: 1; }
    
    .thinking-dot {
      width: 10px;
      height: 10px;
      background: var(--ferni-sage);
      border-radius: 50%;
      animation: thinking-bounce 1.4s ease-in-out infinite;
    }
    
    .thinking-dot:nth-child(1) { animation-delay: 0s; }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes thinking-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-12px); opacity: 1; }
    }
    
    /* Reconnecting spinner */
    .reconnecting-spinner {
      margin-top: 24px;
      opacity: 0;
      transition: all 0.4s var(--ease-expo);
    }
    
    .reconnecting-spinner.visible { opacity: 1; }
    
    .spinner-ring {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(74, 103, 65, 0.2);
      border-top-color: var(--ferni-sage);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* ========================================
       TRANSCRIPT
       ======================================== */
    .transcript {
      margin-top: auto;
      border-radius: var(--radius-lg);
      padding: 18px;
      margin-bottom: 16px;
      background: rgba(0, 0, 0, 0.15);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s var(--ease-expo);
      max-height: 0;
      overflow: hidden;
    }
    
    .transcript.visible {
      opacity: 1;
      transform: translateY(0);
      max-height: 200px;
    }
    
    .transcript-line {
      font-family: var(--font-body);
      font-size: 15px;
      font-style: italic;
      color: var(--text-primary);
      line-height: 1.6;
      opacity: 0;
      animation: transcript-in 0.5s var(--ease-expo) forwards;
    }
    
    @keyframes transcript-in {
      to { opacity: 0.9; }
    }
    
    /* ========================================
       TEAM
       ======================================== */
    .team {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: auto;
      margin-bottom: 20px;
    }
    
    .team-member {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.4s var(--ease-spring);
      opacity: 0.45;
      position: relative;
    }
    
    .team-member::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: all 0.3s var(--ease-spring);
    }
    
    /* Magnetic hover effect */
    .team-member:hover {
      opacity: 0.9;
      transform: translateY(-8px) scale(1.12);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
    }
    
    .team-member:active {
      transform: translateY(-4px) scale(1.05);
    }
    
    .team-member.active {
      opacity: 1;
      transform: scale(1.05);
    }
    
    .team-member.active::before {
      border-color: rgba(255, 255, 255, 0.3);
    }
    
    /* Ripple effect */
    .team-member .ripple {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0);
      opacity: 1;
      pointer-events: none;
    }
    
    .team-member .ripple.active {
      animation: ripple 0.6s var(--ease-expo);
    }
    
    @keyframes ripple {
      to { transform: scale(2.5); opacity: 0; }
    }
    
    .team-add {
      background: rgba(255, 255, 255, 0.05);
      border: 1px dashed var(--border-medium);
      opacity: 0.35;
    }
    
    .team-add:hover {
      opacity: 0.6;
      border-style: solid;
    }
    
    /* ========================================
       ACTION BUTTON
       ======================================== */
    .action-btn {
      width: 100%;
      border: none;
      border-radius: var(--radius-xl);
      padding: 18px;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s var(--ease-spring);
      position: relative;
      overflow: hidden;
    }
    
    .action-btn.primary {
      background: var(--ferni-sage);
      color: white;
      box-shadow: 0 4px 24px rgba(74, 103, 65, 0.3);
    }
    
    .action-btn.primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(74, 103, 65, 0.4);
    }
    
    .action-btn.primary:active {
      transform: translateY(-1px) scale(0.98);
    }
    
    .action-btn.secondary {
      background: transparent;
      border: 1px solid var(--border-medium);
      color: var(--text-muted);
    }
    
    .action-btn.secondary:hover {
      border-color: var(--text-muted);
      color: var(--text-secondary);
      transform: translateY(-2px);
    }
    
    .action-btn.error {
      background: var(--error-red);
      color: white;
      box-shadow: 0 4px 24px var(--error-glow);
    }
    
    .action-btn.success {
      background: var(--success-green);
      color: white;
      box-shadow: 0 4px 24px var(--success-glow);
    }
    
    /* Button shimmer */
    .action-btn.loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 1.5s infinite;
    }
    
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    
    /* Button ripple */
    .action-btn .btn-ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0);
      pointer-events: none;
    }
    
    .action-btn .btn-ripple.active {
      animation: btn-ripple 0.6s var(--ease-expo);
    }
    
    @keyframes btn-ripple {
      to { transform: scale(4); opacity: 0; }
    }
    
    /* ========================================
       CELEBRATION CONFETTI
       ======================================== */
    .confetti-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .confetti-container.active { opacity: 1; }
    
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confetti-fall 3s ease-out forwards;
    }
    
    @keyframes confetti-fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(800px) rotate(720deg);
        opacity: 0;
      }
    }
    
    /* ========================================
       TOAST
       ======================================== */
    .toast {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 20px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-primary);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transition: all 0.4s var(--ease-spring);
      z-index: 50;
      white-space: nowrap;
    }
    
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    
    .toast.success { border-color: var(--success-green); color: var(--success-green); }
    .toast.error { border-color: var(--error-red); color: var(--error-red); }
    
    /* ========================================
       REFLECTION & WELCOME
       ======================================== */
    .special-content {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s var(--ease-expo);
      text-align: center;
    }
    
    .special-content.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    .special-title {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    
    .special-subtitle {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }
    
    .reflection-card, .welcome-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .reflection-quote {
      font-family: var(--font-body);
      font-size: 16px;
      font-style: italic;
      color: var(--text-primary);
      line-height: 1.6;
      margin-bottom: 10px;
    }
    
    .reflection-source {
      font-size: 12px;
      color: var(--text-dimmed);
    }
    
    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
    }
    
    .stat { text-align: center; }
    
    .stat-value {
      font-family: var(--font-accent);
      font-size: 32px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }
    
    /* Welcome specific */
    .welcome-emoji {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .welcome-features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }
    
    .welcome-feature {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(74, 103, 65, 0.08);
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .welcome-feature-icon {
      width: 32px;
      height: 32px;
      background: var(--ferni-sage);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    
    /* ========================================
       STATE MODIFIERS
       ======================================== */
    
    /* Connecting */
    .phone.connecting .avatar {
      animation: avatar-pulse 1s ease-in-out infinite;
    }
    
    @keyframes avatar-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .phone.connecting .ring { animation-duration: 2s !important; }
    .phone.connecting .status-dot { animation: dot-fast 0.5s ease-in-out infinite; }
    
    @keyframes dot-fast {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    
    /* Speaking */
    .phone.speaking .avatar-container { width: 200px; height: 200px; }
    .phone.speaking .avatar { inset: 45px; }
    .phone.speaking .initials { font-size: 42px; }
    .phone.speaking .ring { animation-duration: 3s !important; }
    .phone.speaking .avatar-glow { opacity: 0.9; animation-duration: 3s; }
    .phone.speaking .name-section { margin-top: 24px; }
    .phone.speaking .usage-badge { display: none; }
    
    /* Listening */
    .phone.listening .avatar-container { width: 200px; height: 200px; }
    .phone.listening .avatar { inset: 45px; }
    .phone.listening .initials { font-size: 42px; }
    .phone.listening .ring { animation-duration: 8s !important; }
    .phone.listening .avatar-glow { opacity: 0.4; animation-duration: 8s; }
    .phone.listening .name-section { margin-top: 24px; }
    .phone.listening .usage-badge { display: none; }
    
    /* Thinking */
    .phone.thinking .avatar { animation: thinking-sway 2s ease-in-out infinite; }
    .phone.thinking .ring { animation-duration: 4s !important; }
    
    @keyframes thinking-sway {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(2deg); }
      75% { transform: rotate(-2deg); }
    }
    
    /* Reflection */
    .phone.reflection .avatar-container { width: 100px; height: 100px; }
    .phone.reflection .avatar { inset: 25px; }
    .phone.reflection .initials { font-size: 24px; }
    .phone.reflection .rings { inset: -25px; }
    .phone.reflection .avatar-glow { opacity: 0.3; inset: 10px; }
    .phone.reflection .name-section { display: none; }
    .phone.reflection .team { display: none; }
    
    /* Welcome */
    .phone.welcome .name-section { display: none; }
    .phone.welcome .team { display: none; }
    
    /* Error */
    .phone.error .ring { animation: ring-error 0.5s ease !important; }
    
    @keyframes ring-error {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1); }
      50% { transform: scale(0.95); }
      75% { transform: scale(1.05); }
    }
    
    /* Reconnecting */
    .phone.reconnecting .avatar { opacity: 0.6; }
    .phone.reconnecting .ring { animation-duration: 3s !important; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="page">
    <div class="controls">
      <div class="theme-toggle">
        <button class="theme-btn active" data-theme="dark">Cedar Night</button>
        <button class="theme-btn" data-theme="light">Zen Garden</button>
      </div>
      <div class="control-row">
        <button class="state-btn active" data-state="idle">Idle</button>
        <button class="state-btn" data-state="welcome">Welcome</button>
        <button class="state-btn" data-state="connecting">Connecting</button>
        <button class="state-btn" data-state="speaking">Speaking</button>
        <button class="state-btn" data-state="listening">Listening</button>
        <button class="state-btn" data-state="thinking">Thinking</button>
        <button class="state-btn" data-state="handoff">Handoff</button>
      </div>
      <div class="control-row">
        <button class="state-btn error" data-state="error">Error</button>
        <button class="state-btn" data-state="reconnecting">Reconnecting</button>
        <button class="state-btn success" data-state="celebration">Celebration</button>
        <button class="state-btn" data-state="reflection">Reflection</button>
      </div>
    </div>
    
    <div class="phone-container">
      <div class="phone" id="phone">
        <div class="aurora"><div class="aurora-layer"></div></div>
        <div class="noise"></div>
        <div class="glass"></div>
        
        <!-- Confetti -->
        <div class="confetti-container" id="confetti"></div>
        
        <!-- Toast -->
        <div class="toast" id="toast"></div>
        
        <div class="content">
          <div class="top-bar">
            <span class="status-text" id="statusText">Welcome back</span>
            <div class="menu-btn" id="menuBtn">
              <div class="menu-line"></div>
              <div class="menu-line"></div>
            </div>
          </div>
          
          <div class="avatar-section">
            <div class="avatar-container" id="avatarContainer">
              <div class="avatar-glow"></div>
              <div class="rings">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-3"></div>
                <div class="ring ring-4"></div>
              </div>
              <div class="avatar ferni" id="avatar">
                <span class="initials" id="initials">FE</span>
              </div>
            </div>
            
            <div class="waveform" id="waveform">
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
              <div class="wave-bar"></div>
            </div>
            
            <div class="listening-indicator" id="listeningIndicator">
              <div class="listening-line"></div>
              <div class="listening-dot"></div>
              <div class="listening-line"></div>
            </div>
            
            <div class="thinking-dots" id="thinkingDots">
              <div class="thinking-dot"></div>
              <div class="thinking-dot"></div>
              <div class="thinking-dot"></div>
            </div>
            
            <div class="reconnecting-spinner" id="reconnectingSpinner">
              <div class="spinner-ring"></div>
            </div>
            
            <div class="name-section" id="nameSection">
              <h2 class="name" id="personaName">Ferni</h2>
              <p class="subtitle" id="personaSubtitle">Building something together</p>
              <div class="usage-badge" id="usageBadge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
                5 left
              </div>
              <div class="status-pill" id="statusPill">
                <span class="status-dot"></span>
                <span id="statusLabel">Ready to listen</span>
              </div>
            </div>
            
            <!-- Special content for reflection/welcome/celebration -->
            <div class="special-content" id="specialContent"></div>
          </div>
          
          <div class="transcript" id="transcript">
            <p class="transcript-line" id="transcriptText"></p>
          </div>
          
          <div class="team" id="team">
            <div class="team-member active" data-persona="ferni" style="background: linear-gradient(145deg, var(--ferni-sage-light), var(--ferni-sage-dark));">
              <span>FE</span>
              <div class="ripple"></div>
            </div>
            <div class="team-member" data-persona="peter" style="background: linear-gradient(145deg, var(--peter-teal-light), var(--peter-teal));">
              <span>PJ</span>
              <div class="ripple"></div>
            </div>
            <div class="team-member" data-persona="maya" style="background: linear-gradient(145deg, var(--maya-terracotta-light), var(--maya-terracotta));">
              <span>MS</span>
              <div class="ripple"></div>
            </div>
            <div class="team-member" data-persona="alex" style="background: linear-gradient(145deg, var(--alex-indigo-light), var(--alex-indigo));">
              <span>AC</span>
              <div class="ripple"></div>
            </div>
            <div class="team-member team-add">+</div>
          </div>
          
          <button class="action-btn primary" id="actionBtn">
            <span>Connect</span>
            <div class="btn-ripple"></div>
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    const phone = document.getElementById('phone');
    const avatar = document.getElementById('avatar');
    const avatarContainer = document.getElementById('avatarContainer');
    const initials = document.getElementById('initials');
    const personaName = document.getElementById('personaName');
    const personaSubtitle = document.getElementById('personaSubtitle');
    const statusText = document.getElementById('statusText');
    const statusLabel = document.getElementById('statusLabel');
    const statusPill = document.getElementById('statusPill');
    const usageBadge = document.getElementById('usageBadge');
    const nameSection = document.getElementById('nameSection');
    const waveform = document.getElementById('waveform');
    const listeningIndicator = document.getElementById('listeningIndicator');
    const thinkingDots = document.getElementById('thinkingDots');
    const reconnectingSpinner = document.getElementById('reconnectingSpinner');
    const transcript = document.getElementById('transcript');
    const transcriptText = document.getElementById('transcriptText');
    const specialContent = document.getElementById('specialContent');
    const team = document.getElementById('team');
    const actionBtn = document.getElementById('actionBtn');
    const confetti = document.getElementById('confetti');
    const toast = document.getElementById('toast');
    const menuBtn = document.getElementById('menuBtn');
    
    const personas = {
      ferni: { name: 'Ferni', initials: 'FE', subtitle: 'Building something together', class: 'ferni' },
      peter: { name: 'Peter', initials: 'PJ', subtitle: 'Research & insights', class: 'peter' },
      maya: { name: 'Maya', initials: 'MS', subtitle: 'Habits & routines', class: 'maya' },
      alex: { name: 'Alex', initials: 'AC', subtitle: 'Communication coach', class: 'alex' }
    };
    
    let currentPersona = 'ferni';
    let currentState = 'idle';
    
    // Theme
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.body.classList.toggle('theme-light', btn.dataset.theme === 'light');
        showToast('Theme changed');
      });
    });
    
    // States
    document.querySelectorAll('.state-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        setState(btn.dataset.state);
      });
    });
    
    // Team click with ripple
    document.querySelectorAll('.team-member:not(.team-add)').forEach(member => {
      member.addEventListener('click', (e) => {
        // Ripple
        const ripple = member.querySelector('.ripple');
        ripple.classList.remove('active');
        void ripple.offsetWidth;
        ripple.classList.add('active');
        
        const persona = member.dataset.persona;
        if (persona !== currentPersona) {
          performHandoff(persona);
        }
      });
    });
    
    // Action button ripple
    actionBtn.addEventListener('click', (e) => {
      const ripple = actionBtn.querySelector('.btn-ripple');
      const rect = actionBtn.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      ripple.classList.remove('active');
      void ripple.offsetWidth;
      ripple.classList.add('active');
      
      handleActionClick();
    });
    
    // Menu hover micro-interaction
    menuBtn.addEventListener('click', () => {
      showToast('Menu clicked');
    });
    
    // Avatar click
    avatarContainer.addEventListener('click', () => {
      if (currentState === 'idle') {
        showToast('Starting conversation...');
        setState('connecting');
        document.querySelector('[data-state="connecting"]').classList.add('active');
        document.querySelector('[data-state="idle"]').classList.remove('active');
      }
    });
    
    function setState(state) {
      currentState = state;
      
      // Reset
      phone.className = 'phone';
      waveform.classList.remove('visible', 'active');
      listeningIndicator.classList.remove('visible');
      thinkingDots.classList.remove('visible');
      reconnectingSpinner.classList.remove('visible');
      transcript.classList.remove('visible');
      specialContent.classList.remove('visible');
      specialContent.innerHTML = '';
      actionBtn.classList.remove('loading', 'error', 'success');
      statusText.classList.remove('error', 'success');
      nameSection.style.display = '';
      team.style.display = '';
      usageBadge.style.display = '';
      confetti.classList.remove('active');
      confetti.innerHTML = '';
      
      switch(state) {
        case 'idle':
          statusText.innerHTML = 'Welcome back';
          statusLabel.textContent = 'Ready to listen';
          actionBtn.querySelector('span').textContent = 'Connect';
          actionBtn.className = 'action-btn primary';
          break;
          
        case 'welcome':
          phone.classList.add('welcome');
          statusText.innerHTML = 'Nice to meet you';
          specialContent.innerHTML = `
            <div class="welcome-emoji">👋</div>
            <h3 class="special-title">Welcome to Ferni</h3>
            <p class="special-subtitle">Your AI team is here to help you grow, one conversation at a time.</p>
            <div class="welcome-card">
              <div class="welcome-features">
                <div class="welcome-feature">
                  <div class="welcome-feature-icon">🎯</div>
                  <span>Set goals and track progress</span>
                </div>
                <div class="welcome-feature">
                  <div class="welcome-feature-icon">💬</div>
                  <span>Talk through anything on your mind</span>
                </div>
                <div class="welcome-feature">
                  <div class="welcome-feature-icon">🤝</div>
                  <span>Meet your team of AI coaches</span>
                </div>
              </div>
            </div>
          `;
          specialContent.classList.add('visible');
          actionBtn.querySelector('span').textContent = 'Get started';
          actionBtn.className = 'action-btn primary';
          break;
          
        case 'connecting':
          phone.classList.add('connecting');
          statusText.innerHTML = '<strong>Connecting...</strong>';
          statusLabel.textContent = 'Reaching out';
          actionBtn.querySelector('span').textContent = 'Connecting...';
          actionBtn.classList.add('loading');
          setTimeout(() => {
            if (currentState === 'connecting') {
              setState('speaking');
              document.querySelector('[data-state="speaking"]').classList.add('active');
              document.querySelector('[data-state="connecting"]').classList.remove('active');
            }
          }, 2000);
          break;
          
        case 'speaking':
          phone.classList.add('speaking');
          statusText.innerHTML = '<strong>Connected</strong>';
          statusLabel.textContent = 'Speaking';
          waveform.classList.add('visible', 'active');
          transcript.classList.add('visible');
          transcriptText.textContent = '"I hear what you\'re saying about feeling overwhelmed. Let\'s take this one step at a time..."';
          actionBtn.querySelector('span').textContent = 'End conversation';
          actionBtn.className = 'action-btn secondary';
          break;
          
        case 'listening':
          phone.classList.add('listening');
          statusText.innerHTML = '<strong>Connected</strong>';
          statusLabel.textContent = 'Listening';
          listeningIndicator.classList.add('visible');
          transcript.classList.add('visible');
          transcriptText.textContent = '"I\'ve been thinking about what you said last time..."';
          actionBtn.querySelector('span').textContent = 'End conversation';
          actionBtn.className = 'action-btn secondary';
          break;
          
        case 'thinking':
          phone.classList.add('thinking');
          statusText.innerHTML = '<strong>Connected</strong>';
          statusLabel.textContent = 'Thinking...';
          thinkingDots.classList.add('visible');
          actionBtn.querySelector('span').textContent = 'End conversation';
          actionBtn.className = 'action-btn secondary';
          break;
          
        case 'handoff':
          performHandoff('peter');
          break;
          
        case 'error':
          phone.classList.add('error', 'shake');
          statusText.innerHTML = 'Connection lost';
          statusText.classList.add('error');
          statusLabel.textContent = 'Unable to connect';
          actionBtn.querySelector('span').textContent = 'Try again';
          actionBtn.className = 'action-btn error';
          showToast('Connection failed', 'error');
          setTimeout(() => phone.classList.remove('shake'), 600);
          break;
          
        case 'reconnecting':
          phone.classList.add('reconnecting');
          statusText.innerHTML = 'Reconnecting...';
          statusLabel.textContent = 'Please wait';
          reconnectingSpinner.classList.add('visible');
          actionBtn.querySelector('span').textContent = 'Cancel';
          actionBtn.className = 'action-btn secondary';
          break;
          
        case 'celebration':
          phone.classList.add('celebration');
          statusText.innerHTML = '🎉 Milestone reached!';
          statusText.classList.add('success');
          statusLabel.textContent = '5 day streak!';
          showConfetti();
          showToast('Amazing! 5 day streak! 🔥', 'success');
          specialContent.innerHTML = `
            <h3 class="special-title">You're on fire! 🔥</h3>
            <p class="special-subtitle">5 conversations in a row. Your commitment to growth is inspiring.</p>
            <div class="reflection-card">
              <div class="stats">
                <div class="stat">
                  <div class="stat-value">5</div>
                  <div class="stat-label">day streak</div>
                </div>
                <div class="stat">
                  <div class="stat-value">23</div>
                  <div class="stat-label">total chats</div>
                </div>
                <div class="stat">
                  <div class="stat-value">4h</div>
                  <div class="stat-label">time invested</div>
                </div>
              </div>
            </div>
          `;
          specialContent.classList.add('visible');
          actionBtn.querySelector('span').textContent = 'Keep going';
          actionBtn.className = 'action-btn success';
          break;
          
        case 'reflection':
          phone.classList.add('reflection');
          statusText.innerHTML = 'Session complete';
          specialContent.innerHTML = `
            <h3 class="special-title">A moment to reflect</h3>
            <div class="reflection-card">
              <p class="reflection-quote">"You mentioned feeling overwhelmed by choices. Remember: you don't have to have all the answers today."</p>
              <p class="reflection-source">— from today's conversation</p>
            </div>
            <div class="stats">
              <div class="stat">
                <div class="stat-value">12</div>
                <div class="stat-label">minutes</div>
              </div>
              <div class="stat">
                <div class="stat-value">3</div>
                <div class="stat-label">insights</div>
              </div>
              <div class="stat">
                <div class="stat-value">5</div>
                <div class="stat-label">day streak</div>
              </div>
            </div>
          `;
          specialContent.classList.add('visible');
          actionBtn.querySelector('span').textContent = 'Continue later';
          actionBtn.className = 'action-btn primary';
          break;
      }
    }
    
    function performHandoff(toPersona) {
      const fromMember = document.querySelector(`[data-persona="${currentPersona}"]`);
      const toMember = document.querySelector(`[data-persona="${toPersona}"]`);
      
      fromMember.classList.remove('active');
      phone.classList.add('handoff');
      
      setTimeout(() => {
        toMember.classList.add('active');
        currentPersona = toPersona;
        const p = personas[toPersona];
        avatar.className = `avatar ${p.class}`;
        initials.textContent = p.initials;
        personaName.textContent = p.name;
        personaSubtitle.textContent = p.subtitle;
        
        showToast(`Switched to ${p.name}`);
        
        setTimeout(() => {
          phone.classList.remove('handoff');
          if (currentState === 'handoff') {
            setState('speaking');
            document.querySelector('[data-state="speaking"]').classList.add('active');
            document.querySelector('[data-state="handoff"]').classList.remove('active');
          }
        }, 400);
      }, 400);
    }
    
    function handleActionClick() {
      if (currentState === 'idle' || currentState === 'welcome') {
        setState('connecting');
        document.querySelector('[data-state="connecting"]').classList.add('active');
        document.querySelector(`[data-state="${currentState}"]`).classList.remove('active');
      } else if (currentState === 'error') {
        setState('connecting');
        document.querySelector('[data-state="connecting"]').classList.add('active');
        document.querySelector('[data-state="error"]').classList.remove('active');
      } else if (currentState === 'celebration' || currentState === 'reflection') {
        setState('idle');
        document.querySelector('[data-state="idle"]').classList.add('active');
        document.querySelector(`[data-state="${currentState}"]`).classList.remove('active');
      } else if (currentState !== 'connecting') {
        setState('reflection');
        document.querySelector('[data-state="reflection"]').classList.add('active');
        document.querySelector(`[data-state="${currentState}"]`).classList.remove('active');
      }
    }
    
    function showToast(message, type = '') {
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2500);
    }
    
    function showConfetti() {
      confetti.classList.add('active');
      const colors = ['#6bc48f', '#d4a84a', '#c4856a', '#4a6741', '#3a6b73'];
      for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 2 + 's';
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        confetti.appendChild(piece);
      }
      setTimeout(() => {
        confetti.classList.remove('active');
        confetti.innerHTML = '';
      }, 4000);
    }
  </script>
</body>
