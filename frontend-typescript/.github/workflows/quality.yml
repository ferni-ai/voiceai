name: Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Design token validation
        run: npm run lint:tokens

      - name: Run tests
        run: npm test -- --run

  ui-audit:
    name: UI Quality Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run UI audit
        id: audit
        run: |
          npm run audit:ui 2>&1 | tee ui-audit-report.txt || true
          ERRORS=$(grep "Errors:" ui-audit-report.txt | grep -oP '\d+' || echo "0")
          WARNINGS=$(grep "Warnings:" ui-audit-report.txt | grep -oP '\d+' || echo "0")
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT

      - name: Fail on UI errors
        if: steps.audit.outputs.errors != '0'
        run: |
          echo "UI audit found ${{ steps.audit.outputs.errors }} errors"
          exit 1

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-audit-report
          path: ui-audit-report.txt

  pr-compliance:
    name: PR Compliance Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check design tokens
        id: tokens
        run: |
          npm run lint:tokens 2>&1 | tee token-report.txt
          echo "status=pass" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run UI audit
        id: audit
        run: |
          npm run audit:ui 2>&1 | tee ui-audit-report.txt || true
          ERRORS=$(grep "Errors:" ui-audit-report.txt | grep -oP '\d+' || echo "0")
          WARNINGS=$(grep "Warnings:" ui-audit-report.txt | grep -oP '\d+' || echo "0")
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT

      - name: Check file sizes
        id: sizes
        run: |
          echo "## Large Files Report" > size-report.txt
          echo "" >> size-report.txt
          find src/ui -name "*.ts" -exec wc -l {} + | sort -rn | head -20 >> size-report.txt
          LARGE_FILES=$(find src/ui -name "*.ts" -exec wc -l {} + | awk '$1 > 500 {count++} END {print count+0}')
          echo "large_files=$LARGE_FILES" >> $GITHUB_OUTPUT

      - name: Comment PR with compliance report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const auditReport = fs.readFileSync('ui-audit-report.txt', 'utf8');
            const sizeReport = fs.readFileSync('size-report.txt', 'utf8');

            const errors = '${{ steps.audit.outputs.errors }}';
            const warnings = '${{ steps.audit.outputs.warnings }}';
            const largeFiles = '${{ steps.sizes.outputs.large_files }}';
            const tokenStatus = '${{ steps.tokens.outputs.status }}' === 'pass' ? '✅' : '❌';

            const errorIcon = errors === '0' ? '✅' : '❌';
            const warningIcon = parseInt(warnings) < 500 ? '✅' : '⚠️';
            const sizeIcon = largeFiles === '0' ? '✅' : '⚠️';

            const body = `## 🔍 Code Quality Report

            | Check | Status | Details |
            |-------|--------|---------|
            | Design Tokens | ${tokenStatus} | All values use CSS variables |
            | UI Errors | ${errorIcon} | ${errors} errors found |
            | UI Warnings | ${warningIcon} | ${warnings} warnings |
            | Large Files | ${sizeIcon} | ${largeFiles} files > 500 lines |

            <details>
            <summary>📊 UI Audit Summary</summary>

            \`\`\`
            ${auditReport.split('\n').slice(0, 40).join('\n')}
            \`\`\`

            </details>

            <details>
            <summary>📏 File Size Report</summary>

            \`\`\`
            ${sizeReport}
            \`\`\`

            </details>

            ---
            *Run \`npm run audit:ui\` locally for full details*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
