<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Insights | Ferni Admin</title>
  <link rel="icon" href="/images/favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-ferni: #4a6741;
      --color-ferni-dark: #3d5a35;
      --color-peter: #3a6b73;
      --color-alex: #5a6b8a;
      --color-maya: #a67a6a;
      --color-jordan: #c4856a;
      --color-nayan: #b8956a;
      --color-bg: #f5f1e8;
      --color-bg-elevated: #fffdfb;
      --color-text-primary: #2c2520;
      --color-text-secondary: #70605a;
      --color-text-muted: #9a8f84;
      --color-border: rgba(0, 0, 0, 0.1);
      --font-body: 'Inter', sans-serif;
      --font-display: 'Plus Jakarta Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text-primary);
      line-height: 1.5;
    }

    .header {
      background: var(--color-bg-elevated);
      border-bottom: 1px solid var(--color-border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header__title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-ferni);
    }

    .header__actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn--primary {
      background: var(--color-ferni);
      color: white;
    }

    .btn--primary:hover {
      background: var(--color-ferni-dark);
    }

    .btn--secondary {
      background: var(--color-bg);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border);
    }

    .btn--secondary:hover {
      background: var(--color-bg-elevated);
    }

    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .card {
      background: var(--color-bg-elevated);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card__title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .card__subtitle {
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    /* Metrics */
    .metric {
      text-align: center;
      padding: 20px;
    }

    .metric__value {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--color-ferni);
    }

    .metric__label {
      font-size: 0.9rem;
      color: var(--color-text-secondary);
      margin-top: 4px;
    }

    .metric__change {
      font-size: 0.8rem;
      margin-top: 8px;
    }

    .metric__change--up {
      color: var(--color-ferni);
    }

    .metric__change--down {
      color: #c0392b;
    }

    /* Insights */
    .insight {
      display: flex;
      gap: 12px;
      padding: 16px;
      background: var(--color-bg);
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .insight:last-child {
      margin-bottom: 0;
    }

    .insight__avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .insight__avatar--ferni { background: var(--color-ferni); }
    .insight__avatar--peter { background: var(--color-peter); }
    .insight__avatar--alex { background: var(--color-alex); }
    .insight__avatar--maya { background: var(--color-maya); }
    .insight__avatar--jordan { background: var(--color-jordan); }

    .insight__content {
      flex: 1;
    }

    .insight__title {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    .insight__description {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      margin-bottom: 8px;
    }

    .insight__action {
      font-size: 0.8rem;
      color: var(--color-ferni);
      font-weight: 500;
    }

    .insight__badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .insight__badge--observation { background: rgba(90, 107, 138, 0.15); color: var(--color-alex); }
    .insight__badge--recommendation { background: rgba(74, 103, 65, 0.15); color: var(--color-ferni); }
    .insight__badge--experiment { background: rgba(196, 133, 106, 0.15); color: var(--color-jordan); }
    .insight__badge--alert { background: rgba(192, 57, 43, 0.15); color: #c0392b; }

    /* Experiments */
    .experiment {
      padding: 16px;
      background: var(--color-bg);
      border-radius: 12px;
      margin-bottom: 12px;
      border-left: 4px solid var(--color-ferni);
    }

    .experiment__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .experiment__name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .experiment__impact {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 600;
    }

    .experiment__impact--high { background: var(--color-ferni); color: white; }
    .experiment__impact--medium { background: var(--color-jordan); color: white; }
    .experiment__impact--low { background: var(--color-text-muted); color: white; }

    .experiment__hypothesis {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      margin-bottom: 12px;
      font-style: italic;
    }

    .experiment__actions {
      display: flex;
      gap: 8px;
    }

    /* Summary */
    .summary {
      padding: 20px;
      background: rgba(74, 103, 65, 0.08);
      border-radius: 12px;
      font-size: 1rem;
      line-height: 1.6;
      border-left: 4px solid var(--color-ferni);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--color-text-muted);
    }

    .loading__spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-ferni);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 40px;
      color: var(--color-text-muted);
    }

    .empty__icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-text-primary);
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .toast.is-visible {
      opacity: 1;
      visibility: visible;
    }

    /* Section */
    .section {
      margin-bottom: 32px;
    }

    .section__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section__title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="header__title">🧠 Landing Insights</h1>
    <div class="header__actions">
      <button class="btn btn--secondary" onclick="refreshData()">
        ↻ Refresh
      </button>
      <button class="btn btn--primary" onclick="generateReport()">
        ✨ Generate Report
      </button>
    </div>
  </header>

  <main class="main">
    <!-- Metrics Grid -->
    <div class="grid" id="metricsGrid">
      <div class="card">
        <div class="metric">
          <div class="metric__value" id="visitors">-</div>
          <div class="metric__label">Visitors (7 days)</div>
        </div>
      </div>
      <div class="card">
        <div class="metric">
          <div class="metric__value" id="conversionRate">-</div>
          <div class="metric__label">Conversion Rate</div>
        </div>
      </div>
      <div class="card">
        <div class="metric">
          <div class="metric__value" id="avgTime">-</div>
          <div class="metric__label">Avg Time on Page</div>
        </div>
      </div>
      <div class="card">
        <div class="metric">
          <div class="metric__value" id="returning">-</div>
          <div class="metric__label">Returning Visitors</div>
        </div>
      </div>
    </div>

    <!-- Summary -->
    <section class="section">
      <div class="section__header">
        <h2 class="section__title">Team Summary</h2>
        <span class="card__subtitle" id="reportDate">-</span>
      </div>
      <div class="summary" id="summary">
        <div class="loading">
          <div class="loading__spinner"></div>
          Loading insights...
        </div>
      </div>
    </section>

    <!-- Insights -->
    <section class="section">
      <div class="section__header">
        <h2 class="section__title">Team Insights</h2>
        <select id="personaFilter" onchange="filterInsights(this.value)">
          <option value="all">All Personas</option>
          <option value="peter">Peter (Research)</option>
          <option value="alex">Alex (Copy)</option>
          <option value="maya">Maya (Behavior)</option>
          <option value="jordan">Jordan (Planning)</option>
          <option value="ferni">Ferni (Synthesis)</option>
        </select>
      </div>
      <div class="card">
        <div id="insightsList">
          <div class="loading">
            <div class="loading__spinner"></div>
            Loading insights...
          </div>
        </div>
      </div>
    </section>

    <!-- Experiments -->
    <section class="section">
      <div class="section__header">
        <h2 class="section__title">Suggested Experiments</h2>
      </div>
      <div class="card">
        <div id="experimentsList">
          <div class="loading">
            <div class="loading__spinner"></div>
            Loading experiments...
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = '/api/landing/optimization';
    const ADMIN_KEY = 'dev-mode'; // In production, use proper auth
    
    let allInsights = [];

    async function fetchWithAuth(url, options = {}) {
      return fetch(url, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'X-Admin-Key': ADMIN_KEY,
          ...options.headers,
        },
      });
    }

    async function loadMetrics() {
      try {
        const res = await fetchWithAuth(`${API_BASE}/metrics?period=week`);
        const metrics = await res.json();

        document.getElementById('visitors').textContent = metrics.visitors.toLocaleString();
        document.getElementById('conversionRate').textContent = `${metrics.conversionRate.toFixed(1)}%`;
        document.getElementById('avgTime').textContent = `${Math.round(metrics.avgTimeOnPage)}s`;
        document.getElementById('returning').textContent = metrics.returningVisitors.toLocaleString();
      } catch (error) {
        console.error('Failed to load metrics:', error);
      }
    }

    async function loadInsights() {
      try {
        const res = await fetchWithAuth(`${API_BASE}/insights`);
        const data = await res.json();
        
        allInsights = data.insights || [];
        
        if (data.generatedAt) {
          const date = new Date(data.generatedAt);
          document.getElementById('reportDate').textContent = 
            `Last updated: ${date.toLocaleDateString()} ${date.toLocaleTimeString()}`;
        }
        
        renderInsights(allInsights);
      } catch (error) {
        console.error('Failed to load insights:', error);
        document.getElementById('insightsList').innerHTML = `
          <div class="empty">
            <div class="empty__icon">📊</div>
            <p>No insights yet. Generate a report to get started.</p>
          </div>
        `;
      }
    }

    function renderInsights(insights) {
      const container = document.getElementById('insightsList');
      
      if (!insights.length) {
        container.innerHTML = `
          <div class="empty">
            <div class="empty__icon">💡</div>
            <p>No insights available. Generate a report to get team analysis.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = insights.map(insight => {
        const avatarInitials = {
          ferni: 'FE', peter: 'PL', alex: 'AX', maya: 'MY', jordan: 'JD'
        }[insight.persona] || '??';

        return `
          <div class="insight">
            <div class="insight__avatar insight__avatar--${insight.persona}">${avatarInitials}</div>
            <div class="insight__content">
              <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
                <span class="insight__title">${insight.title}</span>
                <span class="insight__badge insight__badge--${insight.type}">${insight.type}</span>
              </div>
              <p class="insight__description">${insight.description}</p>
              ${insight.suggestedAction ? `<p class="insight__action">→ ${insight.suggestedAction}</p>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function filterInsights(persona) {
      if (persona === 'all') {
        renderInsights(allInsights);
      } else {
        renderInsights(allInsights.filter(i => i.persona === persona));
      }
    }

    async function loadExperiments() {
      try {
        const res = await fetchWithAuth(`${API_BASE}/experiments`);
        const data = await res.json();
        
        const container = document.getElementById('experimentsList');
        const experiments = data.experiments || [];

        if (!experiments.length) {
          container.innerHTML = `
            <div class="empty">
              <div class="empty__icon">🧪</div>
              <p>No experiments suggested yet. Generate a report to get recommendations.</p>
            </div>
          `;
          return;
        }

        container.innerHTML = experiments.map(exp => `
          <div class="experiment">
            <div class="experiment__header">
              <span class="experiment__name">${exp.name}</span>
              <span class="experiment__impact experiment__impact--${exp.estimatedImpact}">${exp.estimatedImpact} impact</span>
            </div>
            <p class="experiment__hypothesis">"${exp.hypothesis}"</p>
            <p style="font-size: 0.85rem; color: var(--color-text-secondary); margin-bottom: 12px;">
              <strong>Suggested by:</strong> ${exp.persona} • 
              <strong>Duration:</strong> ${exp.suggestedDuration} days • 
              <strong>Metric:</strong> ${exp.targetMetric}
            </p>
            <div class="experiment__actions">
              <button class="btn btn--primary" onclick="approveExperiment('${exp.id}')">
                Approve & Start
              </button>
              <button class="btn btn--secondary" onclick="viewExperimentDetails('${exp.id}')">
                View Details
              </button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Failed to load experiments:', error);
      }
    }

    async function loadSummary() {
      try {
        const res = await fetchWithAuth(`${API_BASE}/reports?limit=1`);
        const data = await res.json();
        
        const container = document.getElementById('summary');
        
        if (!data.reports?.length) {
          container.innerHTML = `
            <p>No reports generated yet. Click "Generate Report" to get AI-powered insights from Ferni's team.</p>
          `;
          return;
        }

        const report = data.reports[0];
        container.textContent = report.summary || 'Report generated successfully.';
      } catch (error) {
        document.getElementById('summary').innerHTML = `
          <p>Click "Generate Report" to get AI-powered insights from Ferni's team.</p>
        `;
      }
    }

    async function generateReport() {
      showToast('Generating report... This may take a minute.');
      
      try {
        const res = await fetchWithAuth(`${API_BASE}/report`, {
          method: 'POST',
          body: JSON.stringify({ period: 'week' }),
        });
        
        const report = await res.json();
        
        showToast('Report generated successfully!');
        await refreshData();
      } catch (error) {
        showToast('Failed to generate report. Check console.');
        console.error('Failed to generate report:', error);
      }
    }

    async function approveExperiment(experimentId) {
      try {
        await fetchWithAuth(`${API_BASE}/experiments/${experimentId}/approve`, {
          method: 'POST',
        });
        showToast('Experiment approved and scheduled!');
      } catch (error) {
        showToast('Failed to approve experiment.');
        console.error(error);
      }
    }

    function viewExperimentDetails(experimentId) {
      showToast('Experiment details coming soon...');
    }

    async function refreshData() {
      await Promise.all([
        loadMetrics(),
        loadSummary(),
        loadInsights(),
        loadExperiments(),
      ]);
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('is-visible');
      setTimeout(() => toast.classList.remove('is-visible'), 3000);
    }

    // Initialize
    refreshData();
  </script>
</body>
</html>
