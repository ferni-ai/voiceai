<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Self-Healing | Ferni Observability</title>
  <link rel="stylesheet" href="/design-system/tokens.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--color-background-primary); color: var(--color-text-primary); min-height: 100vh; line-height: 1.6; }
    
    .skip-link { position: absolute; top: -40px; left: 0; background: var(--color-accent-primary); color: white; padding: 8px 16px; z-index: 1000; transition: top 0.3s; }
    .skip-link:focus { top: 0; }
    
    .nav-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--color-background-secondary); border-bottom: 1px solid var(--color-border-subtle); position: sticky; top: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 0.75rem; }
    .nav-brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #4a6741, #3d5a35); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .nav-brand-text { font-family: var(--font-display); font-size: 1.125rem; font-weight: 600; }
    .nav-links { display: flex; gap: 0.5rem; }
    .nav-link { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 8px; color: var(--color-text-secondary, #e8e2da); text-decoration: none; font-size: 0.875rem; transition: all 200ms ease; }
    .nav-link:hover { background: rgba(250, 246, 240, 0.05); color: var(--color-text-primary); }
    .nav-link.active { background: #4a6741; color: white; }
    .nav-link .icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }
    
    .main-content { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .page-header { margin-bottom: 2rem; display: flex; align-items: flex-start; justify-content: space-between; }
    .page-eyebrow { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #4a6741; margin-bottom: 0.5rem; }
    .page-title { font-family: var(--font-display); font-size: 2rem; font-weight: 700; }
    .page-subtitle { color: var(--color-text-secondary, #c4bdb4); font-size: 1rem; margin-top: 0.25rem; }
    
    /* Health Banner */
    .health-banner { background: var(--color-background-elevated, #252220); border-radius: 16px; padding: 1.5rem 2rem; border: 1px solid rgba(250, 246, 240, 0.1); margin-bottom: 2rem; display: flex; align-items: center; gap: 2rem; }
    .health-status { display: flex; align-items: center; gap: 1rem; }
    .health-dot { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: pulse 2s infinite; }
    .health-dot.healthy { background: radial-gradient(circle, #5a8751 0%, #3d5a35 100%); box-shadow: 0 0 20px rgba(74, 103, 65, 0.5); }
    .health-dot.degraded { background: radial-gradient(circle, #c4956a 0%, #9a7b5a 100%); box-shadow: 0 0 20px rgba(196, 133, 106, 0.5); }
    .health-dot.critical { background: radial-gradient(circle, #e08080 0%, #b05050 100%); box-shadow: 0 0 20px rgba(224, 112, 112, 0.5); animation: pulse-fast 1s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    @keyframes pulse-fast { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.6; } }
    .health-dot .icon { width: 24px; height: 24px; stroke: white; stroke-width: 2; fill: none; }
    .health-text { font-family: var(--font-display); }
    .health-label { font-size: 2rem; font-weight: 700; text-transform: uppercase; }
    .health-sublabel { font-size: 0.875rem; color: var(--color-text-muted); }
    
    /* Stats Grid */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--color-background-elevated, #252220); border-radius: 12px; padding: 1.25rem; border: 1px solid rgba(250, 246, 240, 0.1); }
    .stat-label { font-size: 0.75rem; color: var(--color-text-muted, #a09890); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .stat-value { font-family: var(--font-mono); font-size: 1.75rem; font-weight: 700; }
    .stat-value.green { color: #4a6741; }
    .stat-value.yellow { color: #c4856a; }
    .stat-value.red { color: #e07070; }
    .stat-subtext { font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.25rem; }
    
    /* Sections */
    .section { background: var(--color-background-elevated, #252220); border-radius: 16px; padding: 1.5rem; border: 1px solid rgba(250, 246, 240, 0.1); margin-bottom: 1.5rem; }
    .section-title { font-family: var(--font-display); font-weight: 600; font-size: 1.125rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .section-title .icon { width: 20px; height: 20px; stroke: #4a6741; stroke-width: 2; fill: none; }
    
    /* Grid Layouts */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    @media (max-width: 1100px) { .three-col { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 900px) { .two-col, .three-col { grid-template-columns: 1fr; } }
    
    /* Circuit Breaker Cards */
    .circuit-card { display: flex; align-items: center; gap: 1rem; padding: 1rem; background: var(--color-background-base, #1a1614); border-radius: 12px; margin-bottom: 0.75rem; transition: all 200ms ease; }
    .circuit-card:last-child { margin-bottom: 0; }
    .circuit-card:hover { background: rgba(250, 246, 240, 0.03); }
    .circuit-indicator { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .circuit-indicator.closed { background: #4a6741; box-shadow: 0 0 8px rgba(74, 103, 65, 0.5); }
    .circuit-indicator.half_open { background: #c4856a; box-shadow: 0 0 8px rgba(196, 133, 106, 0.5); animation: pulse 1.5s infinite; }
    .circuit-indicator.open { background: #e07070; box-shadow: 0 0 8px rgba(224, 112, 112, 0.5); animation: pulse-fast 0.8s infinite; }
    .circuit-info { flex: 1; min-width: 0; }
    .circuit-name { font-weight: 600; font-size: 0.9375rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .circuit-meta { font-size: 0.75rem; color: var(--color-text-muted); display: flex; gap: 1rem; margin-top: 0.25rem; }
    .circuit-state { font-family: var(--font-mono); font-size: 0.8125rem; font-weight: 600; text-transform: uppercase; padding: 0.25rem 0.5rem; border-radius: 4px; }
    .circuit-state.closed { background: rgba(74, 103, 65, 0.2); color: #6b9f60; }
    .circuit-state.half_open { background: rgba(196, 133, 106, 0.2); color: #d4a57a; }
    .circuit-state.open { background: rgba(224, 112, 112, 0.2); color: #f08080; }
    
    /* Health Monitor Cards */
    .monitor-card { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1rem; background: var(--color-background-base, #1a1614); border-radius: 10px; margin-bottom: 0.5rem; }
    .monitor-card:last-child { margin-bottom: 0; }
    .monitor-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .monitor-dot.healthy { background: #4a6741; }
    .monitor-dot.unhealthy { background: #e07070; }
    .monitor-dot.unknown { background: #5a524a; }
    .monitor-name { flex: 1; font-size: 0.875rem; }
    .monitor-latency { font-family: var(--font-mono); font-size: 0.75rem; color: var(--color-text-muted); }
    .monitor-status { font-size: 0.6875rem; text-transform: uppercase; font-weight: 600; padding: 0.125rem 0.375rem; border-radius: 3px; }
    .monitor-status.healthy { background: rgba(74, 103, 65, 0.2); color: #6b9f60; }
    .monitor-status.unhealthy { background: rgba(224, 112, 112, 0.2); color: #f08080; }
    
    /* Anomaly Graph */
    .anomaly-graph { height: 120px; display: flex; align-items: flex-end; gap: 3px; padding: 1rem 0; }
    .anomaly-bar { flex: 1; min-width: 8px; background: linear-gradient(180deg, rgba(74, 103, 65, 0.8) 0%, rgba(74, 103, 65, 0.3) 100%); border-radius: 2px 2px 0 0; transition: height 0.3s ease; position: relative; }
    .anomaly-bar.warning { background: linear-gradient(180deg, rgba(196, 133, 106, 0.8) 0%, rgba(196, 133, 106, 0.3) 100%); }
    .anomaly-bar.anomaly { background: linear-gradient(180deg, rgba(224, 112, 112, 0.9) 0%, rgba(224, 112, 112, 0.4) 100%); }
    .anomaly-bar::after { content: attr(data-value); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); font-size: 0.625rem; color: var(--color-text-muted); opacity: 0; transition: opacity 0.2s; }
    .anomaly-bar:hover::after { opacity: 1; }
    .anomaly-legend { display: flex; gap: 1.5rem; justify-content: center; margin-top: 0.5rem; font-size: 0.75rem; color: var(--color-text-muted); }
    .anomaly-legend-item { display: flex; align-items: center; gap: 0.375rem; }
    .anomaly-legend-dot { width: 8px; height: 8px; border-radius: 2px; }
    
    /* Restart History */
    .restart-item { display: flex; align-items: flex-start; gap: 1rem; padding: 1rem; background: var(--color-background-base, #1a1614); border-radius: 10px; margin-bottom: 0.75rem; }
    .restart-item:last-child { margin-bottom: 0; }
    .restart-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .restart-icon.success { background: rgba(74, 103, 65, 0.2); }
    .restart-icon.success .icon { stroke: #6b9f60; }
    .restart-icon.failed { background: rgba(224, 112, 112, 0.2); }
    .restart-icon.failed .icon { stroke: #f08080; }
    .restart-icon .icon { width: 18px; height: 18px; stroke-width: 2; fill: none; }
    .restart-info { flex: 1; }
    .restart-service { font-weight: 600; font-size: 0.9375rem; }
    .restart-reason { font-size: 0.8125rem; color: var(--color-text-secondary); margin-top: 0.125rem; }
    .restart-time { font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.25rem; }
    
    /* Live Indicator */
    .live-indicator { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--color-text-muted); }
    .live-dot { width: 8px; height: 8px; background: #4a6741; border-radius: 50%; animation: live-pulse 2s infinite; }
    @keyframes live-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    
    /* Buttons */
    .refresh-btn { display: flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid rgba(250, 246, 240, 0.1); background: transparent; color: var(--color-text-secondary); font-size: 0.875rem; cursor: pointer; transition: all 200ms ease; }
    .refresh-btn:hover { background: rgba(250, 246, 240, 0.05); color: var(--color-text-primary); }
    .refresh-btn .icon { width: 16px; height: 16px; }
    .theme-toggle { padding: 0.375rem; border-radius: 8px; border: 1px solid rgba(250, 246, 240, 0.1); background: transparent; cursor: pointer; }
    .theme-toggle .icon { width: 18px; height: 18px; stroke: var(--color-text-secondary); stroke-width: 2; fill: none; }
    
    /* Loading */
    .loading-overlay { display: flex; align-items: center; justify-content: center; padding: 4rem; color: var(--color-text-muted); }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--color-background-elevated); border-top-color: #4a6741; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 1rem; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    /* Empty States */
    .empty-state { text-align: center; padding: 2rem; color: var(--color-text-muted); }
    .empty-state .icon { width: 48px; height: 48px; stroke: var(--color-text-muted); stroke-width: 1.5; fill: none; margin-bottom: 1rem; opacity: 0.5; }
    
    /* Light Theme */
    [data-theme="light"] { --color-background-base: #faf6f0; --color-background-elevated: #ffffff; --color-text-primary: #2C2520; --color-text-secondary: #5a524a; --color-text-muted: #8a827a; }
    
    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
    
    /* Focus */
    .nav-link:focus-visible, .refresh-btn:focus-visible, .theme-toggle:focus-visible {
      outline: 2px solid var(--color-accent-primary);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  <nav class="nav-header" aria-label="Dashboard navigation">
    <div class="nav-brand">
      <div class="nav-brand-icon">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" aria-hidden="true">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="nav-brand-text">Ferni Observability</span>
    </div>
    <div class="nav-links">
      <a href="/observability-hub.html" class="nav-link">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Hub
      </a>
      <a href="/error-dashboard.html" class="nav-link">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
        Errors
      </a>
      <a href="/self-healing-dashboard.html" class="nav-link active">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        Self-Healing
      </a>
      <a href="/cost-dashboard.html" class="nav-link">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Cost
      </a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/></svg>
      </button>
    </div>
  </nav>

  <main class="main-content" id="main-content">
    <div class="loading-overlay">
      <div class="loading-spinner"></div>
      <span>Loading self-healing dashboard...</span>
    </div>
  </main>

  <script>
    let data = null;
    const appEl = document.getElementById('main-content');
    
    // Theme toggle
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
      localStorage.setItem('ferni-theme', current === 'dark' ? 'light' : 'dark');
    }
    const savedTheme = localStorage.getItem('ferni-theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

    // Fetch dashboard data
    async function fetchData() {
      try {
        const response = await fetch('/api/observability/self-healing');
        if (!response.ok) throw new Error('Failed to fetch');
        data = await response.json();
        render();
      } catch (err) {
        appEl.innerHTML = `
          <div class="loading-overlay">
            <span style="color: var(--color-semantic-warning)">
              Failed to load data. Is the server running?<br>
              <small style="opacity: 0.7">Endpoint: /api/observability/self-healing</small>
            </span>
          </div>
        `;
      }
    }

    // Format helpers
    function formatDuration(ms) {
      if (!ms || ms === 0) return '0ms';
      if (ms < 1000) return `${ms.toFixed(0)}ms`;
      if (ms < 60000) return `${(ms / 1000).toFixed(1)}s`;
      return `${Math.floor(ms / 60000)}m ${Math.floor((ms % 60000) / 1000)}s`;
    }
    
    function formatPercent(v) { 
      return `${((v || 0) * 100).toFixed(1)}%`; 
    }
    
    function formatTime(timestamp) {
      if (!timestamp) return 'N/A';
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
      return date.toLocaleDateString();
    }

    function getHealthClass(status) {
      if (status === 'healthy') return 'healthy';
      if (status === 'degraded') return 'degraded';
      return 'critical';
    }

    function getHealthIcon(status) {
      if (status === 'healthy') {
        return '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>';
      }
      if (status === 'degraded') {
        return '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
      }
      return '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
    }

    // Render dashboard
    function render() {
      if (!data) return;
      
      const circuits = data.circuits || [];
      const healthMonitors = data.healthMonitors || [];
      const anomalies = data.anomalyHistory || [];
      const restarts = data.restartHistory || [];
      const stats = data.stats || {};
      
      const healthyCircuits = circuits.filter(c => c.state === 'closed').length;
      const openCircuits = circuits.filter(c => c.state === 'open').length;
      const halfOpenCircuits = circuits.filter(c => c.state === 'half_open').length;
      
      const healthyMonitors = healthMonitors.filter(m => m.healthy).length;
      const unhealthyMonitors = healthMonitors.filter(m => !m.healthy).length;

      appEl.innerHTML = `
        <header class="page-header">
          <div>
            <p class="page-eyebrow">System Resilience</p>
            <h1 class="page-title">Self-Healing Dashboard</h1>
            <p class="page-subtitle">Circuit breakers, health monitors, anomaly detection & auto-recovery</p>
          </div>
          <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="live-indicator">
              <div class="live-dot"></div>
              <span>Live • Updates every 10s</span>
            </div>
            <button class="refresh-btn" aria-label="Refresh data" onclick="fetchData()">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              </svg>
              Refresh
            </button>
          </div>
        </header>

        <!-- Health Banner -->
        <div class="health-banner">
          <div class="health-status">
            <div class="health-dot ${getHealthClass(data.overallHealth)}">
              ${getHealthIcon(data.overallHealth)}
            </div>
            <div class="health-text">
              <div class="health-label" style="color: ${data.overallHealth === 'healthy' ? '#4a6741' : data.overallHealth === 'degraded' ? '#c4856a' : '#e07070'}">
                ${(data.overallHealth || 'unknown').toUpperCase()}
              </div>
              <div class="health-sublabel">System Status</div>
            </div>
          </div>
          <div style="flex: 1;">
            <div class="stats-row" style="margin: 0;">
              <div class="stat-card" style="padding: 0.875rem;">
                <div class="stat-label">Circuits</div>
                <div class="stat-value ${openCircuits > 0 ? 'red' : 'green'}">${healthyCircuits}/${circuits.length}</div>
                <div class="stat-subtext">healthy</div>
              </div>
              <div class="stat-card" style="padding: 0.875rem;">
                <div class="stat-label">Services</div>
                <div class="stat-value ${unhealthyMonitors > 0 ? 'red' : 'green'}">${healthyMonitors}/${healthMonitors.length}</div>
                <div class="stat-subtext">online</div>
              </div>
              <div class="stat-card" style="padding: 0.875rem;">
                <div class="stat-label">Anomalies</div>
                <div class="stat-value ${(stats.anomaliesLast5Min || 0) > 0 ? 'yellow' : 'green'}">${stats.anomaliesLast5Min || 0}</div>
                <div class="stat-subtext">last 5 min</div>
              </div>
              <div class="stat-card" style="padding: 0.875rem;">
                <div class="stat-label">Auto-Heals</div>
                <div class="stat-value green">${stats.autoHealsToday || 0}</div>
                <div class="stat-subtext">today</div>
              </div>
              <div class="stat-card" style="padding: 0.875rem;">
                <div class="stat-label">Uptime</div>
                <div class="stat-value green">${formatPercent(stats.uptimePercent || 1)}</div>
                <div class="stat-subtext">24h</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Circuit Breakers & Health Monitors -->
        <div class="two-col">
          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
              Circuit Breakers
            </h2>
            ${circuits.length > 0 ? circuits.map(circuit => `
              <div class="circuit-card">
                <div class="circuit-indicator ${circuit.state}"></div>
                <div class="circuit-info">
                  <div class="circuit-name">${circuit.name}</div>
                  <div class="circuit-meta">
                    <span>${circuit.successRate || '100%'} success</span>
                    <span>${circuit.totalRequests || 0} requests</span>
                  </div>
                </div>
                <div class="circuit-state ${circuit.state}">${circuit.state.replace('_', ' ')}</div>
              </div>
            `).join('') : `
              <div class="empty-state">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                <p>No circuit breakers registered</p>
              </div>
            `}
          </div>

          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
              Health Monitors
            </h2>
            ${healthMonitors.length > 0 ? healthMonitors.map(monitor => `
              <div class="monitor-card">
                <div class="monitor-dot ${monitor.healthy ? 'healthy' : 'unhealthy'}"></div>
                <span class="monitor-name">${monitor.displayName || monitor.name}</span>
                ${monitor.latencyMs ? `<span class="monitor-latency">${monitor.latencyMs}ms</span>` : ''}
                <span class="monitor-status ${monitor.healthy ? 'healthy' : 'unhealthy'}">
                  ${monitor.healthy ? 'Online' : 'Offline'}
                </span>
              </div>
            `).join('') : `
              <div class="empty-state">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                <p>No health monitors configured</p>
              </div>
            `}
          </div>
        </div>

        <!-- Anomaly Detection & Restart History -->
        <div class="two-col">
          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
              Anomaly Detection (Last Hour)
            </h2>
            ${anomalies.length > 0 ? `
              <div class="anomaly-graph">
                ${anomalies.map(a => {
                  const height = Math.max(4, Math.min(100, (a.value / (a.max || 100)) * 100));
                  const isAnomaly = a.isAnomaly;
                  const isWarning = a.zScore && Math.abs(a.zScore) > 2;
                  return `<div class="anomaly-bar ${isAnomaly ? 'anomaly' : isWarning ? 'warning' : ''}" 
                    style="height: ${height}%" 
                    data-value="${a.value?.toFixed(1) || 0}"
                    title="${a.metric}: ${a.value?.toFixed(1)}${a.isAnomaly ? ' (ANOMALY)' : ''}"></div>`;
                }).join('')}
              </div>
              <div class="anomaly-legend">
                <div class="anomaly-legend-item">
                  <div class="anomaly-legend-dot" style="background: rgba(74, 103, 65, 0.8)"></div>
                  <span>Normal</span>
                </div>
                <div class="anomaly-legend-item">
                  <div class="anomaly-legend-dot" style="background: rgba(196, 133, 106, 0.8)"></div>
                  <span>Warning</span>
                </div>
                <div class="anomaly-legend-item">
                  <div class="anomaly-legend-dot" style="background: rgba(224, 112, 112, 0.9)"></div>
                  <span>Anomaly</span>
                </div>
              </div>
            ` : `
              <div class="empty-state">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
                <p>No anomaly data available</p>
                <small style="opacity: 0.7">Anomalies will appear as the system processes requests</small>
              </div>
            `}
          </div>

          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
              Restart History
            </h2>
            ${restarts.length > 0 ? restarts.slice(0, 5).map(restart => `
              <div class="restart-item">
                <div class="restart-icon ${restart.success ? 'success' : 'failed'}">
                  ${restart.success 
                    ? '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>'
                    : '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
                  }
                </div>
                <div class="restart-info">
                  <div class="restart-service">${restart.serviceName}</div>
                  <div class="restart-reason">${restart.reason || 'Manual restart'}</div>
                  <div class="restart-time">${formatTime(restart.timestamp)}</div>
                </div>
              </div>
            `).join('') : `
              <div class="empty-state">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/></svg>
                <p>No restarts recorded</p>
                <small style="opacity: 0.7">Service restarts will appear here</small>
              </div>
            `}
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="section" style="margin-top: 1rem;">
          <h2 class="section-title">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/></svg>
            Quick Commands
          </h2>
          <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; font-family: var(--font-mono); font-size: 0.8125rem; color: var(--color-text-muted);">
            <code style="background: var(--color-background-base); padding: 0.5rem 0.75rem; border-radius: 6px;">ferni health</code>
            <code style="background: var(--color-background-base); padding: 0.5rem 0.75rem; border-radius: 6px;">ferni circuits</code>
            <code style="background: var(--color-background-base); padding: 0.5rem 0.75rem; border-radius: 6px;">ferni restart agent</code>
            <code style="background: var(--color-background-base); padding: 0.5rem 0.75rem; border-radius: 6px;">ferni diagnose "error"</code>
            <code style="background: var(--color-background-base); padding: 0.5rem 0.75rem; border-radius: 6px;">ferni anomalies</code>
          </div>
        </div>
      `;
    }

    // Initialize
    fetchData();
    setInterval(fetchData, 10000); // Refresh every 10 seconds
  </script>
</body>
</html>
