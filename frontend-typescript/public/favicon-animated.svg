<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Ferni Pulsing Orb Favicon -->
  <defs>
    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.06); opacity: 0.92; }
      }
      @keyframes glow {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.45; }
      }
      .orb {
        animation: pulse 3s ease-in-out infinite;
        transform-origin: center;
      }
      .glow-ring {
        animation: glow 3s ease-in-out infinite;
      }

      @media (prefers-reduced-motion: reduce) {
        .orb, .glow-ring { animation: none; }
      }
    </style>
    <!-- Orb gradient -->
    <linearGradient id="orbGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="50%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>
    <!-- Highlight -->
    <radialGradient id="highlight" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#F5F1E8"/>

  <!-- Glow ring -->
  <circle class="glow-ring" cx="16" cy="16" r="13" fill="none" stroke="#4a6741" stroke-width="1.5" opacity="0.3"/>

  <!-- Main orb -->
  <circle class="orb" cx="16" cy="16" r="11" fill="url(#orbGrad)"/>

  <!-- Highlight -->
  <circle class="orb" cx="16" cy="16" r="11" fill="url(#highlight)"/>
</svg>
