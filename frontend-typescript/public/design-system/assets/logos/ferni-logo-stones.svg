<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    Ferni Logo - Three Stones (Zen)
    
    A peaceful, balanced design that looks like three zen stones:
    - Outer: The sage green body/world
    - Middle: The white eye foundation  
    - Inner: The dark pupil/center
    
    The mouth is hidden but exists for animation.
  -->
  
  <!-- Outer Stone: Body/World -->
  <circle cx="50" cy="50" r="45" fill="#4a6741"/>
  
  <!-- Middle Stone: Eye White (centered) -->
  <circle cx="50" cy="50" r="18" fill="white"/>
  
  <!-- Eye Details -->
  <circle cx="50" cy="50" r="12" fill="#5a8060"/>
  
  <!-- Inner Stone: Pupil -->
  <circle cx="50" cy="50" r="6" fill="#2c2520"/>
  
  <!-- Catchlight (life spark) -->
  <circle cx="47" cy="47" r="2" fill="white" opacity="0.9"/>
</svg>

