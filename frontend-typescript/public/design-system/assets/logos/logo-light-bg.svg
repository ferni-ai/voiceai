<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- For use on light/white backgrounds -->
  <defs>
    <linearGradient id="orbGradientLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    
    <filter id="shadowLight" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.25"/>
    </filter>
    
    <linearGradient id="shineLight" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  
  <!-- Subtle ring for light backgrounds -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  
  <!-- Main orb with drop shadow -->
  <circle cx="60" cy="60" r="46" fill="url(#orbGradientLight)" filter="url(#shadowLight)"/>
  
  <!-- Shine highlight -->
  <ellipse cx="48" cy="42" rx="22" ry="16" fill="url(#shineLight)" opacity="0.7"/>
  
  <!-- Sound wave mark -->
  <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="60" cy="60" r="5" fill="white"/>
    <path d="M 50 60 Q 50 52, 60 52 Q 70 52, 70 60" stroke-width="2.5" opacity="0.95"/>
    <path d="M 50 60 Q 50 68, 60 68 Q 70 68, 70 60" stroke-width="2.5" opacity="0.95"/>
    <path d="M 44 60 Q 44 48, 60 48 Q 76 48, 76 60" stroke-width="2" opacity="0.7"/>
    <path d="M 44 60 Q 44 72, 60 72 Q 76 72, 76 60" stroke-width="2" opacity="0.7"/>
    <path d="M 38 60 Q 38 44, 60 44 Q 82 44, 82 60" stroke-width="1.5" opacity="0.4"/>
    <path d="M 38 60 Q 38 76, 60 76 Q 82 76, 82 60" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>

