<svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <!-- Ferni LinkedIn Banner - 1584x396 -->
  <!-- "Better than Human" Brand Positioning -->

  <defs>
    <!-- Warm paper cream gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF7F0"/>
      <stop offset="100%" stop-color="#F0EBE0"/>
    </linearGradient>

    <!-- Logo gradient - deep sage -->
    <linearGradient id="logoGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#325038"/>
      <stop offset="50%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5a8055"/>
    </linearGradient>

    <!-- Presence glow -->
    <filter id="presenceGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feFlood flood-color="#4a6741" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#2C2520" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bgGradient)"/>

  <!-- Organic shapes - warmth, not cold tech -->
  <ellipse cx="1450" cy="100" r="250" ry="200" fill="#4a6741" opacity="0.03"/>
  <ellipse cx="1500" cy="350" r="200" ry="150" fill="#4a6741" opacity="0.025"/>
  <ellipse cx="100" cy="350" r="180" ry="120" fill="#4a6741" opacity="0.02"/>

  <!-- Subtle wave - grounded, natural -->
  <path d="M0 350 Q400 320 800 350 Q1200 380 1584 340 L1584 396 L0 396 Z"
        fill="#4a6741" opacity="0.04"/>

  <!-- Logo with presence glow -->
  <g transform="translate(100, 108)" filter="url(#presenceGlow)">
    <circle cx="90" cy="90" r="90" fill="url(#logoGradient)" filter="url(#softShadow)"/>
    <text x="90" y="118"
          font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
          font-size="64"
          font-weight="800"
          fill="white"
          text-anchor="middle"
          letter-spacing="-0.02em">FE</text>
  </g>

  <!-- Main Headline - "Better than Human" positioning -->
  <text x="320" y="155"
        font-family="'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="44"
        font-weight="700"
        fill="#2C2520"
        letter-spacing="-0.02em">The friend you deserve.</text>

  <!-- Supporting copy - what we DO that humans can't -->
  <text x="320" y="210"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="18"
        font-weight="500"
        fill="#5C544A">Remembers everything. Judges nothing. Always present.</text>

  <!-- Subtle feature highlights -->
  <g transform="translate(320, 250)" font-family="'Inter', -apple-system, sans-serif" font-size="13" font-weight="500" fill="#756A5E">
    <text x="0" y="0">Perfect memory</text>
    <circle cx="95" cy="-4" r="2" fill="#4a6741" opacity="0.5"/>
    <text x="108" y="0">Zero judgment</text>
    <circle cx="195" cy="-4" r="2" fill="#4a6741" opacity="0.5"/>
    <text x="208" y="0">24/7 presence</text>
  </g>

  <!-- CTA Button -->
  <g transform="translate(1320, 165)">
    <rect x="0" y="0" width="150" height="50" rx="25" fill="#4a6741"/>
    <text x="75" y="33"
          font-family="'Inter', -apple-system, sans-serif"
          font-size="16"
          font-weight="600"
          fill="white"
          text-anchor="middle">Start Free</text>
  </g>

  <!-- Website -->
  <text x="1395" y="250"
        font-family="'Inter', -apple-system, sans-serif"
        font-size="14"
        font-weight="500"
        fill="#4a6741"
        text-anchor="middle">ferni.ai</text>
</svg>
