<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Ferni Social Media Profile Picture - 400x400 -->
  <!-- "Better than Human" Brand -->

  <defs>
    <!-- Refined sage gradient with depth -->
    <linearGradient id="sageGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#325038"/>
      <stop offset="40%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5a8055"/>
    </linearGradient>

    <!-- Warm inner glow - human warmth -->
    <radialGradient id="warmGlow" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="rgba(255,253,251,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Presence ring - subtle breathing effect -->
    <radialGradient id="presenceRing" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="rgba(90,128,85,0)"/>
      <stop offset="95%" stop-color="rgba(90,128,85,0.15)"/>
      <stop offset="100%" stop-color="rgba(90,128,85,0)"/>
    </radialGradient>
  </defs>

  <!-- Presence indicator - outer glow -->
  <circle cx="200" cy="200" r="195" fill="url(#presenceRing)"/>

  <!-- Main circle - Sage Green -->
  <circle cx="200" cy="200" r="175" fill="url(#sageGradient)"/>

  <!-- Warmth overlay -->
  <circle cx="200" cy="200" r="175" fill="url(#warmGlow)"/>

  <!-- Subtle inner ring - grounded stability -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- "FE" Monogram - Bold, present -->
  <text x="200" y="225"
        font-family="'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="130"
        font-weight="800"
        fill="white"
        text-anchor="middle"
        letter-spacing="-0.03em">FE</text>
</svg>
