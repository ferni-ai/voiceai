<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- Ocean gradient for head -->
    <linearGradient id="headGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="40%" style="stop-color:#0891b2"/>
      <stop offset="70%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    
    <!-- Body gradient (warmer) -->
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    
    <!-- Arm/leg gradient -->
    <linearGradient id="limbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    
    <filter id="softShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1e293b" flood-opacity="0.15"/>
    </filter>
    
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- === BODY === -->
  <!-- Main body (rounded rectangle) -->
  <rect 
    x="120" y="200" 
    width="160" height="180" 
    rx="40" ry="40"
    fill="url(#bodyGradient)"
    stroke="url(#limbGradient)"
    stroke-width="3"
    filter="url(#softShadow)"
  />
  
  <!-- Heart glow in chest -->
  <circle cx="200" cy="280" r="25" fill="#0891b2" opacity="0.2"/>
  <circle cx="200" cy="280" r="15" fill="#0891b2" opacity="0.4"/>
  <circle cx="200" cy="280" r="8" fill="#06b6d4"/>
  
  <!-- === ARMS === -->
  <!-- Left arm -->
  <rect x="70" y="220" width="50" height="24" rx="12" fill="url(#limbGradient)"/>
  <!-- Left hand (waving!) -->
  <circle cx="55" cy="200" r="20" fill="url(#limbGradient)"/>
  <ellipse cx="55" cy="200" rx="18" ry="16" fill="#e0f2fe" opacity="0.3"/>
  
  <!-- Right arm -->
  <rect x="280" y="240" width="50" height="24" rx="12" fill="url(#limbGradient)"/>
  <!-- Right hand -->
  <circle cx="345" cy="252" r="20" fill="url(#limbGradient)"/>
  <ellipse cx="345" cy="252" rx="18" ry="16" fill="#e0f2fe" opacity="0.3"/>
  
  <!-- === LEGS === -->
  <!-- Left leg -->
  <rect x="140" y="380" width="28" height="60" rx="14" fill="url(#limbGradient)"/>
  <!-- Left foot -->
  <ellipse cx="154" cy="450" rx="24" ry="14" fill="url(#limbGradient)"/>
  
  <!-- Right leg -->
  <rect x="232" y="380" width="28" height="60" rx="14" fill="url(#limbGradient)"/>
  <!-- Right foot -->
  <ellipse cx="246" cy="450" rx="24" ry="14" fill="url(#limbGradient)"/>
  
  <!-- === HEAD (the FE+AI ellipse!) === -->
  <ellipse 
    cx="200" cy="110" 
    rx="130" ry="75" 
    fill="url(#headGradient)"
    filter="url(#softShadow)"
  />
  
  <!-- Subtle shine on head -->
  <ellipse cx="200" cy="85" rx="100" ry="45" fill="rgba(255,255,255,0.1)"/>
  
  <!-- FE circle (left eye area) -->
  <circle cx="150" cy="110" r="32" fill="rgba(0,0,0,0.2)"/>
  <circle cx="150" cy="110" r="28" fill="rgba(255,255,255,0.15)"/>
  <!-- Eye -->
  <ellipse cx="150" cy="110" rx="12" ry="14" fill="#FFFDFB"/>
  <circle cx="152" cy="108" r="6" fill="#1e293b"/>
  <circle cx="154" cy="106" r="2" fill="#FFFDFB"/>
  
  <!-- AI circle (right eye area) -->
  <circle cx="250" cy="110" r="32" fill="rgba(255,255,255,0.9)"/>
  <!-- Eye -->
  <ellipse cx="250" cy="110" rx="12" ry="14" fill="#FFFDFB"/>
  <circle cx="252" cy="108" r="6" fill="#1e293b"/>
  <circle cx="254" cy="106" r="2" fill="#FFFDFB"/>
  
  <!-- Friendly smile -->
  <path 
    d="M 170 140 Q 200 165, 230 140" 
    fill="none" 
    stroke="#FFFDFB" 
    stroke-width="4" 
    stroke-linecap="round"
  />
  
  <!-- Antenna -->
  <line x1="200" y1="35" x2="200" y2="10" stroke="url(#limbGradient)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="200" cy="8" r="8" fill="#06b6d4"/>
  <circle cx="200" cy="8" r="4" fill="#FFFDFB"/>
</svg>
