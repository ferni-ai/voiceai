<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="headGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="30%" style="stop-color:#06b6d4"/>
      <stop offset="60%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Neck -->
  <rect x="88" y="95" width="24" height="18" rx="4" fill="#cbd5e1"/>
  
  <!-- Body -->
  <rect x="55" y="110" width="90" height="75" rx="10" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  
  <!-- Heart -->
  <rect x="85" y="125" width="30" height="22" rx="5" fill="#1e293b"/>
  <rect x="89" y="129" width="22" height="14" rx="3" fill="#06b6d4"/>
  
  <!-- Arms -->
  <rect x="25" y="125" width="30" height="10" rx="5" fill="#cbd5e1"/>
  <circle cx="22" cy="130" r="10" fill="#cbd5e1"/>
  
  <rect x="145" y="125" width="30" height="10" rx="5" fill="#cbd5e1"/>
  <circle cx="178" cy="130" r="10" fill="#cbd5e1"/>
  
  <!-- Treads -->
  <rect x="50" y="185" width="35" height="35" rx="7" fill="#475569"/>
  <circle cx="67" cy="202" r="8" fill="#334155"/>
  
  <rect x="115" y="185" width="35" height="35" rx="7" fill="#475569"/>
  <circle cx="132" cy="202" r="8" fill="#334155"/>
  
  <rect x="85" y="192" width="30" height="20" rx="4" fill="#64748b"/>
  
  <!-- HEAD -->
  <ellipse cx="100" cy="52" rx="75" ry="44" fill="url(#headGrad)" filter="url(#shadow)"/>
  
  <!-- FE EYE -->
  <circle cx="70" cy="52" r="24" fill="rgba(0,0,0,0.3)"/>
  <circle cx="70" cy="52" r="20" fill="#1e293b"/>
  <circle cx="70" cy="54" r="10" fill="#06b6d4"/>
  <circle cx="66" cy="49" r="4" fill="#FFFDFB"/>
  
  <!-- AI EYE -->
  <circle cx="130" cy="52" r="24" fill="rgba(255,255,255,0.95)"/>
  <circle cx="130" cy="52" r="20" fill="#FFFDFB"/>
  <circle cx="130" cy="54" r="10" fill="#1e293b"/>
  <circle cx="126" cy="49" r="4" fill="#FFFDFB"/>
</svg>
