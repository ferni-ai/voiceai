<svg viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Stacked Logo with Wordmark -->
  <defs>
    <linearGradient id="stackedGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    
    <filter id="stackedGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo orb centered -->
  <g transform="translate(32, 12)">
    <circle cx="48" cy="48" r="44" fill="none" stroke="url(#stackedGradient)" stroke-width="1" opacity="0.2"/>
    <circle cx="48" cy="48" r="38" fill="url(#stackedGradient)" filter="url(#stackedGlow)"/>
    
    <!-- Sound wave -->
    <g fill="none" stroke="white" stroke-linecap="round">
      <circle cx="48" cy="48" r="6" fill="white"/>
      <path d="M 38 48 Q 38 40, 48 40 Q 58 40, 58 48" stroke-width="2.5"/>
      <path d="M 38 48 Q 38 56, 48 56 Q 58 56, 58 48" stroke-width="2.5"/>
      <path d="M 30 48 Q 30 34, 48 34 Q 66 34, 66 48" stroke-width="2" opacity="0.6"/>
      <path d="M 30 48 Q 30 62, 48 62 Q 66 62, 66 48" stroke-width="2" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Wordmark centered below -->
  <text x="80" y="138" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="url(#stackedGradient)" letter-spacing="-0.02em">
    VoiceAI
  </text>
  
  <!-- Tagline -->
  <text x="80" y="160" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="#6366f1" opacity="0.7" letter-spacing="0.1em">
    YOUR AI TEAM
  </text>
</svg>

