<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Ocean/blue gradient -->
    <linearGradient id="headGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="40%" style="stop-color:#0891b2"/>
      <stop offset="70%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    
    <linearGradient id="limbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    
    <filter id="softShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1e293b" flood-opacity="0.2"/>
    </filter>
    
    <!-- Rounded square clip for app icon -->
    <clipPath id="iconClip">
      <rect x="0" y="0" width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="#f8fafc"/>
  
  <g clip-path="url(#iconClip)">
    <!-- === BODY (simplified) === -->
    <rect 
      x="176" y="290" 
      width="160" height="160" 
      rx="40"
      fill="url(#bodyGradient)"
      stroke="url(#limbGradient)"
      stroke-width="4"
    />
    
    <!-- Heart -->
    <circle cx="256" cy="360" r="12" fill="#0891b2" opacity="0.4"/>
    <circle cx="256" cy="360" r="6" fill="#06b6d4"/>
    
    <!-- === ARMS === -->
    <rect x="116" y="310" width="60" height="28" rx="14" fill="url(#limbGradient)"/>
    <circle cx="100" cy="324" r="22" fill="url(#limbGradient)"/>
    
    <rect x="336" y="310" width="60" height="28" rx="14" fill="url(#limbGradient)"/>
    <circle cx="412" cy="324" r="22" fill="url(#limbGradient)"/>
    
    <!-- === LEGS (partial, cut off at bottom) === -->
    <rect x="190" y="450" width="32" height="80" rx="16" fill="url(#limbGradient)"/>
    <rect x="290" y="450" width="32" height="80" rx="16" fill="url(#limbGradient)"/>
    
    <!-- === HEAD === -->
    <ellipse 
      cx="256" cy="165" 
      rx="150" ry="90" 
      fill="url(#headGradient)"
      filter="url(#softShadow)"
    />
    
    <!-- Shine -->
    <ellipse cx="256" cy="135" rx="120" ry="55" fill="rgba(255,255,255,0.1)"/>
    
    <!-- FE circle -->
    <circle cx="195" cy="165" r="40" fill="rgba(0,0,0,0.2)"/>
    <circle cx="195" cy="165" r="36" fill="rgba(255,255,255,0.15)"/>
    <ellipse cx="195" cy="165" rx="15" ry="18" fill="#FFFDFB"/>
    <circle cx="198" cy="162" r="8" fill="#1e293b"/>
    <circle cx="201" cy="159" r="3" fill="#FFFDFB"/>
    
    <!-- AI circle -->
    <circle cx="317" cy="165" r="40" fill="rgba(255,255,255,0.92)"/>
    <ellipse cx="317" cy="165" rx="15" ry="18" fill="#FFFDFB"/>
    <circle cx="320" cy="162" r="8" fill="#1e293b"/>
    <circle cx="323" cy="159" r="3" fill="#FFFDFB"/>
    
    <!-- Smile -->
    <path 
      d="M 220 200 Q 256 235, 292 200" 
      fill="none" 
      stroke="#FFFDFB" 
      stroke-width="6" 
      stroke-linecap="round"
    />
    
    <!-- Antenna -->
    <line x1="256" y1="75" x2="256" y2="40" stroke="url(#limbGradient)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="256" cy="35" r="12" fill="#06b6d4"/>
    <circle cx="256" cy="35" r="6" fill="#FFFDFB"/>
  </g>
</svg>
