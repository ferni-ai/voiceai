<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <!-- Neon cyberpunk gradient -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="50%" style="stop-color:#00bbf9"/>
      <stop offset="100%" style="stop-color:#9b5de5"/>
    </linearGradient>
    
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00f5d4" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="400" height="240" fill="#0d0d0d" rx="24"/>
  
  <!-- Glow effect behind ellipse -->
  <ellipse 
    cx="200" 
    cy="120" 
    rx="175" 
    ry="95" 
    fill="url(#neonGradient)"
    opacity="0.3"
    filter="url(#neonGlow)"
  />
  
  <!-- Main ellipse -->
  <ellipse 
    cx="200" 
    cy="120" 
    rx="170" 
    ry="90" 
    fill="url(#neonGradient)"
  />
  
  <!-- FE circle -->
  <circle cx="130" cy="120" r="42" fill="rgba(0,0,0,0.4)"/>
  <text 
    x="130" 
    y="128" 
    font-family="Inter, -apple-system, sans-serif" 
    font-size="22" 
    font-weight="700"
    fill="#FFFDFB" 
    text-anchor="middle"
  >FE</text>
  
  <!-- AI circle -->
  <circle cx="270" cy="120" r="42" fill="#FFFDFB"/>
  <text 
    x="270" 
    y="128" 
    font-family="Inter, -apple-system, sans-serif" 
    font-size="22" 
    font-weight="700"
    fill="#0d0d0d" 
    text-anchor="middle"
  >AI</text>
</svg>
