<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persona Health | Ferni Observability</title>
  <link rel="stylesheet" href="/design-system/tokens.css">
  <style>
    :root { --font-display: 'Plus Jakarta Sans', system-ui, sans-serif; --font-body: 'Inter', system-ui, sans-serif; --font-mono: 'JetBrains Mono', 'Fira Code', monospace; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--color-background-base, #1a1614); color: var(--color-text-primary, #faf6f0); min-height: 100vh; line-height: 1.6; }
    .nav-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--color-background-elevated, #252220); border-bottom: 1px solid rgba(250, 246, 240, 0.1); position: sticky; top: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 0.75rem; }
    .nav-brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #4a6741, #3d5a35); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .nav-brand-text { font-family: var(--font-display); font-size: 1.125rem; font-weight: 600; }
    .nav-links { display: flex; gap: 0.5rem; }
    .nav-link { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 8px; color: var(--color-text-secondary, #e8e2da); text-decoration: none; font-size: 0.875rem; transition: all 200ms ease; }
    .nav-link:hover { background: rgba(250, 246, 240, 0.05); color: var(--color-text-primary); }
    .nav-link.active { background: #4a6741; color: white; }
    .nav-link .icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }
    .main-content { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .page-header { margin-bottom: 2rem; display: flex; align-items: flex-start; justify-content: space-between; }
    .page-eyebrow { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #4a6741; margin-bottom: 0.5rem; }
    .page-title { font-family: var(--font-display); font-size: 2rem; font-weight: 700; }
    .page-subtitle { color: var(--color-text-secondary, #c4bdb4); font-size: 1rem; margin-top: 0.25rem; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--color-background-elevated, #252220); border-radius: 12px; padding: 1.25rem; border: 1px solid rgba(250, 246, 240, 0.1); }
    .stat-label { font-size: 0.75rem; color: var(--color-text-muted, #a09890); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .stat-value { font-family: var(--font-mono); font-size: 1.5rem; font-weight: 700; }
    .stat-subtext { font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.25rem; }
    .section { background: var(--color-background-elevated, #252220); border-radius: 16px; padding: 1.5rem; border: 1px solid rgba(250, 246, 240, 0.1); margin-bottom: 1.5rem; }
    .section-title { font-family: var(--font-display); font-weight: 600; font-size: 1.125rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .section-title .icon { width: 20px; height: 20px; stroke: #4a6741; stroke-width: 2; fill: none; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
    .persona-card { background: var(--color-background-base, #1a1614); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; }
    .persona-card:last-child { margin-bottom: 0; }
    .persona-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 1.125rem; text-transform: uppercase; flex-shrink: 0; }
    .persona-info { flex: 1; }
    .persona-name { font-weight: 600; font-size: 1rem; }
    .persona-stats { display: flex; gap: 1.5rem; font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.25rem; }
    .persona-metrics { display: flex; gap: 1rem; text-align: right; }
    .persona-metric { }
    .persona-metric-label { font-size: 0.6875rem; color: var(--color-text-muted); text-transform: uppercase; }
    .persona-metric-value { font-family: var(--font-mono); font-weight: 600; }
    .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid rgba(250, 246, 240, 0.05); }
    .metric-row:last-child { border-bottom: none; }
    .metric-name { color: var(--color-text-secondary, #c4bdb4); font-size: 0.875rem; }
    .metric-value { font-family: var(--font-mono); font-weight: 600; }
    .progress-bar { height: 8px; background: var(--color-background-base, #1a1614); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .progress-fill.green { background: linear-gradient(90deg, #3d5a35, #4a6741); }
    .progress-fill.yellow { background: linear-gradient(90deg, #9a7b5a, #c4856a); }
    .progress-fill.red { background: linear-gradient(90deg, #b05050, #e07070); }
    .refresh-btn { display: flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid rgba(250, 246, 240, 0.1); background: transparent; color: var(--color-text-secondary); font-size: 0.875rem; cursor: pointer; transition: all 200ms ease; }
    .refresh-btn:hover { background: rgba(250, 246, 240, 0.05); color: var(--color-text-primary); }
    .refresh-btn .icon { width: 16px; height: 16px; }
    .loading-overlay { display: flex; align-items: center; justify-content: center; padding: 4rem; color: var(--color-text-muted); }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--color-background-elevated); border-top-color: #4a6741; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 1rem; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    [data-theme="light"] { --color-background-base: #faf6f0; --color-background-elevated: #ffffff; --color-text-primary: #2C2520; --color-text-secondary: #5a524a; --color-text-muted: #8a827a; }
    .theme-toggle { padding: 0.375rem; border-radius: 8px; border: 1px solid rgba(250, 246, 240, 0.1); background: transparent; cursor: pointer; }
    .theme-toggle .icon { width: 18px; height: 18px; stroke: var(--color-text-secondary); stroke-width: 2; fill: none; }
    /* Persona colors */
    .persona-ferni { background: linear-gradient(135deg, #4a6741, #3d5a35); color: white; }
    .persona-jack { background: linear-gradient(135deg, #9a7b5a, #7d6348); color: white; }
    .persona-peter { background: linear-gradient(135deg, #3a6b73, #2d5359); color: white; }
    .persona-alex { background: linear-gradient(135deg, #5a6b8a, #4a5a73); color: white; }
    .persona-maya { background: linear-gradient(135deg, #a67a6a, #8a635a); color: white; }
    .persona-jordan { background: linear-gradient(135deg, #c4856a, #a86d55); color: white; }
    .persona-default { background: linear-gradient(135deg, #5a524a, #403832); color: white; }
  </style>
</head>
<body>
  <nav class="nav-header">
    <div class="nav-brand">
      <div class="nav-brand-icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <span class="nav-brand-text">Ferni Observability</span>
    </div>
    <div class="nav-links">
      <a href="/observability-hub.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Hub</a>
      <a href="/llm-dashboard.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg>LLM</a>
      <a href="/memory-dashboard.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Memory</a>
      <a href="/persona-dashboard.html" class="nav-link active"><svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Personas</a>
      <a href="/handoff-dashboard.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/></svg>Handoffs</a>
      <button class="theme-toggle" onclick="toggleTheme()"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/></svg></button>
    </div>
  </nav>

  <main class="main-content" id="app">
    <div class="loading-overlay"><div class="loading-spinner"></div><span>Loading persona metrics...</span></div>
  </main>

  <script>
    let data = null;
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
      localStorage.setItem('ferni-theme', current === 'dark' ? 'light' : 'dark');
    }
    const savedTheme = localStorage.getItem('ferni-theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

    async function fetchData() {
      try {
        const response = await fetch('/api/observability/personas');
        if (!response.ok) throw new Error('Failed to fetch');
        data = await response.json();
        render();
      } catch (err) {
        console.error('Failed to fetch persona data:', err);
        document.getElementById('app').innerHTML = `<div class="loading-overlay"><span style="color: #c4856a">Failed to load data.</span></div>`;
      }
    }

    function formatDuration(ms) {
      if (ms < 1000) return `${ms.toFixed(0)}ms`;
      return `${(ms / 1000).toFixed(1)}s`;
    }
    function formatPercent(v) { return `${v.toFixed(1)}%`; }
    function getPersonaClass(id) {
      const lower = (id || '').toLowerCase();
      if (lower.includes('ferni')) return 'persona-ferni';
      if (lower.includes('jack')) return 'persona-jack';
      if (lower.includes('peter')) return 'persona-peter';
      if (lower.includes('alex')) return 'persona-alex';
      if (lower.includes('maya')) return 'persona-maya';
      if (lower.includes('jordan')) return 'persona-jordan';
      return 'persona-default';
    }
    function getInitials(id) {
      return (id || 'UN').substring(0, 2).toUpperCase();
    }

    function render() {
      if (!data) return;
      const personas = data.personaStats || [];
      const distribution = data.personaDistribution || {};
      const behaviors = data.activationsByBehavior || {};
      
      const app = document.getElementById('app');
      app.innerHTML = `
        <header class="page-header">
          <div>
            <p class="page-eyebrow">Agent Performance</p>
            <h1 class="page-title">Persona Health</h1>
            <p class="page-subtitle">Monitor bundle loading, knowledge queries, and agent behavior</p>
          </div>
          <button class="refresh-btn" onclick="fetchData()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Refresh
          </button>
        </header>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">Active Personas</div>
            <div class="stat-value">${data.activePersonas || 0}</div>
            <div class="stat-subtext">Currently loaded</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Avg Bundle Load</div>
            <div class="stat-value">${formatDuration(data.avgBundleLoadTimeMs || 0)}</div>
            <div class="stat-subtext">p95: ${formatDuration(data.p95BundleLoadTimeMs || 0)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Knowledge Queries</div>
            <div class="stat-value">${data.totalKnowledgeQueries || 0}</div>
            <div class="stat-subtext">${formatPercent(data.knowledgeQuerySuccessRate || 100)} success</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Handoffs</div>
            <div class="stat-value">${(data.totalHandoffsIn || 0) + (data.totalHandoffsOut || 0)}</div>
            <div class="stat-subtext">${data.totalHandoffsIn || 0} in / ${data.totalHandoffsOut || 0} out</div>
          </div>
        </div>

        <div class="two-col">
          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              Persona Stats
            </h2>
            ${personas.length > 0 ? personas.map(p => `
              <div class="persona-card">
                <div class="persona-avatar ${getPersonaClass(p.personaId)}">${getInitials(p.personaId)}</div>
                <div class="persona-info">
                  <div class="persona-name">${p.personaId}</div>
                  <div class="persona-stats">
                    <span>${p.loadCount || 0} loads</span>
                    <span>${p.knowledgeQueries || 0} queries</span>
                    <span>${(p.handoffsIn || 0) + (p.handoffsOut || 0)} handoffs</span>
                  </div>
                </div>
                <div class="persona-metrics">
                  <div class="persona-metric">
                    <div class="persona-metric-label">Avg Load</div>
                    <div class="persona-metric-value">${formatDuration(p.avgLoadTimeMs || 0)}</div>
                  </div>
                </div>
              </div>
            `).join('') : '<p style="text-align: center; color: var(--color-text-muted); padding: 2rem;">No persona data available</p>'}
          </div>

          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
              System Metrics
            </h2>
            <div class="metric-row">
              <span class="metric-name">Bundle Load Failures</span>
              <span class="metric-value" style="color: ${(data.bundleLoadFailures || 0) > 0 ? '#e07070' : '#4a6741'}">${data.bundleLoadFailures || 0}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Slow Bundle Loads (>500ms)</span>
              <span class="metric-value" style="color: ${(data.slowBundleLoads || 0) > 3 ? '#c4856a' : '#4a6741'}">${data.slowBundleLoads || 0}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Avg Knowledge Query Time</span>
              <span class="metric-value">${formatDuration(data.avgKnowledgeQueryMs || 0)}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Avg Voice Consistency</span>
              <span class="metric-value" style="color: ${(data.avgVoiceConsistencyScore || 100) >= 80 ? '#4a6741' : '#c4856a'}">${formatPercent(data.avgVoiceConsistencyScore || 100)}</span>
            </div>
            <div class="progress-bar" style="margin-top: 0.5rem;">
              <div class="progress-fill ${(data.avgVoiceConsistencyScore || 100) >= 80 ? 'green' : 'yellow'}" style="width: ${data.avgVoiceConsistencyScore || 100}%"></div>
            </div>
            <div class="metric-row" style="margin-top: 1rem;">
              <span class="metric-name">Persona Errors</span>
              <span class="metric-value" style="color: ${(data.personaErrors || 0) > 0 ? '#e07070' : '#4a6741'}">${data.personaErrors || 0}</span>
            </div>
          </div>
        </div>

        ${Object.keys(distribution).length > 0 ? `
          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
              Usage Distribution
            </h2>
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
              ${Object.entries(distribution).map(([persona, pct]) => `
                <div style="background: var(--color-background-base); padding: 1rem; border-radius: 8px; text-align: center; min-width: 100px;">
                  <div class="persona-avatar ${getPersonaClass(persona)}" style="width: 40px; height: 40px; margin: 0 auto 0.5rem; font-size: 0.875rem;">${getInitials(persona)}</div>
                  <div style="font-size: 0.75rem; color: var(--color-text-muted);">${persona}</div>
                  <div style="font-family: var(--font-mono); font-weight: 600;">${pct.toFixed(1)}%</div>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}
      `;
    }

    fetchData();
    setInterval(fetchData, 30000);
  </script>
</body>
</html>
