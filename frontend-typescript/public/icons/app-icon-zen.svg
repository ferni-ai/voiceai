<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Ferni Zen App Icon - Three Stones (small, like zen rocks) -->
  <!-- Brand: Paper Cream #F5F1E8, Ferni Sage #4a6741 -->
  
  <!-- Warm cream background -->
  <rect width="512" height="512" fill="#F5F1E8"/>
  
  <!-- Three Stones Logo - scaled small (35% of icon) centered -->
  <!-- No catchlight - clean zen aesthetic like smooth river stones -->
  <g transform="translate(256, 256)">
    <!-- Outer Stone: Body/World - radius 90 -->
    <circle cx="0" cy="0" r="90" fill="#4a6741"/>
    
    <!-- Middle Stone: White foundation - radius 36 -->
    <circle cx="0" cy="0" r="36" fill="white"/>
    
    <!-- Inner Ring: Sage accent - radius 24 -->
    <circle cx="0" cy="0" r="24" fill="#5a8060"/>
    
    <!-- Center Stone: Dark core - radius 12 -->
    <circle cx="0" cy="0" r="12" fill="#2c2520"/>
  </g>
</svg>
