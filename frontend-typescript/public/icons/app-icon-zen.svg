<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Ferni Zen App Icon - Minimal, peaceful, smaller orb -->
  <!-- Brand: Paper Cream #F5F1E8, Ferni Sage #4a6741 -->
  <defs>
    <!-- Orb gradient - subtle depth -->
    <linearGradient id="zenOrbGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="50%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>
    
    <!-- Soft glow -->
    <filter id="zenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#4a6741" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Top highlight -->
    <radialGradient id="zenHighlight" cx="35%" cy="25%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  
  <!-- Warm cream background -->
  <rect width="512" height="512" fill="#F5F1E8"/>
  
  <!-- Smaller centered orb (140px radius = ~55% of icon) -->
  <circle cx="256" cy="256" r="140" fill="url(#zenOrbGrad)" filter="url(#zenGlow)"/>
  
  <!-- Highlight -->
  <circle cx="256" cy="256" r="140" fill="url(#zenHighlight)"/>
  
  <!-- Minimal waveform - 5 bars, very subtle -->
  <g transform="translate(256, 256)" fill="rgba(255,255,255,0.9)">
    <rect x="-40" y="-12" width="6" height="24" rx="3"/>
    <rect x="-20" y="-20" width="6" height="40" rx="3"/>
    <rect x="0" y="-28" width="6" height="56" rx="3"/>
    <rect x="20" y="-20" width="6" height="40" rx="3"/>
    <rect x="40" y="-12" width="6" height="24" rx="3"/>
  </g>
</svg>

