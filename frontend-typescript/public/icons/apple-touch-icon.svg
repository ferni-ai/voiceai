  <g>
    <!-- Outer Stone: Body -->
    <circle cx="90" cy="90" r="58.5" fill="#4a6741"/>
    <!-- White foundation -->
    <circle cx="90" cy="90" r="23.400000000000002" fill="white"/>
    <!-- Iris ring -->
