    <!-- Pupil -->
    <circle cx="90" cy="90" r="7.803900000000001" fill="#2c2520"/>
    
    <circle cx="86.87844" cy="86.87844" r="2.3411700000000004" fill="white" opacity="0.9"/>
  
  </g>
