<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Ferni Maskable Icon (PWA) - 512x512 with safe zone -->
  <defs>
    <linearGradient id="maskGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#325038"/>
      <stop offset="100%" stop-color="#4a6d52"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background -->
  <rect width="512" height="512" fill="url(#maskGrad)"/>
  <!-- FN centered in safe zone (80% = 410px, centered) -->
  <text x="256" y="310" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="200" font-weight="800" fill="white" text-anchor="middle">FN</text>
</svg>
