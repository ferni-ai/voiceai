<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Ferni Orb Logo - 200x200 -->
  <defs>
    <linearGradient id="orbGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d5a35"/>
      <stop offset="40%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5a7a4d"/>
    </linearGradient>
    <radialGradient id="orbHighlight" cx="35%" cy="25%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    
    <filter id="orbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#4a6741" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" fill="transparent"/>
  
    <circle cx="100" cy="100" r="82.584" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.15"/>
    <circle cx="100" cy="100" r="74.59200000000001" fill="none" stroke="#4a6741" stroke-width="1" opacity="0.1"/>

  <!-- Main orb -->
  <circle cx="100" cy="100" r="66.60000000000001" fill="url(#orbGradient)" filter="url(#orbGlow)"/>

  <!-- Top highlight -->
  <circle cx="100" cy="100" r="66.60000000000001" fill="url(#orbHighlight)"/>

  <!-- Waveform bars -->
  <g>
    <rect x="67" y="95.005" width="2" height="9.990000000000002" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="75" y="92.5075" width="2" height="14.985000000000003" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="83" y="90.00999999999999" width="2" height="19.980000000000004" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="91" y="88.345" width="2" height="23.310000000000002" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="99" y="86.67999999999999" width="2" height="26.640000000000004" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="107" y="88.345" width="2" height="23.310000000000002" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="115" y="90.00999999999999" width="2" height="19.980000000000004" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="123" y="92.5075" width="2" height="14.985000000000003" rx="1" fill="rgba(255,255,255,0.95)"/>
    <rect x="131" y="95.005" width="2" height="9.990000000000002" rx="1" fill="rgba(255,255,255,0.95)"/>
  </g>
</svg>