<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cost Tracking | Ferni Observability</title>
  <link rel="stylesheet" href="/design-system/tokens.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Fonts loaded via Google Fonts link, using tokens.css variables */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }
    /* Skip link for accessibility */
    .skip-link { position: absolute; top: -40px; left: 0; background: var(--color-accent-primary); color: white; padding: 8px 16px; z-index: 1000; transition: top 0.3s; text-decoration: none; border-radius: 0 0 8px 0; }
    .skip-link:focus { top: 0; }

    .nav-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--color-background-elevated, #252220);
      border-bottom: 1px solid rgba(250, 246, 240, 0.1);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { display: flex; align-items: center; gap: 0.75rem; }
    .nav-brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #4a6741, #3d5a35); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .nav-brand-text { font-family: var(--font-display); font-size: 1.125rem; font-weight: 600; }
    .nav-links { display: flex; gap: 0.5rem; }
    .nav-link { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 8px; color: var(--color-text-secondary, #e8e2da); text-decoration: none; font-size: 0.875rem; transition: all 200ms ease; }
    .nav-link:hover { background: rgba(250, 246, 240, 0.05); color: var(--color-text-primary); }
    .nav-link.active { background: #4a6741; color: white; }
    .nav-link .icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }

    .main-content { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .page-header { margin-bottom: 2rem; display: flex; align-items: flex-start; justify-content: space-between; }
    .page-eyebrow { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #4a6741; margin-bottom: 0.5rem; }
    .page-title { font-family: var(--font-display); font-size: 2rem; font-weight: 700; }
    .page-subtitle { color: var(--color-text-secondary, #c4bdb4); font-size: 1rem; margin-top: 0.25rem; }

    .cost-hero {
      background: linear-gradient(135deg, var(--color-background-elevated, #252220), #1e1c1a);
      border-radius: 20px;
      padding: 2rem;
      border: 1px solid rgba(250, 246, 240, 0.1);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 2rem;
    }

    .cost-main {
      display: flex;
      flex-direction: column;
    }

    .cost-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-muted, #a09890);
      margin-bottom: 0.5rem;
    }

    .cost-value {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #4a6741, #6b8f60);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .cost-secondary {
      display: flex;
      gap: 2rem;
    }

    .cost-item { text-align: center; }
    .cost-item-value {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: 700;
    }
    .cost-item-label {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
    }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--color-background-elevated, #252220);
      border-radius: 12px; padding: 1.25rem;
      border: 1px solid rgba(250, 246, 240, 0.1);
    }
    .stat-label { font-size: 0.75rem; color: var(--color-text-muted, #a09890); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .stat-value { font-family: var(--font-mono); font-size: 1.5rem; font-weight: 700; }
    .stat-subtext { font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.25rem; }

    .section {
      background: var(--color-background-elevated, #252220);
      border-radius: 16px; padding: 1.5rem;
      border: 1px solid rgba(250, 246, 240, 0.1);
      margin-bottom: 1.5rem;
    }
    .section-title { font-family: var(--font-display); font-weight: 600; font-size: 1.125rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .section-title .icon { width: 20px; height: 20px; stroke: #4a6741; stroke-width: 2; fill: none; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

    .breakdown-bar {
      display: flex;
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 1rem;
      background: var(--color-background-base, #1a1614);
    }

    .breakdown-segment {
      height: 100%;
      transition: width 0.5s ease;
    }

    .breakdown-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .model-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: var(--color-background-base, #1a1614);
      border-radius: 8px;
      margin-bottom: 0.75rem;
    }
    .model-card:last-child { margin-bottom: 0; }
    .model-name { font-weight: 600; font-size: 0.9375rem; }
    .model-cost { font-family: var(--font-mono); font-size: 1rem; font-weight: 600; color: #4a6741; }

    .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid rgba(250, 246, 240, 0.05); }
    .metric-row:last-child { border-bottom: none; }
    .metric-name { color: var(--color-text-secondary, #c4bdb4); font-size: 0.875rem; }
    .metric-value { font-family: var(--font-mono); font-weight: 600; }

    .refresh-btn { display: flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid rgba(250, 246, 240, 0.1); background: transparent; color: var(--color-text-secondary); font-size: 0.875rem; cursor: pointer; transition: all 200ms ease; }
    .refresh-btn:hover { background: rgba(250, 246, 240, 0.05); color: var(--color-text-primary); }
    .refresh-btn .icon { width: 16px; height: 16px; }

    .loading-overlay { display: flex; align-items: center; justify-content: center; padding: 4rem; color: var(--color-text-muted); }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--color-background-elevated); border-top-color: #4a6741; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 1rem; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    [data-theme="light"] {
      --color-background-base: #faf6f0;
      --color-background-elevated: #ffffff;
      --color-text-primary: #2C2520;
      --color-text-secondary: #5a524a;
      --color-text-muted: #8a827a;
    }
    .theme-toggle { padding: 0.375rem; border-radius: 8px; border: 1px solid rgba(250, 246, 240, 0.1); background: transparent; cursor: pointer; }
    .theme-toggle .icon { width: 18px; height: 18px; stroke: var(--color-text-secondary); stroke-width: 2; fill: none; }
    /* Reduced Motion Support - WCAG Compliance */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
      .loading-spinner { animation: none; }
    }
    /* Focus indicators for accessibility */
    .nav-link:focus-visible, .refresh-btn:focus-visible, .theme-toggle:focus-visible {
      outline: 2px solid var(--color-accent-primary);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <nav class="nav-header" aria-label="Dashboard navigation">
    <div class="nav-brand">
      <div class="nav-brand-icon"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <span class="nav-brand-text">Ferni Observability</span>
    </div>
    <div class="nav-links">
      <a href="/observability-hub.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Hub</a>
      <a href="/llm-dashboard.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg>LLM</a>
      <a href="/connection-dashboard.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><circle cx="12" cy="20" r="1"/></svg>Connection</a>
      <a href="/cost-dashboard.html" class="nav-link active"><svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Cost</a>
      <a href="/handoff-dashboard.html" class="nav-link"><svg class="icon" viewBox="0 0 24 24"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/></svg>Handoffs</a>
      <button class="theme-toggle" onclick="toggleTheme()"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/></svg></button>
    </div>
  </nav>

  <main class="main-content" id="main-content">
    <div class="loading-overlay"><div class="loading-spinner"></div><span>Loading cost data...</span></div>
  </main>

  <script>
    let data = null;
    const appEl = document.getElementById('main-content');

    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
      localStorage.setItem('ferni-theme', current === 'dark' ? 'light' : 'dark');
    }

    const savedTheme = localStorage.getItem('ferni-theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

    async function fetchData() {
      try {
        const response = await fetch('/api/observability/cost');
        if (!response.ok) throw new Error('Failed to fetch');
        data = await response.json();
        render();
      } catch (err) {
        appEl.innerHTML = `<div class="loading-overlay"><span style="color: var(--color-semantic-warning)">Failed to load data. Is the server running?</span></div>`;
      }
    }

    function formatCurrency(amount) {
      if (amount >= 1) return `$${amount.toFixed(2)}`;
      if (amount >= 0.01) return `$${amount.toFixed(3)}`;
      return `$${amount.toFixed(4)}`;
    }

    function formatNumber(n) {
      if (n >= 1000000) return `${(n / 1000000).toFixed(1)}M`;
      if (n >= 1000) return `${(n / 1000).toFixed(1)}K`;
      return n.toLocaleString();
    }

    const serviceColors = {
      llm: '#4a6741',
      tts: '#3a6b73',
      stt: '#9a7b5a',
      embedding: '#5a6b8a'
    };

    function render() {
      if (!data) return;

      const totalForBreakdown = (data.llmCost || 0) + (data.ttsCost || 0) + (data.sttCost || 0) + (data.embeddingCost || 0);
      const llmPercent = totalForBreakdown > 0 ? (data.llmCost / totalForBreakdown) * 100 : 25;
      const ttsPercent = totalForBreakdown > 0 ? (data.ttsCost / totalForBreakdown) * 100 : 25;
      const sttPercent = totalForBreakdown > 0 ? (data.sttCost / totalForBreakdown) * 100 : 25;
      const embPercent = totalForBreakdown > 0 ? (data.embeddingCost / totalForBreakdown) * 100 : 25;

      const models = Object.entries(data.costByModel || {}).sort((a, b) => b[1] - a[1]);
      const providers = Object.entries(data.costByProvider || {}).sort((a, b) => b[1] - a[1]);

      appEl.innerHTML = `
        <header class="page-header">
          <div>
            <p class="page-eyebrow">Budget & Spend</p>
            <h1 class="page-title">Cost Tracking</h1>
            <p class="page-subtitle">Monitor API costs across LLM, TTS, and STT services</p>
          </div>
          <button class="refresh-btn" onclick="fetchData()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Refresh
          </button>
        </header>

        <section class="cost-hero">
          <div class="cost-main">
            <span class="cost-label">Total Spend</span>
            <span class="cost-value">${formatCurrency(data.totalCost || 0)}</span>
          </div>
          <div class="cost-secondary">
            <div class="cost-item">
              <div class="cost-item-value">${formatCurrency(data.costLastHour || 0)}</div>
              <div class="cost-item-label">Last Hour</div>
            </div>
            <div class="cost-item">
              <div class="cost-item-value">${formatCurrency(data.costLast24h || 0)}</div>
              <div class="cost-item-label">Last 24h</div>
            </div>
            <div class="cost-item">
              <div class="cost-item-value">${formatCurrency(data.projectedMonthlyCost || 0)}</div>
              <div class="cost-item-label">Projected/Month</div>
            </div>
          </div>
        </section>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">LLM Cost</div>
            <div class="stat-value" style="color: ${serviceColors.llm}">${formatCurrency(data.llmCost || 0)}</div>
            <div class="stat-subtext">${formatNumber(data.tokensUsed || 0)} tokens</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">TTS Cost</div>
            <div class="stat-value" style="color: ${serviceColors.tts}">${formatCurrency(data.ttsCost || 0)}</div>
            <div class="stat-subtext">${formatNumber(data.charactersSpoken || 0)} chars</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">STT Cost</div>
            <div class="stat-value" style="color: ${serviceColors.stt}">${formatCurrency(data.sttCost || 0)}</div>
            <div class="stat-subtext">${(data.minutesTranscribed || 0).toFixed(1)} min</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Embedding Cost</div>
            <div class="stat-value" style="color: ${serviceColors.embedding}">${formatCurrency(data.embeddingCost || 0)}</div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">
            <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
            Cost Breakdown by Service
          </h2>
          <div class="breakdown-bar">
            <div class="breakdown-segment" style="width: ${llmPercent}%; background: ${serviceColors.llm}"></div>
            <div class="breakdown-segment" style="width: ${ttsPercent}%; background: ${serviceColors.tts}"></div>
            <div class="breakdown-segment" style="width: ${sttPercent}%; background: ${serviceColors.stt}"></div>
            <div class="breakdown-segment" style="width: ${embPercent}%; background: ${serviceColors.embedding}"></div>
          </div>
          <div class="breakdown-legend">
            <div class="legend-item"><span class="legend-dot" style="background: ${serviceColors.llm}"></span>LLM (${llmPercent.toFixed(0)}%)</div>
            <div class="legend-item"><span class="legend-dot" style="background: ${serviceColors.tts}"></span>TTS (${ttsPercent.toFixed(0)}%)</div>
            <div class="legend-item"><span class="legend-dot" style="background: ${serviceColors.stt}"></span>STT (${sttPercent.toFixed(0)}%)</div>
            <div class="legend-item"><span class="legend-dot" style="background: ${serviceColors.embedding}"></span>Embedding (${embPercent.toFixed(0)}%)</div>
          </div>
        </div>

        <div class="two-col">
          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/></svg>
              Cost by Model
            </h2>
            ${models.length > 0 ? models.slice(0, 6).map(([model, cost]) => `
              <div class="model-card">
                <div class="model-name">${model}</div>
                <div class="model-cost">${formatCurrency(cost)}</div>
              </div>
            `).join('') : '<p style="color: var(--color-text-muted); text-align: center; padding: 2rem;">No model cost data</p>'}
          </div>

          <div class="section">
            <h2 class="section-title">
              <svg class="icon" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
              Cost Efficiency
            </h2>
            <div class="metric-row">
              <span class="metric-name">Cost per Session</span>
              <span class="metric-value">${formatCurrency(data.costPerSession || 0)}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Cost per Minute</span>
              <span class="metric-value">${formatCurrency(data.costPerMinute || 0)}</span>
            </div>
            <div class="metric-row">
              <span class="metric-name">Projected Monthly</span>
              <span class="metric-value">${formatCurrency(data.projectedMonthlyCost || 0)}</span>
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
            Cost by Provider
          </h2>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
            ${providers.map(([provider, cost]) => `
              <div class="model-card">
                <div class="model-name">${provider}</div>
                <div class="model-cost">${formatCurrency(cost)}</div>
              </div>
            `).join('') || '<p style="color: var(--color-text-muted); text-align: center; padding: 2rem;">No provider data</p>'}
          </div>
        </div>
      `;
    }

    fetchData();
    setInterval(fetchData, 30000);
  </script>
</body>
</html>
