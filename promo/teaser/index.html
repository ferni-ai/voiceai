<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferni — Coming Soon</title>
  <meta name="description" content="The future of personal AI is almost here. Join the waitlist.">
  <meta name="theme-color" content="#08080c">

  <!-- Open Graph -->
  <meta property="og:title" content="Ferni — Coming Soon">
  <meta property="og:description" content="The future of personal AI is almost here. Join the waitlist.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ferni.ai/teaser">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Ferni — Coming Soon">
  <meta name="twitter:description" content="The future of personal AI is almost here. Join the waitlist.">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%238b5cf6' rx='20' width='100' height='100'/><text x='50' y='68' font-family='system-ui' font-size='48' font-weight='bold' fill='white' text-anchor='middle'>FN</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ========================================================================
       CSS VARIABLES
       ======================================================================== */
    :root {
      --color-bg: #08080c;
      --color-bg-elevated: #0f0f14;
      --color-text: #fafafa;
      --color-text-secondary: #9ca3af;
      --color-text-muted: #6b7280;
      --color-accent: #8b5cf6;
      --color-accent-light: #a78bfa;
      --color-accent-glow: rgba(139, 92, 246, 0.4);
      --color-border: rgba(255, 255, 255, 0.06);
      --font-display: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ========================================================================
       RESET & BASE
       ======================================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-display);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      overflow: hidden;
    }

    ::selection {
      background: var(--color-accent);
      color: white;
    }

    /* ========================================================================
       MAIN SCENE
       ======================================================================== */
    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background Effects */
    .scene-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .gradient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.5;
      animation: orbFloat 20s ease-in-out infinite;
    }

    .gradient-orb--primary {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--color-accent) 0%, transparent 70%);
      top: 20%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 0s;
    }

    .gradient-orb--secondary {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #d946ef 0%, transparent 70%);
      bottom: 20%;
      right: 20%;
      animation-delay: -7s;
      animation-duration: 25s;
    }

    .gradient-orb--tertiary {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
      bottom: 30%;
      left: 10%;
      animation-delay: -14s;
      animation-duration: 30s;
    }

    @keyframes orbFloat {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.4;
      }
      33% {
        transform: translate(-45%, -55%) scale(1.1);
        opacity: 0.6;
      }
      66% {
        transform: translate(-55%, -45%) scale(0.9);
        opacity: 0.35;
      }
    }

    /* Grid overlay */
    .scene-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
    }

    /* Noise texture */
    .scene-noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }

    /* ========================================================================
       CONTENT
       ======================================================================== */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 24px;
      max-width: 600px;
    }

    /* Logo */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s var(--ease-out-expo) 0.2s forwards;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--color-accent) 0%, #d946ef 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: white;
      box-shadow: 0 8px 32px var(--color-accent-glow);
    }

    .logo-text {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* Headline */
    .headline {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s var(--ease-out-expo) 0.4s forwards;
    }

    .headline-gradient {
      background: linear-gradient(135deg, var(--color-accent) 0%, #d946ef 50%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Subheadline */
    .subheadline {
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: var(--color-text-secondary);
      margin-bottom: 48px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s var(--ease-out-expo) 0.6s forwards;
    }

    /* Waitlist Form */
    .waitlist-form {
      display: flex;
      gap: 12px;
      max-width: 440px;
      margin: 0 auto 32px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s var(--ease-out-expo) 0.8s forwards;
    }

    .waitlist-input {
      flex: 1;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      color: var(--color-text);
      font-family: inherit;
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
    }

    .waitlist-input::placeholder {
      color: var(--color-text-muted);
    }

    .waitlist-input:focus {
      border-color: var(--color-accent);
      background: rgba(139, 92, 246, 0.05);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
    }

    .waitlist-btn {
      padding: 16px 28px;
      background: linear-gradient(135deg, var(--color-accent) 0%, #7c3aed 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .waitlist-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--color-accent-glow);
    }

    .waitlist-btn:active {
      transform: translateY(0);
    }

    /* Success message */
    .waitlist-success {
      display: none;
      padding: 16px 24px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 12px;
      color: #10b981;
      font-weight: 500;
      margin-bottom: 32px;
    }

    .waitlist-success.show {
      display: block;
      animation: fadeUp 0.5s var(--ease-out-expo) forwards;
    }

    /* Features hint */
    .features-hint {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s var(--ease-out-expo) 1s forwards;
    }

    .feature-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--color-border);
      border-radius: 100px;
      font-size: 14px;
      color: var(--color-text-secondary);
    }

    .feature-pill svg {
      width: 16px;
      height: 16px;
      color: var(--color-accent);
    }

    /* ========================================================================
       FOOTER
       ======================================================================== */
    .footer {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 0.8s var(--ease-out-expo) 1.2s forwards;
    }

    .footer-text {
      font-size: 13px;
      color: var(--color-text-muted);
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 8px;
    }

    .footer-link {
      font-size: 13px;
      color: var(--color-text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer-link:hover {
      color: var(--color-accent);
    }

    /* ========================================================================
       ANIMATIONS
       ======================================================================== */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ========================================================================
       RESPONSIVE
       ======================================================================== */
    @media (max-width: 640px) {
      .waitlist-form {
        flex-direction: column;
      }

      .waitlist-btn {
        width: 100%;
      }

      .features-hint {
        gap: 10px;
      }

      .feature-pill {
        padding: 8px 14px;
        font-size: 13px;
      }

      .logo {
        margin-bottom: 32px;
      }

      .headline {
        margin-bottom: 16px;
      }

      .subheadline {
        margin-bottom: 32px;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <!-- Background Effects -->
    <div class="scene-bg">
      <div class="gradient-orb gradient-orb--primary"></div>
      <div class="gradient-orb gradient-orb--secondary"></div>
      <div class="gradient-orb gradient-orb--tertiary"></div>
      <div class="scene-grid"></div>
      <div class="scene-noise"></div>
    </div>

    <!-- Main Content -->
    <div class="content">
      <div class="logo">
        <div class="logo-icon">FN</div>
        <span class="logo-text">Ferni</span>
      </div>

      <h1 class="headline">
        The future of<br>
        <span class="headline-gradient">personal AI.</span>
      </h1>

      <p class="subheadline">
        Six AI specialists. One seamless conversation.<br>
        Join the waitlist for early access.
      </p>

      <div class="waitlist-success" id="successMessage">
        You're on the list! We'll be in touch soon.
      </div>

      <form class="waitlist-form" id="waitlistForm">
        <input
          type="email"
          class="waitlist-input"
          placeholder="Enter your email"
          required
          id="emailInput"
        >
        <button type="submit" class="waitlist-btn">Join Waitlist</button>
      </form>

      <div class="features-hint">
        <span class="feature-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/>
            <path d="M12 6v6l4 2"/>
          </svg>
          Launching Soon
        </span>
        <span class="feature-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          6 AI Specialists
        </span>
        <span class="feature-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          Voice-First
        </span>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p class="footer-text">&copy; 2024 Ferni AI. All rights reserved.</p>
      <div class="footer-links">
        <a href="/privacy" class="footer-link">Privacy</a>
        <a href="/terms" class="footer-link">Terms</a>
      </div>
    </footer>
  </div>

  <script>
    // Waitlist Form Handler
    const form = document.getElementById('waitlistForm');
    const emailInput = document.getElementById('emailInput');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value;

      // Here you would typically send to your backend/email service
      // For now, we'll simulate success
      console.log('Waitlist signup:', email);

      // Show success message
      form.style.display = 'none';
      successMessage.classList.add('show');

      // Optional: Send to analytics
      if (typeof gtag !== 'undefined') {
        gtag('event', 'waitlist_signup', {
          'event_category': 'engagement',
          'event_label': email
        });
      }
    });

    // Add subtle parallax effect to orbs on mouse move
    document.addEventListener('mousemove', (e) => {
      const orbs = document.querySelectorAll('.gradient-orb');
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 20;

      orbs.forEach((orb, index) => {
        const factor = (index + 1) * 0.5;
        orb.style.transform = `translate(calc(-50% + ${x * factor}px), calc(-50% + ${y * factor}px))`;
      });
    });
  </script>
</body>
</html>
