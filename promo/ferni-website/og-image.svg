<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - Warm cream like the website -->
  <rect width="1200" height="630" fill="#f5f1e8"/>
  
  <!-- Gradient overlays for depth -->
  <defs>
    <radialGradient id="glow1" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#4a6741" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4a6741" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.2" cy="0.8" r="0.5">
      <stop offset="0%" stop-color="#8b7355" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8b7355" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5c7a52"/>
    </linearGradient>
    <linearGradient id="orbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6741"/>
      <stop offset="100%" stop-color="#5c7a52"/>
    </linearGradient>
  </defs>
  
  <!-- Subtle glows -->
  <ellipse cx="840" cy="189" rx="400" ry="300" fill="url(#glow1)"/>
  <ellipse cx="240" cy="504" rx="300" ry="250" fill="url(#glow2)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="560" y1="0" x2="560" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="880" y1="0" x2="880" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="1040" y1="0" x2="1040" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="#4a6741" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#4a6741" stroke-width="1"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#4a6741" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#4a6741" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#4a6741" stroke-width="1"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#4a6741" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#4a6741" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#4a6741" stroke-width="1"/>
    <line x1="0" y1="560" x2="1200" y2="560" stroke="#4a6741" stroke-width="1"/>
  </g>
  
  <!-- Voice Orb -->
  <g transform="translate(900, 315)">
    <!-- Outer rings -->
    <circle cx="0" cy="0" r="120" stroke="#4a6741" stroke-width="1" fill="none" opacity="0.2"/>
    <circle cx="0" cy="0" r="150" stroke="#4a6741" stroke-width="1" fill="none" opacity="0.15"/>
    <circle cx="0" cy="0" r="180" stroke="#4a6741" stroke-width="1" fill="none" opacity="0.1"/>
    
    <!-- Main orb -->
    <circle cx="0" cy="0" r="80" fill="url(#orbGradient)"/>
    
    <!-- Waveform inside orb -->
    <g fill="white" opacity="0.9">
      <rect x="-28" y="-20" width="4" height="12" rx="2"/>
      <rect x="-18" y="-28" width="4" height="20" rx="2"/>
      <rect x="-8" y="-32" width="4" height="28" rx="2"/>
      <rect x="2" y="-36" width="4" height="36" rx="2"/>
      <rect x="12" y="-32" width="4" height="28" rx="2"/>
      <rect x="22" y="-28" width="4" height="20" rx="2"/>
    </g>
    
    <!-- Persona dots orbiting - using brand-adjacent colors -->
    <circle cx="0" cy="-110" r="20" fill="#4a6741"/>
    <circle cx="95" cy="-55" r="16" fill="#9a7b5a"/>
    <circle cx="95" cy="55" r="16" fill="#3a6b73"/>
    <circle cx="0" cy="110" r="16" fill="#5a6b8a"/>
    <circle cx="-95" cy="55" r="16" fill="#a67a6a"/>
    <circle cx="-95" cy="-55" r="16" fill="#c4856a"/>
  </g>
  
  <!-- Logo -->
  <g transform="translate(80, 60)">
    <rect width="48" height="48" rx="12" fill="url(#orbGradient)"/>
    <text x="24" y="33" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">FN</text>
  </g>
  <text x="140" y="95" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#2c2c2c">Ferni</text>
  
  <!-- Main headline -->
  <text x="80" y="280" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="#2c2c2c">Finally, someone</text>
  <text x="80" y="370" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="url(#textGradient)">who actually listens.</text>
  
  <!-- Subheadline -->
  <text x="80" y="440" font-family="system-ui, sans-serif" font-size="24" fill="#6b6b6b">Six AI specialists. One seamless conversation.</text>
  <text x="80" y="475" font-family="system-ui, sans-serif" font-size="24" fill="#6b6b6b">Your personal AI life coach—just talk.</text>
  
  <!-- URL -->
  <text x="80" y="570" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#4a6741">ferni.ai</text>
</svg>
