<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Ferni</title>
  <meta name="description" content="Oops! This page doesn't exist. Let's get you back on track.">
  <meta name="theme-color" content="#faf8f5">
  <meta name="robots" content="noindex, nofollow">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234a6741' rx='20' width='100' height='100'/><text x='50' y='68' font-family='system-ui' font-size='48' font-weight='bold' fill='white' text-anchor='middle'>FN</text></svg>">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/design-tokens.css?v=1">
  <link rel="stylesheet" href="css/styles.css?v=30">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8);
      background: var(--color-bg-primary);
    }
    
    .error-container {
      text-align: center;
      max-width: 500px;
    }
    
    .error-avatar {
      width: 120px;
      height: 120px;
      margin: 0 auto var(--space-8);
      background: var(--color-ferni);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .error-avatar::before {
      content: '';
      position: absolute;
      inset: -12px;
      background: var(--color-ferni-glow);
      border-radius: var(--radius-full);
      z-index: -1;
      filter: blur(20px);
    }
    
    .avatar-face {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }
    
    .avatar-eyes {
      display: flex;
      gap: var(--space-4);
    }
    
    .eye {
      width: 12px;
      height: 12px;
      background: white;
      border-radius: var(--radius-full);
      position: relative;
    }
    
    .eye::after {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--color-text-primary);
      border-radius: var(--radius-full);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: lookAround 4s ease-in-out infinite;
    }
    
    @keyframes lookAround {
      0%, 100% { transform: translate(-50%, -50%); }
      25% { transform: translate(-20%, -50%); }
      75% { transform: translate(-80%, -50%); }
    }
    
    .avatar-mouth {
      width: 24px;
      height: 4px;
      background: white;
      border-radius: var(--radius-full);
      opacity: 0.8;
    }
    
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(80px, 20vw, 140px);
      font-weight: 800;
      color: var(--color-border-medium);
      line-height: 1;
      margin-bottom: var(--space-4);
    }
    
    .error-container h1 {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: var(--space-4);
    }
    
    .error-message {
      font-size: var(--text-lg);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-8);
      line-height: 1.6;
    }
    
    .error-actions {
      display: flex;
      gap: var(--space-4);
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: var(--space-10);
    }
    
    .error-suggestions {
      padding-top: var(--space-8);
      border-top: 1px solid var(--color-border-subtle);
    }
    
    .error-suggestions h2 {
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-muted);
      margin-bottom: var(--space-4);
    }
    
    .suggestion-links {
      display: flex;
      gap: var(--space-4);
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .suggestion-link {
      font-size: var(--text-sm);
      color: var(--color-accent);
      text-decoration: none;
      padding: var(--space-2) var(--space-4);
      background: var(--color-accent-subtle);
      border-radius: var(--radius-full);
      transition: background var(--transition-fast), color var(--transition-fast);
    }
    
    .suggestion-link:hover {
      background: var(--color-accent);
      color: white;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-container">
      <div class="error-avatar">
        <div class="avatar-face">
          <div class="avatar-eyes">
            <div class="eye"></div>
            <div class="eye"></div>
          </div>
          <div class="avatar-mouth"></div>
        </div>
      </div>
      
      <div class="error-code">404</div>
      <h1>Page not found</h1>
      <p class="error-message">
        Even the best conversations take unexpected turns. 
        Let's get you back to familiar ground.
      </p>
      
      <div class="error-actions">
        <a href="/" class="btn btn-primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Go Home</span>
        </a>
        <a href="https://app.ferni.ai?utm_source=ferni_website&utm_medium=web&utm_campaign=404" class="btn btn-ghost">
          Open the App
        </a>
      </div>
      
      <div class="error-suggestions">
        <h2>Popular Pages</h2>
        <div class="suggestion-links">
          <a href="/" class="suggestion-link">Home</a>
          <a href="/team" class="suggestion-link">Meet the Team</a>
          <a href="/pricing" class="suggestion-link">Pricing</a>
          <a href="/contact" class="suggestion-link">Contact</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
